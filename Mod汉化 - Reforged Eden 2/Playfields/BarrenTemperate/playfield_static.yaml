# Main POI placement.

# Please consider: EXCLUDED BIOMES  ============
#       PoleEdge, PoleEdge_1, SandDrift, Dunes - (Prevent spawning too close to Poles. POI otherwise tend to be placed there because the terrain is so flat.)
#       Rocks                                  - (Prevent spawning too close to large decoration)





# PLACEMENT ORDER:

# 1) Helper POI - Needed for this playfield to function
# 2) Faction POI
#   2a) All faction command centers (Dronebases)
#       2b) (If there) - Faction POI that Trigger a resource spawn (No resources if they do not spawn)
#   2c) All other faction POI: Main spawns > Cluster spawns & Defenses)
#   3) AuxPOI definitions, usually defenses.
# 3) Shelters & crashed vessels
# 4) Deco, nice finds, clutter and junk
# 5) TheLegacy and Alien


## FACTION ORDER
#   ===== Large factions or widespread ====== 
#   Xenu (aggressive - Most of the PV & drones), then Rados (Mining faction, carries GoldResource)

#   Polaris / Arkenian # (Since they are miners, carries GoldResource)

#   Warlords & Pirates # Overriding galactic faction territory, but have SpawnPOIAvoid any other factions to keep distance. May result in some NPC fights on this playfield. :)

#   ===== Small factions ===
#   Brotherhood of Farr # (This world has gold, so they are very interested)

#   TheLegacy # Override galactic faction territory, but SpawnPOIAvoid any other factions. Aggressive Creature anchor




POIs:
    Random:

# ======================= Helper POI =======================

          # HINT MARKERS, DRONE / PV ANCHORS ==========
          # Please do not remove. Needed for this playfield's specialities to function.
          # Most of them will not show in the map. (Exception: Hint POI)


          # Titanium - Hint marker
        - GroupName: SignalMarker01  # This 'POI' will not create a visible block. 
                                     # It should only guide players the idea that resources on this world can be undergroundlayers.
          IsImportant: True
          Faction: None
          PlaceAt: Terrain, UnderWater
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          SpawnPOINear: [START] # START is a fixed placed stamp, at about 0,y,0 position, spawning an undergroundlayer resource.
          SpawnPOINearRange: [10, 20] 
          Properties:
            - Key: MapMarker 
              Value: Neutral
            - Key: Discovery   # Can be seen everywhere on the map. 
              Value: False



          # PV SPAWN ANCHORS - A  (Invisible)
        - GroupName: SignalMarker02
          IsImportant: True
          Faction: None
          BiomesExcluded: [ PoleEdge, PoleEdge_1, SandDrift, Dunes ]
          IsScalingCount: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: True
          SpawnPOIAvoid: [SignalMarker02] 
          SpawnPOIAvoidDistance: 5000
          Properties:
            - Key: MapMarker 
              Value: Neutral  
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


          # PV SPAWN ANCHORS - B  (Invisible)
        - GroupName: SignalMarker03
          IsImportant: True
          Faction: None
          BiomesExcluded: [ PoleEdge, PoleEdge_1, SandDrift, Dunes ]
          IsScalingCount: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: True
          SpawnPOIAvoid: [SignalMarker03]  
          SpawnPOIAvoidDistance: 4000
          Properties:
            - Key: MapMarker 
              Value: Neutral  
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0



          # DRONE & PV SPAWN ANCHORS  (Invisible)
        # - GroupName: NullPOI
        - GroupName: SignalMarker04

          IsScalingCount: True
          CountMinMax: [ 20, 20 ]
          Faction: None
          BiomesExcluded: [ PoleEdge, PoleEdge_1, SandDrift, Dunes ]

          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2

          SpawnPOIAvoid: [NullPOI, SignalMarker04]  # to spread them out
          SpawnPOIAvoidDistance: 800

          Properties:
            - Key: MapMarker 
              Value: Neutral  
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0



