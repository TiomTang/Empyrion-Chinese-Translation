---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html


Description: |
  难度: [c][ff0000]困难[-][/c]

  [c][ffff00]警告：新的装饰系统正在测试中。进入此游戏场地可能会遇到意外问题。[-][/c]

  这颗行星没有任何自然生命，因靠近恒星白天被灼烧，夜晚则冻结。富含资源的陨石覆盖着地表，而地下深处则蕴藏着丰富的矿藏。



PlanetType: Barren
PlayfieldType: Planet
Difficulty: 2

LandClaimZone: Device


# Atmosphere and Sky
AtmosphereEnabled: False

# Light
DayLightIntensity: 1.6
NightLightIntensity: 0.7

DayShadowStrength: 0.95

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhiteMoon
# ==============================================================

### Resource Deposits
RandomResources:
# Size Scaling of ore amount. Poor = 66%. Normal = 100%. Rich = 143%. Gold = 66%. Penatix = 50%.
# ======================================================================================================
# 1=2          6=542      11=3300     16=10200    21=23200
# 2=20         7=862      12=4300     17=12300    22=26700
# 3=67         8=1200     13=5500     18=14600    23=30500
# 4=160        9=1800     14=6800     19=17200    24=34700
# 5=314        10=2500    15=8400     20=20100    25=39200
# ======================================================================================================
    - Name: IronResource
      IsScalingCount: True
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 9, 10 ]
      DepthMinMax: [ 40, 50 ]
      DroneProb: 1
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 3

    - Name: MagnesiumResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 1
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 32
        #YVariance: 3

    - Name: SathiumResource
      # IsScalingCount: True
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 11, 12 ]
      DroneProb: 1
      MaxDroneCount: 5
      DepthMinMax: [ 40, 50 ]
      #DistTypeCylinder:
        #MaxRadius: 32
        #YVariance: 3

    - Name: SathiumResource
      IsScalingCount: True
      CountMinMax: [ 5, 6 ]
      SizeMinMax: [ 9, 11 ]
      DroneProb: 1
      MaxDroneCount: 5
      DepthMinMax: [ 40, 50 ]
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 3

    - Name: GoldResource
      IsScalingCount: True
      CountMinMax: [ 5, 6 ]
      SizeMinMax: [ 2, 3 ]
      DroneProb: 1
      MaxDroneCount: 5
      DepthMinMax: [ 20, 30 ]
      #DistTypeCylinder:
        #MaxRadius: 2
        #YVariance: 2

### Resource Asteroids
AsteroidResources:
     - Name: IronResource
       Threshold: 0.1
       Amount: 0.2
     - Name: MagnesiumResource
       Threshold: 0.1
       Amount: 0.2
     - Name: SathiumResource
       Threshold: 0.1
       Amount: 0.2

### POIs
POIs:
    Random:

# Tesch main
        - GroupName: R2TeschMainT3
          Faction: Alien
          FactionTerritory: [All]
          # NoShieldReload: True
          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 2, 4 ]
          ReserveCount: 3
          TroopTransport: False
          Properties:
            - Key: RegenAfter
              Value: 4320

       # Defense Buildings
        - GroupName: R2TeschDefenseMechT1
          Faction: Alien
          FactionTerritory: [All]
          # NoShieldReload: True
          CountMinMax: [ 6, 6 ]
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOIAvoid: [R2TeschDefenseMechT1]
          SpawnPOIAvoidDistance: 100
          SpawnPOINear: [R2TeschMainT3]
          SpawnPOINearRange: [250, 300]
          Properties:
            - Key: RegenAfter
              Value: 720

# Random Tesch POIs scattered around planet.
        - GroupName: R2TeschMainT1
          Faction: Alien
          FactionTerritory: [All]
          # NoShieldReload: True
          CountMinMax: [ 3, 4 ]
          IsScalingCount: True
          DroneProb: 1.0
          DronesMinMax: [ 2, 3 ]
          ReserveCount: 1
          TroopTransport: False
          SpawnPOIAvoid: [R2TeschMainT3]
          SpawnPOIAvoidDistance: 1500
          Properties:
            - Key: RegenAfter
              Value: 720

        - GroupName: R2TeschDefenseMechT1
          Faction: Alien
          FactionTerritory: [All]
          # NoShieldReload: True
          CountMinMax: [ 6, 7 ]
          IsScalingCount: True
          DroneProb: 1.0
          DronesMinMax: [ 2, 3 ]
          ReserveCount: 1
          TroopTransport: False
          SpawnPOIAvoid: [R2TeschMainT3]
          SpawnPOIAvoidDistance: 1500
          Properties:
            - Key: RegenAfter
              Value: 720


# Harvestable Voidium
        - GroupName: Eden_HarvestVoidiumT1
          Faction: None
          CountMinMax: [ 0, 2 ]
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 4320

# Surface silver
        - GroupName: Eden_PalladiumSurface
          Faction: None
          Biome: [ Rocks ]
          CountMinMax: [ 8, 12 ]
          IsScalingCount: True
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False 
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0
            - Key: MapMarker
              Value: Neutral
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 4320

# Palladium
        - GroupName: Eden_HarvestPalladium
          Faction: None
          # NoShieldReload: True
          CountMinMax: [ 1, 2 ]
          IsScalingCount: True
          DroneProb: 0.5
          DronesMinMax: [ 1, 3 ]
          ReserveCount: 3
          TroopTransport: False 
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 4320







    FixedPlayerStart:
        - Mode: Debug
          Pos: [ -835, 165, -1000 ]
          RotY: 125
          Armor: ArmorMedium

        - Mode: Survival
          Spawn: EscapePod
          Armor: ArmorMedium

