### POIs
POIs:
    Random:

    # Lower landmass = worse spawning chances. Lots of POI are set to 'IsImportant'.

# =========== Resource cluster ===========
# For higher difficulty and as an exploration goal.
# These will cluster resources on different islands, resulting in an e.g. 'Iron Island', 'Copper Island',...
 
          # Resources: Closest to start
        - GroupName: NullPOI 
          IsImportant: True
          Faction: None
          PlaceAt: Terrain
          BiomesExcluded: [ IceSheet, PolarSnow, Rocks, Glacier]
          CountMinMax: [ 1, 1 ]
          DroneProb: 0
          DronesMinMax: [ 1, 1] 
          ReserveCount: 0
          SpawnPOIAvoid: [START]
          SpawnPOIAvoidDistance: 1000
          SpawnPOINear: [START]
          SpawnPOINearRange: [1000, 2000]
          SpawnResource: ["IronResource:2-3","CopperResource:0-1"]
