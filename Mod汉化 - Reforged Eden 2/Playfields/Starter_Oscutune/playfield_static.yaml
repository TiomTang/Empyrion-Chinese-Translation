    - Biomes: [KelpForest, CoralReefs, OpenSea, ShallowWater, ShallowWater_1, ShallowWaterLilies, Surf, Surf_1, Shore, GravelBeach, SwampShore, Swamp, Marsh]
      Entities:
        - Name: Telluropods
          Period: Always
          Amount: 50
          DelayMinMax: [3, 5] 
          AllowInWater: true 
          Color: "0, 0, 0.7"

      # Extra many Telluropods at some shores
    - Biomes: [ShallowWaterLilies, SwampShore]
      Entities:
        - Name: Telluropods
          Period: Always
          Amount: 200
          DelayMinMax: [3, 5] 
          AllowInWater: true 
          Color: "0, 0, 0.7"


    - Biomes: [DeepForest, Marsh, Swamp, SwampShore, GravelBeach]
      Entities:
        - Name: Creepys
          Period: Night
          Amount: 10
          DelayMinMax: [15, 20]
          Color: "1.0, 0, 0"

    - Biomes: [ShallowWaterLilies, Swamp, SwampShore]
      Entities:
        - Name: Slimes
          Period: Always
          Amount: 50
          DelayMinMax: [6, 20]
          AllowInWater: true
          Color: "0.8, 0.7, 1"

      # Arthropods
    - Biomes: [HighPalms, TropicalHills, Hills, DustBowl, Marsh, Forest, DeepForest, Savanna, GravelBeach, PalmBeach, SandBeach, ForestClearing, Dunes, PalmDunes ]
      Entities:
        - Name: AlienBugs01  # Mostly harmless
          Period: Always
          Amount: 40
          DelayMinMax: [6, 20]

    - Biomes: [Savanna, HighPalms, TropicalHills, DustBowl, Cliffs, ForestClearing, Dunes, PalmDunes ]
      Entities:
        - Name: CaveWormsGrey
          Period: Always
          Amount: 30
          DelayMinMax: [12, 20]

      # Hidden in the woods
    - Biomes: [PalmForest, Forest, DeepForest]
      Entities:
        - Name: CaveWormsGreen
          Period: Always
          Amount: 20
          DelayMinMax: [20, 24]
          Color: "0, 0.7, 0" 

    - Biomes: [PalmForest, Forest, DeepForest]
      Entities:
        - Name: CaveWormsGreen
          Period: Night
          Amount: 70
          DelayMinMax: [8, 10] 
          Color: "0, 0.7, 0" 


      # Open spaces
    - Biomes: [Marsh, Forest, HighForest, DeepForest, DustBowl, Grassland, GrasslandShore, Tundra, ColdPlains]
      Entities:
        - Name: RaptorsNight 
          Period: Night
          Amount: 25
          DelayMinMax: [10, 12]
    - Biomes: [ Savanna, TropicalHills, HighPalms, Marsh, Forest, HighForest, Cliffs, Hills, DustBowl, Grassland, ColdPlains, Tundra, PolarSnow]
      Entities:
        - Name: RaptorsNight
          Period: Always
          Amount: 25
          DelayMinMax: [10, 12]

    - Biomes: [ HighPalms, Marsh, HighForest, Hills, Grassland, ColdPlains]
      Entities:
        - Name: Raptors
          Period: Always
          Amount: 15
          DelayMinMax: [10, 12]

    - Biomes: [Marsh, Forest, HighForest, DustBowl, Grassland]
      Entities:
        - Name: Pangolins
          Period: Always
          Amount: 15
          DelayMinMax: [10, 12]

      # Temperate to cold, open spaces
    - Biomes: [ Hills, Grassland, ColdPlains, Tundra, PolarSnow]
      Entities:
        - Name: LizardMules
          Period: Always
          Amount: 25
          DelayMinMax: [10, 12]

    - Biomes: [ ColdPlains, Tundra, PolarSnow] # More of them in some biomes.
      Entities:
        - Name: LizardMules
          Period: Always
          Amount: 25
          DelayMinMax: [10, 12]


      # Island hunter's prey
      
      # Extremely rare (about 1 per three islands)
    - Biomes: [PalmForest, Cliffs, DustBowl, Rocks, Glacier, PolarSnow, LowMountains, LowMountains_1, Mountains]
      Entities:
        - Name: GolemsDesert
          Period: Night
          Amount: 1
          DelayMinMax: [20, 24]
          Color: "1.0, 0, 1.0"
      # (Minimal extra chance for mountains)
    - Biomes: [LowMountains, LowMountains_1, Mountains]
      Entities:
        - Name: GolemsDesert
          Period: Night
          Amount: 1
          DelayMinMax: [20, 24]
          Color: "1.0, 0, 1.0"
          
      # Common places - about 2 per dust bowl stamp
    - Biomes: [DustBowl]
      Entities:
        - Name: GolemsDesert
          Period: Always
          Amount: 30
          DelayMinMax: [-1, -1]
          Color: "1.0, 0, 1.0"

