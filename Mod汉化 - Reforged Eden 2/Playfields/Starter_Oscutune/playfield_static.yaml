### Resource Deposits
RandomResources:
    - Name: CarbonResource
      # Biome: [ Heath, Savanna, Hills, Plains, SavannaEdge, Grassland_1, Grassland ]
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 0, 5 ]
      DroneProb: 0.2
      MaxDroneCount: 1

# Smaller scattered around planet
    - Name: CarbonResource
      IsScalingCount: True
      CountMinMax: [ 7, 7 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 0, 1 ]
      DroneProb: 0
      MaxDroneCount: 1

    - Name: IronResource
      BiomesExcluded: [ IceSheet ]
      IsScalingCount: True
      CountMinMax: [ 4, 4 ]  
      SizeMinMax: [ 4, 8 ] 
      DepthMinMax: [ 5, 15 ] 
      DroneProb: 0.2 
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 8
        #YVariance: 5

    - Name: SiliconResource
      BiomesExcluded: [ IceSheet, PolarSnow, Glacier, Rocks ]
      IsScalingCount: True
      CountMinMax: [ 4, 4 ]
      SizeMinMax: [ 3, 8 ]
      DepthMinMax: [ 5, 15 ] 
      DroneProb: 0.3
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 8
        #YVariance: 5

    - Name: CopperResource
      BiomesExcluded: [ IceSheet ]
      IsScalingCount: True
      CountMinMax: [ 3, 3 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 5, 15 ] 
      DroneProb: 0.3
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 8
        #YVariance: 5

      
    - Name: PromethiumResource   # Will get grabbed by POI 
      Biome: [ Mountains, LowMountains, HighForest, DeepForest ]
      IsScalingCount: True
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 0, 1 ] 
      DroneProb: 0.9 
      MaxDroneCount: 4
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: PromethiumResource
      Biome: [ Mountains, LowMountains, HighForest, DeepForest, HighPalms, ColdPlains, Tundra, Glacier, Rocks ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 5, 15 ] 
      DroneProb: 0.8
      MaxDroneCount: 3
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8


    - Name: SathiumResource  # First entry will get grabbed by POI
      BiomesExcluded: [ IceSheet, PolarSnow ]
      CountMinMax: [ 4, 4 ] 
      SizeMinMax: [ 6, 7 ] 
      DepthMinMax: [ 15, 20 ] 
      DroneProb: 0.7 
      MaxDroneCount: 2
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 16

    - Name: SathiumResource # Second entry will be ignored by POI. Less value.
      Biome: [ PalmForest, HighPalms, DeepForest, LowMountains, Savanna, DustBowl ]
      CountMinMax: [ 1, 2 ] 
      IsScalingCount: True
      SizeMinMax: [ 2, 4 ] 
      DepthMinMax: [ 15, 20 ] 
      DroneProb: 0.7 
      MaxDroneCount: 2
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 16



