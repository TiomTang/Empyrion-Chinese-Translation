# Description: "Difficulty: [c][ff0000][b]Very Hard[/b][-][/c]

# Dead, [c][ff0000][b]Dead2[/b][-][/c], Rogue

# [c][FFFFFF]_______________________________________________[-][/c]

# Start: [c][FFFFFF]Old Bunker[-][/c]                 Equipment: [c][FFFFFF]Minimal[-][/c]

# Missions: [c][FFFFFF]None[-][/c]                     Solar System: [c][FFFFFF]Epsilon[-][/c]


# A dead world, devoid of any natural resources. You will have to scavenge together what you need from the ruins of an extinct civilization and leave the planet before your emergency rations run out.


# [c][ffffff][i]Information on the scenario can be accessed in the Empyriopedia section of the PDA (F1).[-][/i][/c]"

PlanetType: Random Start
PlayfieldType: Planet
Difficulty: 50

LandClaimZone: Device

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.4, 0.3, 0.1"

SkyColor: "0.4, 0.2, 0.1" 
SkyHorizonColor: "0.2, 0, 0"
AtmosphereParams: [1, 1.6]          # [Rayleigh Multiplier, Atmosphere Contrast], default is AtmosphereParams: [1, 1.6]   
                                     # RayleighMultiplier between 0 and 10 - higher values make SkyColor / SkyHorizonColor more pronounced
                                     # Atmosphere Contrast between 0 and 3 - lower values wash out SkyColor / SkyHorizonColor 

# Light
DayLightIntensity: 1.2
NightLightIntensity: 0.40
LightZenithColor: "0.92, 0.75, 0.75"
LightHorizonColor: "1, 0.6, 0"
NightLightColor: "1, 0.78, 0.78"

DayShadowStrength: 0.5
NightShadowStrength: 1

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhite
OrbitUsesLightColor: True

# Fog
# AtmosphereFog: 0.35
FogCloudIntensity: 0.8
# GroundFogIntensity: 0
# GroundFogHeight: 0


# Clouds and Wind
CloudsDensity: 1
CloudsSharpness: 1
CloudsBrightness: 0.3
CloudsOpacity: 0.1
CloudsZenithColor: "0.1, 0, 0.1"
CloudsHorizonColor: "0.2, 0, 0.2"
CloudsNightZenithColor: "0.1, 0, 0.1"
CloudsNightHorizonColor: "0.2, 0, 0.2"

WindSpeed: 50

Seed: 666

# Special Effects 
SpecialEffectsLocal:
  - Name: DustDevil
    Biome: [ DriedLakeBed, Sand ]  
    Time: Always
    FollowPlayerY: True
    MaxHeight: 5
  - Name: WindLines
    Biome: [ Sand, LowMountains, Mountains ]
    Time: Always
    MaxHeight: 5

