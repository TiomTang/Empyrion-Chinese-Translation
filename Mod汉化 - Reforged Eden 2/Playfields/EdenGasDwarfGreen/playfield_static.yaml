### Resource Deposits
RandomResources:



### Resource Asteroids
AsteroidResources:


### POIs
POIs:
    Random:
    
    FixedPlayerStart:
        - Mode: Debug
          Pos: [ 0, 120, 0 ]
          RotY: 0

        - Mode: Survival
          Spawn: EscapePod
          Armor: ArmorMedium

 

### Drones



DroneSpawning:
    Random:
        - DronesMinMax: [ 0, 0 ]
          CenterX: -2500
          Radius: 2000

        - DronesMinMax: [ 0, 0 ]
          CenterX: 2500
          Radius: 2000

