### POIs
POIs:
    Random:

# =================================================================================================
# Main POIs. Important or larger POIs and POI compounds.
# =================================================================================================

# =============================================== Faction Zirax Main
# ====================== Drone Base
# Zirax Drone base
# # Forced to spawn on mountains. Allows different attack vectors
        - GroupName: R2DroneBase
          Faction: Zirax
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          Biome: [ Plateau, LowMountains, LowMountains_1, Mountains, SandDrift ]
          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          SpawnResource: ["IronResource:0-1","PromethiumResource:0-1","CopperResource:0-1"]
          SpawnResourceRange: [150,400]
          Properties:
            - Key: RegenAfter
              Value: 4320

# Defenses for Drone Base
        - GroupName: R2XenuDefenseT2
          Faction: Zirax
          Territory: False
          CountMinMax: [ 3, 4 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: True
          SpawnPOIAvoid: [R2XenuDefenseT2]
          SpawnPOIAvoidDistance: 250
          SpawnPOINear: [R2DroneBase]
          SpawnPOINearRange: [300, 400]
          Properties:
            - Key: RegenAfter
              Value: 720

        - GroupName: R2XenuDefenseT1
          Faction: Zirax
          Territory: False
          CountMinMax: [ 5, 7 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: True
          SpawnPOIAvoid: [R2XenuDefenseT1]
          SpawnPOIAvoidDistance: 250
          SpawnPOINear: [R2DroneBase]
          SpawnPOINearRange: [700, 800]
          Properties:
            - Key: RegenAfter
              Value: 720

# Deco
        - GroupName: R2XenuDeco
          Faction: Zirax
          Territory: False
          CountMinMax: [ 2, 3 ]
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOINear: [R2DroneBase]
          SpawnPOINearRange: [150, 300]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 500
            - Key: RegenAfter
              Value: 720

