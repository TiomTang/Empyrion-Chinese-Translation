### Resource Deposits
RandomResources:
    - Name: ErestrumResource
      # IsScalingCount: True 
      CountMinMax: [ 35, 50 ]
      Biome: [ CryoVolcano, Mountains ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 100, 250 ]
      DroneProb: 0
      #DistTypeCylinder:
        #MaxRadius: 2
        #YVariance: 5

    - Name: PentaxidResource
      # IsScalingCount: True 
      CountMinMax: [ 35, 50 ]
      Biome: [ CryoVolcano, Mountains ]
      SizeMinMax: [ 3, 3 ]
      DepthMinMax: [ 75, 175 ]
      DroneProb: 0
      #DistTypeCylinder:
        #MaxRadius: 2
        #YVariance: 5

### Resource Asteroids
AsteroidResources:


### POIs
POIs:
    Random:
       # ================================
              # Deep Core Mining Station
        - GroupName: Eden_DeepCoreMine
          Faction: Alien
          # NoShieldReload: True  
          IsImportant: True
          CountMinMax: [ 1, 1 ]
          SpawnResource: ["PentaxidResource:1-2"]
          SpawnResourceRange: [1,10]
          Properties:
            - Key: Discovery
              Value: False
            - Key: RegenAfter
              Value: 720

        - GroupName: Eden_SignalQuarantine
          Faction: Admin  
          IsImportant: True
          CountMinMax: [ 1, 1 ]
          SpawnPOINear: [Eden_DeepCoreMine]
          SpawnPOINearRange: [300, 400]
          Properties: 
            - Key: RegenAfter
              Value: 720

        - GroupName: Eden_DeepCoreDefense
          Faction: Alien
          # NoShieldReload: True  
          CountMinMax: [ 6, 8 ]
          SpawnPOINear: [Eden_DeepCoreMine]
          SpawnPOINearRange: [125, 250]
          SpawnPOIAvoid: [Eden_DeepCoreDefense] 
          SpawnPOIAvoidDistance: 50 
          Properties: 
            - Key: MapDistance
              Value: 100
            - Key: RegenAfter
              Value: 720

       # Geysers around mining facility
        - GroupName: Eden_Geyser
          Faction: None
          # IsScalingCount: True
          CountMinMax: [ 4, 6 ]
          SpawnPOINear: [Eden_DeepCoreMine]
          SpawnPOINearRange: [150, 250]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0
            - Key: RegenAfter
              Value: 720

# =========================== Random POIs
# Spawn anchors for resources
        - GroupName: NullPOI
          IsImportant: True
          CountMinMax: [ 25, 25 ]
          Biome: [ CryoVolcano, Mountains ]
          SpawnPOIAvoid: [NullPOI]
          SpawnPOIAvoidDistance: 2000  
          SpawnResource: ["ErestrumResource:4-7","PentaxidResource:4-7"]
          SpawnResourceRange: [125,500]

              # Polaris Research Crawler
        - GroupName: Eden_PolCrawler
          Faction: Polaris
          # NoShieldReload: True  
          CountMinMax: [ 1, 2 ]
          IsScalingCount: True
          Properties:
            - Key: MapDistance
              Value: 100  
            - Key: RegenAfter
              Value: 720

       # ================================
              # Buried Alien Wrecks
        - GroupName: Eden_BuriedCVT3
          Faction: None  
          # IsImportant: True
          CountMinMax: [ 8, 12 ]
          IsScalingCount: True
          Properties:
            - Key: MapDistance
              Value: 25  
            # - Key: HudDistance
              # Value: 100  
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 720

        - GroupName: Eden_BuriedPod
          Faction: Alien
          # NoShieldReload: True  
          # IsImportant: True
          CountMinMax: [ 1, 2 ]
          IsScalingCount: True
          Properties:
            - Key: MapDistance
              Value: 25  
            # - Key: HudDistance
              # Value: 100  
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 720

