        # MAIN LEGACY CLUSTER
        # ====================================================

        # (For the central 'Keystone' POI, see below at fixed POI)

        - GroupName: NullPOI  # RESOURCE ANCHOR - - For the gold to spawn in the inner of the central stamp.
          Faction: None
          Biome: [ NexusPrime ]
          CountMinMax: [ 1, 1 ]
          IsImportant: True
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          # SpawnPOIAvoid: [ START]
          # SpawnPOIAvoidDistance: 100
          SpawnPOINear: [START]
          SpawnPOINearRange: [50, 150]
          # SpawnResource: ["GoldResource:1-1", "PentaxidResource:2-4"]
          # ResourceDistance: 200

# Legacy Drone base
        - GroupName: R2DroneBaseLegacyT4
          Faction: TheLegacy
          FactionTerritory: [All]
          # Biome: [ NexusPrime, GrandAbyss ]
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 6, 8 ]
          ReserveCount: 5
          SpawnPOIAvoid: [NullPOI]
