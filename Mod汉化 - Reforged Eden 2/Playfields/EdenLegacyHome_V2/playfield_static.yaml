---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

Description: "\u96BE\u5EA6: [c][ff00ff]\u6781\u9650+[-][/c]\n\n\u8FD9\u662F\u9057\u7559\u8005\u6BCD\u661F\u7684\u5EFA\u8BBE\u4E2D\u7248\u672C\u3002"






PlanetType: LegacyNexusWorld
PlayfieldType: Planet
Difficulty: 10
LandClaimZone: Device
UseFixed: True
UseRandom: True
Seed: 666

# === Atmosphere and Sky
OrbitUsesLightColor: true       # (Will make the orbit dark)

SunFlare: EnvironmentalEffects/SunFlareYellow3

AtmosphereEnabled: True
# AtmosphereColor: "1.15, 0.98, 0.77"
AtmosphereColor: "1.0, 0.85, 0.66"

# Basic sky colours
AtmosphereParams: [3, 2]


SkyColor: "0.6, 0.30, 0.125"
SkyHorizonColor: "0.3, 0.5, 0.5"
FogColor: "0.05, 0.03, 0.9"


# Fog 
FogCloudIntensity: 0.8
# AtmosphereFog: 0.4            # (-> See playfield_dynamic.yaml)
# GroundFogIntensity: 0.15
# GroundFogHeight: 45


# Light
DayLightIntensity: 0.001          # (NEVER use a value of zero here!)
NightLightIntensity: 1.2

DayShadowStrength: 0.5          # hardcoded, no effect
NightShadowStrength: 0.5        # hardcoded, no effect


LightZenithColor: "0.5, 0.4, 0.5"  # (Low values here reduce the sun's halo.)
LightHorizonColor: "0.8, 0.4, 0"
NightLightColor: "0.4, 0.4, 0.48"


# Clouds
CloudsZenithColor: "0.11, 0.095, 0.125"
CloudsHorizonColor: "0.4, 0.10, 0.08"
CloudsNightZenithColor: "0.080, 0.165, 0.10"
CloudsNightHorizonColor: "0.04, 0.04, 0.120"

# (Parameters for Default Weather)
CloudsDensity: 1
CloudsSharpness: 0
CloudsBrightness: 1
CloudsOpacity: 0.5


WindSpeed: 20

# Special Effects 
SpecialEffectsLocal:
  - Name: Pollen
    Biome: [ FungalOvergrowth, Flowers, FlowersEdge ]
    Time: Day
    MaxHeight: 10
    
  - Name: FireFliesGreenFew
