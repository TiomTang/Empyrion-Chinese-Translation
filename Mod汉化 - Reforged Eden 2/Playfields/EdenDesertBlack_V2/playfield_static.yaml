NightLightIntensity: 0.9
LightZenithColor: "1, 0.8, 0.8"
LightHorizonColor: "1, 0.5, 0.5"
NightLightColor: "1, 0.3, 0.3"
DayShadowStrength: 1
NightShadowStrength: 1

# Sun
SunFlare: EnvironmentalEffects/SunFlareYellow
# OrbitUsesLightColor: True

# Fog
