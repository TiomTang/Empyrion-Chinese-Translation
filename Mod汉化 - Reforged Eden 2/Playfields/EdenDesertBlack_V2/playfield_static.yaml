### Resource Deposits
RandomResources:
    - Name: IronResource
      Biome: [ Sand, Dunes ]
      CountMinMax: [ 2, 3 ] 
      IsScalingCount: True
      SizeMinMax: [ 5, 7 ] 
      DepthMinMax: [ 5, 10 ] 
      DroneProb: 0.2 
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

    - Name: SiliconResource
      Biome: [ Wadi, Flowers, Nest ]
      IsImportant: True
      CountMinMax: [ 1, 2 ]
      IsScalingCount: True
      SizeMinMax: [ 8, 10 ]
      DepthMinMax: [ 4, 8 ] 
      DroneProb: 0.3
      #DistTypeCylinder:
        #MaxRadius: 24
        #YVariance: 3

    - Name: NeodymiumResource
      Biome: [ Mountains, LowMountains, LowMountains_1, LowMountains_2 ]
      CountMinMax: [ 2, 3 ]
      IsScalingCount: True
      SizeMinMax: [ 7, 9 ]
      DepthMinMax: [ 10, 15 ] 
      DroneProb: 0.6
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 24

    - Name: PentaxidResource
      Biome: [ Strange ]
      IsImportant: True
      CountMinMax: [ 10, 13 ]
      IsScalingCount: True
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 0, 1 ] 
      DroneProb: 0
      #DistTypeCylinder:
        #MaxRadius: 1
        #YVariance: 1

    - Name: PromethiumResource
      Biome: [ Mountains, LowMountains, LowMountains_1, LowMountains_2 ]
      CountMinMax: [ 2, 3 ]
      IsScalingCount: True
      SizeMinMax: [ 3, 5 ]
      DepthMinMax: [ 0, 1 ] 
      DroneProb: 0.8
      DepthMinMax: [ 0, 5 ] 
      #DistTypeCylinder:
