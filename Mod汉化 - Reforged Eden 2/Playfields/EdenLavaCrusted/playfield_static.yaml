---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html
Description: |
  难度: [c][ff0000]困难[-][/c]  

  在这颗年轻的行星上，炽热的地幔依旧通过薄壳的裂缝喷发出来。兹瑞克斯帝国的几个家族相互竞争，试图占有这里丰富的资源，但也不排斥合作，共同抵御任何潜在的入侵者。


PlanetType: Crusted Lava
Emissive: True
PlayfieldType: Planet
Difficulty: 4

LandClaimZone: Device


# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.2, 0.05, 0.05"
SkyColor: "0.1, 0.0, 0.0"
SkyHorizonColor: "0.35, 0.15, 0"
AtmosphereParams: [3, 2.5]    

# Light
DayLightIntensity: 1
NightLightIntensity: 0.9
LightZenithColor: "1, 0.95, 0.95"
LightHorizonColor: "1, 0.5, 0"
NightLightColor: "1, 0.85, 0.85"

DayShadowStrength: 0.95
NightShadowStrength: 0.5

# Sun
SunFlare: EnvironmentalEffects/SunFlareRed
# OrbitUsesLightColor: True

# Fog
FogColor: "0.95, 0.50, 0.14"
FogCloudIntensity: 0.3
# AtmosphereFog: 0.95
# GroundFogIntensity: 0.02
# GroundFogHeight: 35

# Clouds and Wind
CloudsDensity: 0.2
CloudsSharpness: 0.2
CloudsBrightness: 0.3
CloudsOpacity: 0.1
CloudsZenithColor: "1, 0.2, 0.2"
CloudsHorizonColor: "1, 0.1, 0.45"
CloudsNightHorizonColor: "0.8, 0.15, 0.00"
CloudsNightZenithColor: "0.8, 0.15, 0.00"
WindSpeed: 2


# Special effects around the player
SpecialEffectsLocal:
  - Name: Grime
    MaxHeight: 20

SpecialEffectsGlobal:
# Weather

 # Do not use the weathers CloudsLight, CloudsMedium, Wind, ColdWave here! (Their clouds react extremely to colouring)
 # weather Clear >>  Already in HeatWave


  - Name: Clear
    Type: Weather
    InitialDelay: 300
    Delay: 300
    Lifetime: 30

# Global Effect
  - Name: MeteorShower
    Time: Always
    InitialDelay: 1
    Delay: 1
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid

  # - Name: ThunderAndLightningPurple
    # Time: Night
    # InitialDelay: 1.5   
    # Delay: 4
    # Lifetime: 300     
    # PlyDist: 100
    # SpawnY: 500
    # Struct: Avoid    

# ==============================================================
# Size Scaling of ore amount. Poor = 66%. Normal = 100%. Rich = 143%. Gold = 66%. Penatix = 50%.
# ======================================================================================================
# 1=2          6=542      11=3300     16=10200    21=23200
# 2=20         7=862      12=4300     17=12300    22=26700
# 3=67         8=1200     13=5500     18=14600    23=30500
# 4=160        9=1800     14=6800     19=17200    24=34700
# 5=314        10=2500    15=8400     20=20100    25=39200
# ======================================================================================================
      # #DistTypeCylinder:
        # #MaxRadius: 13
        # #YVariance: 8
# ======================================================================================================
      # DistTypeWorm:
        # FreqDirChange: 0.2
        # DirChangeMagnitude: 0.2
        # MaxLength: 50
        # DeepnessType: 0 #Depth Style 0=Undefined, 1=Free, 2=Shallow
# ======================================================================================================

### Resource Deposits
RandomResources:
    - Name: IronResource
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 8, 9 ]
      DepthMinMax: [ 30, 60 ]
      DroneProb: 0.9
      #DistTypeCylinder:
        #MaxRadius: 32
        #YVariance: 32

    - Name: CopperResource
      IsScalingCount: True 
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 1, 3 ]
      DroneProb: 0.9
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 3

    - Name: PromethiumResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 2, 3 ]
      DroneProb: 0.4
      #DistTypeCylinder:
        #MaxRadius: 8
        #YVariance: 5

    - Name: ZascosiumResource
      Biome: [ Plains, Dunes, Rocks ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 0.9
      MaxDroneCount: 4
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: GoldResource
      # Biome: [ LavaEdge, LavaFolds, Plains ]
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 5, 6 ]
      DroneProb: 1
      MaxDroneCount: 3
      DepthMinMax: [ 5, 10 ]
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 10

