---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html
Description: "\u96BE\u5EA6: [c][ff0000]\u56F0\u96BE[-][/c] \n\n\u6C6A\u6D0B\u8986\u76D6\u4E86\u7EDD\u5927\u90E8\u5206\u661F\u7403\u8868\u9762\u3002\u5927\u6C14\u4E2D\u9AD8\u6D53\u5EA6\u7684\u6E29\u5BA4\u6C14\u4F53\uFF0C\u4F7F\u5F97\u8FD9\u9897\u884C\u661F\u5728\u4E0E\u6052\u661F\u8DDD\u79BB\u8F83\u8FDC\u7684\u60C5\u51B5\u4E0B\u4F9D\u7136\u4FDD\u6301\u7740\u76F8\u5BF9\u6E29\u6696\u7684\u6C14\u5019\u3002"

PlanetType: Ocean
PlayfieldType: Planet
Difficulty: 4

LandClaimZone: Device

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.45, 0.6, 0.75"

SkyColor: "0.7, 0.7, 1" 
SkyHorizonColor: "1.2, 0.2, 0"

# Light
DayLightIntensity: 1.4
NightLightIntensity: 0.85
LightHorizonColor: "1, 0.4, 0"
NightLightColor: "0.78, 0.78, 1.3"

DayShadowStrength: 1
NightShadowStrength: 1

# Sun
SunFlare: EnvironmentalEffects/SunFlareBlue


# Fog
# AtmosphereFog: 0.35
FogCloudIntensity: 0.8
# GroundFogIntensity: 0
# GroundFogHeight: 0


# Clouds and Wind
CloudsDensity: 0.3
CloudsSharpness: 0.35
CloudsBrightness: 0.7
CloudsOpacity: 0.7
CloudsZenithColor: "0.89, 0.92, 1"
CloudsHorizonColor: "1, 0.3, 0.1"

WindSpeed: 3

# Special Effects 
SpecialEffectsLocal:
  - Name: DandelionsFew
    Biome: [ Grassland, ColdPlains ]
    Time: Day
    MaxHeight: 10
  - Name: ButterfliesFew
    Biome: [ Grassland, Oasis ]
    Time: Day
    MaxHeight: 15
  - Name: Pollen
    Biome: [ TropicalForest, SavannaEdge ]  
    Time: Day
    MaxHeight: 10
  - Name: Mosquitos
    Biome: [ TropicalForest, SavannaEdge, Marsh, Swamp, WaterSwamp, Water ]  
    Time: Day
    MaxHeight: 15
  - Name: ButterfliesBlue
    Biome: [ Forest, Marsh, DeepForest ]
    Time: Day
    MaxHeight: 15
  - Name: Dragonflies
    Biome: [ Marsh, Swamp, WaterSwamp, Water, ShallowWater ]
    Time: Day
    MaxHeight: 15
  - Name: FireFliesOrange
    Biome: [ Forest, DeepForest, Peaks, Marsh, Swamp, WaterSwamp, Oasis ]
    Time: Night
    MaxHeight: 15
  - Name: Moths
    Biome: [ DeepForest, TropicalForest, SavannaEdge, Grassland ]
    Time: Night
    MaxHeight: 15

SpecialEffectsGlobal:
# Weather
  - Name: Clear
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1200
  - Name: CloudsLight
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1200
  - Name: CloudsMedium
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1200
  - Name: Clouds
    Type: Weather
    InitialDelay: 10
    Delay: 5
    Lifetime: 1000
  - Name: Fog
    Type: Weather
    InitialDelay: 24
    Delay: 12
    Lifetime: 1000
  - Name: Wind
    Type: Weather
    InitialDelay: 24
    Delay: 12
    Lifetime: 600
  # - Name: RainMedium
    # Type: Weather
    # InitialDelay: 24
    # Delay: 12
    # Lifetime: 600
  # - Name: RainHeavy
    # Type: Weather
    # InitialDelay: 48
    # Delay: 24
    # Lifetime: 600
  - Name: Storm
    Type: Weather
    InitialDelay: 24
    Delay: 24
    Lifetime: 300
# Global Effect
  - Name: BirdFlocksCrows
    Biome: [ Any ]
    Time: Day
    InitialDelay: 1
    Delay: 4
    Lifetime: 600
    PlyDist: 100
    SpawnY: 30
    Struct: True

