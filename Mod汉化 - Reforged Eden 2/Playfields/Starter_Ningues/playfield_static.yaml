# Description: "Difficulty: [c][ffff00][b]Medium[/b][-][/c]

# Arid, Swamp, Odd Temperate, [c][ffff00][b]Snow[/b][-][/c]

# [c][FFFFFF]_______________________________________________[-][/c]

# Start: [c][FFFFFF]Escape Pod[-][/c]                 Equipment: [c][FFFFFF]Basic[-][/c]

# Missions: [c][FFFFFF]Default[-][/c]                  Solar System: [c][FFFFFF]Beta[-][/c]

# [c][808080]Default Snow starting planet.[-][/c]

# A world at the far edge of the habitable zone, deep in the throes of a major ice age.
# \n
# \nA challenging start, intended for experienced survivalists; no tutorial given.
# \n[i]([c][FFFFFF]Slow beginnings[-][/c]; [c][FFFFFF]freezing[-][/c], [c][FFFFFF]low food[-][/c], [c][FFFFFF]resource poor[-][/c] and [c][FFFFFF]hard to navigate[-][/c])[/i]
# \nSee below how to modify the difficulty, and for survival hints.
# \n
# \nStarting equipment:
# \n[c][FFFFFF]Easy[-][/c] - Quickstart. Includes missing starter resources and a small buffer of food and warmth
# \n[c][FFFFFF]Medium[-][/c] - Gain most starter resources from surface rocks, hunt or salvage
# \n[c][FFFFFF]Hard[-][/c] -  [i]No armor[/i]. Be warned.
# \n(Set in difficulty settings)
# \n
# \nNeed [b]survival hints[/b]? 
# \nScroll down.
# \n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.
# \n[i]- Don't forget to grab the items from the escape pod!
# \n- Freezing will starve you. Use the heater and craft hot beverages to keep you warm
# \n- Jetpack jumps or bunny hops will conserve stamina
# \n- Mark your 'food places' on the map. Small plants regrow in about a day
# \n- The portable constructor can filter crushed stone for ores
# \n- Lower altitudes are much warmer. If you have no option, dig down. Helps also with hail.[/i]
# \n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.\n.
# \n[i]- There might be a broken HV in distance to the large wreckage
# \n- Salvage the open cockpit, and build a closed one.
# \n- The 'Grove' biome near the crashsite, and the 'Shore' will have plants for hot beverages.[/i]"



PlanetClass: Snow Starter
PlanetType: SnowStarter
PlayfieldType: Planet
Difficulty: 13

LandClaimZone: Device

# Atmosphere and Sky
AtmosphereEnabled: True
# AtmosphereColor: "0.95, 1.18, 1.6" 
AtmosphereColor: "0.855, 1.062, 1.44" 
SkyColor: "1.02, 0.76, 1.02"

SkyHorizonColor: "1, 0.3, 0"
AtmosphereParams: [0.4, 1.7]

# Light
DayLightIntensity: 0.8


NightLightIntensity: 0.25
DayShadowStrength: 0.95
NightShadowStrength: 0.5


LightZenithColor: "0.9, 0.95, 1.10"
LightHorizonColor: "0.8, 0.45, 0.10"
NightLightColor: "0.3, 0.3, 0.7"

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhite

# Fog
# AtmosphereFog: 0.5       # (See: playfield_dynamic)
FogCloudIntensity: 0.8
# GroundFogIntensity: 0.07 # (See: playfield_dynamic)
# GroundFogHeight: 40

FogColor: "0.85, 0.85, 1.03"

# Clouds and Wind
CloudsDensity: 0.3
CloudsSharpness: 0.2
CloudsBrightness: 0.6


CloudsZenithColor: "0.60, 0.63, 0.86"
CloudsHorizonColor: "0.72, 0.24, 0.08"

CloudsNightZenithColor: "0.015, 0.023, 0.029"
CloudsNightHorizonColor: "0.015, 0.023, 0.029"

WindSpeed: 3

# Special Effects
SpecialEffectsLocal:
  - Name: FireFliesRed
    Biome: [ Taiga, TaigaEdge, TaigaSnow, Oasis]
    Time: Night
    MaxHeight: 15

  - Name: FireFliesOrange
    Biome: [ Shore, Taiga, TaigaEdge, TaigaSnow, Oasis]
    Time: Night
    MaxHeight: 15

  - Name: FireFliesRed
    Biome: [ Oasis]
    Time: Day
    MaxHeight: 15

  - Name: FireFliesOrange
    Biome: [ Shore, Taiga, Oasis]
    Time: Day
    MaxHeight: 15



SpecialEffectsGlobal:



    # Starting weather
  - Name: Clear
    Type: Weather
    InitialDelay: 0 # (Should start directly.)
    Lifetime: 7200  # (2 ingame days - 1 RL hour -  of sunshine.)
    Delay: 10000    # (This long period should not happen too often)


  - Name: SnowLight
    Type: Weather
    InitialDelay: 48
    Delay: 5
    Lifetime: 600

    # Soon
  - Name: Clear
    Type: Weather
    InitialDelay: 50
    Delay: 12
    Lifetime: 1000

  - Name: SnowMedium
    Type: Weather
    InitialDelay: 50
    Delay: 12
    Lifetime: 800


    # Later
  - Name: Clear
    Type: Weather
    InitialDelay: 72
    Delay: 12
    Lifetime: 600
    
  - Name: SnowHeavy
    Type: Weather
    InitialDelay: 72
    Delay: 12
    Lifetime: 600

  - Name: ColdWave
    Type: Weather
    InitialDelay: 72
    Delay: 24
    Lifetime: 1000

  - Name: Hail
    Type: Weather
    InitialDelay: 72
    Delay: 48
    Lifetime: 600

  - Name: HeatWave
    Type: Weather
    InitialDelay: 90
    Delay: 90
    Lifetime: 400


