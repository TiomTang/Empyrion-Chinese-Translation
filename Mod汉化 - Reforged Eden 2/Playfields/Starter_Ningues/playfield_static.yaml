### Resource Deposits

RandomResources:
    - Name: CarbonResource
      # Biome: [ Heath, Savanna, Hills, Plains, SavannaEdge, Grassland_1, Grassland ]
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 0, 5 ]
      DroneProb: 0
      MaxDroneCount: 1

# Smaller scattered around planet
    - Name: CarbonResource
      IsScalingCount: True
      CountMinMax: [ 7, 7 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 0, 1 ]
      DroneProb: 0
      MaxDroneCount: 1

    - Name: IronResource
      Biome: [ Shore, Taiga, TaigaEdge, TaigaSnow, TaigaSnowEdge, LowMountains, Mountains, Mountains_1, HighMountains, HighMountains_1 ]
      IsScalingCount: True   # Medium Planet: 6 Deposits, Large planet 9
      CountMinMax: [ 3, 3 ]  # (No ranges here, since the Resources are spawned by POI!)
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.0
      MaxDroneCount: 1

    - Name: CopperResource
      BiomesExcluded: [ Glacier ]
      IsScalingCount: True   # Medium Planet: 6 Deposits, Large planet 9
      CountMinMax: [ 3, 3 ]  # (Ranges: See above)
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.0

    - Name: SiliconResource
      Biome: [ Shore, LowMountains, Mountains, Mountains_1, HighMountains, HighMountains_1 ]
      IsScalingCount: True   # Medium Planet: 4 Deposits, Large planet 6
      CountMinMax: [ 2, 2 ]  # (Ranges: See above)
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.0

    - Name: PromethiumResource
      Biome: [ HighMountains, Mountains ]
      IsImportant: True
      IsScalingCount: True   # Medium Planet: 2 Deposits, Large planet 3
      CountMinMax: [ 1, 1 ]  # (Ranges: See above)
      SizeMinMax: [ 4, 4 ]
      DroneProb: 1.0
      DepthMinMax: [ 0, 1 ]
      # #DistTypeCylinder:
        # #MaxRadius: 13
        # #YVariance: 10

### Resource Asteroids
