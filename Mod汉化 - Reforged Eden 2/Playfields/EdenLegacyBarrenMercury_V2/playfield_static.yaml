### Drones
DroneBaseSetup: 
    Random:
        - GroupName: DroneBaseSetup
          Difficulty: 6
          PresetStyle: 3
          Stock:

              - Name: DroneSmallFast01Minigun
                Amount: 300
                Extra: 0

              - Name: DroneSmallFast01Rocket
                Amount: 100
                Extra: 0  
    
              - Name: DroneBomberAttackBase
                Amount: Infinite
                Extra: 1

              - Name: EnemyDroneV2Plasma
                Amount: Infinite
                Extra: 1

              - Name: DroneTroopsTransport
                Amount: Infinite
                Extra: 2

              - Name: ZiraxMinigun
                Amount: 500
                Extra: 3

              - Name: ZiraxRocket
                Amount: 500
                Extra: 3

              - Name: Crawler
                Amount: 150
                Extra: 3

              - Name: AlienAssassinGrey
                Amount: 300
                Extra: 3
   


# Drones that patrol on whole planet 
DroneSpawning:    
    Random:
        - DronesMinMax: [ 0, 0 ]
          CenterX: -5000

        - DronesMinMax: [ 0, 0 ]
          CenterX: 5000
