PlanetType: Barren
PlayfieldType: Planet
Difficulty: 2

LandClaimZone: Device


# Atmosphere and Sky
AtmosphereEnabled: False

# Light
DayLightIntensity: 1.6
NightLightIntensity: 0.7

DayShadowStrength: 0.95

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhiteMoon
# ==============================================================

### Resource Deposits
RandomResources:
# Size Scaling of ore amount. Poor = 66%. Normal = 100%. Rich = 143%. Gold = 66%. Penatix = 50%.
# ======================================================================================================
# 1=2          6=542      11=3300     16=10200    21=23200
# 2=20         7=862      12=4300     17=12300    22=26700
# 3=67         8=1200     13=5500     18=14600    23=30500
# 4=160        9=1800     14=6800     19=17200    24=34700
# 5=314        10=2500    15=8400     20=20100    25=39200
# ======================================================================================================
    - Name: IronResource
      IsScalingCount: True
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 9, 10 ]
      DepthMinMax: [ 40, 50 ]
      DroneProb: 1
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 3

    - Name: MagnesiumResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 1
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 32
        #YVariance: 3

    - Name: SathiumResource
      # IsScalingCount: True
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 11, 12 ]
      DroneProb: 1
      MaxDroneCount: 5
      DepthMinMax: [ 40, 50 ]
      #DistTypeCylinder:
        #MaxRadius: 32
        #YVariance: 3

    - Name: SathiumResource
      IsScalingCount: True
      CountMinMax: [ 5, 6 ]
      SizeMinMax: [ 9, 11 ]
      DroneProb: 1
      MaxDroneCount: 5
      DepthMinMax: [ 40, 50 ]
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 3

    - Name: GoldResource
      IsScalingCount: True
      CountMinMax: [ 5, 6 ]
      SizeMinMax: [ 2, 3 ]
      DroneProb: 1
      MaxDroneCount: 5
      DepthMinMax: [ 20, 30 ]
      #DistTypeCylinder:
        #MaxRadius: 2
        #YVariance: 2

### Resource Asteroids
AsteroidResources:
     - Name: IronResource
       Threshold: 0.1
       Amount: 0.2
     - Name: MagnesiumResource
       Threshold: 0.1
       Amount: 0.2
     - Name: SathiumResource
       Threshold: 0.1
       Amount: 0.2

### POIs
POIs:
    Random:






    FixedPlayerStart:
        - Mode: Debug
          Pos: [ -835, 165, -1000 ]
          RotY: 125
          Armor: ArmorMedium

        - Mode: Survival
          Spawn: EscapePod
          Armor: ArmorMedium

