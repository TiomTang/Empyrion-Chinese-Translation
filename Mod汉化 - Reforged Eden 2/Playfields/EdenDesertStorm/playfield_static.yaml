### Resource Deposits
RandomResources:
    - Name: CobaltResource
      Biome: [ Wadi, Oasis, Flowers, Nest ]
      IsImportant: True
      CountMinMax: [ 1, 2 ]
      IsScalingCount: True
      SizeMinMax: [ 2, 5 ]
      DepthMinMax: [ 10, 15 ] 
      DroneProb: 0
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

    - Name: CopperResource
      Biome: [ Plateau ]
      CountMinMax: [ 2, 3 ]
      IsScalingCount: True
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 10, 15 ] 
      DroneProb: 0
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

    - Name: NeodymiumResource
      Biome: [ Mountains, LowMountains, LowMountains_1 ]
      CountMinMax: [ 1, 2 ]
      IsScalingCount: True
      SizeMinMax: [ 9, 11 ]
      DepthMinMax: [ 65, 75 ] 
      DroneProb: 0
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

    - Name: SathiumResource
      Biome: [ Rocks, Dunes, Sand ]
      CountMinMax: [ 2, 3 ]
      IsScalingCount: True
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 5, 10 ] 
      DroneProb: 0
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 8
        #YVariance: 8

    - Name: PromethiumResource
      Biome: [ Mountains, LowMountains, LowMountains_1 ]
      CountMinMax: [ 2, 3 ]
      IsScalingCount: True
      SizeMinMax: [ 3, 5 ]
      DepthMinMax: [ 0, 1 ] 
      DroneProb: 0
      DepthMinMax: [ 0, 5 ] 
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5


