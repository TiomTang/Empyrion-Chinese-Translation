# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

# Description: "Water is quite common in the universe, as life-enabling liquid, or at least as ice or vapor.\nHowever, not every planet is gifted with water. Some worlds get scorched by their home star, or maybe their magnetic field is too weak to stem against the push of the stellar wind.\n\nBut even this place of glaring sunshine has managed to keep some spots here or there..."
Description: "\u96BE\u5EA6: [c][ffff00]\u4E2D\u7B49[-][/c]\n\n\u4F20\u611F\u5668\u5E72\u6270: [c][ffff00]POI\u63A2\u6D4B\u8303\u56F4\u964D\u4F4E\u3002[-][/c]\n\n\u4E00\u9897\u6C99\u6F20\u884C\u661F\uFF0C\u6CA1\u6709\u4EFB\u4F55\u81EA\u7136\u6C34\u6E90\u3002\u5168\u7403\u5C18\u66B4\u7B3C\u7F69\u6574\u4E2A\u884C\u661F\uFF0C\u964D\u4F4E\u4E86\u80FD\u89C1\u5EA6\u3002"



PlanetClass: Stormy Desert
PlanetType: Stormy Desert
PlayfieldType: Planet
Difficulty: 5

LandClaimZone: Device

# Special Effects 
SpecialEffectsLocal:
  - Name: FireFliesRed
    Biome: [ Water, ShallowWater, Shore ]
    Time: Night
    MaxHeight: 40
  - Name: FireFliesGreenFew
    Biome: [ Plains, Sand, Flowers, FlowersEdge, Wadi, DustBowl ]
    Time: Night
    MaxHeight: 150
  - Name: Pollen
    Biome: [ Plains, DustBowl, Plantation, Flowers, FlowersEdge, Oasis ]
    Time: Day
    MaxHeight: 150
  - Name: FireFliesGreen
    Biome: [ Oasis, Plantation ]
    Time: Night
    MaxHeight: 150
  - Name: WindLines
    Biome: [ Plains, DustBowl, Plantation, Sand, Plateau, LowMountains, LowMountains_1, Mountains, SandDrift, Dunes ]
    Time: Always
    MaxHeight: 5

SpecialEffectsGlobal:
# Weather
  - Name: Clear
    Type: Weather
    InitialDelay: 0
    Delay: 10
    Lifetime: 300
  - Name: Wind
    Type: Weather
    InitialDelay: 0
    Delay: 5
    Lifetime: 500
  - Name: CloudsLight
    Type: Weather
    InitialDelay: 0
    Delay: 12
    Lifetime: 300
  - Name: Clouds
    Type: Weather
    InitialDelay: 6
    Delay: 12
    Lifetime: 180
  - Name: CloudsDark
    Type: Weather
    InitialDelay: 24
    Delay: 36
    Lifetime: 180
  - Name: HeatWave
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 300
  - Name: FogRadiationPurple
    Type: Weather
    InitialDelay: 72
    Delay: 72
    Lifetime: 120
# Global Effects
  # - Name: BirdFlocksVultures
    # Biome: [ Dunes, Plains, Mountains, Water, Flowers, Plantation ]
    # Time: Day
    # InitialDelay: 2
    # Delay: 4
    # Lifetime: 600
    # PlyDist: 50
    # SpawnY: 40
    # Struct: True
  - Name: ThunderAndLightningRed
    Time: Always
    InitialDelay: 2   
    Delay: 6
    Lifetime: 600     
    PlyDist: 50
    SpawnY: 100
    Struct: Avoid    

# ==================

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.9, 0.75, 0.45"  
SkyColor: "0.64, 0.4, 0.4"
SkyHorizonColor: "1, 0.2, 0"
# AtmosphereParams: [5, 1.5]       
AtmosphereParams: [5, 2.2]       

# Light
DayLightIntensity: 1.1
NightLightIntensity: 0.6
LightZenithColor: "0.64, 0.5, 0.5"
LightHorizonColor: "1, 0.5, 0"
NightLightColor: "0.5, 0.6, 0.8"
DayShadowStrength: 1
NightShadowStrength: 1

# Sun
SunFlare: EnvironmentalEffects/SunFlareRedSpace

# Fog
AtmosphereFog: 0.70
# FogColor: "0.5, 0.8, 0.7"
FogCloudIntensity: 0.8

# Clouds & Wind
CloudsDensity: 0.3
CloudsSharpness: 0.05
CloudsOpacity: 0.7

CloudsBrightness: 0.7
CloudsZenithColor: "1.0, 0.6, 0.3"
CloudsHorizonColor: "1, 0.3, 0.1"
CloudsNightZenithColor: "0.3, 0.2, 0.1"
CloudsNightHorizonColor: "0.5, 0.3, 0"

WindSpeed: 15


