### Resource Deposits
RandomResources:
    - Name: SiliconResource   # Shallow, tiny, from meteorites
      Biome: [ Mountains, PlainsEdge, Plains, Regolith, RegolithEdge ]
      # IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 2, 3 ]
      DepthMinMax: [ 1, 2 ]
      DroneProb: 0.4
      #DistTypeCylinder:
        #MaxRadius: 2
        #YVariance: 0

    - Name: MagnesiumResource  # Mountains, shallow, very poor
      Biome: [ Mountains, Regolith, RegolithEdge ]
      # IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 2, 3 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.7
      MaxDroneCount: 1 
      #DistTypeCylinder:
        #MaxRadius: 10
        #YVariance: 3

    - Name: MagnesiumResource  # Below ice; bigger -> Needs HV excavator or autominer
      Biome: [ LayeredIce, IceSheet, CrustedIce ]
      # IsScalingCount: True 
      CountMinMax: [ 0, 2 ]
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 70, 80 ]
      DroneProb: 0.2
      MaxDroneCount: 1 
      #DistTypeCylinder:
        #MaxRadius: 10
        #YVariance: 3


    - Name: CobaltResource    # Mountains, shallow
      Biome: [ Mountains, Regolith, RegolithEdge ]
      # IsScalingCount: True 
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 4, 9 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 10
        #YVariance: 3

    - Name: CobaltResource     # Deep below ice, rich -> Needs HV excavator or autominer
      Biome: [ LayeredIce, IceSheet, CrustedIce ]
      # IsScalingCount: True 
      CountMinMax: [ 0, 2 ]
      SizeMinMax: [ 8, 9 ]
      DepthMinMax: [ 60, 80 ]
      DroneProb: 0.2
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 10
        #YVariance: 3

    - Name: IronResource    # Very shallow, meteorite impact anywhere
      # Biome: [ Mountains, SmallCrater, Regolith, RegolithEdge ]
      # IsScalingCount: True 
      CountMinMax: [ 0, 2 ] 
      SizeMinMax: [ 2, 4 ] 
      DepthMinMax: [ 2, 5 ]
      DroneProb: 0.3      
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 7
        #YVariance: 10
        
    - Name: GoldResource    # Very shallow, meteorite impact
      Biome: [ RayCrater ]  # This lessens the spawn chance, making it even rarer
      # IsScalingCount: True 
      CountMinMax: [ 0, 1 ] 
      SizeMinMax: [ 4, 5 ]  # But _if_ it it is quite a haul
      DepthMinMax: [ 2, 5 ]
      DroneProb: 0.3
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 3

    - Name: PentaxidResource   # Shallow, meteorite impact
      Biome: [ Flats, DeepCanyon, Rifts, Rifts_1 ]
      # IsScalingCount: True 
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 2, 5 ]
      DroneProb: 0.6
      MaxDroneCount: 2
      #DistTypeCylinder:
        #MaxRadius: 5
        #YVariance: 10

    - Name: IceResource
      IsScalingCount: True 
      CountMinMax: [ 6, 7 ]
      SizeMinMax: [ 8, 13 ]
      DroneProb: 0.1
      MaxDroneCount: 2
      DepthMinMax: [ 0, 5 ]

### Resource Asteroids
