# Syndicate Munitions Depot
Description: |
  类型: [c][A0522D]采矿地点[-][/c] - [c][00ff00]2级[-][/c]

  重力异常表明存在含矿小行星。

  [c][ffffff][i]开采被某阵营占领的小行星被视为战争行为。POI 的存在受银河阵营领地影响。[/i][-][/c]


Gravity: 0
AtmosphereEnabled: False
PvPProb: 0
UseFixed: True

# Habitable Star
Radiation: [3,8]
TemperatureDay: [-160,-100]
# Mysterious Music
Music: [alien2, AnAridPlace, Anomalous, ColdSpace, desert2, Dusk, EnergyMatrix, FirstHours, Goliath, JumpingTheRift, moonstone, MorningLight, Obelisk, TidalLock, Voyage]

PlayfieldType: Space
LandClaimZone: Device
PlanetType: EdenSpace_POI_MiningT2_1
PlayfieldLevelOverride: [1,2]

