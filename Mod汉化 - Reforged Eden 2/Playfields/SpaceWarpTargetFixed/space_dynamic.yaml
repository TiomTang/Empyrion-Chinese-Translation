# Playfield Characteristics
Description: "\u6052\u661F\u7684\u7FD8\u66F2\u5230\u8FBE\u70B9\u3002

  [c][ffff00]\u7FD8\u66F2\u88C2\u9699:[-][/c] [c][ffffff]\u6B64\u661F\u533A\u65E0\u6CD5\u9501\u5B9A\u6216\u76F4\u63A5\u7FD8\u66F2\u5230\u8FBE\u3002\u4F60\u53EA\u80FD\u4ECE\u5176\u4ED6\u6052\u661F\u7CFB\u6216\u901A\u8FC7\u8DEF\u5F84\u70B9\u7FD8\u66F2\u5230\u6B64\u5904\u3002\u84DD\u56FE\u5DE5\u5382\u5DF2\u7981\u7528\u3002[-][/c]

