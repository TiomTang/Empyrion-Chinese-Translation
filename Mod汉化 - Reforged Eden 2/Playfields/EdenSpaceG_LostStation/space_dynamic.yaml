# Playfield Characteristics
Description: |
  难度: [c][00ff00]简单[-][/c]

  主权归属: [c][ffffff]未占领[-][/c]


  此星区在你的导航地图上被标注为有一个重要的贸易空间站，但目前唯一能够探测到的信号是一条低功率的求救信号。


  [c][ffffff][i]开采被某阵营占领的小行星将被视为宣战行为。POI 的存在受银河阵营领土影响。[/i][-][/c]


Gravity: 0                         
AtmosphereEnabled: False          
PvPProb: 0                            
UseFixed: True                       

# Standard Star
Radiation: [5,10]
TemperatureDay: [-200,-100]
# Music: [moonstone, space, DistantWorlds, Migration, Artefact, ColdDivide] # Orbit
Music: [DarkSoundscape, DarkSoundscape2, DarkSoundscape3, desert2] # POI
PlayfieldLevelOverride: [1,1]

PlayfieldType: Space
LandClaimZone: Device
PlanetType: Station

