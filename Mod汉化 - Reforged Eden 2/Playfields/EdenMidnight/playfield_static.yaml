### Resource Deposits
RandomResources:
    - Name: IronResource
      IsScalingCount: True
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 8, 13 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

        # Taken up by the Ghyst POI Complex
    - Name: GoldResource
      Biome: [ LargeCrater ]
      # IsScalingCount: True
      CountMinMax: [ 3, 3 ]
      SizeMinMax: [ 13, 13 ]
      DepthMinMax: [ 0, 0 ]
      DroneProb: 1
      MaxDroneCount: 5
      # DistTypeWorm:

    - Name: GoldResource
      Biome: [ LargeCrater ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 11, 12 ]
      DepthMinMax: [ 0, 0 ]
      DroneProb: 0.7
      MaxDroneCount: 2
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

    - Name: PlatinResource
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 3, 6 ]
      DroneProb: 1
      MaxDroneCount: 3
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 3

    - Name: ZascosiumResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 7, 8 ]
      DepthMinMax: [ 3, 6 ]
      DroneProb: 1
      MaxDroneCount: 3
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 3

    - Name: PromethiumResource
      IsScalingCount: True
      CountMinMax: [ 2, 4 ]
      SizeMinMax: [ 3, 6 ]
