---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html


Description: "\u96BE\u5EA6: [c][ff0000]***[-][/c][c][ff00ff][b] \u6781\u9650 [/b][-][/c][c][ff0000]***[-][/c]

  [c][ffffff][i](\u6781\u9650\u96BE\u5EA6\u4F1A\u5E26\u6765\u6781\u7AEF\u6311\u6218\uFF0C\u5E76\u53EF\u80FD\u5728\u6BEB\u65E0\u9884\u8B66\u7684\u60C5\u51B5\u4E0B\u5BFC\u81F4\u4F60\u7684\u98DE\u8239\u635F\u5931)[-][/i][/c]

  [c][ffff00]\u9AD8\u91CD\u529B\u8B66\u544A[-][/c]

  \u8FD9\u9897\u884C\u661F\u88AB\u6D53\u539A\u7684\u5927\u6C14\u7B3C\u7F69\uFF0C\u5730\u8868\u5438\u6536\u4E86\u5927\u90E8\u5206\u5149\u7EBF\uFF0C\u5BFC\u81F4\u6E29\u5EA6\u5347\u81F3\u6781\u7AEF\u9AD8\u6E29\u3002\u884C\u661F\u8868\u9762\u5B8C\u5168\u5931\u53BB\u53EF\u89C1\u5EA6\uFF0C\u4F46\u4F20\u611F\u5668\u663E\u793A\u8FD9\u91CC\u8574\u85CF\u7740\u5927\u91CF\u7684\u91D1\u77FF\u77F3\u3002"



PlanetType: Midnight
Emissive: True
PlayfieldType: Planet
Difficulty: 2

LandClaimZone: Device



# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.1, 0, 0" 
SkyColor: "0,0,0"
AtmosphereParams: [10, 3]          # [Rayleigh Multiplier, Atmosphere Contrast], default is AtmosphereParams: [1, 1.6]   
                                     # RayleighMultiplier between 0 and 10 - higher values make SkyColor / SkyHorizonColor more pronounced
                                     # Atmosphere Contrast between 0 and 3 - lower values wash out SkyColor / SkyHorizonColor 

# Light
DayLightIntensity: 0
NightLightIntensity: 0.9
DayShadowStrength: 0.95

LightZenithColor: "0.01,0.01,0.01"
LightHorizonColor: "0.0,0,0"
NightLightColor: "0.4, 0, 0"

# Sun
SunFlare: EnvironmentalEffects/SunFlareRed
OrbitUsesLightColor: True

# Special Effects
SpecialEffectsLocal:
  - Name: Grime
    Biome: [ LargeCrater, Unknown ]
    MaxHeight: 20
  - Name: Grime
    MaxHeight: 20
  - Name: Grime
    MaxHeight: 40
  - Name: Grime
    MaxHeight: 60
  - Name: Grime
    Biome: [ LargeCrater, Unknown ]
    MaxHeight: 80
  - Name: Grime
    MaxHeight: 100
    Biome: [ LargeCrater, Unknown ]
  - Name: Grime
    MaxHeight: 800
  - Name: Grime
    MaxHeight: 800
  - Name: Grime
    MaxHeight: 800

SpecialEffectsGlobal:
# Weather
  - Name: CloudsDark
    Type: Weather
    InitialDelay: 0
    Delay: 0
    Lifetime: 1200
  - Name: MeteorFireRain
    Type: Weather
    InitialDelay: 12
    Delay: 24
    Lifetime: 180
  - Name: FireRain
    Type: Weather
    InitialDelay: 12
    Delay: 24
    Lifetime: 180

# ==============================================================

# Fog
FogColor: "0, 0, 0"
FogCloudIntensity: 0.8
# AtmosphereFog: 0.95
# GroundFogIntensity: 0.24
# GroundFogHeight: 45

# Clouds and Wind
CloudsDensity: 1
CloudsSharpness: 0
CloudsBrightness: 0
CloudsOpacity: 1
CloudsZenithColor: "0,0,0"
CloudsHorizonColor: "0,0,0"
WindSpeed: 0

