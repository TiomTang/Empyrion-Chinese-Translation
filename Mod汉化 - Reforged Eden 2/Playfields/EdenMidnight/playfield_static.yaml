### POIs
POIs:
    Random:  
        - GroupName: R2DroneBase
          Faction: Zirax
          # NoShieldReload: True  
#          # NoShieldReload: True
          DroneBaseSetup: DroneBaseSetup
          CountMinMax: [ 0, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 5 ] 
          ReserveCount: 5
          Properties: 
            - Key: RegenAfter
              Value: 4320

              #Ghyst Compound =================================================
        - GroupName: R2GhystMain
          Faction: Ghyst
          FactionTerritory: [Zirax]
          # NoShieldReload: True  
          Biome: [ LargeCrater ]
          CountMinMax: [ 1, 1 ]
          IsImportant: True
          DroneProb: 1
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 2
          TroopTransport: True
          SpawnResource: ["GoldResource:1-2"]
          SpawnResourceRange: [100,125]
          Properties: 
            - Key: RegenAfter
              Value: 4320

              # Auxillary POIs for Ghyst Compound
        - GroupName: R2GhystAuxT2
          Faction: Ghyst
          FactionTerritory: [Zirax]
          CountMinMax: [ 5, 8 ]
          # IsImportant: True
          DroneProb: 0.7
          DronesMinMax: [ 2, 3 ]
          ReserveCount: 0
          TroopTransport: True
          SpawnPOINear: [R2GhystMain]
          SpawnPOINearRange: [250, 500]
          SpawnResource: ["GoldResource:0-1"]
          SpawnResourceRange: [100,125]
          Properties: 
            - Key: RegenAfter
