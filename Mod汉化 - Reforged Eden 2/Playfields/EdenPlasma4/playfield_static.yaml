---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html
Description: |
  \u96BE\u5EA6: [c][ff00ff]\u6781\u9650[-][/c]

  [c][ffffff][i](\u6781\u9650\u96BE\u5EA6\u5C06\u5E26\u6765\u6781\u7AEF\u6311\u6218\uFF0C\u5E76\u53EF\u80FD\u5728\u51E0\u4E4E\u6CA1\u6709\u9884\u8B66\u7684\u60C5\u51B5\u4E0B\u5BFC\u81F4\u4F60\u7684\u98DE\u8239\u635F\u5931)[-][/i][/c]

  [c][ffff00]\u9AD8\u91CD\u529B\u8B66\u544A[-][/c]


  \u7531\u884C\u661F\u5730\u58F3\u4E2D\u5927\u91CF\u94B7\u5F15\u53D1\u7684\u5931\u63A7\u653E\u5C04\u6027\u8870\u53D8\uFF0C\u5C06\u5730\u8868\u53D8\u6210\u4E86\u9762\u76EE\u5168\u975E\u7684\u5730\u72F1\uFF0C\u88AB\u7B49\u79BB\u5B50\u88C2\u7F1D\u548C\u91CD\u529B\u5F02\u5E38\u6495\u88C2\u3002

  \u4F20\u611F\u5668\u63A2\u6D4B\u5230[c][ff00ff]\u6DF1\u6E0A\u5179\u745E\u514B\u65AF[-][/c]\u7684\u5B58\u5728\u3002\u5EFA\u8BAE\u6781\u5EA6\u8C28\u614E\u884C\u4E8B\u3002



PlanetType: Plasma
Emissive: True
PlayfieldType: Planet
Difficulty: 10

LandClaimZone: Device


# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0, 0.2, 0.4"

SkyColor: "0,0,0.1"
SkyHorizonColor: "0, 0, 0.2"
AtmosphereParams: [10, 3]

# Light
DayLightIntensity: 0.7
NightLightIntensity: 0.9
LightZenithColor: "1.2, 1, 1.2"
LightHorizonColor: "0.3, 0.5, 1"
NightLightColor: "0.4, 0.7, 1.4"

DayShadowStrength: 0.95
NightShadowStrength: 0.5

# Sun
SunFlare: EnvironmentalEffects/SunFlareBlue

# Fog
FogColor: "1, 0, 1"
# AtmosphereFog: 0.6
FogCloudIntensity: 0.1
# GroundFogIntensity: 0.02
# GroundFogHeight: 75

# Clouds and Wind
CloudsDensity: 0.2
CloudsSharpness: 0.2
CloudsBrightness: 0.3
CloudsOpacity: 0.1

CloudsZenithColor: "0, 0.2, 1"
CloudsHorizonColor: "0.2, 0.0, 0.4"
CloudsNightZenithColor: "0.015, 0.018, 0.017"
CloudsNightHorizonColor: "0.015, 0.018, 0.017"


WindSpeed: 0


# Special effects around the player
SpecialEffectsLocal:
  - Name: Grime
    MaxHeight: 20

SpecialEffectsGlobal:
# # Weather
  - Name: Clear
    Type: Weather
    InitialDelay: 300
    Delay: 300
    Lifetime: 30
# Global Effect
  - Name: ThunderAndLightningPurple
    Time: Always
    InitialDelay: 0   
    Delay: 2
    Lifetime: 300     
    PlyDist: 50
    SpawnY: 100
    Struct: Avoid    

# ==============================================================

### Resource Deposits
RandomResources:
# Size Scaling of ore amount. Poor = 66%. Normal = 100%. Rich = 143%. Gold = 66%. Penatix = 50%.
# ======================================================================================================
# 1=2          6=542      11=3300     16=10200    21=23200
# 2=20         7=862      12=4300     17=12300    22=26700
# 3=67         8=1200     13=5500     18=14600    23=30500
# 4=160        9=1800     14=6800     19=17200    24=34700
# 5=314        10=2500    15=8400     20=20100    25=39200
# ======================================================================================================
    - Name: MagnesiumResource
      Biome: [ Plains, Dunes, CrystallizedRocks, Flats ]
      IsScalingCount: True 
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.9
      #DistTypeCylinder:
        #MaxRadius: 8
        #YVariance: 10

    - Name: GoldResource
      Biome: [ Plains, Dunes, CrystallizedRocks, Flats ]
      IsScalingCount: True
      CountMinMax: [ 2, 4 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 1
      MaxDroneCount: 8
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 10

    - Name: PlatinResource
      # Biome: [ Plains, Dunes, CrystallizedRocks, Flats ]
      IsScalingCount: True
      CountMinMax: [ 0, 1 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 150, 250 ]
      DroneProb: 1
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 3

    - Name: PlatinResource
      # Biome: [ Plains, Dunes, CrystallizedRocks, Flats ]
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 2, 3 ]
      DepthMinMax: [ 0, 2 ]
      DroneProb: 0.3
      MaxDroneCount: 2
      #DistTypeCylinder:
        #MaxRadius: 1
        #YVariance: 1

    - Name: ZascosiumResource
      Biome: [ Plains, Dunes, CrystallizedRocks, Flats ]
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 0, 5 ]
      DroneProb: 1  
      MaxDroneCount: 8
      #DistTypeCylinder:
        #MaxRadius: 10
        #YVariance: 15

        # Large, shallow, wide fields of promethium.
    - Name: PromethiumResource
      Biome: [ Plains, Dunes, CrystallizedRocks, Flats ]
      IsScalingCount: True 
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 13, 16 ]
      DepthMinMax: [ 1, 1 ]
      DroneProb: 1
      MaxDroneCount: 12
      #DistTypeCylinder:
        #MaxRadius: 64
        #YVariance: 1

### Resource Asteroids
AsteroidResources:
     - Name: MagnesiumResource
       Threshold: 0.2
       Amount: 0.1

     - Name: GoldResource
       Threshold: 0.2
       Amount: 0.1

     - Name: ZascosiumResource
       Threshold: 0.2
       Amount: 0.1

