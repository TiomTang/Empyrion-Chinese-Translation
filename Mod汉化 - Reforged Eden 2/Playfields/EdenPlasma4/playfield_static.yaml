### POIs
POIs:
    Random:
        - GroupName: R2KrielDroneBase
          Faction: Kriel
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          # Biome: [ Plains, Dunes, CrystallizedRocks, Flats ]
          CountMinMax: [ 1, 1 ]
          IsImportant: True
          DroneProb: 1.0
          DronesMinMax: [ 8, 8 ] 
          ReserveCount: 30
          SpawnResource: ["PromethiumResource:1-1","ZascosiumResource:1-1"]
          SpawnResourceRange: [175,300]
          Properties: 
            - Key: SI
              Value: Off
            - Key: Music
              Value: moonstone
            - Key: RegenAfter
              Value: 720 

              # Auxiliary POIs for Drone Base
        - GroupName: R2KrielMain
          Faction: Kriel
          # Biome: [ Plains, Dunes, CrystallizedRocks, Flats ]
          CountMinMax: [ 1, 2 ]
          # IsImportant: True
          DroneProb: 1
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 12
          SpawnPOINear: [R2KrielDroneBase]
          SpawnPOINearRange: [250, 400]
          TroopTransport: True
          Properties:
            - Key: RegenAfter
              Value: 720

              # Defense POIs for Drone Base
