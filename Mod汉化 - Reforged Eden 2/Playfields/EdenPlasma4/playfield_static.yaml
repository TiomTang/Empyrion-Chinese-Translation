          IsImportant: True
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          Properties: 
            # MapDistance values over 500 do not work on planets.
            - Key: Discovery
              Value: False
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 720

              # Kriel main POI cluster - needs more Kriel POIs!
