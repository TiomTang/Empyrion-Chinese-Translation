### Resource Deposits
RandomResources:
    - Name: IronResource
      Biome: [ JungleMountains ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 13, 15 ]
      DepthMinMax: [ 15, 20 ]
      DroneProb: 1
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 64
        #YVariance: 45

    - Name: SiliconResource
      Biome: [ DustBowl ]
      IsImportant: True
      IsScalingCount: True
      CountMinMax: [ 4, 6 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 1, 3 ]
      DroneProb: 0.2
      #DistTypeCylinder:
        #MaxRadius: 7
        #YVariance: 3

    - Name: CopperResource
      Biome: [ Jungle, JungleOasis, Oasis ]
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
