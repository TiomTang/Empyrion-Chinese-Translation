      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 7, 8 ]
      DepthMinMax: [ 10, 15 ]
      DroneProb: 0.2
      #DistTypeCylinder:
        #MaxRadius: 7
        #YVariance: 5

