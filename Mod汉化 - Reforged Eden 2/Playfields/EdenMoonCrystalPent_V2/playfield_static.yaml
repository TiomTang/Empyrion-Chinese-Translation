### Resource Deposits
RandomResources:
    - Name: CopperResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 4, 10 ]
      DroneProb: 0
      MaxDroneCount: 2
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: NeodymiumResource
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 20, 30 ]
      DroneProb: 0
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 25

    - Name: PromethiumResource
      Biome: [ Crystal ]
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 4, 5 ]
      DroneProb: 0
      MaxDroneCount: 5
      DepthMinMax: [ 20, 40 ]
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: PentaxidResource
      Biome: [ Crystal ]
      IsScalingCount: True
      CountMinMax: [ 5, 7 ]
      SizeMinMax: [ 4, 6 ]
      DroneProb: 2
      MaxDroneCount: 8
      DepthMinMax: [ 49, 65 ]
      #DistTypeCylinder:
        #MaxRadius: 32
        #YVariance: 24

    - Name: PentaxidResource
      Biome: [ Plains ]
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 4, 5 ]
      DroneProb: 0.5
      MaxDroneCount: 2
      DepthMinMax: [ 30, 60 ]
      #DistTypeCylinder:
        #MaxRadius: 32
        #YVariance: 10

