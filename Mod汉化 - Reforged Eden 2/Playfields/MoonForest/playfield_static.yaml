      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

    - Name: CopperResource
      Biome: [ Forest, Oasis, Marsh, Swamp ]
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 3, 5 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.0
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

    - Name: SiliconResource
