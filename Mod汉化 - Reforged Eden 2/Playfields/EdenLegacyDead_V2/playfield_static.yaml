# Energized Xenocrystals grouping
        - GroupName: RE2_CrystalsXeno
          Faction: None
          # Biome: [ Wasteland ]
          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 4320

        - GroupName: RE2_CrystalsXeno
          Faction: None
          # Biome: [ Wasteland ]
          CountMinMax: [ 4, 6 ]
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOINear: [RE2_CrystalsXeno]
          SpawnPOINearRange: [35,100]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 4320

# Random Energized Xenocrystals
        - GroupName: RE2_CrystalsXeno
          Faction: None
          # Biome: [ Wasteland ]
          CountMinMax: [ 3, 4 ]
          IsScalingCount: True
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 4320

# Random Deco =============================================================
        - GroupName: Eden_Bones
          Faction: None
          Biome: [ DriedLakeBed, Sand, Shore, Water, ShallowWater, Wasteland ]
          CountMinMax: [ 8, 12 ]
          PlaceAt: Terrain, UnderWater
          # IsScalingCount: True 
          DroneProb: 0
          DronesMinMax: [ 1, 3 ]
          ReserveCount: 2
          TroopTransport: True
          Properties: 
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

# Dead animals floating on water
        - GroupName: RE2_DeadAnimalsWater
          Faction: None
          Biome: [ DeepWater, Water ]
          PlaceAt: OnWater
          CountMinMax: [ 4, 6 ]
          IsScalingCount: True
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 720

    FixedPlayerStart:
        - Mode: Debug
          Pos: [ -596, 104, -1063 ]
          RotY: 125

        - Mode: Survival
          Spawn: EscapePod
          Pos: [ -350, 0 ]      # fixed x,z position of escape pod start      
          # Armor: ArmorLight
          PlayerArmor: ["ArmorMedium, ArmorLight, ArmorLight, #FreshStart:ArmorLight"]     
          Status: [ "Food: 400, Health: 400", "Food: 250, Health: 250", "Food: 150, Health: 150", "#FreshStart:Food: 250, Health: 250" ]  
          Items: [ "SurvivalTool, PowerBar:2, Medikit04:3, Bandages:2, Flashlight, AntibioticOintment:2, SurvivalTent, MobileAirCon, OxygenGeneratorSmall, BioFuel:5, OxygenBottleSmall:5", "SurvivalTool, PowerBar:1, Medikit04:2, Bandages:1, Flashlight, AntibioticOintment:1, SurvivalTent, MobileAirCon, OxygenGeneratorSmall, BioFuel:2, OxygenBottleSmall:5", "SurvivalTool, PowerBar:1, Medikit04:1, Flashlight, SurvivalTent, OxygenBottleSmall:5", "#FreshStart: SurvivalTool, Medikit04:1, Flashlight, SurvivalTent, OxygenBottleSmall:3" ]

