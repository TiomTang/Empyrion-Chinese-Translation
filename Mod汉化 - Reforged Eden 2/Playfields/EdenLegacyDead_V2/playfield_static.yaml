    # Delay: 5
    # Lifetime: 1000
  # - Name: Fog
    # Type: Weather
    # InitialDelay: 24
    # Delay: 12
    # Lifetime: 1000
  - Name: Wind
    Type: Weather
    InitialDelay: 24
    Delay: 12
    Lifetime: 600
  # - Name: RainMedium
    # Type: Weather
    # InitialDelay: 24
    # Delay: 12
    # Lifetime: 600
  # - Name: RainHeavy
    # Type: Weather
    # InitialDelay: 48
    # Delay: 24
    # Lifetime: 600
  # - Name: Storm
    # Type: Weather
    # InitialDelay: 48
    # Delay: 24
    # Lifetime: 600
  - Name: FogRadiationPurple
    Type: Weather
    InitialDelay: 24
    Delay: 72
    Lifetime: 300
