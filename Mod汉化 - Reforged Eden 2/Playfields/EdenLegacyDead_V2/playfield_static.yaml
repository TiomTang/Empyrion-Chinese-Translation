---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html
Description: |
  难度: [c][ffff00]中等[-][/c]


  在很久以前，这里被剥夺了所有的自然资源，并被彻底清除了生命，如今只作为一场银河战争中被遗忘的牺牲品存在。似乎就连遗留者也对这个地方没有兴趣。


PlanetClass: Dead Legacy
PlanetType: Dead Legacy
PlayfieldType: Planet
Difficulty: 5

LandClaimZone: Device

# Atmosphere and Sky
AtmosphereEnabled: True
# AtmosphereColor: "0.6, 0.6, 0.65"
AtmosphereColor: "0.6, 0.7, 0.6"

# SkyColor: "0.1, 0.1, 0.1"
SkyColor: "0.1, 0.2, 0.1"
# SkyHorizonColor: "0.2, 0, 0.1"
SkyHorizonColor: "0, 0.15, 0.1"
AtmosphereParams: [1, 1.6]          # [Rayleigh Multiplier, Atmosphere Contrast], default is AtmosphereParams: [1, 1.6]   
                                     # RayleighMultiplier between 0 and 10 - higher values make SkyColor / SkyHorizonColor more pronounced
                                     # Atmosphere Contrast between 0 and 3 - lower values wash out SkyColor / SkyHorizonColor 

# Light
# DayLightIntensity: 1.2
DayLightIntensity: 1
NightLightIntensity: 0.50
# NightLightColor: "1, 0.78, 0.78"

LightZenithColor: "0.6,1,0.7"
LightHorizonColor: "0.5,0.8,0.7"

# NightLightColor: "0.78, 0.78, 1"
NightLightColor: "0.7, 1, 0.7"

DayShadowStrength: 0.5
NightShadowStrength: 1

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhite2
# OrbitUsesLightColor: True


# Fog
# AtmosphereFog: 0.35
FogCloudIntensity: 0.8
# GroundFogIntensity: 0
# GroundFogHeight: 0


# Clouds and Wind
CloudsDensity: 0.3
CloudsSharpness: 0.1
CloudsBrightness: 0.2
CloudsOpacity: 0.1
CloudsZenithColor: "1, 0.83, 0.83"
CloudsHorizonColor: "1, 0.3, 0.1"
CloudsNightZenithColor: "0.05, 0.2, 0.1"
CloudsNightHorizonColor: "0.05, 0.2, 0.15"

WindSpeed: 8

# Special Effects 
SpecialEffectsLocal:
  - Name: DustDevil
    Biome: [ DriedLakeBed, Sand ]  
    Time: Always
    FollowPlayerY: True
    MaxHeight: 5
  - Name: WindLines
    Biome: [ Sand, LowMountains, Mountains ]
    Time: Always
    MaxHeight: 5

SpecialEffectsGlobal:
# Weather
  - Name: Clear
    Type: Weather
    InitialDelay: 0
    Delay: 0
    Lifetime: 1200
  - Name: CloudsLight
    Type: Weather
    InitialDelay: 6
    Delay: 12
    Lifetime: 600
