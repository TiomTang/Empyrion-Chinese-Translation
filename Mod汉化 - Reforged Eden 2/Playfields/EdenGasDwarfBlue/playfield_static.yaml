---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html
#Created by Needleship


Description: |
  [c][e0e020] 注意：出于安全原因，你的飞船电脑会阻止你进入大气层。 [-][/c] \n并非所有气态行星都诞生为巨行星：如果它们形成时周围的物质不足，有些会保持相对较小的体积。\n尽管如此，这依然是一团巨大的氢气团，包裹着一个小型岩石核心。其他气体的痕迹为云层增添了色彩。\n\n大气中的猛烈风暴可能会将任何敢于靠近的飞行器撕裂——或者“表面”的压力会将它们压碎。\n- 不建议着陆。


  [c][808080][i]最初由 Needleship 创作。[/i][-][/c]



PlanetType: Gas
PlayfieldType: Planet
Difficulty: 2

AllowHV: False                  # Dis-allow HVs to enter/spawn in this playfield, default is True
AllowSV: False                  # Dis-allow SVs to enter/spawn in this playfield, default is True
AllowCV: False                  # Dis-allow CVs to enter/spawn in this playfield, default is True
AllowBA: False                  # Dis-allow BAs to enter/spawn in this playfield, default is True

# Atmosphere and Sky
AtmosphereEnabled: True
# AtmosphereColor: "0.5, 0.53, 0.58"
AtmosphereColor: "0.7, 0.7, 0.8"
SkyColor: "1, 0.8, 1"
SkyHorizonColor: "1, 0.3, 0"

# Light
DayLightIntensity: 0.9
NightLightIntensity: 0.05
DayShadowStrength: 0.95
NightShadowStrength: 0.5

LightZenithColor: "0.80, 0.8, 1"
LightHorizonColor: "1, 0.6, 0.15"
NightLightColor: "0.2, 0.0, 1.0"

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhite

# Fog
AtmosphereFog: 0.1
FogCloudIntensity: 0.0
GroundFogIntensity: 0.00
GroundFogHeight: 0

# Clouds and Wind
CloudsDensity: 0.3
CloudsSharpness: 0.2
CloudsBrightness: 0.6
CloudsZenithColor: "0.4, 0.5, 0.4"
CloudsHorizonColor: "1, 0.3, 0"

WindSpeed: 3

# Special Effects
SpecialEffectsGlobal:
  - Name: Clear
    Type: Weather
    InitialDelay: 0
    Delay: 3
    Lifetime: 1200

# ==============================================================

### Resource Deposits
RandomResources:



### Resource Asteroids
AsteroidResources:


