POIs:
    Random:

 

### Drones

    FixedPlayerStart:
        - Mode: Debug
          Pos: [ 0, 120, 0 ]
          RotY: 0

        - Mode: Survival
          Spawn: EscapePod
          Armor: ArmorMedium

DroneSpawning:
    Random:
        - DronesMinMax: [ 0, 0 ]
          CenterX: -2500
          Radius: 2000

        - DronesMinMax: [ 0, 0 ]
          CenterX: 2500
          Radius: 2000

