# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

Description: "\u96BE\u5EA6: [c][00ff00]\u7B80\u5355[-][/c]  \n\n\u8FD9\u9897\u5BCC\u542B\u94DC\u7684\u536B\u661F\u62E5\u6709\u975E\u5E38\u7A00\u8584\u7684\u5927\u6C14\u2014\u2014\u5B83\u53D7\u9644\u8FD1\u884C\u661F\u5F02\u5E38\u5DE8\u5927\u7684\u78C1\u573A\u4FDD\u62A4\uFF0C\u5E76\u4E14\u536B\u661F\u7684\u5BC6\u5EA6\u8DB3\u591F\u9AD8\uFF0C\u53EF\u4EE5\u963B\u6B62\u90E8\u5206\u6C14\u4F53\u9038\u5165\u592A\u7A7A\u3002\u7531\u6B64\uFF0C\u5B83\u79EF\u7D2F\u4E86\u6781\u5927\u91CF\u7684\u6C99\u6F20\u6D82\u5C42\u3002"


PlanetType: Varnished Barren Moon
PlayfieldType: Moon
Difficulty: 3

LandClaimZone: Device

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.30, 0.35, 0.35"
SkyColor: "0.05, 0.10, 0.00" 
SkyHorizonColor: "0.4, 0.1, 0"
AtmosphereParams: [5, 1.6]     

# Light
DayLightIntensity: 1.6
NightLightIntensity: 0.7
DayShadowStrength: 0.95

DayShadowStrength: 1
NightShadowStrength: 1

LightZenithColor: "1, 0.92, 0.84"
LightHorizonColor: "0.5, 0.4, 0.45"
NightLightColor: "0.78, 0.78, 1"

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhiteMoon

# Fog
# AtmosphereFog: 0.00
FogColor: "0.9, 0.9, 0.1"
FogCloudIntensity: 0.0
# GroundFogIntensity: 0.05
# GroundFogHeight: 125

# Clouds and Wind
CloudsDensity: 0.0
CloudsSharpness: 1
CloudsBrightness: 0.0
CloudsOpacity: 0.0
 
CloudsZenithColor: "0.0, -0.1, -0.1"
CloudsHorizonColor: "1, 0.3, 0.1"

WindSpeed: 0

# ==============================================================
# Size Scaling of ore amount. Poor = 66%. Normal = 100%. Rich = 143%. Gold = 66%. Penatix = 50%.
# ======================================================================================================
# 1=2          6=542      11=3300     16=10200    21=23200
# 2=20         7=862      12=4300     17=12300    22=26700
# 3=67         8=1200     13=5500     18=14600    23=30500
# 4=160        9=1800     14=6800     19=17200    24=34700
# 5=314        10=2500    15=8400     20=20100    25=39200
# ======================================================================================================
      # #DistTypeCylinder:
        # #MaxRadius: 13
        # #YVariance: 8
# ======================================================================================================
      # DistTypeWorm:
        # FreqDirChange: 0.2
        # DirChangeMagnitude: 0.2
        # MaxLength: 50
        # DeepnessType: 0 #Depth Style 0=Undefined, 1=Free, 2=Shallow
# ======================================================================================================

### Resource Deposits
RandomResources:
    - Name: SiliconResource
      IsScalingCount: True
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 8, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.4
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

# Massive deep copper deposit.
    - Name: CopperResource
      IsScalingCount: True
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 11, 12 ]
      DepthMinMax: [ 65, 80 ]
      DroneProb: 1
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 64
        #YVariance: 10

    - Name: CopperResource
      IsScalingCount: True
      CountMinMax: [ 5, 7 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 2, 3 ]
      DroneProb: 1
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 8
        #YVariance: 5

    - Name: CobaltResource
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: AluminiumResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 25, 35 ]
      DroneProb: 0.2
      MaxDroneCount: 1

    - Name: PromethiumResource
      IsScalingCount: True
      CountMinMax: [ 2, 4 ]
      SizeMinMax: [ 3, 6 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      DepthMinMax: [ 0, 1 ]
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 10

### Resource Asteroids
AsteroidResources:
     - Name: SiliconResource
       Threshold: 0.2
       Amount: 0.1
     - Name: CopperResource
       Threshold: 0.2
       Amount: 0.1
     - Name: CobaltResource
       Threshold: 0.2
       Amount: 0.1
     - Name: AluminiumResource
       Threshold: 0.2
       Amount: 0.1
     - Name: PromethiumResource
       Threshold: 0.2
       Amount: 0.1

