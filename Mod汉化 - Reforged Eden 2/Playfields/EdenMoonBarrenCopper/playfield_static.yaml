# =============================================== Faction Zirax Main
# ====================== Drone Base
# Zirax Drone base
# # Forced to spawn on mountains. Allows different attack vectors
        - GroupName: R2DroneBase
          Faction: Zirax
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          IsImportant: True
          CountMinMax: [ 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 2, 4 ]
          ReserveCount: 3
          SpawnResource: ["CopperResource:1-1"]
          SpawnResourceRange: [150,400]
          Properties:
            - Key: RegenAfter
              Value: 4320

