### Resource Deposits
RandomResources:



#T0


#T1


#T2
    - Name: CobaltResource
      Biome: [ SaltFlatsEdge, BarrenRocks, Regolith, Plains, LowMountains, Mountains, CanyonEdge]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 8, 9 ]    # Rich
      DepthMinMax: [ 65, 80 ] # Very deep inside the rock. Will need a drill turret or a mining HV.
      DroneProb: 0.3


    - Name: TitanResource
      Biome: [ SaltFlatsEdge, BarrenRocks, Regolith, Plains, PlainsEdge, CanyonEdge]
      IsScalingCount: True 
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 65, 80 ] # As above - Very deep inside the rock. 
      MaxDroneCount: 1 

#Special

    - Name: MagnesiumResource   # (Residuals of evaporated water)
      Biome: [ SaltFlats, Salts, Salts_1, Flats, Hollow]    # Small target biomes, will likely much rarer
      IsScalingCount: True
      CountMinMax: [ 5, 5 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 3, 6 ]    # Shallow deposit
      DroneProb: 0.7
      MaxDroneCount: 1 

    - Name: MagnesiumResource   # (Residuals of evaporated water)
      Biome: [ Maze, Flats, Hollow]    # Medium target biome
      IsScalingCount: True
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 3, 6 ]    # Shallow deposit
      DroneProb: 0.7
      MaxDroneCount: 1 



    - Name: MagnesiumResource   #
      Biome: [ LowMountains, LowMountains_1, Mountains ]   # Medium to small target biomes; fallbacks
      IsScalingCount: True
      CountMinMax: [ 3, 3 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 30, 60 ]


    - Name: PromethiumResource
      Biome: [ LowMountains_1, LowMountains, Mountains ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 20, 30 ]
      DroneProb: 0.3
      MaxDroneCount: 1 

    - Name: PentaxidResource
      Biome: [ LargeCrater, CraterEdge, PalmDunes ]
      # IsScalingCount: True 
      IsImportant: True
      CountMinMax: [ 10, 10 ] # Small target biome... Possibly only 5 deposits or so show up?
      SizeMinMax: [ 3, 4 ]    # 30-71 ores per deposit. 
      DepthMinMax: [ 5, 20 ]


