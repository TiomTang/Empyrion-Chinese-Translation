# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html



# Desert variant # (Mostly a Pirate haven. They hide in the canyons after their raids of trading vessels deep inside galactic faction territories)
Description: |
  难度: [c][ffff00]中等[-][/c]

  [c]注意:   [b]POI探测受限[/b] 在这颗卫星上。[/b] [-][/c]

  [c][808080][i]凭肉眼探索。[-][/i][-][/c]


  一颗拥有广阔峡谷系统的卫星。

  远古时期，这里的水是由一次富含翘曲水晶（原料）的陨石撞击“带来”的——可能是自然形成，或是一次古代的地球化改造尝试。  
  如今，这个世界拥有稀薄的大气层——经过漫长的岁月，即便几滴雨水也能在岩石上刻出深痕……

  这里依然到处覆盖着低密度的翘曲水晶（原料）粉尘——掩盖了POI的能量信号。

  [i]……对于那些不想被发现的人来说，这是一个避风港……[/i]




PlanetClass: Desert Canyon Moon
PlanetType: MoonDesertCanyon
PlayfieldType: Moon
Difficulty: 4

LandClaimZone: Device


UseFixed: true
UseRandom: true




# == Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.58, 0.7, 0.68"  # lime green


# LightStrength & Shadows
DayLightIntensity: 1.4
NightLightIntensity: 1.9
DayShadowStrength: 0.95
NightShadowStrength: 0.5

# Fog basics
FogCloudIntensity: 0.8
AtmosphereFog: 0


# Atmosphere colours; will effect even weather
SunFlare: EnvironmentalEffects/SunFlareBlue

AtmosphereParams: [0.5, 1.5]
SkyColor: "0.9, 0.9, 0.3"
SkyHorizonColor: "0.5, 0.1, 0.005"
FogColor: "0.7, 0.80, 0.70"

LightZenithColor: "0.95, 0.95, 0.90"
LightHorizonColor: "0.8, 0.3, 0.1"
NightLightColor: "0.3, 0.4, 0.45"


GroundFogIntensity: 0.010
GroundFogHeight: 20

CloudsZenithColor: "0.40, 0.38, 0.31"
CloudsHorizonColor: "0.4, 0.07, 0.05"
CloudsNightZenithColor: "0.03, 0.010, 0.01"
CloudsNightHorizonColor: "0.03, 0.010, 0.01"

# Clouds. These parameters will only matter if NO weather effect is defined (='default' weather)
CloudsDensity: 0.2
CloudsSharpness: 1
CloudsBrightness: 0.3
CloudsOpacity: 0.4


# Wind
WindSpeed: 40



