# =========== Placing the basic POI for the playfield to work ===========

          # DroneBase Xenu - High difficulty POI (outdated, but fond memories of that 'plasma phalanx')
        - GroupName: R2DroneBase
          IsImportant: True
          Faction: Zirax
          # NoShieldReload: True
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          BiomesExcluded: [ PoleEdge ] 
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 4 ]
          ReserveCount: 20
          TroopTransport: True
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 2000
          Properties: 
            - Key: Music
              Value: Encryptor
            - Key: RegenAfter
              Value: 4320

