---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

Description: "\u96BE\u5EA6: [c][ff0000]\u56F0\u96BE[-][/c]


[c][e0e020]\u6CE8\u610F:[-][/c]   [c]\u63A2\u6D4B\u5230\u591A\u4E2A\u9632\u7A7A\u70AE\u5854\u3002[-][/c]\n[c][808080][i]\u5EFA\u8BAE\u6781\u5EA6\u8C28\u614E\u3002[-][/i][-][/c] \n\n\u5728\u884C\u661F\u5F62\u6210\u8FC7\u7A0B\u4E2D\uFF0C\u5927\u591A\u6570\u91CD\u5143\u7D20\u4F1A\u6C89\u5165\u6838\u5FC3\u3002\n\u7136\u800C\uFF0C\u5982\u679C\u4E00\u6B21\u5B87\u5B99\u4E8B\u6545\u5265\u79BB\u4E86\u4E16\u754C\u7684\u5916\u5C42\uFF0C\u6216\u8005\u8FD9\u4E9B\u7269\u8D28\u6781\u4E3A\u4E30\u5BCC\u2014\u2014\u90A3\u4E48\u4F1A\u51FA\u73B0\u6240\u8C13\u7684"metal planet" may form.\n\nIn either case, only a "few hundred kilometers" of thin silicate mantle remains.\nStill, there are plenty of minerals to mine here, and heavy elements and exotic element deposits are easy to access.\n\nBecause they are extremely rare, they attract many \u201Cprotectors\u201D. Only the most cautious or extremely powerful players can find a way to navigate here... \u2014 Invaders, beware."





PlanetClass: Barren Metal
PlanetType: BarrenMetal
PlayfieldType: Planet
Difficulty: 4

LandClaimZone: Device


# == Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.6, 0.3, 0.0"

# LightStrength & Shadows
DayLightIntensity: 1.4
NightLightIntensity: 1.5
DayShadowStrength: 0.95
NightShadowStrength: 0.5

# Fog basics
FogCloudIntensity: 0.8
AtmosphereFog: 0
GroundFogIntensity: 0.02
GroundFogHeight: 180

# Atmosphere colours; will effect even weather
SunFlare: EnvironmentalEffects/SunFlareBlue

SkyColor: "0.9, 0.25, 0.0"
SkyHorizonColor: "0.5, 0.1, 0.005"
FogColor: "0.8, 0.40, 0.40"

LightZenithColor: "0.95, 0.95, 0.90"
LightHorizonColor: "0.8, 0.3, 0.1"
NightLightColor: "0.3, 0.4, 0.45"

CloudsZenithColor: "0.4, 0.108, 0.0"
CloudsHorizonColor: "0.4, 0.07, 0.05"
CloudsNightZenithColor: "0.03, 0.010, 0.01"
CloudsNightHorizonColor: "0.03, 0.010, 0.01"

# Wind
WindSpeed: 3

# Clouds. These parameters will only matter if NO weather effect is defined (='default' weather)
CloudsDensity: 0.95
CloudsSharpness: 1
CloudsBrightness: 0.3
CloudsOpacity: 0.5


# Special effects around the player
SpecialEffectsLocal:
  - Name: Grime
    MaxHeight: 20

SpecialEffectsGlobal:
# Weather
  - Name: Clear
    Type: Weather
    InitialDelay: 2
    Delay: 2  
    Lifetime: 600
  - Name: CloudsLight
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1200
  - Name: CloudsMedium
    Type: Weather
    InitialDelay: 6
    Delay: 2
    Lifetime: 1000
  - Name: CloudsDark
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 600
  - Name: FireRain
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 600


# Global Effect
  - Name: MeteorShower
    Time: Day
    InitialDelay: 0
    Delay: 2
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid


# ==============================================================
# Size Scaling of ore amount. Poor = 66%. Normal = 100%. Rich = 143%. Gold = 66%. Penatix = 50%.
# ======================================================================================================
# 1=2          6=542      11=3300     16=10200    21=23200
# 2=20         7=862      12=4300     17=12300    22=26700
# 3=67         8=1200     13=5500     18=14600    23=30500
# 4=160        9=1800     14=6800     19=17200    24=34700
# 5=314        10=2500    15=8400     20=20100    25=39200
# ======================================================================================================
      # #DistTypeCylinder:
        # #MaxRadius: 13
        # #YVariance: 8
# ======================================================================================================
      # DistTypeWorm:
        # FreqDirChange: 0.2
        # DirChangeMagnitude: 0.2
        # MaxLength: 50
        # DeepnessType: 0 #Depth Style 0=Undefined, 1=Free, 2=Shallow
# ======================================================================================================

### Resource Deposits
RandomResources:

    # - Name: IronResource    # may confuse players- Iron is literally in the canyon walls! (and more challenging to harvest than standard deposits)
      # IsScalingCount: True 
      # CountMinMax: [ 6, 6 ]
      # SizeMinMax: [ 2, 16 ]
      # DepthMinMax: [ 5, 10 ]
      # DroneProb: 0.9
      

    - Name: ErestrumResource         # Will get grabbed by RocketTurret-POI
      Biome: [ Canyon, DeepCanyon ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 0.2  
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: ErestrumResource
      Biome: [ ShallowCanyon, Canyon, DeepCanyon ]
      IsScalingCount: True
      CountMinMax: [ 3, 3 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 1  
      MaxDroneCount: 4
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: ZascosiumResource         #  Will get grabbed by RocketTurret-POI
      Biome: [ ShallowCanyon, Canyon, DeepCanyon ]
      IsScalingCount: True 
      CountMinMax: [ 8, 8 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 0.5
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: CopperResource
      Biome: [DustBowl, Rifts, Rifts_1, LargeCrater, SmallCrater, Dunes]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 13 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.6
      #DistTypeCylinder:
        #MaxRadius: 32
        #YVariance: 16
        
    - Name: CobaltResource
      Biome: [ DustBowl, Rocks, Rocks_1, LowMountains, LowMountains_1, Mountains, HighMountains, LargeCrater, SmallCrater ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8
        
    - Name: SiliconResource
      Biome: [ Plains, Sand, Dunes ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.2
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8
        
    - Name: PromethiumResource
      Biome: [Rocks, Rocks_1, LavaFolds, LavaEdge, ShallowCanyon, Canyon, DeepCanyon]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 7, 11 ]
      DroneProb: 0.7
      DepthMinMax: [ 0, 1 ]
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 10
        
    - Name: GoldResource
      Biome: [ CanyonEdge, ShallowCanyon, Canyon, DeepCanyon, LargeCrater, SmallCrater ]
      IsImportant: True
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 5, 6 ]
      DroneProb: 1
      MaxDroneCount: 3
      DepthMinMax: [ 5, 10 ]
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 10


### Resource Asteroids
AsteroidResources:
     - Name: PromethiumResource
       Threshold: 0.2
       Amount: 0.1
     - Name: SiliconResource
       Threshold: 0.2
       Amount: 0.1
     - Name: CobaltResource
       Threshold: 0.2
       Amount: 0.1
     - Name: ZascosiumResource
       Threshold: 0.2
       Amount: 0.1

### POIs
POIs:
