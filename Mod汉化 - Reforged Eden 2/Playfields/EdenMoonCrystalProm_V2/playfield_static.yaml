# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html
Description: "\u96BE\u5EA6: [c][ff0000]\u56F0\u96BE[-][/c]

[c][ffff00]\u8B66\u544A\uFF1A\u65B0\u7684\u88C5\u9970\u7CFB\u7EDF\u6B63\u5728\u6D4B\u8BD5\u4E2D\u3002\u8FDB\u5165\u6B64\u6E38\u620F\u573A\u5730\u53EF\u80FD\u4F1A\u9047\u5230\u610F\u5916\u95EE\u9898\u3002[-][/c]

\u6709\u65F6\u4F1A\u5F62\u6210\u8868\u9762\u9AD8\u5EA6\u6676\u5316\u7684\u8352\u829C\u536B\u661F\u3002\u8FD9\u7C7B\u6240\u8C13\u7684\u6676\u4F53\u536B\u661F\u56E0\u5176\u8574\u542B\u7684\u81EA\u7136\u8D44\u6E90\u6216\u7CBE\u795E\u8C61\u5F81\u610F\u4E49\u800C\u5907\u53D7\u89CA\u89CE\u3002\u53EF\u68C0\u6D4B\u5230\u5927\u91CF\u7684\u94B7\u3002"




PlanetType: Crystalline Moon
PlayfieldType: Moon
Difficulty: 3

LandClaimZone: Device

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.2, 0.4, 0.7" 
SkyColor: "0, 0.1, 0.8"
SkyHorizonColor: "0, 0.2, 1"
AtmosphereParams: [2, 1]       

# Light
DayLightIntensity: 1.1
NightLightIntensity: 0.7
DayShadowStrength: 0.95

LightZenithColor: "0.7,0.8,1"
LightHorizonColor: "0,0.6,0.8"
NightLightColor: "0, 0.5, 1.1"

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhite


# Fog
FogColor: "0, 0.3, 0.7"
FogCloudIntensity: 0.8
# AtmosphereFog: 0.95
# GroundFogIntensity: 0.24
# GroundFogHeight: 45

# Clouds and Wind
CloudsDensity: 0.2
CloudsSharpness: 0.2
CloudsBrightness: 0.1
CloudsOpacity: 0.05

CloudsZenithColor: "0.1,0.3,0.5" 
CloudsHorizonColor: "0.1, 0.5, 0.5"
CloudsNightZenithColor: "0, 0, 0.3"
CloudsNightHorizonColor: "0.1, 0.5, 0.5"

WindSpeed: 2


# Special Effects
SpecialEffectsLocal:
  - Name: ButterfliesBlue
    Biome: [ Forest ]
    Time: Day
    MaxHeight: 15
  - Name: FireFliesGreenFew
    Biome: [ Forest, Grassland ]
    Time: Always
    MaxHeight: 15
  - Name: FireFliesGreen
    Biome: [ Shore, ShallowWater ]
    Time: Night
    MaxHeight: 15

SpecialEffectsGlobal:
# Weather

    # Basic
  - Name: Clear
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1200
  - Name: CloudsLight
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 600
  - Name: CloudsMedium
    Type: Weather
    InitialDelay: 6
    Delay: 12
    Lifetime: 600
    # Uncommon
  - Name: Fog
    Type: Weather
    InitialDelay: 12
    Delay: 36
    Lifetime: 300
  - Name: RainMedium
    Type: Weather
    InitialDelay: 12
    Delay: 36
    Lifetime: 600
  - Name: RainHeavy
    Type: Weather
    InitialDelay: 12
    Delay: 48
    Lifetime: 600
  - Name: Storm
    Type: Weather
    InitialDelay: 48
    Delay: 72
    Lifetime: 600

    # Rare
  - Name: FogRadiationPurple
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 600


# Global Effects
  - Name: ThunderAndLightningWhite
    Biome: [ Any ]
    Time: Always
    InitialDelay: 0.5
    Delay: 6
    Lifetime: 30
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid

