### Resource Deposits
RandomResources:
    - Name: IronResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 4, 10 ]
      DroneProb: 0.5
      MaxDroneCount: 4
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: CopperResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 4, 10 ]
      DroneProb: 0.4
      MaxDroneCount: 2
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8
      
    - Name: PromethiumResource
      Biome: [ Crystal ]
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 8, 10 ]
      DroneProb: 1
      MaxDroneCount: 5
      DepthMinMax: [ 20, 40 ]
      # DistTypeWorm:
        # FreqDirChange: 0.2
        # DirChangeMagnitude: 0.2
        # MaxLength: 100
        # DeepnessType: 2 #Depth Style 0=Undefined, 1=Free, 2=Shallow

    - Name: ErestrumResource
      Biome: [ Mountains, LowMountains ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 25, 40 ]
      DroneProb: 1
      MaxDroneCount: 4
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

### Resource Asteroids
AsteroidResources:
    - Name: IronResource
      Threshold: 0.2
      Amount: 0.1
    - Name: CopperResource
      Threshold: 0.2
      Amount: 0.1
    - Name: PromethiumResource
      Threshold: 0.2
      Amount: 0.1

