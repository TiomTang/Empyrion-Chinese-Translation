# Drones
# ------------ Aerodrones with propellers.
# DroneSmallZiraxEMP
# DroneAeroZiraxMinigun
# DroneAeroZiraxCannon
# DroneAeroZiraxRocket

# ------------ Small hoverdrones
# DroneHoverZiraxMinigun
