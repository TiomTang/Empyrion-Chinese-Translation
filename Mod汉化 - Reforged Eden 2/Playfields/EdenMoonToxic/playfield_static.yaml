### Resource Deposits
RandomResources:
    - Name: MagnesiumResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 6, 11 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.9
      #DistTypeCylinder:
        #MaxRadius: 25
        #YVariance: 3

    - Name: PromethiumResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 7, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.4
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: ZascosiumResource
      Biome: [ Plains, Dunes, Rocks ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 0.9
      MaxDroneCount: 4
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

### Resource Asteroids
AsteroidResources:
     - Name: MagnesiumResource
       Threshold: 0.2
       Amount: 0.2
     - Name: PromethiumResource
       Threshold: 0.2
       Amount: 0.1
     - Name: ZascosiumResource
       Threshold: 0.2
       Amount: 0.1

### POIs
