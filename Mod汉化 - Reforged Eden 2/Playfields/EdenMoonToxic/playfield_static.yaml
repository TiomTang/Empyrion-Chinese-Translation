# DroneHoverZiraxRocket

# ------------ Large gunships
# DroneLargeZiraxMinigun
# DroneLargeZiraxRocket
# DroneLargeZiraxPlasma

DroneBaseSetup:
    Random:
        - GroupName: DroneBaseSetup
          Difficulty: 6
          PresetStyle: 3
          Stock:

              - Name: DroneHoverZiraxMinigun
                Amount: 200
                Extra: 0

              - Name: DroneHoverZiraxRocket
                Amount: 200
                Extra: 0

              - Name: DroneBomberAttackBase
                Amount: Infinite
                Extra: 1

              - Name: EnemyDroneV2Plasma
                Amount: Infinite
                Extra: 1

              - Name: DroneTroopsTransport
                Amount: Infinite
                Extra: 2

              - Name: ZiraxMinigun
                Amount: 500
                Extra: 3

              - Name: ZiraxRocket
                Amount: 500
                Extra: 3

              - Name: RipperDog
                Amount: 150
                Extra: 3

              - Name: Mechanoid
                Amount: 300
                Extra: 3

