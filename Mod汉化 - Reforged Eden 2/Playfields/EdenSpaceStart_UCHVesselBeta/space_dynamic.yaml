# Playfield Characteristics
Description: |
  [c][FFFFFF]人类联合理事会研究船[-][/c] UCHN Explorer 停泊在此，正在进行研究或维护工作。

  如果你还没有完成，所有泰伦幸存者需要在 [c][00ff00]单人任务[-][/c] 标签下启动伊甸园计划序章任务 [c][00ffff]与泰伦军队建立联系[-][/c]，然后向最近的人类联合理事会研究船报到。

  [c][ffffff][i]采矿属于某阵营已占领的小行星被视为战争行为。POI 的存在受银河阵营领地影响。[/i][-][/c]


