# =========== Placing the basic POI for the playfield to work ===========

          # DroneBase Xenu - High difficulty POI (outdated, but fond memories of that 'plasma phalanx')
        - GroupName: Eden_PrisonDroneBase
          IsImportant: True
          Faction: Zirax
          # NoShieldReload: True
          DroneBaseSetup: DroneBaseSetup
          BiomesExcluded: [ PoleEdge, ColdPlains ] 
          CountMinMax: [ 3, 5 ]
          DroneProb: 1.0
          DronesMinMax: [ 8, 8 ]
          ReserveCount: 20
          TroopTransport: True
          SpawnPOIAvoid: [START]
          SpawnPOIAvoidDistance: 4000
          Properties: 
            - Key: Music
              Value: Encryptor
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 720

