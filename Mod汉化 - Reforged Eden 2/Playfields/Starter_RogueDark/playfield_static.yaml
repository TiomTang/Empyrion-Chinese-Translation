          CountMinMax: [ 8, 12 ]
          InitPower: True
          SpawnPOINear: [RE2_StarterRogue]
          SpawnPOINearRange: [150, 300]
          Properties: 
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0
            - Key: MapMarker 
              Value: Neutral  
            - Key: RegenAfter
              Value: 180  

