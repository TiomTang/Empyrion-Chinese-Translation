          SpawnPOINearRange: [100, 500]
          Properties:
            - Key: SI
              Value: Off
            - Key: HudDistance
              Value: 0
            - Key: MapDistance
              Value: 0
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
