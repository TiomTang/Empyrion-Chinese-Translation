# Description: "Difficulty: [c][ff00ff][b]Ultra[/b][-][/c]

# [c][ff00ff][b]Dark Rogue[/b][-][/c]

# [c][FFFFFF]_______________________________________________[-][/c]

# Start: [c][FFFFFF]Crashed Transport[-][/c]      Equipment: [c][FFFFFF]Basic[-][/c]

# Missions: [c][FFFFFF]Custom[-][/c]                 Solar System: [c][FFFFFF]Rogue[-][/c]

# [c][ffff00][i]Blueprint factory disabled on this planet, its moons, and orbit.[/i][-][/c]

# [c][ffffff]No sunlight, no solar power, pitch black.[-][/c]


# After being captured by the Zirax, your prison transport crash landed on a rogue planet outside of any known star system.

# You must escape the prison transport, fight off Zirax patrols and hostile wildlife, and survive a brutal and pitch black environment.


# [c][ffffff][i]Information on the scenario can be accessed in the Empyriopedia section of the PDA (F1).[-][/i][/c]"

PlanetClass: Dark Rogue Starter
PlanetType: RogueStarterDark
Emissive: True
PlayfieldType: Planet
Difficulty: 40

# Blueprint factory is disabled on this starting planet.
AllowBlueprintSV: False
AllowBlueprintCV: False
AllowBlueprintBA: False
AllowBlueprintHV: False

LandClaimZone: Device

