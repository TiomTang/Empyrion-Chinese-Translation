PlanetType: Crystalline Moon
PlayfieldType: Moon
Difficulty: 3

LandClaimZone: Device

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.5, 0.65, 1.1" 
SkyColor: "0, 0.3, 0.7"
SkyHorizonColor: "0.7, 0.5, 0.2"
AtmosphereParams: [1, 2]       

# Light
DayLightIntensity: 1.4
NightLightIntensity: 0.55
DayShadowStrength: 0.95

LightZenithColor: "0.8,0.8,1"
LightHorizonColor: "0.5,0.5,1"
NightLightColor: "1.4,1.4,2"

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhite


# Fog
FogColor: "1, 0.8, 0.8"
FogCloudIntensity: 0.8
# AtmosphereFog: 0.95
# GroundFogIntensity: 0.24
# GroundFogHeight: 45

# Clouds and Wind
CloudsDensity: 1
CloudsSharpness: 0
CloudsBrightness: 3
CloudsOpacity: 0.01

CloudsZenithColor: "0,0,3" 
CloudsHorizonColor: "6, 0, 0"
CloudsNightZenithColor: "2, 0, 2"
CloudsNightHorizonColor: "0, 0, 2"

WindSpeed: 1


# Special Effects
SpecialEffectsLocal:
  - Name: FireFliesGreen
    Biome: [ Grassland ]
    Time: Always
    MaxHeight: 15
  - Name: FireFliesGreen
    Biome: [ Shore, ShallowWater ]
    Time: Night
    MaxHeight: 15
  - Name: FireFliesGreen
    Biome: [ Shore, ShallowWater ]
    Time: Night
    MaxHeight: 15
  - Name: FireFliesGreen
    Biome: [ Shore, ShallowWater ]
    Time: Night
    MaxHeight: 15


SpecialEffectsGlobal:
# Weather
  - Name: CloudsDark
    Type: Weather
    InitialDelay: 0
    Delay: 48
    Lifetime: 1200
  - Name: Clear
    Type: Weather
    InitialDelay: 0
    Delay: 36
    Lifetime: 1200


