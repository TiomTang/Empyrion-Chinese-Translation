### Resource Deposits
RandomResources:
    - Name: SiliconResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 4, 10 ]
      DroneProb: 0
      MaxDroneCount: 2
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: SathiumResource
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 15, 20 ]
      DroneProb: 0
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 25

    - Name: PromethiumResource
      Biome: [ Crystal ]
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 4, 5 ]
      DroneProb: 0
      MaxDroneCount: 5
      DepthMinMax: [ 10, 15 ]
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: ErestrumResource
      Biome: [ HardenedCrystal ]
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      IsImportant: True
      SizeMinMax: [ 6, 8 ]
      DroneProb: 1
      MaxDroneCount: 8
      DepthMinMax: [ 35, 35 ]
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 3

### Resource Asteroids
AsteroidResources:
