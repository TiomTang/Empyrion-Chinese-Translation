### Resource Deposits
RandomResources:
    - Name: CarbonResource
      IsImportant: True
      CountMinMax: [ 1, 2 ]
      IsScalingCount: True
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 30, 60 ]
      DroneProb: 0

    - Name: IronResource
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 5, 9 ]
      DepthMinMax: [ 4, 8 ]
      DroneProb: 0.2
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

    - Name: SiliconResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 7, 8 ]
      DepthMinMax: [ 4, 9 ]
      DroneProb: 0.2
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

    - Name: SathiumResource
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 7, 8 ]
      DepthMinMax: [ 4, 9 ]
      DroneProb: 0.8
      MaxDroneCount: 3
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

    - Name: GoldResource
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 3, 3 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 5

    - Name: PromethiumResource
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 4, 8 ]
      DroneProb: 0.4
      #DistTypeCylinder:
        #MaxRadius: 8
        #YVariance: 15


