# ---------------------- Drone Base
# Zirax Drone base
        - GroupName: R2DroneBase
          Faction: Zirax
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          # Biome: [ Plateau, LowMountains, LowMountains_1, Mountains, SandDrift ]
          BiomesExcluded: [ PolarSnow, Radiated, RadiatedFog ]
          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          SpawnResource: ["IronResource:0-1","PromethiumResource:0-1","SathiumResource:0-1"]
          SpawnResourceRange: [150,400]
          Properties:
            - Key: RegenAfter
              Value: 4320

