### POIs
POIs:
    Random:

# Floating
        - GroupName: R2LegacyFloatingT2
          Faction: TheLegacy
          Territory: False
          CountMinMax: [ 8, 8 ]
          # IsScalingCount: True
          DroneProb: 1
          DronesMinMax: [ 2, 3 ]
          ReserveCount: 1
          TroopTransport: False
          SpawnPOIAvoid: [R2LegacyFloatingT2]
          SpawnPOIAvoidDistance: 750
          Properties:
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 4320

        - GroupName: RE2_FloatingErestrum
          Biome: [ Hotspot, Ravines, LavaEdge ]
          Faction: None
          FactionTerritory: [All]
          CountMinMax: [ 18, 24 ]
          # IsScalingCount: True
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOIAvoid: [R2LegacyFloatingT2]
          SpawnPOIAvoidDistance: 250
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: SI
              Value: Off
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0
            - Key: RegenAfter
              Value: 720

# Energized Xenocrystals
        - GroupName: RE2_CrystalsXeno
          Faction: None
          Biome: [ LargeCrater, Mountains ]
          CountMinMax: [ 30, 40 ]
          # IsScalingCount: True
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 4320

