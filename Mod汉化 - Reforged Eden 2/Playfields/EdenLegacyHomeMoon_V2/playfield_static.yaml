### Resource Deposits
RandomResources:
    - Name: CarbonResource
      Biome: [ ObsidianPlains, Obsidian ]
      IsScalingCount: True
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 9, 12 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0
      MaxDroneCount: 0

    - Name: IronResource
      Biome: [ Mountains ]
      IsScalingCount: True
      CountMinMax: [ 4, 6 ]
      SizeMinMax: [ 7, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0
      MaxDroneCount: 0

    - Name: SiliconResource
      IsScalingCount: True
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 7, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0
      MaxDroneCount: 0

    - Name: MagnesiumResource
      IsScalingCount: True
      CountMinMax: [ 5, 6 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 3, 5 ]
      DroneProb: 0
      MaxDroneCount: 0

    - Name: GoldResource
      Biome: [ LavaFolds, LargeCrater, Hotspot ]
      IsImportant: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0
      MaxDroneCount: 0

# Extra large deposit
    - Name: PromethiumResource
      Biome: [ Hotspot ]
      IsImportant: True
      IsScalingCount: True
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 10, 12 ]
      DepthMinMax: [ 40, 60 ]
      DroneProb: 0
      MaxDroneCount: 0

    - Name: PromethiumResource
      Biome: [ Hotspot ]
      IsScalingCount: True
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 20, 30 ]
      DroneProb: 0
      MaxDroneCount: 0


