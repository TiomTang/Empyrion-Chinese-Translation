# Playfield Characteristics
Description: |
  一个能带你到银河系遥远区域的跃迁之门。

  这个跃迁之门通向银河系的东南侧。在使用前需要修复。


  [c][ffffff][i]开采被某阵营占领的小行星被视为战争行为。POI 的存在会受到银河系阵营领地影响。[/i][-][/c]


Gravity: 0
AtmosphereEnabled: False
PvPProb: 0
UseFixed: True

Radiation: [3,6]
TemperatureDay: [-150,-100]
Music: [2473, Adrift, Anomalous, ColdSpace, EnergyMatrix, FirstHours, Magnitude, moonstone, MorningLight, Transit, Voyage]


PlayfieldType: Space
LandClaimZone: Device
PlanetType: Jump Gate
PlayfieldLevelOverride: [1,2]

