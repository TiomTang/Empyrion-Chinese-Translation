# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html
Description: "\u96BE\u5EA6: [c][ffff00]\u4E2D\u7B49[-][/c]

  [c][ffff00]\u8B66\u544A\uFF1A\u65B0\u7684\u88C5\u9970\u7CFB\u7EDF\u6B63\u5728\u6D4B\u8BD5\u4E2D\u3002\u8FDB\u5165\u6B64\u6E38\u620F\u573A\u5730\u53EF\u80FD\u4F1A\u9047\u5230\u610F\u5916\u95EE\u9898\u3002[-][/c]

  \u4E00\u9897\u708E\u70ED\u5E72\u65F1\u7684\u884C\u661F\uFF0C\u81EA\u7136\u6C34\u6E90\u6781\u5C11\u3002\u5927\u7247\u7684\u8352\u5730\u548C\u5F00\u9614\u5E73\u539F\u5360\u636E\u4E86\u5927\u90E8\u5206\u666F\u89C2\uFF0C\u53EA\u6709\u5C11\u91CF\u68EE\u6797\u4F9D\u9644\u5728\u6DE1\u6C34\u6E56\u7684\u5CB8\u8FB9\u3002\u5C3D\u7BA1\u73AF\u5883\u6076\u52A3\uFF0C\u751F\u547D\u4F9D\u7136\u5728\u8FD9\u4E25\u9177\u7684\u4E16\u754C\u4E2D\u987D\u5F3A\u751F\u5B58\u3002"


PlanetType: Arid Wasteland
PlayfieldType: Planet
Difficulty: 2

LandClaimZone: Device

# Atmosphere and Sky
AtmosphereEnabled: True   
# AtmosphereColor: "1.0, 0.86, 0.75" # Brown
AtmosphereColor: "1.0, 0.9, 0.8"
SkyColor: "1, 0.3, 0.2"
SkyHorizonColor: "1, 0.5, 0.2"
AtmosphereParams: [2, 2]          # [Rayleigh Multiplier, Atmosphere Contrast], default is AtmosphereParams: [1, 1.6]   
                                     # RayleighMultiplier between 0 and 10 - higher values make SkyColor / SkyHorizonColor more pronounced
                                     # Atmosphere Contrast between 0 and 3 - lower values wash out SkyColor / SkyHorizonColor 

# Light
DayLightIntensity: 1.5
NightLightIntensity: 0.6
DayShadowStrength: 0.95
LightZenithColor: "1, 0.7, 0.5"
LightHorizonColor: "1, 0.3, 0.2"
# NightLightColor: "0.7, 0.7, 1"
NightLightColor: "0.5, 0.6, 1"

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhite2

# Fog
FogCloudIntensity: 0.8
# AtmosphereFog: 0.3
# GroundFogIntensity: 0.05
# GroundFogHeight: 30

# Clouds and Wind
CloudsDensity: 0.4
CloudsSharpness: 0.3
CloudsBrightness: 1.0
CloudsOpacity: 1.0
# CloudsZenithColor: "0.5, 0.3, 0.4"
CloudsZenithColor: "0.6, 0.3, 0.25"
CloudsHorizonColor: "1, 0.18, 0.18"
CloudsNightZenithColor: "0.054, 0.094, 0.22"     # Color picker - Color of clouds during max night, default is greyish "0.054, 0.094, 0.152"
CloudsNightHorizonColor: "0.054, 0.094, 0.152"    # Color picker - Color of clouds during dusk / dawn, default is greyish "0.054, 0.094, 0.152"
WindSpeed: 4

# Special Effects
SpecialEffectsLocal:
  - Name: Pollen
    Biome: [ Sand, Wasteland, Rocks ]
    Time: Day
    MaxHeight: 10
  - Name: DustDevil
    Biome: [ Sand, Wasteland ]
    Time: Day
    FollowPlayerY: True
    MaxHeight: 10
  - Name: FireFliesGreen
    Biome: [ Marsh, Forest, ForestEdge, PetrifiedForest, PetrifiedMountains ]
    Time: Night
    MaxHeight: 15
  - Name: DandelionsFew
    Biome: [ Savanna, SavannaEdge, Plains ]
    Time: Day
    MaxHeight: 10
  - Name: ButterfliesBlue
    Biome: [ Marsh, Forest, ForestEdge, Plains ]
    Time: Day
    MaxHeight: 15
  - Name: TarantulaHawksFew
    Biome: [ Marsh, Savanna, SavannaEdge, Plains ]
    Time: Day
    MaxHeight: 15
  - Name: WindLines
    Biome: [ Desert, Wasteland, Rocks, LowMountains, Mountains ]
    Time: Day
    MaxHeight: 10

  - Name: FireFliesGreen
    Biome: [ Plains ]
    Time: Night
    MaxHeight: 15
  - Name: FireFliesGreen
    Biome: [ Plains ]
    Time: Night
    MaxHeight: 15
  - Name: FireFliesGreen
    Biome: [ Plains ]
    Time: Night
    MaxHeight: 15

SpecialEffectsGlobal:
