    InitialDelay: 1
    Delay: 2
    Lifetime: 600
    PlyDist: 50
    SpawnY: 20
    Struct: True

  - Name: BirdFlocksVultures
    Biome: [ Sand, Wasteland ]
    Time: Day
    InitialDelay: 1
    Delay: 1
    Lifetime: 300
    PlyDist: 25
    SpawnY: 30
    Struct: True

  - Name: BirdFlocksVultures
    Biome: [ Sand, Wasteland ]
    Time: Day
    InitialDelay: 0
    Delay: 1
    Lifetime: 900
    PlyDist: 45
    SpawnY: 50
    Struct: True

  - Name: MeteorShower
    Biome: [ Sand, Wasteland ]
    Time: Always
    InitialDelay: 3.5
    Delay: 5
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
