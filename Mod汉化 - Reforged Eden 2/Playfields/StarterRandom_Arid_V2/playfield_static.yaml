### Resource Deposits
RandomResources:
    - Name: IronResource
      IsScalingCount: True
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 7, 8 ]
      DepthMinMax: [ 4, 10 ]
      DroneProb: 0.5
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: CopperResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 4, 10 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: NeodymiumResource #rich
      IsScalingCount: True
      CountMinMax: [ 5, 6 ]
      SizeMinMax: [ 7, 8 ]
      DepthMinMax: [ 4, 10 ]
      DroneProb: 1
      MaxDroneCount: 4
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: CobaltResource
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 4, 10 ]
      DroneProb: 0.5
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: PromethiumResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
