# Playfield Characteristics
Description: |
  [c][FFFFFF]UCH科研船[-][/c] UCHN Pathfinder 停靠在此，正在进行科研或维护工作。

  如果你还没有这样做，请所有泰伦幸存者在 [c][00ff00]单人任务[-][/c] 标签下激活伊甸园计划序章任务 [c][00ffff]与泰伦部队取得联系[-][/c]，然后报告到最近的UCH科研船。

  [c][ffffff][i]开采已被某阵营占领的小行星将被视为宣战行为。POI 的存在会受到银河阵营领土影响。[/i][-][/c]


Gravity: 0
AtmosphereEnabled: False
PvPProb: 0
UseFixed: True

# Standard Star
Radiation: [5,10]
TemperatureDay: [-200,-100]
# Music: [moonstone, space, DistantWorlds, Migration, Artefact, ColdDivide] # Orbit
# Music: [Sanctuary, Vanguard, Helios, ColdDivide, AlteredPhase] # POI
Music: [Reaver] # POI


PlayfieldType: Space
LandClaimZone: Device
PlanetType: UCH Research Vessel
PlayfieldLevelOverride: [1,2]

