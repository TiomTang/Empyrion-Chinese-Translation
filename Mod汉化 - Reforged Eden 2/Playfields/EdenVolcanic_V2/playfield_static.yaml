---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html
Description: |
  \u96BE\u5EA6: [c][ffff00]\u4E2D\u7B49[-][/c]  

  \u4E00\u9897\u6B63\u5728\u7ECF\u5386\u706B\u5C71\u707E\u53D8\u7684\u7C7B\u5730\u884C\u661F\u3002\u751F\u547D\u4ECD\u5728\u8868\u9762\u96F6\u661F\u5206\u5E03\u3002  



PlanetType: Volcanic
Emissive: True
PlayfieldType: Planet
Difficulty: 2

LandClaimZone: Device

# Sun
SunFlare: EnvironmentalEffects/SunFlareBlue

# Atmosphere and Sky
AtmosphereEnabled: True
# AtmosphereColor: "0.674, 0.824, 1.000"
AtmosphereColor: "0.85, 0.75, 0.65"

# SkyColor: "1, 0.96, 0.96"
SkyColor: "1, 0.6, 0.4"
# SkyHorizonColor: "1, 0.43, 0.1"
SkyHorizonColor: "1, 0.1, 0"
# AtmosphereParams: [2, 2.5]
AtmosphereParams: [10, 2.5]

# Light
# DayLightIntensity: 1.375
DayLightIntensity: 1.375
# NightLightIntensity: 0.55
# NightLightIntensity: 0.65
NightLightIntensity: 0.75

# LightZenithColor: "1,0.95,0.97"
# LightZenithColor: "1,0.85,0.65"
LightZenithColor: "1,0.87,0.66"
# LightHorizonColor: "0.91, 0.25, 0"
LightHorizonColor: "0.91, 0.35, 0"
# NightLightColor: "0.78, 0.78, 1"
# NightLightColor: "1, 0.45, 0.4"
# NightLightColor: "1.2, 0.45, 0.4"
NightLightColor: "1.1, 0.5, 0.45"

DayShadowStrength: 1
NightShadowStrength: 1

# Fog
# AtmosphereFog: 0.35
FogCloudIntensity: 0.8
# GroundFogIntensity: 0
# GroundFogHeight: 0

# FogColor: "1.0, 1.0, 1.0"
# FogColor: "1.0, 0.8, 0.7"
# FogColor: "1.0, 0.85, 0.75"
FogColor: "1.0, 0.88, 0.77"

# Clouds and Wind
# CloudsDensity: 0.3
CloudsDensity: 0.7
# CloudsSharpness: 0.35
CloudsSharpness: 0.15
CloudsBrightness: 0.7
# CloudsOpacity: 0.7
CloudsOpacity: 0.8

# CloudsZenithColor: "0.93, 0.98, 1.1"
CloudsZenithColor: "-0.7, -0.75, -0.75"
CloudsHorizonColor: "1, 0.3, 0.1"           
CloudsNightZenithColor: "0.04, 0.041, 0.065"
CloudsNightHorizonColor: "0.04, 0.041, 0.065"

WindSpeed: 3

