### Resource Deposits
RandomResources:
    - Name: CarbonResource
      Biome: [ MagmaField ]
      CountMinMax: [ 4, 6 ]
      IsScalingCount: True
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0

    - Name: IronResource
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 5, 9 ]
      DepthMinMax: [ 4, 8 ]
      DroneProb: 0

    - Name: CopperResource
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0

    - Name: SiliconResource
      Biome: [ ObsidianPlains, ObsidianSpires ]
      IsScalingCount: True
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 8, 10 ]
      DepthMinMax: [ 0, 2 ]
      DroneProb: 0

    - Name: CobaltResource
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 7, 8 ]
      DepthMinMax: [ 4, 9 ]
      DroneProb: 0.

    - Name: PromethiumResource
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 4, 8 ]
      DroneProb: 0


### Resource Asteroids
AsteroidResources:
