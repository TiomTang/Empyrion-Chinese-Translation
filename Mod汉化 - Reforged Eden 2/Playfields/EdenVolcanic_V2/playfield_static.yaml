### POIs
POIs:
    Random:

# =============================================== Faction Pirates Main

# ---------------------- Aux T2 Compound
        - GroupName: R2PirateAuxT2
          Faction: Pirates
          IsImportant: True
          # BiomesExcluded: [ PolarSnow, Radiated, RadiatedFog ]
          Biome: [ CharredForest ]
          CountMinMax: [ 0, 1 ] # 50% chance
          DroneProb: 0.5
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          SpawnPOIAvoid: [R2TradeTower]
          SpawnPOIAvoidDistance: 100000 # Won't show up if there's a Trader tower
          SpawnResource: ["PromethiumResource:0-1"]
          SpawnResourceRange: [150,600]
          Properties:
            - Key: RegenAfter
              Value: 4320

        - GroupName: R2PirateAuxT1
          Faction: Pirates
          Biome: [ CharredForest ]
          CountMinMax: [ 2, 3 ]
          DroneProb: 0.5
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 1
          TroopTransport: False
          SpawnPOINear: [R2PirateAuxT2]
          SpawnPOINearRange: [100, 300]
          Properties:
            - Key: RegenAfter
              Value: 720

        - GroupName: R2PirateDefenseT1
          Faction: Pirates
          Territory: False
