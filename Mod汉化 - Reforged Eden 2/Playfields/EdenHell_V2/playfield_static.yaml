# Weather

 # Do not use the weathers CloudsLight, CloudsMedium, Wind, ColdWave here! (Their clouds react extremely to colouring)
 # weather Clear >>  Already in HeatWave


  - Name: Clouds
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1500
  - Name: CloudsDark
    Type: Weather
    InitialDelay: 0
    Delay: 2  
    Lifetime: 1200
  - Name: Fog
    Type: Weather
    InitialDelay: 48
    Delay: 12
    Lifetime: 500
  - Name: HeatWave
    Type: Weather
    InitialDelay: 12
    Delay: 12
    Lifetime: 1200
  - Name: Clear
    Type: Weather
    InitialDelay: 12
    Delay: 36
    Lifetime: 600
  - Name: MeteorFireRain
    Type: Weather
    InitialDelay: 0
    Delay: 6
    Lifetime: 300
  - Name: FireRain
    Type: Weather
    InitialDelay: 0
    Delay: 6
    Lifetime: 600

# Global Effect
