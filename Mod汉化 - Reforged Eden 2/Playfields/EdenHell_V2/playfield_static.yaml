PlanetType: Hell
Emissive: True
PlayfieldType: Planet
Difficulty: 4

LandClaimZone: Device


# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "1.4, 0.6, 0.32" 
SkyColor: "2, 1, 0.0"
SkyHorizonColor: "2, 0.15, 0"
AtmosphereParams: [3, 2.5]    

# Light
