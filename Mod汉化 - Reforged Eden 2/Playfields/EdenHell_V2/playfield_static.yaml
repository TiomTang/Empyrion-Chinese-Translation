    InitialDelay: 1
    Delay: 5
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid

  - Name: ThunderAndLightningRed
    Time: Always
    InitialDelay: 0
    Delay: 6
    Lifetime: 500     
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid    

