### Resource Deposits
RandomResources:
    - Name: MagnesiumResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 6, 11 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.9
      #DistTypeCylinder:
        #MaxRadius: 25
        #YVariance: 3

    - Name: PromethiumResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 7, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.4
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: ZascosiumResource
      Biome: [ Plains, Dunes, Rocks ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 7, 8 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 1
      MaxDroneCount: 5
      #DistTypeCylinder:
        #MaxRadius: 21
        #YVariance: 13

    - Name: GoldResource
      Biome: [ LavaEdge, LavaFolds, Plains ]
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 7, 9 ]
      DroneProb: 1
      MaxDroneCount: 3
      DepthMinMax: [ 5, 10 ]
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 10

### Resource Asteroids
