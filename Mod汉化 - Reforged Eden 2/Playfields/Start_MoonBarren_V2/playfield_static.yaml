### POIs
POIs:
    Random:

# =============================================== Faction Zirax
# Drone Base
        - GroupName: R2DroneBase
          Faction: Zirax
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          IsImportant: True
          CountMinMax: [ 0, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 5 ]
          ReserveCount: 5
          Properties:
            - Key: RegenAfter
              Value: 4320

# Near Drone Base
        - GroupName: R2XenuAuxT1
          Faction: Zirax
          CountMinMax: [ 1, 1 ]
          DroneProb: 1
          DronesMinMax: [ 2, 3 ]
          ReserveCount: 2
          TroopTransport: True
          SpawnPOINear: [R2DroneBase]
          SpawnPOINearRange: [600, 800]
          Properties:
            - Key: RegenAfter
              Value: 720

# Defenses for Drone Base
        - GroupName: R2XenuDefenseT1
          Faction: Zirax
          Territory: False
          CountMinMax: [ 2, 3 ]
          DroneProb: 0.7
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          SpawnPOIAvoid: [R2XenuDefenseT3]
          SpawnPOIAvoidDistance: 500
          SpawnPOINear: [R2DroneBase]
          SpawnPOINearRange: [300, 400]
          Properties:
            - Key: RegenAfter
              Value: 720

# =============================================== Faction Polaris
# Trade Station
        - GroupName: R2PolarisTradePlanet
          Faction: Polaris
          IsImportant: True
          BiomesExcluded: [ PolarSnow, Radiated, RadiatedFog ]
          CountMinMax: [ 1, 1 ]
          DroneProb: 0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnResource: ["PromethiumResource:0-1"]
          SpawnResourceRange: [150,600]
          Properties:
            - Key: Discovery
              Value: False
            - Key: Music
              Value: AlteredPhase
            - Key: RegenAfter
              Value: 4320

        - GroupName: R2PolarisAuxT1
          Faction: Polaris
          CountMinMax: [ 1, 2 ]
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOINear: [R2PolarisTradePlanet]
          SpawnPOINearRange: [175, 300]
          Properties:
            - Key: RegenAfter
              Value: 720

        - GroupName: R2PolarisDefenseT2
          Faction: Polaris
          CountMinMax: [ 1, 2 ]
          DroneProb: 0.3
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOINear: [R2PolarisTradePlanet]
          SpawnPOINearRange: [250, 500]
          Properties:
            - Key: RegenAfter
              Value: 720

# =============================================== Faction Zirax
# Random POIs
        - GroupName: R2XenuAuxT1
