# Playfield Characteristics
Description: |
  难度: [c][ffffff]无[-][/c]


  此星区内有一个贸易空间站和赏金猎人办公室。在你跃迁到此星区之前，必须先跃迁到该星区，才能跃迁到此系统中的其他星区。


  [c][ffffff][i]采矿由某个阵营占领的小行星被视为战争行为。POI 的存在会受到银河阵营领土的影响。[/i][-][/c]


Gravity: 0
AtmosphereEnabled: False
PvPProb: 0 #Normal
UseFixed: True

# Habitable Star
Radiation: [3,8]
TemperatureDay: [-160,-100]
Music: [Encryptor]
# Music: [Sanctuary, Vanguard, Helios, ColdDivide, AlteredPhase] # POI
PlayfieldLevelOverride: [1,2]

PlayfieldType: Space
LandClaimZone: Device
PlanetType: Zirax Defense Checkpoint


