# Playfield Characteristics
Description: |
  难度: [c][00ff00]简单[-][/c]

  [c][ffff00]本星区的金属尘云会干扰光学扫描和雷达扫描，遮蔽整个区域内富含资源的小行星，并降低探测器的探测范围。[-][/c]


  由岩石和尘埃组成的小行星带。小行星可能无法为你提供武器火力的掩护，并且可能由敌对势力把守。

  [c][ffffff][i]开采已被某个阵营占领的小行星将被视为战争行为。POI 的存在会受到银河阵营领土的影响。[/i][-][/c]


Gravity: 0
AtmosphereEnabled: False
PvPProb: 0
UseFixed: True

# Habitable Star
Radiation: [3,8]
TemperatureDay: [-160,-100]
# Rich Mining
Music: [2473, Adrift, AlteredPhase, Anomalous, ColdDivide, ColdSpace, EnergyMatrix, FirstHours, Helios, Magnitude, moonstone, MorningLight, Transit, Voyage, Vanguard]

PlayfieldType: Space
LandClaimZone: Device
PlanetType: Asteroid Field Starter
PlayfieldLevelOverride: [1,1]

