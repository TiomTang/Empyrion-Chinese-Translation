### Resource Deposits
RandomResources:
    - Name: SiliconResource   # Shallow
      Biome: [ Mountains, PlainsEdge, Plains, Regolith ]
      IsScalingCount: True 
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 3, 8 ]
      DroneProb: 0.4
      #DistTypeCylinder:
        #MaxRadius: 10
        #YVariance: 3

    - Name: CobaltResource    # Mountains, shallow
      Biome: [ Mountains, Regolith ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 4, 9 ]
      DroneProb: 0.7
      MaxDroneCount: 1      
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8
      
    - Name: MagnesiumResource  # Mountains, shallow, very poor
      Biome: [ Mountains, Regolith ]
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 2, 3 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 8
        #YVariance: 6
      
    - Name: MagnesiumResource  # Below ice, rich -> Needs HV excavator or autominer
      Biome: [ LayeredIce, IceSheet, CrustedIce ]
      IsScalingCount: True 
      CountMinMax: [ 3, 4 ]  #2,2
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 35, 45 ]
      DroneProb: 0.2
      MaxDroneCount: 1       
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8
     
    - Name: CobaltResource     # Deep below ice, rich -> Needs HV excavator or autominer
      Biome: [ LayeredIce, IceSheet, CrustedIce ]
      IsScalingCount: True 
      CountMinMax: [ 3, 3 ]
      SizeMinMax: [ 8, 9 ]
      DepthMinMax: [ 45, 55 ]
      DroneProb: 0.2
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 8

    - Name: IronResource    # Very shallow, meteorite impact anywhere
      # Biome: [ Mountains, SmallCrater, Regolith ]
      IsScalingCount: True 
      CountMinMax: [ 5, 7 ] 
      SizeMinMax: [ 4, 7 ] 
      DepthMinMax: [ 2, 5 ]
      DroneProb: 0.3      
      MaxDroneCount: 1
      #DistTypeCylinder:
        #MaxRadius: 3
        #YVariance: 3
      
    - Name: PromethiumResource # Shallow, meteorite impact
      Biome: [ SmallCrater, Rifts, Regolith ]
      IsScalingCount: True 
      CountMinMax: [ 2, 4 ]
      SizeMinMax: [ 3, 6 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      DepthMinMax: [ 0, 1 ]
      #DistTypeCylinder:
        #MaxRadius: 13
        #YVariance: 10
      
    - Name: PentaxidResource   # Shallow, meteorite impact
      Biome: [ SmallCrater ]
      IsScalingCount: True 
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 3, 4 ]
      DroneProb: 0.6
      MaxDroneCount: 2
      DepthMinMax: [ 0, 5 ]
      #DistTypeCylinder:
        #MaxRadius: 5
        #YVariance: 3

### Resource Asteroids
AsteroidResources:
     - Name: SiliconResource
       Threshold: 0.2
       Amount: 0.1
     - Name: CobaltResource
       Threshold: 0.2
       Amount: 0.1
     - Name: MagnesiumResource
       Threshold: 0.2
       Amount: 0.1
     - Name: IronResource
       Threshold: 0.2
       Amount: 0.1
     - Name: PromethiumResource
       Threshold: 0.2
       Amount: 0.1
     - Name: PentaxidResource
       Threshold: 0.2
       Amount: 0.1

### POIs
POIs:
    Random:

# =============================================== Faction Zirax
# Drone Base
        - GroupName: R2DroneBase
          Faction: Zirax
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          IsImportant: True
          CountMinMax: [ 0, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 5 ]
          ReserveCount: 5
          Properties:
            - Key: RegenAfter
              Value: 4320

# Near Drone Base
        - GroupName: R2XenuAuxT1
          Faction: Zirax
          CountMinMax: [ 1, 1 ]
          DroneProb: 1
          DronesMinMax: [ 2, 3 ]
          ReserveCount: 2
          TroopTransport: True
          SpawnPOINear: [R2DroneBase]
          SpawnPOINearRange: [600, 800]
          Properties:
            - Key: RegenAfter
              Value: 720

# Defenses for Drone Base
        - GroupName: R2XenuDefenseT1
          Faction: Zirax
          Territory: False
          CountMinMax: [ 2, 3 ]
          DroneProb: 0.7
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          SpawnPOIAvoid: [R2XenuDefenseT3]
          SpawnPOIAvoidDistance: 500
          SpawnPOINear: [R2DroneBase]
          SpawnPOINearRange: [300, 400]
          Properties:
            - Key: RegenAfter
              Value: 720

# =============================================== Faction Polaris
# Trade Station
        - GroupName: R2PolarisTradePlanet
          Faction: Polaris
          IsImportant: True
          BiomesExcluded: [ PolarSnow, Radiated, RadiatedFog ]
          CountMinMax: [ 1, 1 ]
          DroneProb: 0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnResource: ["PromethiumResource:0-1"]
          SpawnResourceRange: [150,600]
          Properties:
            - Key: Discovery
              Value: False
            - Key: Music
              Value: AlteredPhase
            - Key: RegenAfter
              Value: 4320

        - GroupName: R2PolarisAuxT1
          Faction: Polaris
          CountMinMax: [ 1, 2 ]
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOINear: [R2PolarisTradePlanet]
          SpawnPOINearRange: [175, 300]
          Properties:
            - Key: RegenAfter
              Value: 720

        - GroupName: R2PolarisDefenseT2
          Faction: Polaris
          CountMinMax: [ 1, 2 ]
          DroneProb: 0.3
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOINear: [R2PolarisTradePlanet]
          SpawnPOINearRange: [250, 500]
          Properties:
            - Key: RegenAfter
              Value: 720

# =============================================== Faction Zirax
# Random POIs
        - GroupName: R2XenuAuxT1
          Faction: Zirax
          IsScalingCount: True
          CountMinMax: [ 2, 3 ]
          DroneProb: 0.6
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOIAvoid: [R2DroneBase]
          SpawnPOIAvoidDistance: 750
          Properties:
            - Key: RegenAfter
              Value: 720

# Crashed ship near Drone Base
        - GroupName: CrashedShip
          Faction: None
