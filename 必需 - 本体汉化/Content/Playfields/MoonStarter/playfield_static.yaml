---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

Description: |
  这块荒芜的岩石将它的历史刻在表面：
  完全固化，没有大气来抹去痕迹和形状——
  所有的遭遇都会被铭记。


PlanetClass: Barren
PlanetType: MoonStarter               
PlayfieldType: Moon               
Difficulty: 1        

LandClaimZone: Device            

# Atmosphere and Sky
AtmosphereEnabled: False

# Light
DayLightIntensity: 1.6
NightLightIntensity: 0.7

DayShadowStrength: 0.95

# Sun                              
SunFlare: EnvironmentalEffects/SunFlareWhiteMoon

### Resource Deposits
RandomResources:
    - Name: IronResource
      IsScalingCount: True 
      CountMinMax: [ 3, 5 ] 
      SizeMinMax: [ 8, 13 ] 
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.2      
      MaxDroneCount: 1 
      
    - Name: SiliconResource
      IsScalingCount: True 
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 8, 9 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.2
      MaxDroneCount: 1 
      
    - Name: CobaltResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.2
      MaxDroneCount: 1
      
    - Name: MagnesiumResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.2
      MaxDroneCount: 1

    - Name: TitanResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 3, 4 ]
      DroneProb: 0.2
      MaxDroneCount: 1
      DepthMinMax: [ 2, 5 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10
      
    - Name: PentaxidResource
      IsScalingCount: True 
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 2, 3 ]
      DroneProb: 0.2
      MaxDroneCount: 2
      DepthMinMax: [ 0, 5 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10
### Resource Asteroids
AsteroidResources:
     - Name: IronResource
       Threshold: 0.2
       Amount: 0.2
     - Name: SiliconResource
       Threshold: 0.2
       Amount: 0.2
     - Name: CobaltResource
       Threshold: 0.2
       Amount: 0.2
     - Name: MagnesiumResource
       Threshold: 0.2
       Amount: 0.2
     - Name: PromethiumResource
       Threshold: 0.2
       Amount: 0.2
     - Name: PentaxidResource
       Threshold: 0.2
       Amount: 0.2

