  ……恒星的强烈辐射，以及缺乏中等规模的质量天体可供锁定，使得瞄准该区域极为困难。[b](1)[/b] 
  许多空转的航母飞船迷失于此——在恒星的光球层中燃烧殆尽。


  [b](1)[/b] [i]在绝望的情况下，仍有可能到达该区域。 
  你可以使用探索扫描数据；它保存在 [b]注册表[/b] 中。

  >打开物品栏；在窗口顶部选择注册表标签，选择太阳星区（例如 Sun[Right]），然后选择你的飞船。
  用按钮为其添加一个航点，然后退出注册表。
  用另一艘飞船，你可以手动瞄准该航点，如果在范围内，即可启动翘曲跳跃。[/i]



