### POIs
### Planetary POIs
# BP Group: ARC:
# BA_ARCFarm,BA_ARCFuelDepot,BA_ARCHabitat,BA_ARCListeningPost,BA_ARCMoonBase,BA_ARCOutpostJeremy,BA_ARCOxygenDepot,BA_ARCRadarTower,BA_ARCSupplyYard,BA_ARCTransportHub,BA_ARCSettlement,BA_ARCSolarFarm
# BP Group: ARCDefense
# BA_ARCDefenseTowerT1,BA_ARCDefenseTowerT2,BA_ARCDefenseTowerT3
# BP Group: ARCSingle
# BA_ARCWeaponFactory
# BP Group: SkyminerPolaris
# BA_PolarisSkyminer
POIs:    
    Random:
        - GroupName: DroneBaseT1                         
          DroneSetupID: DroneBaseARC
          Faction: ARC 
          IsImportant: True
          BiomesExcluded: [ Radiated, RadiatedFog, Hotspot, Dunes ]  # To not have them spawn in radiated areas, and not at the poles. (Pole regions are problematic for gameplay & looks)
          NoShieldReload: True 
       #   IsCommandCenter: True             
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 2, 3 ]  
          Properties:  
            - Key: RegenAfter
              Value: 720 


# Homeworld Unique

        - GroupName: ARCSingle
          Faction: ARC  
          IsImportant: True 
          BiomesExcluded: [ Radiated, RadiatedFog, Hotspot, Dunes ]
          NoShieldReload: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 3 ]  
       #   TroopTransport: True
          AuxiliaryPOIs: [ ARCDefense ]
          Properties:   
            - Key: RegenAfter
              Value: 720 
              
# Solo Groups
              
# Main Random Groups
        - GroupName: ARC
          Faction: ARC  
          BiomesExcluded: [ Radiated, RadiatedFog, Hotspot, Dunes  ]
          IsScalingCount: True
          CountMinMax: [ 4, 8 ]
          NoShieldReload: True 
          DroneProb: 1.0
          DronesMinMax: [ 0, 2 ]  
       #   TroopTransport: True
          AuxiliaryPOIs: [ ARCDefense ]
          Properties:   
            - Key: RegenAfter
              Value: 720 

# Main Random Group AUX
        - GroupName: SkyminerPolaris
          Faction: ARC  
          NoShieldReload: True 
          Territory: False
          CountMinMax: [ 3, 3 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]  
          SpawnResource: ["ErestrumResource:1-1"] 
          ResourceDistance: 100   
          AuxiliaryPOIs: [ ARCDefense ]
          Properties:   
            - Key: RegenAfter
              Value: 720 

# Main Random Group DEFENSES (Auxiliary setting!)
        - GroupName: ARCDefense
          Faction: ARC  
          NoShieldReload: True
          IsScalingCount: True
          IsAuxPOI: True
          SpawnPOINearRange: [100, 250]
        #  IsImportant: True 
          CountMinMax: [ 1, 2 ]
          DroneProb: 0.5
          DronesMinMax: [ 1, 2 ]  
          Properties:  #
            - Key: RegenAfter
              Value: 720 

# Defenses for the dronebase, in a ring

        - GroupName: ARCDefense
          Faction: ARC  
          NoShieldReload: True
          SpawnPOIAvoid: [ARCDefense]  
          SpawnPOIAvoidDistance: 250
          SpawnPOINear: [DroneBaseT1]
          SpawnPOINearRange: [350, 350]
          CountMinMax: [ 5, 5 ]
          DroneProb: 0.5
          DronesMinMax: [ 1, 2 ]  
          Properties:  #
            - Key: RegenAfter
              Value: 720 




