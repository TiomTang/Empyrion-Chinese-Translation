## === (3a) DRONEBASES - Standard ===========================================================================
## ==========================================================================================================

    # These POI are both Cluster Anchors (by SpawnPOINear) and avoidance targets (by SpawnPOIAvoid)
    # ! Their group names must not change, else the playfield will behave unexpectedly
    # DronebaseSetups / DronebaseSetupIDs are defined further down in this document

         # Factions sorted by territory vs. avoidance needs.

         # DB Tesch ============================

        - GroupName: TeschDroneBase 
          Biome: [ Mountains, Mountains_1, HighMountains, HighMountains_1, GlacierSnow, GlacierHills, Dunes ] # very cold and hostile biomes
          Faction: Tesch

          DroneBaseSetup: DroneBaseSetupTsc

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: RegenAfter
              Value: 720


         # DB Zirax ============================

         # DB Zirax subfactions ================

        - GroupName: ZiraxDroneBase            # CommandCenter
          Biome: [ Shore, Taiga, TaigaEdge ]
          Faction: Rados


          IsCommandCenter: True

          DroneBaseSetup: DroneBaseSetup

          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties:
            - Key: Music
              Value: moonstone 
            - Key: RegenAfter
              Value: 720

