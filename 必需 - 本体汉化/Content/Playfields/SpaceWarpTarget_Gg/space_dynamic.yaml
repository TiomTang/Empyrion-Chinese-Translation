  … 恒星的高辐射，以及缺乏可锁定的中等质量天体，使得瞄准此区域极其困难。[b](1)[/b] 
  许多闲置的航母飞船迷失于此——在恒星的光球层中燃烧殆尽。


  [b](1)[/b] [i]在绝望的情况下，这个区域仍有可能到达。 
  你可以使用保存在[b]登记册[/b]中的探索扫描数据；

  >打开物品栏；在窗口顶部选择登记册标签页，选择太阳星区（例如 Sun[Right]），然后选择你的飞船。 
  使用按钮在其上添加一个航点。退出登记册。 
  然后使用另一艘飞船，可以手动将你的飞船对准该航点，并在距离范围内启动翘曲跳跃。[/i]



