    Type: Weather
    InitialDelay: 1
    Delay: 5  
    Lifetime: 500
  - Name: CloudsLight
    Type: Weather
    InitialDelay: 1
    Delay: 5
    Lifetime: 600
  - Name: CloudsMedium
    Type: Weather
    InitialDelay: 2
    Delay: 5
    Lifetime: 600
  - Name: CloudsDark
    Type: Weather
    InitialDelay: 2
    Delay: 5  
    Lifetime: 500
  - Name: FireRain       # Danger
    Type: Weather
    InitialDelay: 5
    Delay: 5
    Lifetime: 330

    # Uncommon - rain
  - Name: Storm
    Type: Weather
    InitialDelay: 35
    Delay: 30
    Lifetime: 400

    # Rare
  - Name: Fog
    Type: Weather
    InitialDelay: 48
    Delay: 20
    Lifetime: 400
  - Name: Hail          # Danger
    Type: Weather
    InitialDelay: 35
    Delay: 10
    Lifetime: 340

    
# Global Effects

  - Name: MeteorShower   # Young world, still 'clearing the neighbourhood' 
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 60
    PlyDist: 60
    SpawnY: 100
    Struct: Avoid
  - Name: MeteorShower
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 60
    PlyDist: 70
    SpawnY: 100
    Struct: Avoid
  - Name: MeteorShower
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 60
    PlyDist: 80
    SpawnY: 100
    Struct: Avoid
  - Name: MeteorShower
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 60
    PlyDist: 900
    SpawnY: 100
    Struct: Avoid



  - Name: ThunderAndLightningPurple   # Atmosphere hasn't rained down yet, lots of friction
    Time: Always
    InitialDelay: 0 
    Delay: 0
    Lifetime: 350     
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid    
  - Name: ThunderAndLightningWhite
    Time: Always
    InitialDelay: 0 
    Delay: 1
    Lifetime: 300     
    PlyDist: 100
    SpawnY: 500
