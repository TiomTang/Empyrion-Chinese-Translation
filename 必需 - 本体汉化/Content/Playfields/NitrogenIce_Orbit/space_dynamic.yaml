      InitPower: True

      Position:
        # Used to place POI in relation to a planet or moon:
        RadialInfo: [0,0,0,         10,       4.0,4.1,            -1,-1,            30, 0, 0]
      #             [centerX,Y,Z, Yoffset,  radiusMin,Max,  angleStart,Increase,  rotationX,Y,Z]
      # Yoffset - relative Y Offset for placed objects. Useful if large POI might collide with an asteroid ring.
      # radiusMin, radiusMax - If a planet/moon is available, then this is a distance factor (min/max), compared to the planet's/moon's radius. F.e. 1.2. ???????????"If no planet/moon, then this is the radius (f.e. 2000)"????????
      # startAngle - Start angle to place objects, increase angle to place objects. Use -1,-1 for random distribution.
      # rotationX, rotationY, roatationZ - Rotation of the plane where all the objects are positioned. If not specified and a ring is around a planet, it will be the rotation of the ring.
      # (Only 'centerX,Y,Z' is mandatory)

      Compound:
        CountMinMax: [2, 4]
        Probability: 1
        Name: [BAOGhyst, BAOGhyst, BAOGhyst, BAOGhyst]
        DistanceMinMax: [300, 800]
        # Rotate: true
        
      Properties: 
        - Key: Music
          Value: Lava  
        - Key: Discovery
          Value: False

