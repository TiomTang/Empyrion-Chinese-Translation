


# PLAYTIELD SUMMARY:
# Some hot, radiated asteroids. E.g. close to an M-flare star, Black Hole, 
# Basic resources only, but rich with one guaranteed Pentaxid asteroid.

# People don't like such a place, so only explorers and crazies are here. (Possibly getting into a fight over the Pentaxid asteroids)




Gravity: 0
AtmosphereEnabled: False
PvPProb: 0
UseFixed: True
Radiation: [20,30]        # Radiated space
TemperatureDay: [110,150] # Hot space
Music: [Transit]
 
PlayfieldType: Space  
PlanetType: AsteroidFieldFewRadiated

Description: "\u9644\u8FD1\u6052\u661F\u7684\u5F3A\u70C8\u8F90\u5C04\u53EF\u80FD\u4F1A\u4FC3\u4F7F\u7FD8\u66F2\u6C34\u6676\uFF08\u539F\u6599\uFF09\u6676\u4F53\u7684\u5F62\u6210\u3002\n\n\u8FD9\u662F\u654C\u5BF9\u7A7A\u95F4\uFF0C\u56E0\u6B64\u4EBA\u4EEC\u5F80\u5F80\u907F\u5F00\u5B83\u2014\u2014\u9664\u4E86\u5076\u5C14\u51FA\u73B0\u7684\u75AF\u72C2\u3001\u8D2A\u5A6A\u6216\u7EDD\u671B\u4E4B\u4EBA\u3002\n\u8BF7\u8C28\u614E\u884C\u4E8B\uFF1B\u8FD9\u91CC\u53EF\u4E0D\u662F\u98DE\u8239\u8239\u4F53\u7834\u635F\u7684\u597D\u5730\u65B9\u2026\u2026\n"

