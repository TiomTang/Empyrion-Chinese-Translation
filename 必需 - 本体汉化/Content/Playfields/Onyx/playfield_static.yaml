### Resource Deposits


### POIs
POIs:


    Random:   

        - GroupName: ProgenitorControlStation  # Placeholder (Could be a story place) - !!Keep size the same or smaller!! 
          Faction: Progenitor  
          IsImportant: True
          Biome: [ Tower ]
          NoShieldReload: True
          # IsCommandCenter: True
          # DroneSetupID: DroneBasePrenn
          CountMinMax: [ 1, 1 ]
          SpawnPOINear: [START]
          SpawnPOINearRange: [0, 300]  # Increases spawn chances by keeping it to a smaller spawn area
          Properties:
            # - Key: Music
              # Value: moonstone 
            - Key: RegenAfter
              Value: 720

        - GroupName: ProgenitorArtifacts  # Placeholder
          Faction: Progenitor
          Biome: [ Proximity, Structure, Active ]
          IsImportant: True
          CountMinMax: [ 4, 4 ] # 
          SpawnPOIAvoid: [ProgenitorArtifacts] 
          SpawnPOIAvoidDistance: 400  # Spreading them out
          SpawnPOINear: [START]
          SpawnPOINearRange: [500, 800]
          Properties:  
            - Key: RegenAfter
              Value: 720

        - GroupName: ProgenitorArtifacts  # Placeholder
          Faction: Progenitor
          Biome: [ Structure, Canyon ]
          IsScalingCount: True
          CountMinMax: [ 20, 20 ] # Lots and lots of them
          SpawnPOIAvoid: [ProgenitorArtifacts] 
          SpawnPOIAvoidDistance: 600  # Spreading them out
          Properties:
            - Key: RegenAfter
              Value: 720





    FixedPlayerStart:
   


