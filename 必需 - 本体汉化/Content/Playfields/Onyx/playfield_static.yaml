---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html


Description: "\u4E00\u4E2A\u672A\u77E5\u6E90\u8D77\u7684\u884C\u661F\u7EA7\u7ED3\u6784\u3002"


PlanetType: Megastructure

PlayfieldType: Planet
Difficulty: 4

LandClaimZone: Device





# === Atmosphere and Sky
OrbitUsesLightColor: true       # (Will make the orbit dark)

SunFlare: EnvironmentalEffects/SunFlareYellow3

AtmosphereEnabled: True
AtmosphereColor: "0, 0.85, 0.85"  # Dark green-blue


# Basic sky colours
AtmosphereParams: [30, 10]  # Black skies

SkyColor: "0.05, 0.10, 0.00" 
SkyHorizonColor: "0.4, 0.1, 0"


# Light

OrbitUsesLightColor: True  # Will turn the orbit dark
# LightZenithColor: "0.5, 0.4, 0.5"  # (Low values here reduce the sun's halo.)
LightZenithColor: "0.46, 0.41, 0.47"
LightHorizonColor: "0.098, 0.168, 0.168"
                                   
NightLightColor: "0.41, 0.39, 0.48"

DayLightIntensity: 2
NightLightIntensity: 1

DayShadowStrength: 0.95



# Sun
SunFlare: EnvironmentalEffects/SunFlareWhite


# Fog
FogColor: 0.49, 0.81, 0.49


FogCloudIntensity: 0.8
# AtmosphereFog: 0.8          # See Playfield_dynamic!
# GroundFogIntensity: 0
# GroundFogHeight: 0


# Clouds and Wind #(Unused in this case - Weather is Clear all the time)
CloudsDensity: 0.0
CloudsSharpness: 0.05
CloudsBrightness: 0.3
CloudsOpacity: 0.0
CloudsZenithColor: 0.4, 0.108, 0.0
CloudsHorizonColor: 0.4, 0.07, 0.05
CloudsNightZenithColor: 0.03, 0.010, 0.01
CloudsNightHorizonColor: 0.03, 0.010, 0.01
WindSpeed: 4


# Special Effects
SpecialEffectsLocal:


  - Name: FireFliesGreen
    Biome: [ Canyon ]
    Time: Night
    MaxHeight: 15
  - Name: Grime
    Biome: [ Canyon ]
    Time: Always
    MaxHeight: 15

    
SpecialEffectsGlobal:

# Global Effects
  - Name: ThunderAndLightning
    Biome: [ Any ]
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 500
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid

  - Name: ThunderAndLightning
    Biome: [ Any ]
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 500
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid

  - Name: ThunderAndLightningWhite
    Biome: [ Any ]
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 500
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid


# Weather
  - Name: Clear  # No clouds
    Type: Weather
    InitialDelay: 0
    Delay: 0
    Lifetime: 1200




