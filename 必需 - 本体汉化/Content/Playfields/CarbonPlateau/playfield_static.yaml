        - GroupName: CrashedShip
          Faction: None

          Biome: [  Rocks, RocksEdge,  HighMountains ]
          IsScalingCount: True
          CountMinMax: [ 1, 1 ]
          PlaceAt: UnderWater, Terrain

          DroneProb: 1.0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 4
          SpawnPOIAvoid: [CrashedShip, START]
          SpawnPOIAvoidDistance: 1500
          SpawnPOINear: [START]
          SpawnPOINearRange: [2000, 16000]   # (To improve spawning chances)
          InitPower: False
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720


          # ================ Alien / Abandoned  ================
          # ================ 

        - GroupName: Artifacts
          Faction: Alien
          Biome: [ ShallowCanyon, Canyon, CanyonEdge, DeepCanyon]
          AvoidFactionTerritory: True

          IsScalingCount: True
          CountMinMax: [ 1, 1 ]

          SpawnPOIAvoid: [LegacyInfector, ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase, PiratesDroneBase, WarlordDroneBase, CivilMain, TS_Metal_Waypoint ]
          SpawnPOIAvoidDistance: 2000
          Properties: 
            - Key: RegenAfter
              Value: 720



         # Abandoned POI. Will try to spawn near a civilisation cluster. Will fail if no cluster is available.
        - GroupName: AbandonedPOI
          Faction: Alien

          Biome: [ HighMountains, RocksEdge, Rocks, CrystallizedRocks ]
          AvoidFactionTerritory: True
          FactionTerritory: [All]

          # IsScalingCount: True
          CountMinMax: [ 1, 1 ]

          SpawnPOINear: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase, PiratesDroneBase, WarlordDroneBase, CivilMain, TS_Metal_Waypoint ]
          SpawnPOINearRange: [1200, 2000]
          InitPower: False
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720


        - GroupName: AbandonedPOI  # As above. ( Another definition to have a try at a different anchor POI)
          Faction: Alien

          Biome: [ HighMountains, HighPlateau, Hills, RocksEdge, CrystallizedRocks ]
          AvoidFactionTerritory: True
          FactionTerritory: [All]

          # IsScalingCount: True
          CountMinMax: [ 1, 1 ]

          SpawnPOIAvoid: [AbandonedPOI]
          SpawnPOIAvoidDistance: 2000
          SpawnPOINear: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase, PiratesDroneBase, WarlordDroneBase, CivilMain, TS_Metal_Waypoint ]
          SpawnPOINearRange: [1200, 2000]
          InitPower: False
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720



          # ================ TheLegacy ================
          # ================ 
          # Will try to avoid all other factions (Since they otherwise would have raided this POI already)
