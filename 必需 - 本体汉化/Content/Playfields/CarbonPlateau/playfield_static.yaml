## ========================================================================
## =========================== POI ========================================
## ========================================================================




# Main POI placement.

# Please consider: EXCLUDED BIOMES  ============
#       Plains, PlainsEdge - (Prevent spawning too close to Poles. POI otherwise tend to be placed there because the terrain is so flat.)





# PLACEMENT ORDER:

# 1) Helper POI - Needed for this playfield to function
# 2) Faction POI
#   2a) All faction command centers (Dronebases)
#       2b) (If there) - Faction POI that Trigger a resource spawn (No resources if they do not spawn)
#   2c) All other faction POI: Main spawns > Cluster spawns & Defenses)
#   3) AuxPOI definitions, usually defenses.
# 3) Shelters & crashed vessels
# 4) Deco, nice finds, clutter and junk
# 5) TheLegacy and Alien


## FACTION ORDER
#   ===== Large factions or widespread ====== 
#   Xenu (aggressive - Most of the PV & drones), then Rados (Mining faction, carries GoldResource)

#   Polaris / Arkenian # (Since they are miners, carries GoldResource)

#   Warlords & Pirates # Overriding galactic faction territory, but have SpawnPOIAvoid any other factions to keep distance. May result in some NPC fights on this playfield. :)

#   ===== Small factions ===
#   Brotherhood of Farr # (This world has gold, so they are very interested)

#   TheLegacy # Override galactic faction territory, but SpawnPOIAvoid any other factions. Aggressive Creature anchor




POIs:
    Random:

# ======================= Helper POI =======================

          # PV ANCHORS ==========
          # Please do not remove. These will ensure that PV do not risk to spawn 'on top of each other'


          # PV SPAWN ANCHORS - A  (Invisible)
        - GroupName: SignalMarker02
          IsImportant: True
          Faction: None
          BiomesExcluded: [ Plains ]
          IsScalingCount: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: True
          SpawnPOIAvoid: [SignalMarker02] 
          SpawnPOIAvoidDistance: 5000
          Properties:
            - Key: MapMarker 
              Value: Neutral  
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


          # PV SPAWN ANCHORS - B  (Invisible)
        - GroupName: SignalMarker03
          IsImportant: True
          Faction: None
          BiomesExcluded: [ PoleEdge, Plains, HighMountains, Mountains, HighPlateau ]
          IsScalingCount: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: True
          SpawnPOIAvoid: [SignalMarker03]  
          SpawnPOIAvoidDistance: 4000
          Properties:
            - Key: MapMarker 
              Value: Neutral  
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0



          # DRONE & PV SPAWN ANCHORS  (Invisible)
        # - GroupName: NullPOI
        - GroupName: SignalMarker04

          IsScalingCount: True
          CountMinMax: [ 20, 20 ]
          Faction: None
          BiomesExcluded: [ PoleEdge, Plains, HighMountains, Mountains, HighPlateau ]

          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2

          SpawnPOIAvoid: [NullPOI, SignalMarker04]  # to spread them out
          SpawnPOIAvoidDistance: 800

          Properties:
            - Key: MapMarker 
              Value: Neutral  
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0







# ========================================================================
#                     POI: DRONE BASES and COMMAND CENTERS
# ========================================================================



    # DB Large Factions === 



         # DB Zirax (Xenu) ========
        - GroupName: DroneBaseT1   # CommandCenter & POI anchor for defense structures & creature spawnzone anchor!)
          Faction: Xenu   # For drones, using hostile zirax faction. (Zirax is currently set to neutral)

          DroneBaseSetup: DroneBaseSetupXen

          IsImportant: True
          Biome: [ HighMountains ] # Top of the carbon plateaus,  'colder' biomes
          
          # BiomesExcluded: [ Plains ]  # (To prevent it from spawning at the poles)
          CountMinMax: [ 1, 1 ]

          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True

          SpawnResource: ["PromethiumResource:0-1", "ZascosiumResource:1-1", "ErestrumResource:1-1"]  # Forces a resorce spawn here. Some spoils, if you decide to fight the Xenu.
          SpawnResourceRange: [80, 140]

          Properties: 
            - Key: RegenAfter
              Value: 720




        - GroupName: PlanetVesselBase
          Faction: Xenu

          BiomesExcluded: [ PoleEdge, Plains ]
          IsImportant: True
          SpawnPOINear: [DroneBaseT1]
