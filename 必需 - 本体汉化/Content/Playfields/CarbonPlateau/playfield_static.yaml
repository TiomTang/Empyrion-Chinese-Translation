### Resource Deposits
RandomResources:

    - Name: IronResource
      IsScalingCount: True 
      Biome: [ Dunes, HighMountains ]
      CountMinMax: [ 4, 4 ]
      SizeMinMax: [ 6, 16 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.9
      

    - Name: ErestrumResource         # Rich. Will get grabbed by POI
      Biome: [ ShouldOnlySpawnWithPOI ]
      IsScalingCount: True
      CountMinMax: [ 3, 3 ]
      SizeMinMax: [ 7, 9 ]
      DepthMinMax: [ 10, 20 ]
      DroneProb: 1  
      MaxDroneCount: 4 
      DistTypeCylinder:
        MaxRadius: 10
        YVariance: 15

    - Name: ErestrumResource
      Biome: [ Rifts, DeepRifts ]
      IsScalingCount: True
      CountMinMax: [ 5, 5 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 50, 80 ]  # Out of player drone range
      DroneProb: 1  
      MaxDroneCount: 4 
      DistTypeCylinder:
        MaxRadius: 10
        YVariance: 15

    - Name: ZascosiumResource         # Will get grabbed by POI
      Biome: [ ShouldOnlySpawnWithPOI ]
      IsScalingCount: True 
      CountMinMax: [ 4, 4 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 10, 20 ]
      DroneProb: 0.9
      MaxDroneCount: 4
      DistTypeCylinder:
        MaxRadius: 15
        YVariance: 10

    - Name: ZascosiumResource         # Freely accessible.
      Biome: [ Rifts, DeepRifts, HighMountains ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 60,85 ]
      DroneProb: 0.9
      MaxDroneCount: 4
      DistTypeCylinder:
        MaxRadius: 15
        YVariance: 10



    - Name: CopperResource
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 16 ]
      DepthMinMax: [ 50, 60 ]
      DroneProb: 0.9
        
    - Name: PromethiumResource
      IsScalingCount: True 
      Biome: [ HighMountains ]
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 6, 8 ]
      DepthMinMax: [ 0, 5 ]
      DroneProb: 0.4
      DistTypeCylinder:
        MaxRadius: 8
        YVariance: 15
        
    - Name: GoldResource   # Might get grabbed by some POI
      Biome: [ SmallCrater, DeepCanyon ] 
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 20, 30 ] # Player drone range
      DroneProb: 1
      MaxDroneCount: 3
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10
        
    - Name: CobaltResource
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 30, 50 ]  # Nearly out of Drone range
      DroneProb: 0.9
      
    - Name: SiliconResource
      IsScalingCount: True 
      Biome: [ Hills, RocksEdge ]
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.9

