### POIs
POIs:
    Random:  
        - GroupName: DroneBaseT1          #CommandCenter
          Faction: Zirax  
          NoShieldReload: True
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          CountMinMax: [ 0, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 5 ] 
          ReserveCount: 5
          Properties: 
            - Key: RegenAfter
              Value: 720

        - GroupName: CrashedShip    
          Faction: None      
          CountMinMax: [ 1, 1 ]
          IsScalingCount: True
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 4
          TroopTransport: False
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

        - GroupName: GhystAuxT1
          Faction: Ghyst  
          NoShieldReload: True
          CountMinMax: [ 3, 4 ]
          IsScalingCount: True 
          DroneProb: 0.7
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          SpawnResource: ["PentaxidResource:0-1"]
          ResourceDistance: 400
          Properties: 
            - Key: RegenAfter
              Value: 720
# Civilians

        - GroupName: CivilSettlement 
          Territory: False
          Faction: Colonists                    #primarily for outside the territories
          NoShieldReload: True
          CountMinMax: [ 3, 4 ]
          Properties:  
            - Key: RegenAfter
              Value: 720 

# Progenitor 
        - GroupName: ProgenitorArtifacts      
          Faction: None     
          CountMinMax: [ 1, 1 ]
          IsScalingCount: True 
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 4
          TroopTransport: False
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

    FixedPlayerStart:
        - Mode: Debug
          Pos: [ -596, 104, -1063 ]
          RotY: 125

        - Mode: Survival
          Spawn: EscapePod
          Armor: ArmorMedium

