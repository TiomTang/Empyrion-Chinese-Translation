      MaxDroneCount: 1

    - Name: SiliconResource
      IsScalingCount: True
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 8, 9 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.4

    - Name: CopperResource
