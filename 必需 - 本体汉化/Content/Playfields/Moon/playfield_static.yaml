## === (3b) DRONEBASES ('Everywhere' factions) ==============================================================
## ==========================================================================================================

             # DBs that need playfield spawn restrictions, else they would be too dominant due to galaxyconfig spawn chances.


         # DB Polaris ==========================

            #  ( Rich PFs only. 25% spawn, Avoid IsInfected)

         # DB Pirates ==========================


       # DB PIRATES ========
            # (IsLawless. Avoid all bigger DBs & TheLegacy)

        - GroupName: PiratesDroneBase
          Biome: [ SmallCrater, LargeCrater ]
          Faction: Pirates

          DroneBaseSetup: DroneBaseSetupPir

          IsImportant: True
          CountMinMax: [ 1, 1 ]   # 50% chance, see below (Coinflip)

          SpawnPOIAvoid: [CNTRL_Coinflip_01, TeschDroneBase, ZiraxDroneBase, DroneBaseT1, EpsilonDronebase, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase]
          SpawnPOIAvoidDistance: 5000 # Far away from other factions / Dangers
          SpawnPOINear: [CNTRL_IsLawless]  # Avoids IsInfected
          SpawnPOINearRange: [500, 45000]

          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties:
            - Key: Music
              Value: desert 
            - Key: RegenAfter
              Value: 720


            # (IsLawless. Partially avoid all bigger DBs)

         # DB Epsilon (In-territory) ===========

            #  ( Only at living & dry PFs. Avoid IsInfected & Avoid IsLawless )

         # DB Warlord ==========================

        - GroupName: WarlordDroneBaseT0  # Drone Pad, no troop transport
          Faction: Warlord
          CountMinMax: [ 1, 1 ]  # (50% spawn chance, see below, Coinflip)

          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupWar

          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ] 
          ReserveCount: 2
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_Coinflip_02, ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase]
          SpawnPOIAvoidDistance: 45000 # Fully avoids
          SpawnPOINear: [CNTRL_IsLawless]
          SpawnPOINearRange: [10, 500]  # Take up less faction territory, this is a small world
          Properties: 
            - Key: RegenAfter
              Value: 720



        - GroupName: WarlordDroneBaseT0_POI  # Drone Pad, no troop transport. Bigger Base, but not yet a full DroneBase.
          Faction: Warlord
          
          IsImportant: True
          CountMinMax: [ 1, 1 ]  # (Spawns as fallback for all other dronebases

          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupWar

          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ] 
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [WarlordDroneBaseT0, ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase]
          SpawnPOIAvoidDistance: 45000 # Fully avoids
          SpawnPOINear: [CNTRL_IsLawless]
          SpawnPOINearRange: [10, 600]  # Take up less faction territory, this is a small world
          Properties: 
            - Key: Music
              Value: moonstone 
            - Key: RegenAfter
              Value: 720

          # 25% chance that the playfield in None territory is unclaimed by Warlord and does not have any drones.



