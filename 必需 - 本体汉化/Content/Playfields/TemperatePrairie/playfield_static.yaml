          Faction: Xenu
          LevelMod: +4

          IsCommandCenter: True                         # CommandCenter for Zirax Base Attacks
          DroneSetupID: DroneBaseSetupXen

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1
          DronesMinMax: [ 2, 3 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000

