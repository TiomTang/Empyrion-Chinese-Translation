# Special Effects 
SpecialEffectsLocal:
  - Name: FireFliesRed
    Biome: [ Water, ShallowWater, Shore ]
    Time: Night
    MaxHeight: 40
  - Name: FireFliesGreenFew
    Biome: [ Plains, Sand, Flowers, FlowersEdge, Wadi, DustBowl ]
    Time: Night
    MaxHeight: 150
  - Name: Pollen
    Biome: [ Plains, DustBowl, Plantation, Flowers, FlowersEdge, Oasis ]
    Time: Day
    MaxHeight: 150
  - Name: FireFliesGreen
    Biome: [ Oasis, Plantation ]
    Time: Night
    MaxHeight: 150

SpecialEffectsGlobal:
# Weather
  - Name: Clear
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1200
  - Name: HeatWave
    Type: Weather
    InitialDelay: 48
    Delay: 12
    Lifetime: 1200
  - Name: Wind
    Type: Weather
    InitialDelay: 20
    Delay: 8
    Lifetime: 500
# Global Effects
  - Name: BirdFlocksVultures
    Biome: [ Dunes, Plains, Mountains, Water, Flowers, Plantation ]
    Time: Day
    InitialDelay: 2
    Delay: 4
    Lifetime: 600
    PlyDist: 50
    SpawnY: 40
    Struct: True
