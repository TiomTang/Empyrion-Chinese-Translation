## === GENERAL INFO ( v 0.84 ) ========================================================================================================

##  ! This template is for RANDOM playfields only! 
##  Sector-placed playfields will ignore the spawn restictions of the Galaxyconfig, likely resulting in too much POI

## ============

## If you are using a 'POI master list': Search and replace these generic keywords with a list of biomes of the playfield.
## It also helps when adding new POI, instead of memorizing all biomes. Use e.g. Notepad++ Autocomplete, then search/replace.

#### For Biome exclusions
##     BM_POLE               Plains
##     BM_TOO_SMALL          Nest, DustBowl 
##     BM_FORBIDDEN          For some reason, there should be no POI here (e.g. Decoration overlaps)


#### For Biome spawns    # !! Always check if these are replaced, else the POI won't spawn !
##     BM_SPAWN_EASY_ALL     Dunes, Sand, Plateau, DustBowl
##     BM_SPAWN_EASY_BRIGHT  Dunes, Sand       Sand, Plateau, FlowersEdge, Flowers, Plantation, DustBowl, Oasis 
##     BM_SPAWN_EASY_DARK    LowMountains, SandDrift, Mountains
##     BM_SPAWN_HIDDEN       Oasis

##     BM_SPAWN_ROUGH        Plantation, DustBowl, Oasis, FlowersEdge, Flowers, LargeCrater (="Lush Lands")
##     BM_SHOREWATER         Shore  (but impossibly hard spawn)

##     BM_HOSTILE            Nest   (but extremely hard spawn)  /  Dunes
##     BM_VOLCANIC           


#### For Creature spawns
##     BM_NO_TROOPERS_HERE   # 
##     BM_TROOP_NICE_HERE    # Plantation, Oasis, LowMountains, Mountains, SandDrift





# POI order:                                  # ! This order is important, since it controls POI spawn chances. Most important POI come first.
                                                  # NEW POI? Plz add it to the fitting section, or the bottom of this list

#     (1) Planet Exclusives                   # POI that may be just alone on a planet, if they spawn.
#     (2) Helper POI                          # General spawning controls
#     (3a) Dronebases standard                # Normal faction POI DBs. For Drones, Base Attacks (CommandCenters)
#     (3b) 'Everywhere faction' Dronebases    # DBs that need playfield spawn restrictions, else they would be too dominant in the galaxy
#     (4) POI Clusters                        # POI that are tied to the DBs, or to other POIs.
#     (5) Factioned fillers                   # POIs in amounts scaling with planet size. To make a playfield more 'alive', especially in galactic territory. 
#     (6) AuxPOI                              # A POI definition that can be re-used at multiple places. -  ! POI used like this may not be spawned by other means in the same playfield.
#     (7) Lawless / Outposts                  # In galactic 'None'-Territory, or at the edges of faction bubbles. Controlled by 'IsLawless' helper POI.
#     (8) Complex & hidden POIs               # E.g. buried Pirate treasures, and their "hints"
#     (9) Nonfactioned fillers                # Abandoned, Ruins, nests, crashed vesels... - ! 'Alien' faction POI need to be placed late, else they might block others.



## === (1) PLANET EXCLUSIVES ================================================================================
## ==========================================================================================================

             # POI that should be the only ones on a planet.
             # The 'IsSettled' control POI will fully avoid these POI here, and all other POIs anchored to IsSettled will then fail to spawn.



          # # ==== Used for a mission. Please keep this entry unless the mission is changed.
          # # The Tesch keep this world free of the other aliens.

        # - GroupName: VOIDSoulAnchor # "EXCLUSIVE_POI_TO_AVOID"
          # BiomesExcluded: [ Plains, BM_FORBIDDEN ]
          # Faction: Void  
          # CountMinMax: [ 2, 3 ]
          # Properties: 
            # - Key: Music
              # Value: lava 
            # - Key: RegenAfter
              # Value: 720


## === (2) CONTROL POI =======================================================================================
## ==========================================================================================================

            # Affecting spawns of other POI. Acting as a stable and quick reference.



         # ==== Legacy Infection control ==============
         # Keep this POI on any playfield. Use as an avoidance target, e.g. for Dronebases

        - GroupName: CNTRL_IsInfected  # (Invisible)
          CountMinMax: [ 1, 1 ]
          IsImportant: True
          Faction: TheLegacy  # Will only spawn if allowed by GalaxyConfig.
          Territory: False  # This POI will still claim *invisible* planet territory, preventing other spawns. Be careful
          PlaceAt: Terrain, OnWater
          SpawnPOINear: [START] # Spawn further away from center, to not block other faction POI spawns.
          SpawnPOINearRange: [3000, 10000] # For size class 2 moons,this marker will be likely at one of the corners of the map, possibly close to the Poles.
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0



         # ==== Lawless Space control ==============
         # Keep this POI on any playfield. Anchor other POIs to this with 'SpawnPOINear'. E.g. for Pirates, Colonists, Progenitor... - Warlords spawn last.

        - GroupName: CNTRL_IsLawless  # (Invisible)
          CountMinMax: [ 1, 1 ]
          IsImportant: True
          Faction: Warlord  # Warlord faction's grip increases the closer it gets to 'None' galactic territory
          Territory: False  # (Still claims invisible territory!)
          PlaceAt: Terrain, OnWater
          SpawnPOIAvoid: [CNTRL_IsInfected, VOIDSoulAnchor]  # Lawless POis will not spawn on Lgc worlds or if an exclusive POI appears.
          SpawnPOIAvoidDistance: 45000
          SpawnPOINear: [START]
          SpawnPOINearRange: [3000, 10000]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


         # # ==== POI - Extra spawn control (Optional) =================
         # # CNTRL_IsSettled: Anchor other POIs to this with 'SpawnPOINear'.
         # # It this control POI fails, all those others will do, too, wiping the planet of them

        # - GroupName: CNTRL_IsSettled  # (Invisible)             # Used by POIs: 
          # CountMinMax: [ 1, 1 ]
          # IsImportant: True
          # Faction: None
          # PlaceAt: Terrain, OnWater
          # SpawnPOINear: [START]
          # SpawnPOINearRange: [100, 1500]
          # SpawnPOIAvoid: [VOIDSoulAnchor, CNTRL_IsInfected]
          # SpawnPOIAvoidDistance: 45000
          # Properties:
            # - Key: MapDistance
              # Value: 0
            # - Key: HudDistance
              # Value: 0


         # # ==== Conflict Spawn Location ==============
          # # A control to place POIs of different factions closer together.

        # - GroupName: CNTRL_IsConflict  # (Invisible)
          # CountMinMax: [ 1, 1 ]
          # IsImportant: True
          # Faction: None  # 
          # PlaceAt: Terrain
          # SpawnPOINear: [START]
          # SpawnPOINearRange: [500, 2500]   # (Adjust this to planet scale. Moons have smaller range)
          # Properties:
            # - Key: MapDistance
              # Value: 0
            # - Key: HudDistance
              # Value: 0


         # ==== Coinflips ==========================
         # To reduce global spawn chances of some POI.

        - GroupName: CNTRL_Coinflip_01  # (Invisible)
          CountMinMax: [ 0, 1 ]       # The coinflip: Halving spawnchances of a POI avoiding this POI here fully.
          IsImportant: True
          Faction: None
          PlaceAt: Terrain, OnWater
          SpawnPOINear: [START]
          SpawnPOINearRange: [1000, 2500]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


        - GroupName: CNTRL_Coinflip_02  # (Invisible)
          CountMinMax: [ 0, 1 ]     # Each additional coinflip POIs to be fully avoided will halve the spawn chances.
          IsImportant: True
          Faction: None
          PlaceAt: Terrain, OnWater
          SpawnPOINear: [START]
          SpawnPOINearRange: [1000, 2500]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


