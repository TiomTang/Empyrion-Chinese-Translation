---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

PlanetType: Lava
Emissive: True
PlayfieldType: Planet
Difficulty: 3   # was: 4 LaS: reduced difficulty to make enemies less tanky

LandClaimZone: Device

Description: |
  Ashon，这颗行星曾经历过与原始地球和忒伊亚相同的灾难。
  它刚刚勉强恢复过来……撞击体的残骸仍在轨道上绕行——正缓慢形成另一颗卫星。

  ——探测到地表存在零星的生命体，但没有足以维持它们的生态圈——这是否意味着它们来源于人工创造？
  兹瑞克斯的基地可能肩负研究这些生物的任务——或者，更有可能是将它们彻底消灭。

# ==============================================================
# Special parameters:
# ==============================================================

AllowBlueprintSV: False         # Dis-allow to spawn SV Blueprint in this playfield, default is True
AllowBlueprintCV: False         # Dis-allow to spawn CV Blueprint in this playfield, default is True
AllowBlueprintBA: False         # Dis-allow to spawn BA Blueprint in this playfield, default is True
AllowBlueprintHV: False         # Dis-allow to spawn HV Blueprint in this playfield, default is True

Seed: 250780                    # Integer [1, 999999] If set overwrites main Seed 
UseFixed: True  			   	   # If set to True uses fixed POIs + resources in Survival mode (per default set to False). Can be used together with UseRandom
UseRandom: True				   # If set to True uses random POIs + resources in Survival mode (per default set to True). Can be used together with UseFixed
#IndestructibleTerrain: True     # If set to True terrain on this playfield will be indestructible

# ==============================================================
# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: 1.053, 0.684, 0.045
SkyColor: "0.0, 0.0, 0.2"
SkyHorizonColor: "0.35, 0.15, 0"
AtmosphereParams: [3, 1.7]

# Light
DayLightIntensity: 0.6
NightLightIntensity: 0.7

LightZenithColor: "1, 0.95, 0.95"
LightHorizonColor: "1, 0.5, 0"
NightLightColor: "1, 0.55, 0.3"

DayShadowStrength: 0.95
NightShadowStrength: 0.5

# Sun
SunFlare: EnvironmentalEffects/SunFlareYellow2

# Fog
FogColor: "1.2, 0.4, 0.0"
FogCloudIntensity: 0.8
# AtmosphereFog: 0.95
# GroundFogIntensity: 0.02
# GroundFogHeight: 35

# Clouds and Wind
CloudsDensity: 1
CloudsSharpness: 0.2
CloudsBrightness: 0.3
CloudsOpacity: 0.7
CloudsZenithColor: "0.6, -0.1, -0.4"
CloudsHorizonColor: "2, 0.1, 0.45"
CloudsNightHorizonColor: "0.8, 0.15, 0.00"
CloudsNightZenithColor: "0.8, 0.15, 0.00"
WindSpeed: 30


