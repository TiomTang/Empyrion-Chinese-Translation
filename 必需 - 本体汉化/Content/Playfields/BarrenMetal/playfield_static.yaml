## === (3a) DRONEBASES - Standard ===========================================================================
## ==========================================================================================================

    # These POI are both Cluster Anchors (by SpawnPOINear) and avoidance targets (by SpawnPOIAvoid)
    # ! Their group names must not change, else the playfield will behave unexpectedly
    # DronebaseSetups / DronebaseSetupIDs are defined further down in this document

         # Factions sorted by territory vs. avoidance needs.

         # DB Tesch ============================

         # DB Zirax ============================

         # DB Zirax subfactions ================

          # DroneBase Xenu - High difficulty POI
        - GroupName: DroneBaseT3                        #CommandCenter
          IsImportant: True
          Faction: Xenu
          NoShieldReload: True
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupXen
          BiomesExcluded: [ PoleEdge ] 
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 4 ]
          ReserveCount: 20
          TroopTransport: True
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 2000
          Properties: 
            - Key: Music
              Value: Encryptor
            - Key: RegenAfter
              Value: 720


          # Safe place to respawn after being shot down by turrets. Will only spawn if Zirax are there.
        - GroupName: TS_Metal_Waypoint
          IsImportant: True
          Faction: Colonists
          NoShieldReload: True
          BiomesExcluded: [ PoleEdge ] 
          CountMinMax: [ 1, 1 ]
          DroneProb: 0
          DronesMinMax: [ 1 ]
          ReserveCount: 0
          TroopTransport: False 
          SpawnResource: ["ErestrumResource:1-1"]
          SpawnResourceRange: [100, 250]
          SpawnPOINear: [DroneBaseT3] 
          SpawnPOINearRange: [1500, 10000]
          # SpawnPOIAvoid: [DroneBaseT3]
          # SpawnPOIAvoidDistance: 1000
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720



