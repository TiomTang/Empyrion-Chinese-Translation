Description: |
  这颗行星上的毁灭性景象从很远的地方就能看见，更重要的是，其原因并非自然事件。

  如果它曾经有过大气层，那么如今已被彻底剥离。连微生物层面的生命迹象都不存在，从本质上说，这颗行星正是无生命岩石绕恒星无尽公转的最佳定义。

  有人从太空轰炸了这颗行星，但是谁、什么、为什么以及何时，目前仍不得而知……

