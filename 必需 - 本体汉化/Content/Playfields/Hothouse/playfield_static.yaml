          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          Properties: 
            - Key: RegenAfter
              Value: 720


            #  ( Rich PFs only. 25% spawn, Avoid IsInfected)


         # DB Pirates ==========================

            # (IsLawless. Partially avoid all bigger DBs)

         # DB Epsilon (In-territory) ===========

            #  ( Only at living & dry PFs. Avoid IsInfected & Avoid IsLawless )

         # DB Warlord ==========================






        # DB WARLORD ========   # Sneaked itself on the planet; drones might fight with each other
        - GroupName: WarlordSkaarDroneBase
          BiomesExcluded: [PoleEdge]
          Faction: Warlord
          
          DroneBaseSetup: DroneBaseSetupWar
          FactionTerritory: [Zirax, ArkenianRepublic, Kriel, PrennFederation, Farr, STRY] # Not allowed in SilentQuarter / PlayerAssist

          IsImportant: True
          CountMinMax: [ 1, 1 ]

          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [PolarisDroneBase, DroneBaseT1] 
          SpawnPOIAvoidDistance: 2000 
          SpawnPOINear: [CNTRL_IsLawless]  # Avoids Infected Playfields
          SpawnPOINearRange: [500, 45000]
          Properties: 
            - Key: Music
