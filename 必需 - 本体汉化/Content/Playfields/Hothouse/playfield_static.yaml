NightLightIntensity: 1.2


LightZenithColor: "0.7, 0.5, 0.2" 
LightHorizonColor: "1, 0.5, 0"

NightLightColor: "0.5, 0.3, 0.0"

DayShadowStrength: 0.95
NightShadowStrength: 0.5


# Sun
SunFlare: EnvironmentalEffects/SunFlareBlue

# Fog

FogColor: "1, 0.5, 0.01"

FogCloudIntensity: 1
AtmosphereFog: 1
GroundFogIntensity: 0.12

GroundFogHeight: 1100 # 1200

# Clouds and Wind
CloudsDensity: 1
CloudsSharpness: 0.2
CloudsBrightness: 0.3
CloudsOpacity: 0.7



