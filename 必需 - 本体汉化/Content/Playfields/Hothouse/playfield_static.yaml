## Planet has a large variability of resources, but those depositis usually are rather small, deep, and potentially guarded.



### Resource Deposits
RandomResources:

    - Name: IronResource
      Biome: [ LowMountains, Mountains, Hills ]
      IsScalingCount: True 
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 45, 65 ]
      DroneProb: 0.9


    - Name: CopperResource
      Biome: [ Hills, LavaFieldUpper, LowMountains, Mountains ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 10, 12 ]   # Rich
      DepthMinMax: [ 35, 60 ]  # Middle drone range
      DroneProb: 0.9

    - Name: SiliconResource
      Biome: [ Sediment ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.9


    - Name: CobaltResource
      Biome: [ LowMountains, Mountains, Hills ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.9


    - Name: NeodymiumResource
      Biome: [ Sediment, Fissure ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 4, 7 ]      # 
      DepthMinMax: [ 3, 10 ]    # "Easy" to mine (Player drone or handdrill, if player is crazy)
      DroneProb: 0.2
      MaxDroneCount: 1
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10



    - Name: SathiumResource
      Biome: [ Sediment, Fissure ]
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 4, 7 ]
      DepthMinMax: [ 30, 40 ]  # Needs drone hatch to mine
      DroneProb: 1
      MaxDroneCount: 3
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10



    - Name: PromethiumResource
      IsScalingCount: True 
      Biome: [ Rocks, Hills ]         # Small target biome, less chances to spawn
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 4, 6 ]     # Decent amount
      DepthMinMax: [ 30, 40 ]  # Needs drone hatch to mine
      DroneProb: 0.4
      DistTypeCylinder:
        MaxRadius: 8
        YVariance: 15


    - Name: GoldResource         #
      Biome: [ Fissure ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 3, 4 ]      # 40-100 units (Gold has 66% penalty to yield)
      DepthMinMax: [ 60, 80 ]   # Out of drone range. Use an HV.
      DroneProb: 1  
      MaxDroneCount: 7   # ... They keep coming...
      DistTypeCylinder:
        MaxRadius: 5
        YVariance: 15

     # 'Lucky finds'   ===== 


    - Name: ErestrumResource    # Lucky find
      Biome: [ Sediment, Fissure ]
      CountMinMax: [ 0, 2 ]     # Does NOT scale with planet size!
      SizeMinMax: [ 3, 5 ]
      DepthMinMax: [ 60, 70 ]   # Out of drone range. Use an HV.
      DroneProb: 1  
      MaxDroneCount: 4 
      DistTypeCylinder:
        MaxRadius: 10
        YVariance: 15


    - Name: ZascosiumResource    # Lucky find
      Biome: [ Sediment, Fissure ]
      CountMinMax: [ 1, 1 ]      # Does NOT scale with planet size!
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 60, 70 ]    # Out of drone range. Use an HV
      DroneProb: 1  
      MaxDroneCount: 4 
      DistTypeCylinder:
        MaxRadius: 12
        YVariance: 20

    - Name: PlatinResource      # Lucky find
      Biome: [ Sediment, Fissure ]
      CountMinMax: [ 1, 2 ]     # Does NOT scale with planet size!
      SizeMinMax: [ 3, 5 ]      #
      DepthMinMax: [ 60, 70 ]   # Out of drone range. Use an HV
      DroneProb: 1  
      MaxDroneCount: 4 
      DistTypeCylinder:
        MaxRadius: 12
        YVariance: 20









