## ========================================================================
##                     POI: DRONE BASES and COMMAND CENTERS
## ========================================================================

    # This world is extremely hostile. 
    # Only very dedicated mining factions will try to build bases here.
    # ... Or, crazy people (Warlord)


         # DB Zirax (Rados) ========
        - GroupName: DroneBaseT1   # CommandCenter
          Faction: Rados   # 

          DroneBaseSetup: DroneBaseSetupRad

          IsImportant: True
          Biome: [Sediment]
          CountMinMax: [ 1, 1 ]

          SpawnPOINear: [START]   # (Increases spawn chances)
          SpawnPOINearRange: [1500, 2500]

          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: RegenAfter
              Value: 720


         # DB POLARIS (Arkenian) ========

        - GroupName: PolarisDroneBase 
          Faction: Polaris

          DroneBaseSetup: DroneBaseSetupPol
          IsCommandCenter: True      # BA attacks

          IsImportant: True
          Biome: [Sediment]

          SpawnPOINear: [START]
          SpawnPOINearRange: [1500, 2500]

          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
#          AuxiliaryPOIs: [ZiraxDefense]
          Properties: 
            - Key: RegenAfter
              Value: 720




