### Resource Deposits
RandomResources:

    - Name: IronResource
      Biome: [ LowMountains, Mountains, Hills ]
      IsScalingCount: True 
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 45, 65 ]
      DroneProb: 0.9


    - Name: CopperResource
      Biome: [ Hills, LavaFieldUpper, LowMountains, Mountains ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 10, 12 ]   # Rich
      DepthMinMax: [ 35, 60 ]  # Middle drone range
      DroneProb: 0.9

    - Name: SiliconResource
      Biome: [ Sediment ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.9


    - Name: CobaltResource
      Biome: [ LowMountains, Mountains, Hills ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.9


    - Name: NeodymiumResource
      Biome: [ Sediment, Fissure ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 4, 7 ]      # 
