PlanetType: RadiatedIce
PlayfieldType: Planet
Difficulty: 2



LandClaimZone: Device



# ==============================================================


# Atmosphere and Sky

AtmosphereEnabled: True

DayLightIntensity: 0.55
NightLightIntensity: 0.45




AtmosphereColor: "0.19, 0.26, 0.35"

SkyColor: "0.90, 0.5, 0.3"

SkyHorizonColor: "1, 0.2, 0"


# Light
DayLightIntensity: 0.55   #1.4
NightLightIntensity: 0.45

#LightZenithColor: "1, 0.95, 0.85"
#LightZenithColor: "1, 0.7, 0.7"
#LightZenithColor: "0.85, 0.55, 0.55"  # Reddish
LightZenithColor: "0.65, 0.65, 0.75"   # PaleBlue

# LightZenithColor: "1.65, 1.65, 1.75"   # Glaring PaleBlue
# LightZenithColor: "1.45, 1.55, 2.05"   #
# LightZenithColor: "1.35, 1.55, 2.15"   #
LightZenithColor: "2.05, 2.25, 3.15"   #

#LightHorizonColor: "1, 0.5, 0"
LightHorizonColor: "1, 0.5, 0.2"       # Orange


#NightLightColor: "0.78, 0.78, 1"
NightLightColor: "1, 0.2, 0"            # Red

DayShadowStrength: 1
NightShadowStrength: 1

# Sun
SunFlare: EnvironmentalEffects/SunFlareBlue       # Choose from pre-selection: SunFlareBlue, SunFlarePurple, SunFlareRed, SunFlareRedSpace, SunFlareWhite, SunFlareWhite2, SunFlareWhite3, SunFlareWhite3Space, SunFlareWhite4, SunFlareWhite4Space, SunFlareWhiteMoon, SunFlareWhiteSpace, SunFlareYellow, SunFlareYellow2, SunFlareYellow3
# SunFlare: EnvironmentalEffects/SunFlareBlue

# ==============================================================


# Fog
AtmosphereFog: 0.99
# FogColor: "0.0, 0,0, 0.0"
# FogColor: "0.0, 0,0, 0.5"    # Slight blue color will make the sunset rays colourful blue-pink?
FogColor: "0.0, 0.05, 0.08"     # fixed typo

FogCloudIntensity: 0.8
GroundFogIntensity: 0
GroundFogHeight: 0

# Clouds
CloudsDensity: 0.1
CloudsSharpness: 0.1
CloudsBrightness: 0.7
CloudsOpacity: 0.4

CloudsZenithColor: "1.0, 0.5, 0.6"
CloudsHorizonColor: "1, 0.3, 0.1"

# Wind Speed
WindSpeed: 3



# ==============================================================


# Special Effects 
SpecialEffectsLocal:

  - Name: EnvironmentalEffects/Sparks              # The ground boils away...
    Biome: [ LowFlats, PlateauPreparer ]
    Time: Day
    MaxHeight: 10



SpecialEffectsGlobal:
# Weather
  - Name: Clear      # Will remove 'space view clouds'
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1200


# Global Effects
  - Name: MeteorShower
    Biome: [ Mountains, PlateauMain, PlateauPreparer ]
    Time: Always
    InitialDelay: 3.5
    Delay: 5
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid




