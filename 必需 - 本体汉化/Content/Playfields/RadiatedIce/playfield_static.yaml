### Resource Deposits
RandomResources:
    - Name: IronResource # Very poor and shallow
      Biome: [ SmallCrater, SmallCrater_1, LargeCrater, DustCenter, Dust, DustEdge, DeepDust ]
      IsScalingCount: True
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 3, 7 ]
      DroneProb: 0.3
      MaxDroneCount: 1

    - Name: MagnesiumResource  # Mountains, shallow, very poor
      Biome: [ Mountains, Regolith, RegolithEdge ]
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 2, 3 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.7
      MaxDroneCount: 1 
      
    - Name: MagnesiumResource  # Below ice; bigger -> Needs HV excavator or autominer
      Biome: [ Regolith, RegolithEdge, DustCenter ]
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 70, 80 ]
      DroneProb: 0.2
      MaxDroneCount: 1 


    - Name: PromethiumResource  # Will be grabbed by POI. - - Otherwise has an extremely small chance to spawn (due to tiny target biome)
      # IsScalingCount: True
      Biome: [ CrustedIce, DeepDust ]
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 5, 6 ]
      DroneProb: 1
      MaxDroneCount: 2
      DepthMinMax: [ 5, 10 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

