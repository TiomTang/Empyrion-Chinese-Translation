## === (3a) DRONEBASES - Standard ===========================================================================
## ==========================================================================================================

    # These POI are both Cluster Anchors (by SpawnPOINear) and avoidance targets (by SpawnPOIAvoid)
    # ! Their group names must not change, else the playfield will behave unexpectedly
    # DronebaseSetups / DronebaseSetupIDs are defined further down in this document

         # Factions sorted by territory vs. avoidance needs.

         # DB Tesch ============================

         # DB Zirax ============================

        - GroupName: ZiraxDroneBase  # Anchor for Epsilon Dronebase
          Biome: [ OasisEdge, Savanna, Sand ]
          Faction: Zirax

          DroneBaseSetup: DroneBaseSetup
          # IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          # SpawnPOIAvoid: [CNTRL_IsInfected]  # (Will try to fight with TheLegacy anyway)
          # SpawnPOIAvoidDistance: 45000
          Properties: 
            - Key: RegenAfter
              Value: 720


         # DB Zirax subfactions ================



         # DB Kriel ============================

        - GroupName: KrielDroneBase
          Biome: [ Rocks, LowMountains, Mountains, GlacierSnow ]
          # Biome: [  PolarSnow, GlacierSnow, ColdPlains, Tundra, Swamp, DeepForest, LowMountains, Mountains ]  # 'darker' Biomes
          Faction: Kriel

          DroneBaseSetup: DroneBaseSetupKrl

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, ARCDronebase]
          SpawnPOIAvoidDistance: 2000
          DroneProb: 1.0
          DronesMinMax: [ 6, 8 ]
          ReserveCount: 10
          NoShieldReload: True
          # SpawnPOIAvoid: [CNTRL_IsInfected]  # (Will try to fight with TheLegacy anyway)
          # SpawnPOIAvoidDistance: 45000
          Properties: 
            - Key: Music
              Value: Encryptor
            - Key: RegenAfter
              Value: 720 



         # DB ArkenianRepublic =================


        - GroupName: PolarisDroneBase
          Biome: [ Oasis, OasisEdge, Savanna, SavannaEdge, Rocks ]
          # Biome: [ Sand, SavannaEdge, Savanna, HighGrass] # 'brighter' biomes
          Faction: ArkenianRepublic

          DroneBaseSetup: DroneBaseSetupArk
          IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          Properties: 
            - Key: Music
              Value: desert
            - Key: RegenAfter
              Value: 720



        # DB PRENN (Trader) ====================

        - GroupName: PrennDroneBaseT1 # Is also a trading station, but normal core. Needs breathable atmo
          Biome: [ Oasis, OasisEdge, Savanna ]
          Faction: PrennFederation

          DroneBaseSetup: DroneBaseSetupPre
          # IsCommandCenter: True

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 6 ]
          ReserveCount: 7
          NoShieldReload: True 
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          Properties:
            - Key: Music
              Value: SunnySkies
            - Key: RegenAfter
              Value: 720 
            - Key: Discovery  # Traders broadcasting their position
              Value: False


         # DB Farr =============================

        - GroupName: FarrDroneBase
          Biome: [ Oasis, OasisEdge, Savanna ]
          Faction: Farr 

          DroneBaseSetup: DroneBaseSetupFarr

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True 
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000

          SpawnResource: ["GoldResource:1-1"]  # 
          SpawnResourceRange: [150,300]

          Properties:
            - Key: Music
              Value: desert
            - Key: RegenAfter
              Value: 720 


         # DB (Other mini-factions)=============

         # DB Talon ============================

        - GroupName: TribalZiggurat                      # CommandCenter
          Biome: [ Oasis, OasisEdge, Savanna ]
          Faction: Talon

          IsCommandCenter: True

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          Properties:  
            - Key: RegenAfter
              Value: 720


         # DB TheLegacy (Infected Planets) =====



## === (3b) DRONEBASES ('Everywhere' factions) ==============================================================
## ==========================================================================================================


         # DBs that need playfield spawn restrictions, else they would be too dominant due to galaxyconfig spawn chances.

         # Factions sorted by avoidance needs.

         # DB Polaris ==========================

