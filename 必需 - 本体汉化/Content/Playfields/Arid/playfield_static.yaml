            - Key: RegenAfter
              Value: 720


         # DB Warlord ==========================

        - GroupName: DroneBaseT1           # CommandCenter
          BiomesExcluded: [ Oasis, OasisEdge, Rocks, LowMountains, Mountains, GlacierSnow ]
          Faction: Warlord
          NoShieldReload: True

          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupWar

          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 3 ] 
          ReserveCount: 5
          SpawnPOINear: [CNTRL_IsLawless]
          SpawnPOINearRange: [500, 45000]
          SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase]
          SpawnPOIAvoidDistance: 45000 # Fully avoids other factions
          Properties: 
            - Key: Music
              Value: moonstone 
            - Key: RegenAfter
              Value: 720



