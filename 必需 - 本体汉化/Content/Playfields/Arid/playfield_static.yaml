## === (3a) DRONEBASES - Standard ===========================================================================
## ==========================================================================================================

    # These POI are both Cluster Anchors (by SpawnPOINear) and avoidance targets (by SpawnPOIAvoid)
    # ! Their group names must not change, else the playfield will behave unexpectedly
    # DronebaseSetups / DronebaseSetupIDs are defined further down in this document

         # Factions sorted by territory vs. avoidance needs.

         # DB Tesch ============================

         # DB Zirax ============================

        - GroupName: ZiraxDroneBase  # Anchor for Epsilon Dronebase
          BiomesExcluded: [ BM_POLE, BM_TOO_SMALL ]  # (To prevent it from spawning at the poles or to prevent decoration overlaps)
          Faction: Zirax

          DroneBaseSetup: DroneBaseSetup
          # IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: RegenAfter
              Value: 720


         # DB Zirax subfactions ================

         # DB Kriel ============================

         # DB ArkenianRepublic =================

         # DB Prenn ============================

         # DB Farr =============================

         # DB (Other mini-factions)=============

         # DB Talon ============================

        - GroupName: TribalBazarArid                      # CommandCenter
          Faction: Talon  
          IsImportant: True

          IsCommandCenter: True

          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          Properties:  
            - Key: RegenAfter
              Value: 720


         # DB TheLegacy (Infected Planets) =====



## === (3b) DRONEBASES ('Everywhere' factions) ==============================================================
## ==========================================================================================================


         # DBs that need playfield spawn restrictions, else they would be too dominant due to galaxyconfig spawn chances.

         # Factions sorted by avoidance needs.

         # DB Polaris ==========================

         # DB Pirates ==========================

         # DB Epsilon (In-territory) ===========

        - GroupName: EpsilonDronebase
          BiomesExcluded: [ BM_POLE, BM_TOO_SMALL ]
          Faction: Epsilon

          DroneBaseSetup: DroneBaseSetupEps
          IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          SpawnPOINear: [ZiraxDroneBase]
          SpawnPOINearRange: [3000, 45000]
          Properties: 
            - Key: Music
              Value: Encryptor 
            - Key: RegenAfter
              Value: 720


         # DB Warlord ==========================


        - GroupName: DroneBaseT1           # CommandCenter
          BiomesExcluded: [ IceSheet, RadiatedFog]
          Faction: Warlord
          NoShieldReload: True

          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupWar

          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ] 
          ReserveCount: 5
          SpawnPOINear: [CNTRL_IsLawless]
          SpawnPOINearRange: [500, 45000]
          SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase]
          SpawnPOIAvoidDistance: 45000 # Fully avoids other factions
          Properties: 
            - Key: Music
              Value: moonstone 
            - Key: RegenAfter
              Value: 720



