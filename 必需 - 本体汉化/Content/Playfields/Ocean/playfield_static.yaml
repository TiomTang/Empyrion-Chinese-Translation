## === (3b) DRONEBASES ('Everywhere' factions) ==============================================================
## ==========================================================================================================

             # DBs that need playfield spawn restrictions, else they would be too dominant due to galaxyconfig spawn chances.


         # DB Polaris ==========================

            #  ( Rich PFs only. 25% spawn, Avoid IsInfected)

         # DB Pirates ==========================

            # (IsLawless. Avoid all bigger DBs & TheLegacy)

        - GroupName: PiratesDroneBase
          Biome: [ SandBeach, PalmDunes, Dunes, ForestClearing, Savanna, HighPalms, TropicalHills ]
          Faction: Pirates

          DroneBaseSetup: DroneBaseSetupPir

          IsImportant: True
          CountMinMax: [ 1, 1 ]

          SpawnPOINear: [CNTRL_IsLawless]
          SpawnPOINearRange: [1000, 45000]
          SpawnPOIAvoid: [CNTRL_IsInfected, ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase]
          SpawnPOIAvoidDistance: 45000

          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: RegenAfter
              Value: 720

         # DB Epsilon (In-territory) ===========

