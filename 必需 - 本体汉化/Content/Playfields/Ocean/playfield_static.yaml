## === (3a) DRONEBASES - Standard ===========================================================================
## ==========================================================================================================

    # These POI are both Cluster Anchors (by SpawnPOINear) and avoidance targets (by SpawnPOIAvoid)
    # ! Their group names must not change, else the playfield will behave unexpectedly
    # DronebaseSetups / DronebaseSetupIDs are defined further down in this document

         # Factions sorted by territory vs. avoidance needs.

         # DB Tesch ============================

         # DB Zirax ============================



         # DB Zirax  ========
        - GroupName: ZiraxDroneBase  # (Also spawn control for Epsilon to decide if inside or outside of Zrx territory)
          BiomesExcluded: [ IceSheet, Glacier, Rocks, PolarSnow, Shore, GravelBeach, SandBeach, Surf, Surf_1 ]  # (To prevent it from spawning at the poles or to prevent decoration overlaps)

          Faction: Zirax

          DroneBaseSetup: DroneBaseSetup
          # IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          Properties: 
            - Key: Music
              Value: lava
            - Key: RegenAfter
              Value: 720

         # DB Zirax subfactions ================

        - GroupName: DroneBaseT1
          BiomesExcluded: [ IceSheet, PolarSnow, Rocks, Glacier, Tundra, ColdPlains ] 
          Faction: Epsilon

          DroneBaseSetup: DroneBaseSetupEps
          IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1
          DronesMinMax: [ 4, 5 ]
          ReserveCount: 9
          TroopTransport: False 
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          SpawnPOINear: [DroneBaseT1]   # To have it spawn only in Zirax territory
          SpawnPOINearRange: [1000, 45000]
          SpawnResource: ["PromethiumResource:1-1","TitanResource:2-2","CopperResource:0-1"]
