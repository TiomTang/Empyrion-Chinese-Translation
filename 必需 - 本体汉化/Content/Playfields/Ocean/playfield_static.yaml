## === (3a) DRONEBASES - Standard ===========================================================================
## ==========================================================================================================

    # These POI are both Cluster Anchors (by SpawnPOINear) and avoidance targets (by SpawnPOIAvoid)
    # ! Their group names must not change, else the playfield will behave unexpectedly
    # DronebaseSetups / DronebaseSetupIDs are defined further down in this document

         # Factions sorted by territory vs. avoidance needs.

         # DB Tesch ============================

         # DB Zirax ============================



         # DB Zirax  ========
        - GroupName: ZiraxDroneBase  # (Also spawn control for Epsilon to decide if inside or outside of Zrx territory)
          BiomesExcluded: [ IceSheet, Glacier, Rocks, PolarSnow, Shore, GravelBeach, SandBeach, Surf, Surf_1 ]  # (To prevent it from spawning at the poles or to prevent decoration overlaps)

          Faction: Xenu

          DroneBaseSetup: DroneBaseSetup
          # IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          Properties: 
            - Key: Music
              Value: lava
            - Key: RegenAfter
              Value: 720

         # DB Zirax subfactions ================  # (Territory only)

          # Ghyst
        - GroupName: GhystBunker  # Spawn anchor
          Biome: [ PolarSnow, Glacier, Rocks ]
          Faction: Ghyst

          DroneBaseSetup: DroneBaseSetupGhy

          IsImportant: True
          CountMinMax: [ 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          POIDistance: 45000
          SpawnResource: ["PromethiumResource:1-1","CopperResource:0-1"]
          SpawnResourceRange: [150,400]
          Properties: 
            - Key: Music
              Value: lava 
            - Key: RegenAfter
              Value: 720


          # Epsilon
        - GroupName: EpsilonDronebase
          Biome: [ PalmDunes, Dunes, ForestClearing, Savanna, HighPalms, TropicalHills, Hills, Cliffs, Grassland, Forest, DeepForest, HighForest, LowMountains, ColdPlains ]
          Faction: Epsilon

          DroneBaseSetup: DroneBaseSetupEps
          IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1
          DronesMinMax: [ 4, 5 ]
          ReserveCount: 9
          TroopTransport: False 
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          SpawnPOINear: [ZiraxDroneBase]
          SpawnPOINearRange: [6000, 20000]
          SpawnResource: ["PromethiumResource:1-1","TitanResource:2-2","CopperResource:0-1"]
          SpawnResourceRange: [100,400]
          Properties: 
            - Key: Music
              Value: Encryptor 
            - Key: RegenAfter
              Value: 720

        - GroupName: PlanetVesselBase
          Faction: Zirax
          NoShieldReload: True
          IsImportant: True
          BiomesExcluded: [ IceSheet, PolarSnow, Rocks, Glacier]
          # PlanetVesselBaseSetup: PlanetVesselBaseSetup
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 2, 3 ]
          ReserveCount: 6
          TroopTransport: True
          # SpawnPOIAvoid: [TS_Planet]
          # POIDistance: 2000
          SpawnPOINear: [EpsilonDronebase]
          SpawnPOINearRange: [1000, 6000]
          Properties: 
            - Key: RegenAfter
              Value: 720



         # DB Kriel ============================

         # DB KRIEL ========
        - GroupName: KrielDroneBase 
          Biome: [ Grassland, Forest, DeepForest, HighForest, LowMountains_1, Tundra, Rocks ]  # 'darker' Biomes
          Faction: Kriel

          DroneBaseSetup: DroneBaseSetupKrl

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, ARCDronebase]
          SpawnPOIAvoidDistance: 2000
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: Music
              Value: AlteredPhase
            - Key: RegenAfter
              Value: 720 



         # DB ArkenianRepublic =================

        - GroupName: PolarisDroneBase 
          Biome: [ SandBeach, PalmDunes, Dunes, ForestClearing, Savanna, HighPalms, TropicalHills, Cliffs, HighForest, LowMountains, LowMountains_1 ]
          Faction: ArkenianRepublic

          DroneBaseSetup: DroneBaseSetupArk
          IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          Properties: 
            - Key: Music
              Value: desert
            - Key: RegenAfter
              Value: 720

         # DB Prenn ============================

        - GroupName: PrennDroneBaseT1 # Is also a trading station, but normal core. Needs breathable atmo
