  ……该物体的强大辐射，以及缺乏可以锁定的中型质量天体，使得瞄准此区域极其困难。[b](1)[/b]  
  许多闲置的运输舰都在此迷失——漂向潜伏的引力井深处。


  [b](1)[/b] [i]在绝望的情况下，仍有可能抵达该区域。  
  你可以使用你的探索扫描数据；保存在 [b]登记册[/b] 中。

  > 打开物品栏；在窗口顶部选择“登记册”标签，选择恒星星区（例如 Sun[Right]），然后选择你的飞船。  
  使用按钮在其上添加一个航路点，退出登记册。  
  然后用另一艘飞船手动将你的飞船对准那个航路点，如果在范围内，即可启动翘曲跳跃。[/i]



