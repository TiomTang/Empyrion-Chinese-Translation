## === (3b) DRONEBASES ('Everywhere' factions) ==============================================================
## ==========================================================================================================

             # DBs that need playfield spawn restrictions, else they would be too dominant due to galaxyconfig spawn chances.


         # DB Polaris ==========================

            #  ( Rich PFs only. 25% spawn, Avoid IsInfected)

         # DB Pirates ==========================

            # (IsLawless. Partially avoid all bigger DBs)

         # DB Epsilon (In-territory) ===========

            #  ( Only at living & dry PFs. Avoid IsInfected & Avoid IsLawless )

         # DB Warlord ==========================


        - GroupName: DroneBaseT1
          Faction: Warlord
          CountMinMax: [ 1, 1 ]  # (100% spawn at living & precious PFs, 50% at low interest)

          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupWar

          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ] 
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOINear: [CNTRL_IsLawless]
          SpawnPOINearRange: [500, 45000]
          SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase]
          SpawnPOIAvoidDistance: 45000 # Fully avoids
          Properties: 
            - Key: Music
              Value: moonstone 
            - Key: RegenAfter
              Value: 720



