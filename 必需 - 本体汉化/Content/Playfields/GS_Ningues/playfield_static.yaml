---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

Description: "\u96BE\u5EA6: \u4E2D\u7B49\n\u6559\u7A0B: \u5426\n\u4EFB\u52A1: \u4ED9\u5973\u5EA7\u83CC\u682A (\u6781\u661F\u5DE8\u578B\u4F01\u4E1A)\n\n\u5982\u679C\u4F60\u80FD\u5728\u8FD9\u9897\u51B0\u5C01\u7684\u536B\u661F\u4E0A\u5B58\u6D3B\u4E0B\u524D\u51E0\u4E2A\u5C0F\u65F6\uFF0C\u8BF7\u627E\u5230\u79D1\u5B66\u7AD9\u5E76\u534F\u52A9\u90A3\u91CC\u7684\u5DE5\u4F5C\u4EBA\u5458\u5E94\u5BF9\u4ED6\u4EEC\u7684\u6311\u6218\u2026\u2026\n"
#Description: "Between ice and glaciers, one can still sense the former splendor of this frozen planet. The fight against cold and the unconditional will to survive all tangible opportunities drives not only the quite dangerous fauna, but also the sparse flora of this icy moon to the utmost.\n\nSuitable for advanced players"

PlanetClass: Snow
PlanetType: SnowStarter
PlayfieldType: Moon # 'Planet' will be shown with an orbit line in the system map, and not be grouped to gas giants!
Difficulty: 1

LandClaimZone: Device

# ==============================================================
# Special parameters:
# ==============================================================

#AllowBlueprintSV: False         # Dis-allow to spawn SV Blueprint in this playfield, default is True
#AllowBlueprintCV: False         # Dis-allow to spawn CV Blueprint in this playfield, default is True
#AllowBlueprintBA: False         # Dis-allow to spawn BA Blueprint in this playfield, default is True
#AllowBlueprintHV: False         # Dis-allow to spawn HV Blueprint in this playfield, default is True

Seed: 575561                    # Integer [1, 999999] If set overwrites main Seed 
#UseFixed: True  			   	   # If set to True uses fixed POIs + resources in Survival mode (per default set to False). Can be used together with UseRandom
#UseRandom: True				   # If set to True uses random POIs + resources in Survival mode (per default set to True). Can be used together with UseFixed
#IndestructibleTerrain: True     # If set to True terrain on this playfield will be indestructible

# ==============================================================
# Atmosphere and Sky
AtmosphereEnabled: True
# AtmosphereColor: "0.95, 1.18, 1.6" 
AtmosphereColor: "0.855, 1.062, 1.44" 
SkyColor: "1.02, 0.76, 1.02"

SkyHorizonColor: "1, 0.3, 0"
AtmosphereParams: [0.4, 1.7]

# Light
DayLightIntensity: 0.8


NightLightIntensity: 0.25
DayShadowStrength: 0.95
NightShadowStrength: 0.5


LightZenithColor: "0.9, 0.95, 1.10"
LightHorizonColor: "0.8, 0.45, 0.10"
NightLightColor: "0.3, 0.3, 0.7"

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhite

# Fog
# AtmosphereFog: 0.5       # (See: playfield_dynamic)
FogCloudIntensity: 0.8
# GroundFogIntensity: 0.07 # (See: playfield_dynamic)
# GroundFogHeight: 40

FogColor: "0.85, 0.85, 1.03"

# Clouds and Wind
CloudsDensity: 0.3
CloudsSharpness: 0.2
CloudsBrightness: 0.6


CloudsZenithColor: "0.60, 0.63, 0.86"
CloudsHorizonColor: "0.72, 0.24, 0.08"

CloudsNightZenithColor: "0.015, 0.023, 0.029"
CloudsNightHorizonColor: "0.015, 0.023, 0.029"

WindSpeed: 3

# Special Effects
SpecialEffectsLocal:
  - Name: FireFliesRed
    Biome: [ Taiga, TaigaEdge, TaigaSnow, Oasis]
    Time: Night
    MaxHeight: 15

  - Name: FireFliesOrange
    Biome: [ Shore, Taiga, TaigaEdge, TaigaSnow, Oasis]
    Time: Night
    MaxHeight: 15

  - Name: FireFliesRed
    Biome: [ Oasis]
    Time: Day
    MaxHeight: 15

  - Name: FireFliesOrange
    Biome: [ Shore, Taiga, Oasis]
    Time: Day
    MaxHeight: 15



SpecialEffectsGlobal:



    # Starting weather
  - Name: SnowHeavy
    Type: Weather
    InitialDelay: 0 # (Should start directly.)
    Lifetime: 50  # (2 ingame days - 1 RL hour -  of sunshine.)
    Delay: 10000    # (This long period should not happen too often)

  - Name: Clear
    Type: Weather
    InitialDelay: 10 # (sShould start directly.)
    Lifetime: 7200  # (2 ingame days - 1 RL hour -  of sunshine.)
    Delay: 1000    # (This long period should not happen too often)


  - Name: SnowLight
    Type: Weather
    InitialDelay: 48
    Delay: 5
    Lifetime: 600

    # Soon
  - Name: Clear
    Type: Weather
    InitialDelay: 50
    Delay: 12
    Lifetime: 1000

  - Name: SnowMedium
    Type: Weather
    InitialDelay: 50
    Delay: 12
    Lifetime: 800


    # Later
  - Name: Clear
    Type: Weather
    InitialDelay: 72
    Delay: 12
    Lifetime: 600
    
  - Name: SnowHeavy
    Type: Weather
    InitialDelay: 72
    Delay: 12
    Lifetime: 600

  - Name: ColdWave
    Type: Weather
    InitialDelay: 72
    Delay: 24
    Lifetime: 1000

  - Name: Hail
    Type: Weather
    InitialDelay: 72
    Delay: 48
    Lifetime: 600

  - Name: HeatWave
    Type: Weather
    InitialDelay: 90
    Delay: 90
    Lifetime: 400


    # (All standard clouds removed, too 'busy' looking.
    # - Colors adjusted to ColdWave's clouds.)

  # - Name: CloudsLight
    # Type: Weather
    # InitialDelay: 10
    # Delay: 10
    # Lifetime: 400

  # - Name: CloudsMedium  # (Too bright here)
    # Type: Weather
    # InitialDelay: 0
    # Delay: 3
    # Lifetime: 1200

  # - Name: Clouds   # (Strange colour)
    # Type: Weather
    # InitialDelay: 5
    # Delay: 5
    # Lifetime: 900

# ==============================================================

### Resource Deposits

RandomResources:
    - Name: CarbonResource
      BiomesExcluded: [ Dunes, Glacier] 
      IsScalingCount: True   # Medium Planet: 6-8 Deposits, Large planet 9-12
      CountMinMax: [ 2, 4 ]  # (was [ 5, 8 ] unscaled)
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 0, 5 ]
      DroneProb: 0.2
      MaxDroneCount: 1
      
    - Name: IronResource
      BiomesExcluded: [ Dunes, Glacier] 
      IsScalingCount: True   # Medium Planet: 6-8 Deposits, Large planet 9-12
      CountMinMax: [ 1, 4 ]  # (was [ 5, 8 ] unscaled)
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.2
      MaxDroneCount: 1

    - Name: CopperResource
      BiomesExcluded: [ Dunes, Glacier] 
      IsScalingCount: True   # Medium Planet: 4-8 Deposits, Large planet 6-12
      CountMinMax: [ 1, 4 ]  # (was [ 4, 7 ] unscaled)
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3

    - Name: SiliconResource
      BiomesExcluded: [ Dunes, Glacier] 
      IsScalingCount: True   # Medium Planet: 4-6 Deposits, Large planet 6-9
      CountMinMax: [ 1, 6 ]  # (was [ 4, 7 ] unscaled)
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3  
      
    - Name: CobaltResource
      Biome: [ LowMountains, Mountains, HighMountains ]
      IsScalingCount: True   # Medium Planet: 4-8 Deposits, Large planet 6-12
      CountMinMax: [ 2, 6 ]  # (was [ 4, 7 ] unscaled)
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3

### Resource Asteroids
AsteroidResources:
     - Name: IronResource
       Threshold: 0.2
       Amount: 0.2
     - Name: CopperResource
       Threshold: 0.2
       Amount: 0.2
     - Name: SiliconResource
       Threshold: 0.2
       Amount: 0.2
     - Name: CarbonResource
       Threshold: 0.2
       Amount: 0.2

### POIs
POIs:
    Random:

#============================================================
# Basic layout is as follows
# Playfield has several required POI, which can be different per planet type
# Always placed: Obelisk & Font of Knowledge + Activators
# 1 camp/wreckage nearby the Obelisk
# 1 main PoI relevant for story log
# 1 POI that CAN have a story log but merely is something to discover for the player
# random, thematicall fitting POI scattered around the planet.
# ======================= CRASHSITE  ======================= 

          # 'Distance holder POI'
        - GroupName: NullPOI                # PLZ KEEP THIS POI! - - Used for 'security' spacing of POI
          CountMinMax: [ 1, 1 ]             # (The parameter 'SpawnPOIAvoid' does not work well if it is defined as a combination of START and a POI.)
          SpawnPOINear: [START]             # (NullPOI acts still as 'POI', is used instead of START.)
          SpawnPOINearDistance: 10          # (Due to the fixed shape of the Crashsite and the nonexistent size of NullPOI, this POI should never fail to spawn)
          IsImportant: True     # (Will not have any spawn problems, just to be sure. Should spawn immediately, so no loss in performance.)
          PlaceAt: Terrain, UnderWater     # (Default is just on terrain)

          # STARTER RESOURCE NODES
          SpawnResource: ["IronResource:1-1", "CopperResource:1-1", "SiliconResource:1-1" ]
          SpawnResourceRange: [300, 400]

# Polaris Station

        - GroupName: NinguesPolarisMission          # Mission Hub on Ningues; Command Center; Dronebase
          IsImportant: True
      #    DroneSetupID: NinguesDroneBasePolaris
          Faction: Polaris
          CountMinMax: [ 1, 1 ]
         # IsCommandCenter: true
          SpawnPOINear: [START]              
          SpawnPOINearDistance: 2500
       #   SpawnPOIAvoid: [ START ]
       #   SpawnPOIAvoidDistance: 800 
          Properties: 
            - Key: RegenAfter
              Value: 360
            - Key: SI
              Value: Off
           

 #  ======== REQUIRED POI ======== 
 

        - GroupName: GSNinguesStart              #  Gamestart
          IsImportant: True
          Faction: Alien
          CountMinMax: [ 1, 1 ] 
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [0,50]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
              

        - GroupName: NinguesConvoy        # Tales of Tash
          IsImportant: True
          BiomesExcluded: [ GlacierHills ] 
          Faction: Alien
          CountMinMax: [ 1, 1 ]
       #   Biome: [ColdPlains_Danger, Tundra]   
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [300,600]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: PersonalContainer 
              Value: "Token::9981" 

        - GroupName: TOTObeliskSnow           # Tales of Tash!
          IsImportant: True
          Faction: Progenitor          
          CountMinMax: [ 1, 1 ]
       #   Biome: [ColdPlains_Danger, Tundra]   
          SpawnPOINear: [ NinguesConvoy ]
          SpawnPOINearRange: [30,110]   #110
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: PersonalContainer 
              Value: "Token::9981" 

        - GroupName: NinguesScienceVessel  #Tot + Ningues Mission
          # GroupName: TOTCampFontSnow     # Tales of Tash
          IsImportant: True
          Territory: false
          BiomesExcluded: [ HighMountains, HighMountains_1, Mountains, Mountains_1, IceShelf ] 
          Faction: Polaris
          CountMinMax: [ 1, 1 ] 
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 1200
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [1200,8000]   
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: PersonalContainer 
              Value: "Token::9981" 

        - GroupName: TOTFontB               #  Gain access to Teleport Network
          IsImportant: True
          Faction: None          
          CountMinMax: [ 1, 1 ]
       #   Biome: [ColdPlains_Danger, Tundra]   
       #   SpawnPOINear: [ START ]
       #   SpawnPOINearRange: [500,1000]
          SpawnPOINear: [ NinguesScienceVessel ]
          SpawnPOINearRange: [30,100]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360


        - GroupName: NinguesQuarry           # Tales of Tash, hiding of Ice Gomlem Elders (Mission)
          IsImportant: True
          Faction: Alien
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 800   
          SpawnPOINear: [START]
          SpawnPOINearRange: [800, 1500]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360

        - GroupName: NinguesMineralSynthLab           # Andromeda Strain Mission Target; Dronebase
          IsImportant: True
          BiomesExcluded: [ Dunes, Glacier, GlacierHills_1 ] 
          Faction: Alien          
          DroneSetupID: DroneBaseNingues
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 2500
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: SI
              Value: Off
            - Key: PersonalContainer 
              Value: "Token::9981" 

# ======== Optional POI

        - GroupName: TOTActivatorSnow           # May be used later 'discovering missions'
          BiomesExcluded: [ Dunes, Glacier ] 
          Faction: None          
          CountMinMax: [ 2, 9 ]
      #    SpawnPOIAvoid: [ NullPOI ]
      #    SpawnPOIAvoidDistance: 4000
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360 

        - GroupName: TemperateStarterTribalTower 
          Faction: None
          CountMinMax: [ 1, 1 ]
          Biome: [GlacierHills, Tundra, Plains, Taiga, TaigaEdge, TaigaSnow, TaigaSnowEdge] 
          # BiomesExcluded: [ Dunes, Glacier, GlacierHills_1 ]  
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 1000
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360

        - GroupName: TemperateStarterRuinsTribal 
          Faction: None           
          CountMinMax: [ 7, 15 ]
          SpawnPOINear: [ TemperateStarterTribalTower ]
          SpawnPOINearRange: [50,300]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360 
              
        - GroupName: Ruins                       
          IsImportant: True
          Faction: None
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ NullPOI]
          SpawnPOIAvoidDistance: 500
       #   SpawnPOINear: [ TOTObeliskSnow ]
       #   SpawnPOINearRange: [50,200]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360

        - GroupName: Ruins           # At least ONE needs to spawn
          BiomesExcluded: [ Dunes, Glacier, GlacierHills_1 ] 
          Faction: None
          CountMinMax: [ 10, 10 ]
          SpawnPOIAvoid: [ NullPOI, Ruins]
          SpawnPOIAvoidDistance: 600
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360

        - GroupName: Wreckage 
          IsImportant: True
          Faction: Alien
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ NullPOI]
          SpawnPOIAvoidDistance: 500
       #   SpawnPOINear: [ RuinsTribalTower ]
       #   SpawnPOINearRange: [100,1000]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
              
        - GroupName: Wreckage
          BiomesExcluded: [ Dunes, Glacier, GlacierHills_1 ] 
          Faction: Alien
          CountMinMax: [ 10, 10 ]
          SpawnPOIAvoid: [ START, Wreckage ]
          SpawnPOIAvoidDistance: 600
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360


    FixedPlayerStart:
