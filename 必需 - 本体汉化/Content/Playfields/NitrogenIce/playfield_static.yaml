## ============== Magnesium and Carbon world ================
# To have always a source of Carbon (since it is needed for some very basic materials)


OrbitUsesLightColor: True  
LightZenithColor: "0.3, 0.3, 0.3"   # Doesn't have any effect on this playfield (since no atmo), but will make the orbit playfield as bright as the playfield dayside.



PlanetType: FrozenNitrogen
PlayfieldType: Planet
Difficulty: 2

LandClaimZone: Device


# Atmosphere and Sky
AtmosphereEnabled: False

# Light
DayLightIntensity: 0.4 # 0.8
NightLightIntensity: 0.4 # 0.6

DayShadowStrength: 0.95         # hardcoded, no effect?
NightShadowStrength: 0.5        # hardcoded, no effect


# Sun
SunFlare: EnvironmentalEffects/SunFlareWhiteMoon




SpecialEffectsLocal:

  - Name: EnvironmentalEffects/Sparks
    Biome: [ LavaFields ]
    Time: Day
    MaxHeight: 10

SpecialEffectsGlobal:





# ==============================================================

### Resource Deposits
RandomResources:


    - Name: CarbonResource #
      Biome: [ Dust, DustEdge, DustMountains ]
      IsScalingCount: True
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 15, 20 ]
      DroneProb: 0.3
      MaxDroneCount: 1


    - Name: IronResource  #
      Biome: [ RayCraterBright, LargeCrater, SmallCrater, SmallCrater_1 ]
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 20, 30 ]
      DroneProb: 0.2
      MaxDroneCount: 1 



    - Name: CopperResource  #
      Biome: [ RayCraterBright, LargeCrater, SmallCrater, SmallCrater_1 ]
      IsScalingCount: True    # Tiny; sometimes
      CountMinMax: [ 0, 2 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 20, 30 ]
      DroneProb: 0.2
      MaxDroneCount: 1 



      
    - Name: MagnesiumResource  
      Biome: [ PatternPits, Mare ]
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 30, 40 ]
      DroneProb: 0.2
      MaxDroneCount: 1 


    - Name: CobaltResource
      Biome: [ Mountains, LowMountains ]
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 3, 5 ]  #
      DroneProb: 0.4
      MaxDroneCount: 1
      DepthMinMax: [ 35, 60 ] # Barely in Drone reach
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10



    - Name: SathiumResource 
      IsScalingCount: True
      Biome: [ Mountains, LowMountains ]
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 5, 6 ]  # Minimal deposit for building up a CV / Warp
      DroneProb: 1
      MaxDroneCount: 2
      DepthMinMax: [ 70, 80 ]  # Far out of drone reach, needs HV miner or Autominer
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

    - Name: PentaxidResource
      Biome: [ Regolith, RegolithEdge ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 4, 4 ]  # Ca 67 units each (50% penalty)
      DroneProb: 0.2
      MaxDroneCount: 2
      DepthMinMax: [ 20, 30 ] 
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10



### Resource Asteroids
AsteroidResources:
     - Name: CarbonResource
       Threshold: 0.1
       Amount: 0.1



### POIs
POIs:
    Random:


          # Helper POI
        - GroupName: SignalMarker01  # Decides the location of a civilisation cluster
          Faction: None
          IsImportant: True
          Biome: [Regolith, RegolithEdge, Cliffs, CrustedIce, LargeCrater] 
          CountMinMax: [ 1, 1]
          PlaceAt: Terrain, OnWater
          # FactionTerritory: [All] 
          Territory: False
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 2500 
          SpawnPOINear: [START] 
          SpawnPOINearRange: [2500, 2600]

