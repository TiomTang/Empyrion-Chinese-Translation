SpawnZones:


     # ====================
     # MARKER ZONES
     # (To easily find important POI in the SSG  - - has no other function. 
     # Please keep these active.)
     # ====================

   - SpawnAt: [START]  # Marker
     Radius: 2500
     RadiusRandom: 0
     RateMultiplyerCenter: 0
     RateMultiplyerEdge: 0
     Color: "0.0, 0.0, 0.0, 1.0"
     Entities:
       - Names: [CyborgsDamagedHerd]
         Biomes: [Any]
         Amount: 0
         Period: Always
         DelayMinMax: [15, 25]

   - SpawnAt: [SignalMarker01]  # Marker - Civilisation cluster
     Radius: 600
     RadiusRandom: 0
     RateMultiplyerCenter: 0
     RateMultiplyerEdge: 0
     Color: "1.0, 1.0, 0.0, 1.0"
