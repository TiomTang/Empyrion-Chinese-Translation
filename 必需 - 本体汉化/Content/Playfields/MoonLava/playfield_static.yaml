---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

Description: |
  \u4E00\u9897\u5C1A\u672A\u5F62\u6210\u575A\u56FA\u6838\u5FC3\u7684\u5E7C\u5C0F\u536B\u661F\uFF0C\u5E26\u6709\u5FAE\u5F31\u7684\u5927\u6C14\u75D5\u8FF9\u3002  
  \u4E5F\u8BB8\u5B83\u8BDE\u751F\u81EA\u4E00\u7247\u6052\u661F\u76D8\uFF0C\u6216\u662F\u4E00\u6B21\u58EE\u89C2\u884C\u661F\u78B0\u649E\u7684\u6B8B\u4F59\u3002


PlanetType: MoonLava
Emissive: True
PlayfieldType: Moon
Difficulty: 3

LandClaimZone: Device

# Atmosphere and Sky
AtmosphereEnabled: True

# Light
DayLightIntensity: 0.65
NightLightIntensity: 0.8
DayShadowStrength: 0.95

# Sun
SunFlare: EnvironmentalEffects/SunFlareRed

# Atmosphere and Sky
AtmosphereColor: "0.88, 0.48, 0.25"
SkyColor: "0.8, 0.1, 0" 
SkyHorizonColor: "0.2, 0.005, 0"
AtmosphereParams: [2, 1.6]     

# Light
LightZenithColor: "1, 0.95, 0.98"
LightHorizonColor: "1, 0.6, 0.15"
NightLightColor: "0.78, 0.78, 1"

DayShadowStrength: 1
NightShadowStrength: 1

# Fog
# AtmosphereFog: 0.00
FogCloudIntensity: 0.0
FogColor: "1, 0, 0"
# GroundFogIntensity: 0.03
# GroundFogHeight: 125

# Clouds and Wind
CloudsDensity: 0.0
CloudsSharpness: 1
CloudsBrightness: 0.0
CloudsOpacity: 0.0
 
CloudsZenithColor: "-0.1, -0.2, -0.2"
CloudsHorizonColor: "1, 0.3, 0.1"

WindSpeed: 0


SpecialEffectsGlobal:
# Weather    # Only weather Clear defined = Removes the 'space clouds'

  - Name: Clear
    Type: Weather
    InitialDelay: 0
    Delay: 0
    Lifetime: 1000


# ==============================================================

### Resource Deposits
RandomResources:
    - Name: IronResource
      IsScalingCount: True 
      CountMinMax: [ 3, 5 ] 
      SizeMinMax: [ 8, 13 ] 
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.3      
      MaxDroneCount: 1
      
    - Name: SiliconResource
      IsScalingCount: True 
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 8, 9 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.4
      
    - Name: CobaltResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      
    - Name: MagnesiumResource
      IsScalingCount: True 
      BiomesExcluded: [ SmallCrater, LargeCrater ]
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.7
      MaxDroneCount: 1 

    - Name: PromethiumResource
      IsScalingCount: True 
      Biome: [ Mare, MareEdge ]
      CountMinMax: [ 2, 4 ]
      SizeMinMax: [ 3, 6 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      DepthMinMax: [ 0, 1 ]
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10
      
    - Name: PentaxidResource
      IsScalingCount: True 
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 2, 3 ]
      DroneProb: 0.6
      MaxDroneCount: 2
      DepthMinMax: [ 0, 5 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

### Resource Asteroids
AsteroidResources:
     - Name: IronResource
       Threshold: 0.2
       Amount: 0.2
     - Name: SiliconResource
       Threshold: 0.2
       Amount: 0.2
     - Name: CobaltResource
       Threshold: 0.2
       Amount: 0.2
     - Name: MagnesiumResource
       Threshold: 0.2
       Amount: 0.2
     - Name: PromethiumResource
       Threshold: 0.2
       Amount: 0.2
     - Name: PentaxidResource
       Threshold: 0.2
       Amount: 0.2

### POIs
POIs:
    Random:  
        - GroupName: DroneBaseT1    #CommandCenter
          Faction: Zirax  
          NoShieldReload: True
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          CountMinMax: [ 0, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 5 ]
          ReserveCount: 5
          Properties: 
            - Key: RegenAfter
              Value: 720

        - GroupName: ProgenitorArtifacts      
          Faction: None     
          CountMinMax: [ 1, 1 ]
          IsScalingCount: True 
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 4
          TroopTransport: False
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

        - GroupName: CrashedShip    
          Faction: None     
          CountMinMax: [ 1, 2 ]
          IsScalingCount: True 
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 4
          TroopTransport: False
          Properties: 
            - Key: MapMarker 
              Value: Neutral  
            - Key: RegenAfter
              Value: 720

        - GroupName: GhystAuxT1
          Faction: Ghyst  
          NoShieldReload: True
          CountMinMax: [ 3, 4 ]
          IsScalingCount: True 
          DroneProb: 0.7
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          SpawnResource: ["PentaxidResource:0-1"]
          ResourceDistance: 400
          Properties: 
            - Key: RegenAfter
              Value: 720

    FixedPlayerStart:
        - Mode: Debug
          Pos: [ -596, 104, -1063 ]
          RotY: 125

        - Mode: Survival
          Spawn: EscapePod
          Armor: ArmorMedium

### Drones
DroneBaseSetup:
    Random:
        - GroupName: DroneBaseSetup
          Difficulty: 0
          PresetStyle: 0
          Stock:
              - Name: DroneSmallFast01Rocket
                Amount: 100
                Extra: 0

              - Name: DroneSmallFast01Minigun
                Amount: 200
                Extra: 0

              - Name: DroneLargeSlow01Minigun
                Amount: 100
                Extra: 0

              - Name: DroneSmallSlow01Cannon
                Amount: 200
                Extra: 0

              - Name: DroneSmallAttackBase
                Amount: 300
                Extra: 1

              - Name: DroneTroopsTransport
                Amount: Infinite
                Extra: 2

              - Name: ZiraxMale
                Amount: 500
                Extra: 3

              - Name: RipperDog
                Amount: 400
                Extra: 3

DroneSpawning:
    Random:
        - DronesMinMax: [ 5, 10 ]
          CenterX: -2500
          Radius: 1500

        - DronesMinMax: [ 5, 10 ]
          CenterX: 2500
          Radius: 1500
