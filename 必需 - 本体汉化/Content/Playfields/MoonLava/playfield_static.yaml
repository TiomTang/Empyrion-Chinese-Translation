# Exotics (Cluster) ==============


         # ==  Hidden Monument core   # Might not always spawn
        - GroupName: HiddenMonument-60m  # POI Anchor for Circle path monuments. Will not spawn all the time. Hard to locate, but possible with custom HUD MapMarkers.
          Biome: [ LowMountains, Mountains ]
          Faction: Alien
          Territory: False

          IsImportant: True
          CountMinMax: [ 1, 1 ]       #
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000    #Fully avoids
          SpawnPOINear: [START]  # So that the ring may appear nearly full
          SpawnPOINearRange: [0, 800]  
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: MapDistance
              Value: 140
            - Key: HudDistance
              Value: 140
            - Key: RegenAfter
              Value: 720


         # ==  Hidden Monument circle
        - GroupName: PathMonument  # Will only spawn, if the Hidden Monument has spawned first.
          Faction: None
          IsImportant: True
          CountMinMax: [ 11, 11 ]
          SpawnPOIAvoid: [PathMonument, HiddenMonument-60m]
          SpawnPOIAvoidDistance: 400
          SpawnPOINear: [HiddenMonument-60m]
          SpawnPOINearRange: [800, 800]   # Will make circle of about 1600m diameter. Check map to find the center, and use custom HUD waypoints.
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: MapDistance     # Low detection range, to give players clue about the (even more hidden) central monument
              Value: 500
            - Key: HudDistance
              Value: 500
            - Key: RegenAfter
              Value: 720



