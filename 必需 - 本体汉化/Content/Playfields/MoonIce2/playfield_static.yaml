### POIs
POIs:
    Random:


       # ======================= PREPARING RESOURCES ======================= 


         # RESOURCE MARKER (and 'scanner signal')
        - GroupName: ResourceMarker01
          Faction: None
          Biome: [ LowMountains ]
          CountMinMax: [ 1, 1 ]
          IsImportant: True
          SpawnResource: ["SiliconResource:0-1","CobaltResource:1-1","MagnesiumResource:0-1"]
          SpawnResourceRange: [150,2000]
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: MapDistance
              Value: 10000



       # # ======================= Determining which faction spawns here (if at all)


        - GroupName: SignalMarker01      #  => 50% that this moon is inhabited
          CountMinMax: [ 0, 1 ]
          Biome: [ LowMountains, Flats, DeepCanyon, Rifts, Rifts_1, RayCrater ]
          IsImportant: True
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: MapDistance
              Value: 10000



       # Either nobody, Zirax or Polaris on this planet!

       # ======================= MAIN ZIRAX SETTLEMENT ======================= 
       # Might only rarely spawn (in about 25% of cases or less) - Otherwise the planet might be claimed by Polaris


        - GroupName: RadosAuxT2
          CountMinMax: [ 0, 1 ]
          Faction: Rados
          IsImportant: True
          Territory: False
          DroneProb: 0.0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False 
          SpawnPOINear: [SignalMarker01]
          SpawnPOINearRange: [200, 800]
          # SpawnResource: ["PentaxidResource:0-1"]
          # SpawnResourceRange: [150,400]
          Properties: 
            - Key: RegenAfter
              Value: 720

        - GroupName: RadosSurvey
          Faction: Rados
          Territory: False         
          CountMinMax: [ 2, 2 ]
          SpawnPOINear: [RadosAuxT2]
          SpawnPOINearRange: [30, 100]
          Properties: 
            - Key: RegenAfter
              Value: 720 

        - GroupName: RadosAuxT1
          Faction: Rados
          Territory: False
          CountMinMax: [ 1, 1 ]
          DroneProb: 0.0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          TroopTransport: False 
          SpawnPOINear: [RadosAuxT2]
          SpawnPOINearRange: [500, 1000]
          Properties:
            - Key: RegenAfter
              Value: 720



       # ================================
       # POLARIS  - Will only spawn, if no Zirax are there - (= 25% spawn chance)

        - GroupName: PolarisLogisticsMain # PolarisMiningLavaAux  #PolarisMiningLava
          Faction: Polaris
          Biome: [ LowMountains, Regolith, RegolithEdge, Flats, PlainsEdge ]
          CountMinMax: [ 1, 1 ]
          LevelMod: +1
          DroneProb: 1
          DronesMinMax: [ 2, 3 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOIAvoid: [RadosAuxT2]
          SpawnPOIAvoidDistance: 20000  # Larger than the planet
          SpawnPOINear: [SignalMarker01]
          SpawnPOINearRange: [200, 800]
          SpawnResource: ["PentaxidResource:0-1"]
          SpawnResourceRange: [150,400]
          Properties: 
            - Key: RegenAfter
              Value: 720

        - GroupName: PolarisLogisticsAux
          Faction: Polaris
          Territory: False
          CountMinMax: [ 2, 4 ]
          LevelMod: +1
          DroneProb: 1
          DronesMinMax: [ 1, 4 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOINear: [PolarisLogisticsMain]
          SpawnPOINearRange: [300, 500] 
          Properties: 
            - Key: RegenAfter
              Value: 720

        - GroupName: PolarisDefenceSnow
          Faction: Polaris 
          Territory: False
          CountMinMax: [ 1, 2 ]
          LevelMod: +1
          DroneProb: 1
          DronesMinMax: [ 1, 4 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOINear: [PolarisLogisticsMain]
          SpawnPOINearRange: [400, 600] 
          Properties: 
            - Key: RegenAfter
              Value: 720

        - GroupName: TS_Masperon
          Faction: Polaris 
          Territory: False
          CountMinMax: [ 1, 1 ]
          LevelMod: +1
          DroneProb: 1
          DronesMinMax: [ 1, 4 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOINear: [PolarisLogisticsMain]
          SpawnPOINearRange: [400, 700] 
          Properties: 
            - Key: RegenAfter
              Value: 720

        - GroupName: JunkT1
          Faction: None
          CountMinMax: [ 1, 2 ]
          SpawnPOINear: [TS_Masperon]
          SpawnPOINearRange: [100, 300] 
          Properties: 
            - Key: MapMarker 
              Value: Neutral  
            - Key: RegenAfter
              Value: 720  


       # ================================
       # Wreckage and Human Ruins 
       # If this spawns, then the other POI spawn, too.
        - GroupName: Wreckage
          Faction: None  
          IsImportant: True
          CountMinMax: [ 0, 1 ]
          SpawnPOIAvoid: [RadosAuxT2, PolarisLogisticsMain]
          SpawnPOIAvoidDistance: 3000
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

        - GroupName: Ruins
          Faction: None  
          CountMinMax: [ 0, 2 ]
          SpawnPOINear: [Wreckage]
          SpawnPOINearRange: [80, 150]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

        - GroupName: SignalMarker02
          CountMinMax: [ 1, 1 ]
          SpawnPOINear: [Wreckage]
          SpawnPOINearRange: [200, 800]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: MapDistance
              Value: 10000


        - GroupName: SmugglerHideout
          Faction: None
          IsScalingCount: True
          CountMinMax: [ 0, 1 ]
          DroneProb: 0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 1
          TroopTransport: False   
          SpawnPOIAvoid: [SmugglerHideout, RadosAuxT2, PolarisLogisticsMain]
          POIDistance: 2000
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

# Civilians

        - GroupName: CivilSettlement 
          Territory: False
          Faction: Colonists                    #primarily for outside the territories
          NoShieldReload: True
          CountMinMax: [ 3, 4 ]
          Properties:  
            - Key: RegenAfter
              Value: 720 

       # ================================
       # Ships, junk, ruins
       

        - GroupName: ProgenitorArtifacts      
          Faction: None     
          CountMinMax: [ 1, 1 ]
          IsScalingCount: True 
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 4
          TroopTransport: False
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

        - GroupName: CrashedShipLargeSnow
          IsImportant: True
          Biome: [ RayCrater, DeepCanyon, Flats ]
          Faction: None
          CountMinMax: [ 1, 1 ]
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720
              
        - GroupName: SignalMarker02
          PlaceAt: UnderWater, Terrain
          CountMinMax: [ 1, 1 ]
          SpawnPOINear: [CrashedShip]
