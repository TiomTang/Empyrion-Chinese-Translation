            - Key: MapDistance
              Value: 10000


        - GroupName: JunkT1
          Faction: None
          AvoidFactionTerritory: True
          CountMinMax: [ 0, 2 ]
          Properties: 
            - Key: MapMarker 
              Value: Neutral  
            - Key: RegenAfter
              Value: 720  


          # Lucky find, anywhere (spawns rarely due to tiny biomes)
        - GroupName: JunkT3_Engine
          Biome: [ DeepCanyon, Flats, Rifts, Rifts_1 ]
          Faction: None
          CountMinMax: [ 1, 1 ]
