## === (3b) DRONEBASES ('Everywhere' factions) ==============================================================
## ==========================================================================================================

             # DBs that need playfield spawn restrictions, else they would be too dominant due to galaxyconfig spawn chances.


         # DB Polaris ==========================

            #  ( Rich PFs only. 25% spawn, Avoid IsInfected)

         # DB Pirates ==========================

            # (IsLawless. Fully avoid all bigger DBs)

         # DB Epsilon  ===========

         # Zirax Epsilon ====== 

        - GroupName: EpsilonDronebase          #CommandCenter
          Faction: Epsilon  
          Biome: [ LowMountains, Mountains, CryoVolcano ]

          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupEps
          CountMinMax: [ 0, 1 ]   # May not aways spawn
          DroneProb: 1.0
          DronesMinMax: [ 4, 5 ] 
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000 # Fully avoids
          Properties: 
            - Key: RegenAfter
              Value: 720

          # Zirax Ghyst
        - GroupName: DroneBaseT1          #CommandCenter. Spies snooping around even in other faction's spaces
          Faction: Ghyst  
          Biome: [ LowMountains, Mountains, CryoVolcano ]
          FactionTerritory: [All]  # (Restricted by avoids below)

          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupGhy
          CountMinMax: [ 0, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 5 ] 
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected, CNTRL_IsUnclaimed, EpsilonDronebase, EpsilonAuxT2, GhystAuxT2, TS_Bog, CivilSettlement, KrielMain]  # Will avoid Epsilon
          SpawnPOIAvoidDistance: 40000 # Bigger than the planet
          Properties: 
            - Key: RegenAfter
              Value: 720


         # DB Warlord ==========================


        - GroupName: DroneBaseT1
          BiomesExcluded: [ BM_POLE ]
          Faction: Warlord
          CountMinMax: [ 0, 1 ]  # (100% spawn at living & precious PFs, 50% at low interest)

          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupWar

          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ] 
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOINear: [CNTRL_IsLawless] # Avoids IsInfected
          SpawnPOINearRange: [500, 45000]
          SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase]
          SpawnPOIAvoidDistance: 45000 # Fully avoids
          Properties: 
            - Key: Music
              Value: moonstone 
            - Key: RegenAfter
              Value: 720



