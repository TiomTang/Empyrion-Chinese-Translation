OrbitUsesLightColor: True  
LightZenithColor: "0.3, 0.3, 0.3"   # Doesn't have any effect on this playfield (since no atmo), but will make the orbit playfield as bright as the playfield dayside.



PlanetType: NitrogenVolcanic
PlayfieldType: Planet
Difficulty: 2

LandClaimZone: Device


# Atmosphere and Sky
AtmosphereEnabled: False

# Light
DayLightIntensity: 0.4 
NightLightIntensity: 0.1

DayShadowStrength: 0.95         # hardcoded, no effect?
NightShadowStrength: 0.5        # hardcoded, no effect


# Sun
SunFlare: EnvironmentalEffects/SunFlareWhiteMoon




SpecialEffectsLocal:

  - Name: EnvironmentalEffects/Sparks
    Biome: [ LavaFields ]
    Time: Day
    MaxHeight: 10

SpecialEffectsGlobal:





# ==============================================================

### Resource Deposits
RandomResources:
    - Name: CarbonResource # Very poor and shallow
      Biome: [ Rifts, MethaneIce, MethaneIceEdge, SmallCrater, SmallCrater_1 ]
      IsScalingCount: True
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 3, 7 ]
      DroneProb: 0.3
      MaxDroneCount: 1


    - Name: IronResource  #
      Biome: [ CryoVolcano, Mountains, LowMountains ]
      IsScalingCount: True    # Tiny; always there
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 20, 30 ]
      DroneProb: 0.2
      MaxDroneCount: 1 

    - Name: IronResource  # Below ice; small -> May need HV excavator
      Biome: [ CryoVolcano ]
      IsScalingCount: True 
      CountMinMax: [ 0, 1 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 40, 50 ]
      DroneProb: 0.2
      MaxDroneCount: 1 


    - Name: SiliconResource  #
      Biome: [ CryoVolcano, Mountains, LowMountains ]
      IsScalingCount: True    # Tiny; sometimes
      CountMinMax: [ 0, 2 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 20, 30 ]
      DroneProb: 0.2
      MaxDroneCount: 1 



    - Name: MagnesiumResource  # Mountains, shallow, very poor
      Biome: [ CryoVolcano, Mountains, LowMountains ]
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 2, 3 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.7
      MaxDroneCount: 1 
      
    - Name: MagnesiumResource  # Below ice; bigger -> Needs HV excavator or autominer
      Biome: [ CryoVolcano, Mountains, LowMountains ]
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 70, 80 ]
      DroneProb: 0.2
      MaxDroneCount: 1 


    - Name: AluminiumResource
      # IsScalingCount: True
      CountMinMax: [ 0, 1 ]
      SizeMinMax: [ 2, 3 ]  # Ca 20-67 units
      DroneProb: 0.2
      MaxDroneCount: 1
      DepthMinMax: [ 35, 60 ] # Barely in Drone reach
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10



    - Name: SathiumResource 
      IsScalingCount: True
      Biome: [ CrustedIce, RegolithEdge, MethaneIce, MethaneIceEdge ]
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 5, 6 ]  # Minimal deposit for building up a CV / Warp
      DroneProb: 1
      MaxDroneCount: 2
      DepthMinMax: [ 70, 80 ]  # Far out of drone reach, needs HV miner or Autominer
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

    - Name: PentaxidResource
      IsScalingCount: True
      CountMinMax: [ 0, 2 ]
      SizeMinMax: [ 4, 4 ]  # Ca 67 units each (50% penalty)
      DroneProb: 0.2
      MaxDroneCount: 2
      DepthMinMax: [ 35, 60 ] # Barely in Drone reach
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10

### Resource Asteroids
AsteroidResources:
     - Name: CarbonResource
       Threshold: 0.1
       Amount: 0.1
     - Name: MagnesiumResource
       Threshold: 0.1
       Amount: 0.1


### POIs
POIs:
    Random:


         # =====
         # NOTE: Ghyst POI may spawn even in other faction territory, but cannot get placed if those other factions already have POI here.
         # =====



        # ===== REGULAR FACTION SPAWNS ==========================================================
        # =======================================================================================


         # Zirax Epsilon ====== 

        - GroupName: EpsilonDronebase          #CommandCenter
          Faction: Epsilon  
          Biome: [ LowMountains, Mountains, CryoVolcano ]
          NoShieldReload: True
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupEps
          CountMinMax: [ 0, 1 ]   # May not aways spawn
          DroneProb: 1.0
          DronesMinMax: [ 4, 5 ] 
          ReserveCount: 5
          Properties: 
            - Key: RegenAfter
              Value: 720



        - GroupName: EpsilonAuxT2
          Faction: Epsilon  
          Biome: [ LowMountains, Mountains, CryoVolcano ]
          NoShieldReload: True
          CountMinMax: [ 2, 2 ]
          IsScalingCount: True 
          DroneProb: 0.7
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          SpawnResource: ["PentaxidResource:0-1"]
          ResourceDistance: 100
          SpawnPOINear: [EpsilonDronebase ]
          SpawnPOINearRange: [100, 500]
          Properties: 
            - Key: RegenAfter
              Value: 720

        - GroupName: EpsilonAuxT1
          Faction: Epsilon  
          Biome: [ LowMountains, Mountains, CryoVolcano ]
          NoShieldReload: True
          CountMinMax: [ 2, 2 ]
          IsScalingCount: True 
          DroneProb: 0.7
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          SpawnPOINear: [EpsilonDronebase ]
          SpawnPOINearRange: [400, 2000]
          Properties: 
            - Key: RegenAfter
              Value: 720



        # ============ KRIEL ============= 

        - GroupName: KrielMain   # Kriel don't like this place much
          BiomesExcluded: [ PoleEdge, PoleEdge_1 ]
          Faction: Kriel    
          NoShieldReload: True
          CountMinMax: [ 0, 1 ]
          Properties: 
            - Key: RegenAfter
              Value: 720 




        # ============ ARKENIAN ============= 

        - GroupName: TS_Bog
          Faction: ArkenianRepublic  
          Biome: [ LowMountains, Mountains, CryoVolcano ]
          NoShieldReload: True
          CountMinMax: [ 0, 1 ]   # May not aways spawn
          DroneProb: 1.0
          DronesMinMax: [ 4, 5 ] 
          ReserveCount: 5
          Properties: 
            - Key: RegenAfter
              Value: 720




        # ============ CIVILIANS / COLONISTS ============= 

        - GroupName: CivilSettlement   # Only for very desperate colonists here... (Even less spawn chances due to galaxyconfig -> About 0.2 chance.)
          Biome: [ LowMountains, Mountains, CryoVolcano ]
          Faction: Colonists
          NoShieldReload: True
          CountMinMax: [ 0, 1 ]
          Properties: 
            - Key: RegenAfter
              Value: 720 





        # ============ LEGACY FACTION ============= 
        - GroupName: LegacyFloatingT1
          Faction: TheLegacy  
          FactionTerritory: [PlayerAssist, TheLegacy]   # Will only spawn in silent quarter.
          BiomesExcluded: [ PoleEdge, PoleEdge_1 ]
          CountMinMax: [ 1, 1 ]
          DroneProb: 0.0
          DronesMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [LegacyFloatingT1]  
          SpawnPOIAvoidDistance: 2000 #
          Properties: 
            - Key: Music
              Value: EvilWhispering
            - Key: SI
              Value: Off
            - Key: RegenAfter
              Value: 720



        # ===== SPECIAL FACTION SPAWNS ==========================================================
        # =======================================================================================




         # Zirax Ghyst ======  # May spawn in a lot of faction spaces... Snooping around. -  Will not spawn when Epsilon are already there.


        - GroupName: GhystAuxT1  # Forward base - May spawn only in None territory
          Faction: Ghyst  
          BiomesExcluded: [ PoleEdge, PoleEdge_1 ]
          FactionTerritory: [All]   # Snooping on all the big factions... - will NOT be placed in SilentQuarter, Tesch...
          NoShieldReload: True
          CountMinMax: [ 0, 1 ]
          DroneProb: 0.7
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          SpawnPOIAvoid: [DroneBaseT1, EpsilonDronebase, EpsilonAuxT2, GhystAuxT2, TS_Bog, CivilSettlement, KrielMain, LegacyFloatingT1]  
          SpawnPOIAvoidDistance: 40000 # Bigger than the planet
          Properties: 
            - Key: RegenAfter
              Value: 720


        - GroupName: GhystAuxT1  # Forward base - May spawn much easier
          Faction: Ghyst  
          BiomesExcluded: [ PoleEdge, PoleEdge_1 ]
          FactionTerritory: [Zirax, ArkenianRepublic, Kriel, PrennFederation, Farr, STRY]   # Snooping on all the big factions... - will NOT be placed in SilentQuarter, Tesch...
          NoShieldReload: True
          CountMinMax: [ 0, 1 ]
          DroneProb: 0.7
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          SpawnPOIAvoid: [DroneBaseT1, EpsilonDronebase, EpsilonAuxT2, GhystAuxT2, TS_Bog, CivilSettlement, KrielMain, LegacyFloatingT1]  
          SpawnPOIAvoidDistance: 40000 # Bigger than the planet
          Properties: 
            - Key: RegenAfter
              Value: 720


         # Zirax Ghyst  Extra ====== 
        - GroupName: DroneBaseT1          #CommandCenter. Only spawns in Zirax territory, unclaimed, or a warzone.
          Faction: Ghyst  
          Biome: [ LowMountains, Mountains, CryoVolcano ]
          FactionTerritory: [Zirax, STRY]
          NoShieldReload: True
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupGhy
          CountMinMax: [ 0, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 5 ] 
          ReserveCount: 5
          SpawnPOIAvoid: [EpsilonDronebase]    # Will not appear if there are Epsilon
          SpawnPOIAvoidDistance: 40000 # Bigger than the planet
          Properties: 
            - Key: RegenAfter
              Value: 720



        - GroupName: GhystAuxT1
          Faction: Ghyst  
          BiomesExcluded: [ LowMountains, Mountains, CryoVolcano ]
          FactionTerritory: [Zirax, STRY]
          NoShieldReload: True
          CountMinMax: [ 2, 2 ]
          IsScalingCount: True 
          DroneProb: 0.7
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          SpawnPOIAvoid: [EpsilonDronebase]    # Will not appear if there are Epsilon
          SpawnPOIAvoidDistance: 40000 # Bigger than the planet
          Properties: 
            - Key: RegenAfter
              Value: 720




        # ============ PIRATES ============= 

        - GroupName: PiratesMain   # Will only spawn when there is no other large faction here.
          Biome: [ LowMountains, Mountains, CryoVolcano ]
          Faction: Pirates
          FactionTerritory: [Zirax, ArkenianRepublic, Kriel, PrennFederation, Farr, STRY, Pirates]   # 
          NoShieldReload: True
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [DroneBaseT1, EpsilonDronebase, EpsilonAuxT2, GhystAuxT2, TS_Bog, CivilSettlement, KrielMain, LegacyFloatingT1]  
          SpawnPOIAvoidDistance: 40000 # Bigger than the planet = Will avoid this place if somebody else is already here.
          Properties: 
            - Key: RegenAfter
              Value: 720 


        - GroupName: JunkT2       # next to Pirate centers
          Faction: None  
          NoShieldReload: True 
          CountMinMax: [ 2, 3 ]
          DroneProb: 0.0
          DronesMinMax: [ 1, 1 ]
          ReserveCount: 0
          SpawnPOIAvoid: [JunkT2]  
          SpawnPOIAvoidDistance: 250
          SpawnPOINear: [PiratesMain]
          SpawnPOINearRange: [150, 400]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

        - GroupName: CrashedShip       # next to Pirate centers
          Faction: None  
          NoShieldReload: True 
          CountMinMax: [ 0, 1 ]
          SpawnPOINear: [PiratesMain]
          SpawnPOINearRange: [150, 400]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720





        # ============ HERMITS ============= 


        - GroupName: Ruins     # Hermit stand-in, WIP. 
          # Faction: Warlord    # No faction, will default to alien, hostile.
          BiomesExcluded: [ PoleEdge, PoleEdge_1 ]
          NoShieldReload: True
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [LegacyFloatingT1]  
          SpawnPOIAvoidDistance: 40000
          Properties: 
            - Key: RegenAfter
              Value: 720 

        - GroupName: JunkT2  #
          Faction: None
          CountMinMax: [ 1, 2 ]
          SpawnPOIAvoid: [JunkT2]
          SpawnPOIAvoidDistance: 300
          SpawnPOINear: [Ruins ]
          SpawnPOINearRange: [0, 400]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

        - GroupName: CrashedShip  # Rare
          Biome: [ MethaneIce, MethaneIceEdge ]
          Faction: None
          CountMinMax: [ 0, 1 ]
          SpawnPOINear: [Ruins ]
          SpawnPOINearRange: [300, 1800]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720







         # ============= FILLER CIVILISATION JUNK ============
        - GroupName: JunkT1
          Biome: [ SmallCrater, SmallCrater_1, LargeCrater, DustCenter, DeepDust, CrustedIce ]
          Faction: None      
          CountMinMax: [5, 7 ]
          IsScalingCount: True
          DroneProb: 0.2
          DronesMinMax: [ 1, 1]
          ReserveCount: 0
          TroopTransport: False
          # SpawnPOIAvoid: [ChainAnchor06, ChainAnchor01]
          # SpawnPOIAvoidDistance: 1500
          SpawnPOINear: [EpsilonDronebase, DroneBaseT1, CivilSettlement ]
          SpawnPOINearRange: [0, 700 ]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720










    FixedPlayerStart:
        - Mode: Debug
          Pos: [ 2000, 70, 0 ]
          RotY: 125
          Armor: ArmorMedium

        - Mode: Survival
          Pos: [ 2000, 70, 0 ]
          RotY: 125
          Armor: ArmorMedium




