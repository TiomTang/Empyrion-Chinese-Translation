# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html




## ============== T1 Hover miner world.  ================
# (Minimal) Sathium and Carbon world - CV construction, and some upkeep materials.

# Only few BA here. Hermits, Pirates, Zirax Ghyst, Zirax Epsilon, a e.g. Kriel...
# The Ghyst may even spawn in (some) other faction's territory. These guys are snooping around EVERYWHERE =D





Description: |
  [c][808080][i]注意：此游戏场地为[b]正在制作[/b]。[-][/c][/i] 

  [c]孤寂。黑暗。[i][b]寒冷[/b][/i]。
  [c][808080]资源稀少——深埋于地下，但非常容易开采。[-][/c]

  远离恒星，这个世界寒冷到连氮气都不再是气体，而是在地表凝结。

  在这样的温度下，液态水扮演着熔岩的角色，而水冰则是“岩石”。

  每隔一个世纪，恒星才会稍微将这里加热到足以让内层地壳中的水膨胀——随后它会喷发到地表，形成一种色彩斑斓的“冰火山”，并将其他物质一同散布四周。

  这让地表保持年轻；同时也掩盖了所有陨石撞击坑（以及其中的资源）。


  ……只有极少数人会选择在如此严酷而偏远的地方生活。
  [i]一个小小的基地供他们隐藏、休息、寻求平静，或许还有找回自我……[/i]

  尽量忽视那些军人，或那些无法无天的人，声称[i]“这里可是完美地点！”[/i]

  ——他们会来，他们会走。冰会一直存在。




OrbitUsesLightColor: True  
LightZenithColor: "0.3, 0.3, 0.3"   # Doesn't have any effect on this playfield (since no atmo), but will make the orbit playfield as bright as the playfield dayside.



PlanetType: NitrogenVolcanic
PlayfieldType: Planet
Difficulty: 2

LandClaimZone: Device


# Atmosphere and Sky
AtmosphereEnabled: False

# Light
DayLightIntensity: 0.4 
NightLightIntensity: 0.1

DayShadowStrength: 0.95         # hardcoded, no effect?
NightShadowStrength: 0.5        # hardcoded, no effect


# Sun
SunFlare: EnvironmentalEffects/SunFlareWhiteMoon




SpecialEffectsLocal:

  - Name: EnvironmentalEffects/Sparks
    Biome: [ LavaFields ]
    Time: Day
    MaxHeight: 10

SpecialEffectsGlobal:





# ==============================================================

### Resource Deposits
RandomResources:
    - Name: CarbonResource # Very poor and shallow
      Biome: [ Rifts, MethaneIce, MethaneIceEdge, SmallCrater, SmallCrater_1 ]
      IsScalingCount: True
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 3, 7 ]
      DroneProb: 0.3
      MaxDroneCount: 1


    - Name: IronResource  #
      Biome: [ CryoVolcano, Mountains, LowMountains ]
      IsScalingCount: True    # Tiny; always there
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 20, 30 ]
      DroneProb: 0.2
      MaxDroneCount: 1 

    - Name: IronResource  # Below ice; small -> May need HV excavator
      Biome: [ CryoVolcano ]
      IsScalingCount: True 
      CountMinMax: [ 0, 1 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 40, 50 ]
      DroneProb: 0.2
      MaxDroneCount: 1 


    - Name: SiliconResource  #
      Biome: [ CryoVolcano, Mountains, LowMountains ]
      IsScalingCount: True    # Tiny; sometimes
      CountMinMax: [ 0, 2 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 20, 30 ]
      DroneProb: 0.2
      MaxDroneCount: 1 



    - Name: MagnesiumResource  # Mountains, shallow, very poor
      Biome: [ CryoVolcano, Mountains, LowMountains ]
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 2, 3 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.7
      MaxDroneCount: 1 
      
    - Name: MagnesiumResource  # Below ice; bigger -> Needs HV excavator or autominer
      Biome: [ CryoVolcano, Mountains, LowMountains ]
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 70, 80 ]
      DroneProb: 0.2
      MaxDroneCount: 1 


    - Name: AluminiumResource
      # IsScalingCount: True
      CountMinMax: [ 0, 1 ]
      SizeMinMax: [ 2, 3 ]  # Ca 20-67 units
      DroneProb: 0.2
      MaxDroneCount: 1
      DepthMinMax: [ 35, 60 ] # Barely in Drone reach
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10



    - Name: SathiumResource 
      IsScalingCount: True
      Biome: [ CrustedIce, RegolithEdge, MethaneIce, MethaneIceEdge ]
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 5, 6 ]  # Minimal deposit for building up a CV / Warp
      DroneProb: 1
      MaxDroneCount: 2
      DepthMinMax: [ 70, 80 ]  # Far out of drone reach, needs HV miner or Autominer
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

    - Name: PentaxidResource
      IsScalingCount: True
      CountMinMax: [ 0, 2 ]
      SizeMinMax: [ 4, 4 ]  # Ca 67 units each (50% penalty)
      DroneProb: 0.2
      MaxDroneCount: 2
      DepthMinMax: [ 35, 60 ] # Barely in Drone reach
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10

### Resource Asteroids
AsteroidResources:
     - Name: CarbonResource
       Threshold: 0.1
       Amount: 0.1
     - Name: MagnesiumResource
       Threshold: 0.1
       Amount: 0.1


