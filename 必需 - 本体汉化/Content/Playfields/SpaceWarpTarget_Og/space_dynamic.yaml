  [c][e0e020]注意:[-][/c]   [c] 不建议将飞船停靠在巨大的聚变火球附近。[-][/c]


  ……恒星巨大的辐射，以及缺乏中等质量天体用于定位，使得锁定该区域极其困难。[b](1)[/b] 
  许多闲置的航母飞船迷失了方向——在恒星光球层中焚毁。


  [b](1)[/b] [i]在绝望的情况下，该区域仍有可能到达。 
  你可以使用保存在[b]登记簿[/b]中的探索扫描数据。

  >打开物品栏；在窗口顶部选择登记簿标签，选择太阳星区（例如 Sun[Right]），然后选择你的飞船。
  用按钮在其上添加一个航点，退出登记簿。
  然后使用另一艘飞船手动瞄准该航点，如果在范围内，则启动翘曲跃迁。[/i]



