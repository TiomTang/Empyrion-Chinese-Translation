## === (3a) DRONEBASES - Standard ===========================================================================
## ==========================================================================================================

    # These POI are both Cluster Anchors (by SpawnPOINear) and avoidance targets (by SpawnPOIAvoid)
    # ! Their group names must not change, else the playfield will behave unexpectedly
    # DronebaseSetups / DronebaseSetupIDs are defined further down in this document

         # Factions sorted by territory vs. avoidance needs.

         # DB Tesch ============================

         # DB Zirax ============================

        - GroupName: DroneBaseT1  # Spawn Anchor
          Faction: Ghyst
          BiomesExcluded: [ IceSheet, RadiatedFog]

          IsCommandCenter: True              #CommandCenter
          DroneBaseSetup: DroneBaseSetup

          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: Music
              Value: moonstone
            - Key: RegenAfter
              Value: 720 


         # DB Zirax subfactions ================

         # DB Kriel ============================

         # DB ArkenianRepublic =================

         # DB Prenn ============================

         # DB Farr =============================

         # DB (Other mini-factions)=============

         # DB Talon ============================

         # DB TheLegacy (Infected Planets) =====

        - GroupName: LegacyMain     # SC 14 BA  - Could be a dronebase?
          Faction: TheLegacy  
          Biome: [ Radiated , Plains, Tundra, Forest]
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 3 ]
          NoShieldReload: True
          SpawnPOIAvoid: [LegacyCrawler, LegacyMain]  # Spread them out
          SpawnPOIAvoidDistance: 1500
          Properties: 
            - Key: Music
              Value: WhatWalksBelow
            - Key: RegenAfter
              Value: 720


