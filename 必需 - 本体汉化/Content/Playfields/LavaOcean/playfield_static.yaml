### Drones
DroneBaseSetup:
    Random:
        - GroupName: DroneBaseSetup
          Difficulty: 7
          PresetStyle: 3
          Stock:
              - Name: DroneSmallFast01Plasma
                Amount: 200
                Extra: 0  

              - Name: EnemyDroneV2Plasma
                Amount: 200
                Extra: 0

              - Name: EnemyDroneV2Minigun
                Amount: 300
                Extra: 0

              - Name: DroneLargeSlow02Cannon
                Amount: 200
                Extra: 0

              - Name: DroneBomberAttackBase
                Amount: Infinite
                Extra: 1

              - Name: DroneSmallFast01Plasma
                Amount: Infinite
                Extra: 1

              - Name: EnemyDroneV2Plasma
                Amount: Infinite
                Extra: 1

              - Name: DroneTroopsTransport
                Amount: Infinite
                Extra: 2

              - Name: ZiraxMinigun
                Amount: 500
                Extra: 3

              - Name: Mechanoid
                Amount: 250
                Extra: 3

              - Name: RipperDog
                Amount: 250
                Extra: 3

          PlanetVesselBase:
              Name: PlanetVesselBaseSetup
              Position3D: [ 0, 102, 0]
              BaseType: PlanetVesselBase
              KeyId: 0
              PlanetVessel:
                - Name: PVZiraxT2
                  Mission: PlanetPatrol
                  FixedMaxSpeed: 10
                  RespawnDelay: 12

                  RangePatrolTask:
                    Position3D: [ 1500, 80, 0 ]
                    Radius: 800
                    DistToGround: 80

                  AttackCVCircleAround:
                    DistToTarget: 220

DroneSpawning:
    Random:
        - DronesMinMax: [ 5, 10 ]
          CenterX: -5000
          Radius: 3000

        - DronesMinMax: [ 5, 10 ]
          CenterX: 5000
          Radius: 3000
