SpawnZones:
   - SpawnAt: [GoldResource]
     BiomesExcluded: [ LowMountains, Mountains ]
     Radius: 500
     RadiusRandom: 25
     RateMultiplyerCenter: 1.0
     RateMultiplyerEdge: 0.2
     Color: "1.0, 1.0, 1.0, 1.0"
     Entities:
       - Names: [Overseers]
         Biomes: [Any]
         Amount: 350
         Period: Always
         DelayMinMax: [-1, -1]
   - SpawnAt: [ZascosiumResource, ErestrumResource]
     BiomesExcluded: [ LowMountains, Mountains ]
     Radius: 400
     RadiusRandom: 25
     RateMultiplyerCenter: 1.0
     RateMultiplyerEdge: 0.5
     Color: "1.0, 1.0, 1.0, 1.0" 
     Entities:
       - Names: [AlienBugs03]
         Biomes: [Any]
         Amount: 200
         Period: Always
         DelayMinMax: [-1, -1]
   - SpawnAt: [CrashedShip, AbandonedPOI, Wreckage]
     BiomesExcluded: [ LowMountains, Mountains ]
     Radius: 500
     RadiusRandom: 50
     RateMultiplyerCenter: 1.0
     RateMultiplyerEdge: 0.5
     Color: "1.0, 1.0, 1.0, 1.0"
     SpawnOnlyIfPoiIsAlien: true
     Entities:
       - Names: [CaveWormGreyHerd, Otyughs]
         Biomes: [Any]
         Amount: 200
         Period: Always
         DelayMinMax: [-1, -1]
   - SpawnAt: [DroneBaseT1, GhystMain, GhystBunker]
     BiomesExcluded: [ LowMountains, Mountains ]
     Radius: 1000
     RadiusRandom: 100
     RateMultiplyerCenter: 1.0
     RateMultiplyerEdge: 0.4
     Color: "1.0, 1.0, 1.0, 1.0"
     SpawnOnlyIfPoiIsAlien: true
     Entities:
       - Names: [ZiraxMinigunPatrol, ZiraxRocketPatrol, ZiraxShotgunPatrol, ZiraxMechanoidPatrol, ZiraxRipperDogPatrol]
         Biomes: [Any]
         Amount: 250
         Period: Always
         DelayMinMax: [-1, -1]
   - SpawnAt: [GhystAuxT2]
     BiomesExcluded: [ LowMountains, Mountains ]
     Radius: 500
     RadiusRandom: 25
     RateMultiplyerCenter: 1.0
     RateMultiplyerEdge: 0.6
     Color: "1.0, 1.0, 1.0, 1.0"
     SpawnOnlyIfPoiIsAlien: true
     Entities:
       - Names: [ZiraxMinigunPatrol, ZiraxRocketPatrol, ZiraxShotgunPatrol, ZiraxMechanoidPatrol, ZiraxRipperDogPatrol]
         Biomes: [Any]
         Amount: 200
         Period: Always
         DelayMinMax: [-1, -1]
