---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

PlanetType: Lava
Emissive: True
PlayfieldType: Planet
Difficulty: 4

LandClaimZone: Device

Description: "[c]\u6CE8\u610F\uFF1A\u6B64\u6E38\u620F\u573A\u5730\u4E3A\u8349\u7A3F\u3002[-][/c] 
  [c][808080][i]  \u5728\u672A\u6765\u7684\u66F4\u65B0\u4E2D\uFF0C\u4E16\u754C\u53EF\u80FD\u4F1A\u53D1\u751F\u91CD\u5927\u53D8\u5316\u3002\u76EE\u524D\u73A9\u6CD5\u6709\u9650\u3002[-][/i][-][/c]

  \u5E74\u7EAA\u592A\u5C0F\uFF0C\u8FDE\u4E00\u4E2A\u50CF\u6837\u7684\u5730\u8868\u90FD\u6CA1\u6709\u2026\u2026"

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.80, 0.44, 0.17" 
SkyColor: "0.0, 0.0, 0.2"
SkyHorizonColor: "0.35, 0.15, 0"
AtmosphereParams: [3, 1.7]     

# Light
DayLightIntensity: 0.6
NightLightIntensity: 0.7

LightZenithColor: "1, 0.95, 0.95"
LightHorizonColor: "1, 0.5, 0"
NightLightColor: "1, 0.55, 0.3"

DayShadowStrength: 0.95
NightShadowStrength: 0.5

# Sun
SunFlare: EnvironmentalEffects/SunFlareYellow2

# Fog
FogColor: "1.2, 0.4, 0.0"
FogCloudIntensity: 0.8
# AtmosphereFog: 0.95
# GroundFogIntensity: 0.02
# GroundFogHeight: 35

# Clouds and Wind
CloudsDensity: 1
CloudsSharpness: 0.2
CloudsBrightness: 0.3
CloudsOpacity: 0.7
CloudsZenithColor: "0.6, -0.1, -0.4"
CloudsHorizonColor: "2, 0.1, 0.45"
CloudsNightHorizonColor: "0.8, 0.15, 0.00"
CloudsNightZenithColor: "0.8, 0.15, 0.00"
WindSpeed: 30


# Special effects around the player
SpecialEffectsLocal:
  - Name: Grime
    MaxHeight: 20

SpecialEffectsGlobal:
# Weather

 # Do not use the weathers CloudsLight, CloudsMedium, Wind, ColdWave here! (Their clouds react extremely to colouring)
 # weather Clear >>  Already in HeatWave


  - Name: Clouds
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1500
  - Name: CloudsDark
    Type: Weather
    InitialDelay: 0
    Delay: 2  
    Lifetime: 1200
  - Name: Fog
    Type: Weather
    InitialDelay: 48
    Delay: 12
    Lifetime: 1000
  - Name: HeatWave
    Type: Weather
    InitialDelay: 12
    Delay: 12
    Lifetime: 1200
  - Name: MeteorFireRain
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 300
  - Name: FireRain
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 300

# Global Effect
  - Name: MeteorShower
    Time: Day
    InitialDelay: 1
    Delay: 5
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid

  - Name: ThunderAndLightningPurple
    Time: Night
    InitialDelay: 1.5
    Delay: 4
    Lifetime: 300
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid
# ==============================================================

### Resource Deposits
RandomResources: 
#T0:
#Carbon: poor/low
    - Name: CarbonResource
  #    Biome: [ Flats, CrystallizedRocks ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 2, 6 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 1  
      MaxDroneCount: 4 
#T1:
#T2:
#T3:
    - Name: ErestrumResource
      Biome: [ Flats, CrystallizedRocks ]
      IsScalingCount: True
      CountMinMax: [ 5, 6 ]
      SizeMinMax: [ 8, 11 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 1  
      MaxDroneCount: 4 

    - Name: ZascosiumResource
      Biome: [ Plains, Dunes, Rocks ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 0.9
      MaxDroneCount: 4
      
#Special:
    - Name: MagnesiumResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 6, 16 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.9

    - Name: PromethiumResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 7, 11 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.4
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10

    - Name: GoldResource
      Biome: [ LavaEdge, LavaFolds, Plains ]
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 7, 11 ]
      DroneProb: 1
      MaxDroneCount: 3
      DepthMinMax: [ 6, 15 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

### Resource Asteroids
AsteroidResources:
     - Name: MagnesiumResource
       Threshold: 0.2
       Amount: 0.3
     - Name: ErestrumResource
       Threshold: 0.2
       Amount: 0.3
     - Name: PromethiumResource
       Threshold: 0.2
       Amount: 0.3
     - Name: ZascosiumResource
       Threshold: 0.2
       Amount: 0.3
     - Name: GoldResource
       Threshold: 0.1
       Amount: 0.2

### POIs
POIs:
    Random:

#VOID

        - GroupName: VOIDSoulAnchor
          Faction: Void  
          NoShieldReload: True
          CountMinMax: [ 2, 3 ]
          DroneProb: 0
          DronesMinMax: [ 0, 1 ]
          ReserveCount: 3
         # TroopTransport: True
         # SpawnPOINear: [TOP]
         # SpawnPOINearRange: [500, 1500]
          Properties: 
            - Key: Music
              Value: lava 
            - Key: RegenAfter
              Value: 720

#Zirax
        - GroupName: DroneBaseT1              #CommandCenter
          Faction: Zirax  
          NoShieldReload: True
          IsCommandCenter: True
          BiomesExcluded: [ LavaFolds, LavaEdge, Hotspot ]  
