          CountMinMax: [ 2, 2 ]  
          SpawnPOIAvoid: [ NullPOI, AkuaTalonMission, AkuaTalonMissionArchery, TemperateStarterTribalField    ]  # (Not close to the Talon center)
          SpawnPOIAvoidDistance: 400
          SpawnPOINear: [ AkuaTalonMissionComArray ]          # (To control the overal distance to the Crashsite. Not too close, this is a dangerous spot.)
          SpawnPOINearRange: [250, 300]  # 
          Properties: 
