    MaxHeight: 15

SpecialEffectsGlobal:
# Weather

                  # This is a very small moon. Reduced weather.


    # Intro weather
  - Name: CloudsLight
    Type: Weather
    InitialDelay: 0
    Delay: 120
    Lifetime: 50

  - Name: Clear
    Type: Weather
    InitialDelay: 1
    Delay: 100
    Lifetime: 800

    # Main weather
  - Name: Clear
    Type: Weather
    InitialDelay: 6
    Delay: 5
    Lifetime: 1200 # Duration: 20 minutes
  - Name: CloudsLight
    Type: Weather
    InitialDelay: 6
    Delay: 2
    Lifetime: 800

  - Name: CloudsMedium
    Type: Weather
    InitialDelay: 12
    Delay: 2
    Lifetime: 800

  - Name: Wind
    Type: Weather
    InitialDelay: 48
    Delay: 12
    Lifetime: 600

  - Name: Storm                # only type of rain, for diversity
    Type: Weather
    InitialDelay: 72
    Delay: 24
    Lifetime: 600


  # (Weather types, unsuited for this playfield)
  # # - Name: CloudsDark        # too dark
  # # - Name: Clouds            # hides the sky
  # # - Name: Fog               # too  much fog
  # # - Name: RainMedium        # too  much fog
  # # - Name: RainHeavy         # too  much fog




# Global Effect
  - Name: BirdFlocksCrows
    Biome: [ Any ]
    Time: Day
    InitialDelay: 1
    Delay: 4
    Lifetime: 600
    PlyDist: 100
    SpawnY: 30
    Struct: True

# ==============================================================

### Resource Deposits
RandomResources:


    - Name: CarbonResource # For SSG test: "CarbonResource"
      Biome: [ Heath, Meadow, Forest_1, Plains, CrashSite, Hills, Swamp, Marsh ]
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 3, 5 ]
      DroneProb: 0.2
      MaxDroneCount: 1
      
    - Name: IronResource
      Biome: [ Heath, Grassland, Forest, Meadow, Hills, IronOreClusters, LowMountains]
      CountMinMax: [ 4, 4 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.2
      MaxDroneCount: 1

    - Name: CopperResource
      Biome: [ Marsh, Swamp, Heath, Meadow, Forest_Water, Forest_1, Forest, CopperOreClusters, LowMountains, Mountains, HighMountains]
      CountMinMax: [ 4, 4 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3

    - Name: SiliconResource
      Biome: [ Beach, Heath, Marsh, Swamp, DustBowl, SavannaEdge, HighGrass, Savanna, LowMountains, Mountains]
      CountMinMax: [ 6, 6 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3  

    - Name: PromethiumResource               # SSOR "training" & for returning Players
      Biome: [ GlacierSnow, HighMountains, Mountains, DustBowl,  ]
      IsImportant: True
      CountMinMax: [ 1, 1 ] 
      SizeMinMax: [ 2, 3 ]   # Tiny; likely only one 'pebble'
      DroneProb: 0.0
      DepthMinMax: [ 3, 5 ]
      DistTypeCylinder:
        MaxRadius: 4
        YVariance: 1


### Resource Asteroids
AsteroidResources:
     - Name: IronResource
       Threshold: 0.2
       Amount: 0.2
     - Name: CopperResource
       Threshold: 0.2
       Amount: 0.2
     - Name: SiliconResource
       Threshold: 0.2
       Amount: 0.2
     - Name: CarbonResource
       Threshold: 0.2
       Amount: 0.2

### POIs
POIs:
    Random:
#============================================================
# Basic layout is as follows
# Playfield has several required POI, which can be different per planet type
# Always placed: Obelisk & Font of Knowledge + Activators
# 1 camp/wreckage nearby the Obelisk
# 1 main PoI relevant for story log
# 1 POI that CAN have a story log but merely is something to discover for the player
# random, thematicall fitting POI scattered around the planet.
# ======================= CRASHSITE  ======================= 

          # 'Distance holder POI'
        - GroupName: NullPOI                # PLZ KEEP THIS POI! - - Used for 'security' spacing of POI
          CountMinMax: [ 1, 1 ]             # (The parameter 'SpawnPOIAvoid' does not work well if it is defined as a combination of START and a POI.)
          SpawnPOINear: [START]             # (NullPOI acts still as 'POI', is used instead of START.)
          SpawnPOINearDistance: 10          # (Due to the fixed shape of the Crashsite and the nonexistent size of NullPOI, this POI should never fail to spawn)
          IsImportant: True     # (Will not have any spawn problems, just to be sure. Should spawn immediately, so no loss in performance.)

          # STARTER RESOURCE NODES - Also see Silicon below
          SpawnResource: ["IronResource:1-1", "CopperResource:1-1", "CarbonResource:1-1" ]
          # SpawnResource: ["IronResource:1-1", "CopperResource:1-1"]
          SpawnResourceRange: [300, 500]


          # Crashsite tutorials ====
        - GroupName: AkuaTut_BugNest_Loot    # "Fighting promise" for plucky Players that want to have adversaries early on
                                    # Presenting HoverBikeKit, ShotgunShells
          Biome: [Crashsite]
          Faction: None

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 190
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [190, 400]   # Pushes it to the edge of the Crashsite, out of range of initial starting area
          Properties: 
            # - Key: MapMarker  # RED marker when using detector
              # Value: Neutral
            - Key: PersonalContainer
              Value: "PlayerBikeKit:1, ShotgunShells: 10"
            - Key: RegenAfter
              Value: 360


        - GroupName: AkuaTut_BugNest_Plots    # "Farmer's promise"
                                    # Presenting Plant Plot, Growlight, BA starter, Core
          Biome: [Crashsite]
          Faction: None

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 190
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [190, 400]   # Pushes it to the edge of the Crashsite, out of range of initial starting area
          Properties: 
            # - Key: MapMarker  # RED marker when using detector
              # Value: Neutral
            - Key: PersonalContainer
              Value: "SpawnNewBase:1, Core:1"
            - Key: RegenAfter
              Value: 360





 # REQUIRED POI
 
 
 
# Progenitor faction
 
         # Obelisk clister ==============
        - GroupName: TOTObeliskTemperate           # REQUIRED! 
          IsImportant: True
          Faction: Progenitor      # Reserves 2400m radius distance to Talon POI.
          CountMinMax: [ 1, 1 ]
          BiomesExcluded: [ WaterSwamp, Beach ]  # (To prevent it from spawning at a place that makes it difficult to spawn the camp)
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [500,600]
          SpawnResource: ["SiliconResource:1-1" ]  # Starter resource
          SpawnResourceRange: [100, 200]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: PersonalContainer
              Value: "Token::9981"    # Tales of Tash

        - GroupName: TOTObeliskCampAkua           # REQUIRED!
          IsImportant: True
          Faction: None
          CountMinMax: [ 1, 1 ]
          SpawnPOINear: [ TOTObeliskTemperate ]
          SpawnPOINearRange: [25,50]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: PersonalContainer
              Value: "Token::9981"    # Tales of Tash



        # Font-cluster  ========
        - GroupName: TOTFontA
          IsImportant: True
          BiomesExcluded: [ PolarSnow, Tundra, ColdPlains, Beach ] 
          Faction: None                   # (Please keep this None faction, else there will be spawn conflicts)
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 1000
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [1500,3000]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360

        - GroupName: TOTFontCamp                # REQUIRED!
          IsImportant: True
          Faction: None                   # (Please keep this None faction, else there will be spawn conflicts)
          CountMinMax: [ 1, 1 ]
          SpawnPOINear: [ TOTFontA ]
          SpawnPOINearRange: [30,70]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: PersonalContainer 
              Value: "Token::9981"      # Tales of Tash


         # Secondary POI
        - GroupName: TOTActivator       # To trigger the obelisk  # (May spawn mission butterflies nearby)
          IsImportant: True             # (Small target biome, more spawn chances. POI has a very small footprint, though, which enhances spawn chances)
          Faction: None                 # !! Please keep this, otherwise spawn conflicts by faction exclusion zone
          Biome: [ LowMountains, Mountains, HighMountains, DustBowl, Beach]   
          CountMinMax: [ 3, 3 ]
          SpawnPOIAvoid: [ NullPOI, TOTActivator ]
          SpawnPOIAvoidDistance: 400
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [1000,4400]  # (Increase spawning chances by excluding the area around Crashsite)
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360 



        # === (For "Alien" faction POI, plz see below. Most of them moved lower in the spawn stack)
        # ====== AkuaTalonMissionDigsite
        # ====== AkuaTalonMissionSupplyDepot
        # ====== AkuaTalonMissionComArray




         # Dronebase ======================

        - GroupName: AkuaTalonMissionAbandonedBase
          IsImportant: True                # (Increases numbers of spawn attempts)
          Faction: Alien                   # (Blocks a radius of about 1200m around the POI for other factions - Especially 'AkuaTalonMission')
          # Biome: [ColdPlains_Danger, Tundra, DustBowl, Beach, LowMountains, HighMountains] 
          Biome: [ColdPlains_Danger]   
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 3000      # (Prohibited to spawn near Start. - - 'SpawnPOINear' may act more like a suggestion in special cases, SpawnPOIAvoid is absolute.)
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [3000,4500]  # Restrict spawn range to increase spawn chances
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360 


# Talon Area

         # Talon POI cluster ===================
        - GroupName: AkuaTalonMission           # NPC interaction
          IsImportant: True
          IsCommandCenter: True
          Faction: Talon                               # ( Will avoid spawning to the map corner of the "AkuaTalonMissionAbandonedBase" POI.)
          # BiomesExcluded: [ PolarSnow, Tundra, Savanna, SavannaEdge, HighGrass, ColdPlains, ColdPlains_Danger, Plains ]      # (Preventing Tundra biome, since this is a spawn anchor for a cluster)
          Biome: [Hills, Plains, Meadow, Forest, Marsh, Heath]


          CountMinMax: [ 1, 1 ] 
          SpawnPOIAvoid: [ AkuaTalonMissionAbandonedBase ]   # (To not spawn in the same map corner and overlap with this POI)
          SpawnPOIAvoidDistance:  3200 # 1200                  # (Just for spawn security)
          SpawnPOINear: [ START ]
          # SpawnPOINearRange: [2500,3500]  # Will spawn in Distance to start, putting it closer to the map edges. 
          SpawnPOINearRange: [2200,3000]  # Will spawn in Distance to start, putting it closer to the map edges. 
                                          # Since the western half of the moon is savanna, this will likely get placed to the 'East' 
          Properties: 
            - Key: RegenAfter
              Value: 360

        - GroupName: AkuaTalonMissionArchery       # (Questgiver location)
          IsImportant: True
          Faction: Talon
          Territory: False
          CountMinMax: [ 1, 1 ] 
          SpawnPOINear: [ AkuaTalonMission ]
          SpawnPOINearRange: [100,400]
          Properties:  
            - Key: RegenAfter
              Value: 360  



        - GroupName: AkuaTalonMissionGuardTower    # LM mission!
          IsImportant: True
          Faction: Talon
          CountMinMax: [ 1, 1 ]
          SpawnPOINear: [AkuaTalonMission]
          SpawnPOINearRange: [300, 600]
          Properties: 
            - Key: RegenAfter
              Value: 720

         # ==== Fillers for the AkuaTalonMission cluster
        - GroupName: TemperateStarterTribalFarm           # Missons: bring crops (from fields?), seeds (collect from NPCs > dialogue), spare parts (robots?) etc
          IsImportant: True
          Faction: Talon
          BiomesExcluded: [ PolarSnow, Tundra, ColdPlains, Savanna] 
          Territory: False
          CountMinMax: [ 3, 4 ]
          SpawnPOINear: [ AkuaTalonMission ]
          SpawnPOINearRange: [100,1000]
          Properties: 
            - Key: RegenAfter
              Value: 360 
            - Key: PersonalContainer         # Required for Quest
              Value: "MetalPieces:1"

        - GroupName: TalonWood
          Faction: Talon
          BiomesExcluded: [ PolarSnow ]
          IsImportant: True
          Territory: False
          CountMinMax: [ 3, 4 ]  # 1,5 
          SpawnPOINear: [AkuaTalonMission]
          SpawnPOINearRange: [110, 400]
          Properties: 
            - Key: RegenAfter
              Value: 720



          # Talon: Quest and fillers 
        - GroupName: TemperateStarterTribalField                 # bring meds, fertilizer (From farms/village chief), kill creatures
          Biome: [Grassland, Grassland_1, Forest, Meadow, Hills, Marsh, Beach]
          Faction: Talon
          Territory: false
          PlaceAt: Terrain, OnWater # (OnWater: For Beach spawning. Otherwise the POI will avoid shores.)
          IsImportant: True
          CountMinMax: [ 10, 10 ]
          SpawnPOIAvoid: [ NullPOI, AkuaTalonMissionSupplyDepot, AkuaTalonMissionAbandonedBase, TOTObeliskTemperate ]
          SpawnPOIAvoidDistance: 600
       #   SpawnPOINear: [ TemperateStarterTribalFarm ]
       #   SpawnPOINearRange: [100,1000]
          Properties: 
            - Key: RegenAfter
              Value: 360 
            - Key: PersonalContainer                             # Required for Quest
              Value: "PlantProtein:1"





# Alien faction

           # Mission -  "Alien" faction POI
           # ============ (Plz keep these POI at this position, else they will prevent other faction POI from spawning.)
        - GroupName: AkuaTalonMissionDigsite
          IsImportant: True
          Faction: Alien          
          CountMinMax: [ 1, 1 ] 
          SpawnPOIAvoid: [ NullPOI, AkuaTalonMission, TOTFontA  ] 
          SpawnPOIAvoidDistance: 1500
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [1000,1500] 
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: PersonalContainer 
              Value: "Token::9981"     # Tales of Tash

        - GroupName: AkuaTalonMissionSupplyDepot
          IsImportant: True
          Faction: Alien
          BiomesExcluded: [ PolarSnow, Tundra, ColdPlains] 
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ NullPOI, AkuaTalonMissionDigsite, AkuaTalonMission, TOTFontA  ]   # (If defining multiple SpawnPOIAvoid, do not use START) 
          SpawnPOIAvoidDistance: 1000
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [1500,2000] 
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: SI
              Value: Off 


        - GroupName: AkuaTalonMissionComArray
          IsImportant: True
          Faction: Alien  
          Biome: [Tundra, ColdPlains, Mountains, LowMountains] 
          CountMinMax: [ 1, 1 ] 
          SpawnPOIAvoid: [ AkuaTalonMissionSupplyDepot, AkuaTalonMissionDigsite, AkuaTalonMission, TOTFontA ]
          SpawnPOIAvoidDistance: 1000
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [1500,3500] 
          Properties:  
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360 








          #  Mission POI - - ('None' faction) ============
        - GroupName: TemperateStarterTribalTower
          IsImportant: True          # (ClusterAnchor, is Important)
          Faction: None              # ('None' faction POI will ignore any faction exclusion zone)
          CountMinMax: [ 1, 1 ]
          Biome: [Savanna]   # (Keep it away from colder biomes - Still a large biome to spawn)
          SpawnPOIAvoid: [ NullPOI, TOTFontA, AkuaTalonMissionAbandonedBase, AkuaTalonMission, AkuaTalonMissionDigsite ]  # (Avoids the Crashsite, and both the Talon cluster and the AbandonedBase.)
          SpawnPOIAvoidDistance: 800
          SpawnPOINear: [ START ]          # (To control the overal distance to the Crashsite. Not too close, this is a dangerous spot.)
          SpawnPOINearRange: [2000, 5000]  # (Increase spawn chances by cutting down spawn area)
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360

        - GroupName: TemperateStarterRuinsTribal                    # At least ONE needs to spawn
          Biome: [Savanna, HighGrass, SavannaEdge, Grassland, LowMountains, Heath, Beach]   
          Faction: None
          CountMinMax: [ 5, 5 ]
          SpawnPOINear: [ TemperateStarterTribalTower ]
          SpawnPOINearRange: [80,300]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
