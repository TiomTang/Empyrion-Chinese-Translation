PlanetClass: Temperate
PlanetType: TemperateStarter
PlayfieldType: Moon
Difficulty: 1

LandClaimZone: Device
# ==============================================================
# Special parameters:
# ==============================================================

#AllowBlueprintSV: False         # Dis-allow to spawn SV Blueprint in this playfield, default is True
#AllowBlueprintCV: False         # Dis-allow to spawn CV Blueprint in this playfield, default is True
#AllowBlueprintBA: False         # Dis-allow to spawn BA Blueprint in this playfield, default is True
#AllowBlueprintHV: False         # Dis-allow to spawn HV Blueprint in this playfield, default is True

# Seed: 575561                    # (This world should now be able to work with dynamic seeds)
# Seed: 0


#UseFixed: True  			   	   # If set to True uses fixed POIs + resources in Survival mode (per default set to False). Can be used together with UseRandom
#UseRandom: True				   # If set to True uses random POIs + resources in Survival mode (per default set to True). Can be used together with UseFixed
#IndestructibleTerrain: True     # If set to True terrain on this playfield will be indestructible

# ==============================================================



# =====================

# Sun
SunFlare: EnvironmentalEffects/SunFlareBlue

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.674, 0.824, 1.000"

  
AtmosphereParams: [1.7, 1.8]     
SkyColor: "0.41, 0.38, 0.35"

SkyHorizonColor: "1, 0.43, 0.1"

# Light
DayLightIntensity: 1.4
NightLightIntensity: 0.9
LightZenithColor: "1,0.97,0.91"


LightHorizonColor: "0.91, 0.53, 0"
NightLightColor: "0.78, 0.78, 1"

DayShadowStrength: 1
NightShadowStrength: 1

# Fog
# AtmosphereFog: 0.35
FogCloudIntensity: 0.8
# GroundFogIntensity: 0
# GroundFogHeight: 0

FogColor: "1.10, 1.10, 1.3"  



# Clouds and Wind
CloudsDensity: 0.3
CloudsSharpness: 0.35
CloudsBrightness: 0.7
CloudsOpacity: 0.5

CloudsZenithColor: "0.76, 0.75, 0.9"
CloudsHorizonColor: "1, 0.4, 0.1"


CloudsNightZenithColor: "0.017, 0.021, 0.026"
CloudsNightHorizonColor: "0.02, 0.021, 0.035"



WindSpeed: 3

# Special Effects 
SpecialEffectsLocal:
  - Name: DandelionsFew
    Biome: [ Crashsite, Grassland, Grassland_1, ColdPlains ]
    Time: Day
    MaxHeight: 10
  - Name: ButterfliesFew
    Biome: [ Crashsite, Grassland, Grassland_1, Oasis ]
    Time: Day
    MaxHeight: 15
  - Name: Pollen
    Biome: [ Savanna, SavannaEdge, HighGrass, DustBowl ]  
    Time: Day
    MaxHeight: 10
  - Name: Mosquitos
    Biome: [ Savanna, SavannaEdge, HighGrass, DustBowl, Marsh, Swamp, WaterSwamp, Water ]  
    Time: Day
    MaxHeight: 15
 # - Name: ButterfliesBlue
 #   Biome: [ Forest, Forest_1, Marsh ]
 #   Time: Day
 #   MaxHeight: 15
  - Name: Dragonflies
    Biome: [ Marsh, Swamp, WaterSwamp, Water, ShallowWater ]
    Time: Day
    MaxHeight: 15
  - Name: FireFliesOrange
    Biome: [ Forest, Forest_1, DeepForest, Peaks, Marsh, Swamp, WaterSwamp, Oasis ]
    Time: Night
    MaxHeight: 15
  - Name: Moths
    Biome: [ DeepForest, Savanna, SavannaEdge, HighGrass, Grassland, Grassland_1, Crashsite ]
