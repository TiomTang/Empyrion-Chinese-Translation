# ==============================================================

### Resource Deposits
RandomResources:
    - Name: CarbonResource
      Biome: [ Heath, Savanna, Hills, Plains, SavannaEdge, HighGrass, Grassland_1, Grassland ]
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 0, 5 ]
      DroneProb: 0.2
      MaxDroneCount: 1
      
    - Name: IronResource
      Biome: [ HighMountains, Mountains, LowMountains, Hills, IronOreClusters]
      CountMinMax: [ 4, 4 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.2
      MaxDroneCount: 1

    - Name: CopperResource
      Biome: [ Meadow, Forest_Water, Forest_1, Forest, CopperOreClusters]
      CountMinMax: [ 4, 4 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3

    - Name: SiliconResource
      Biome: [ DeepWater, Water, ShallowWater, WaterRifts, WaterSwamp, Beach, Marsh, Forest_Water, Grassland_1Water]
      CountMinMax: [ 6, 6 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3  

### Resource Asteroids
AsteroidResources:
     - Name: IronResource
       Threshold: 0.2
       Amount: 0.2
     - Name: CopperResource
       Threshold: 0.2
       Amount: 0.2
     - Name: SiliconResource
       Threshold: 0.2
       Amount: 0.2
     - Name: CarbonResource
       Threshold: 0.2
       Amount: 0.2

### POIs
POIs:
    Random:
#============================================================
# Basic layout is as follows
# Playfield has several required POI, which can be different per planet type
# Always placed: Obelisk & Font of Knowledge + Activators
# 1 camp/wreckage nearby the Obelisk
# 1 main PoI relevant for story log
# 1 POI that CAN have a story log but merely is something to discover for the player
# random, thematicall fitting POI scattered around the planet.
# ======================= CRASHSITE  ======================= 

          # 'Distance holder POI'
        - GroupName: NullPOI                # PLZ KEEP THIS POI! - - Used for 'security' spacing of POI
          CountMinMax: [ 1, 1 ]             # (The parameter 'SpawnPOIAvoid' does not work well if it is defined as a combination of START and a POI.)
          SpawnPOINear: [START]             # (NullPOI acts still as 'POI', is used instead of START.)
          SpawnPOINearDistance: 10          # (Due to the fixed shape of the Crashsite and the nonexistent size of NullPOI, this POI should never fail to spawn)
          IsImportant: True     # (Will not have any spawn problems, just to be sure. Should spawn immediately, so no loss in performance.)

          # STARTER RESOURCE NODES
          SpawnResource: ["IronResource:1-1", "CopperResource:1-1", "SiliconResource:1-1" ]
          SpawnResourceRange: [300, 400]



 # REQUIRED POI
 
         # Obelisk clister ==============
         
        - GroupName: TOTObeliskTemperate           # REQUIRED! 
          IsImportant: True
          Faction: Progenitor          
          CountMinMax: [ 1, 1 ]
          BiomesExcluded: [ WaterSwamp, Beach ]  # (To prevent it from spawning at a place that makes it difficult to spawn the camp)
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [500,600]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: PersonalContainer         
              Value: "Token::9981"    # Tales of Tash

        - GroupName: TOTObeliskCampAkua           # REQUIRED!
          IsImportant: True
          Faction: None          
          CountMinMax: [ 1, 1 ]
       #   Biome: [ColdPlains_Danger, Tundra]   
          SpawnPOINear: [ TOTObeliskTemperate ]
          SpawnPOINearRange: [25,50]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: PersonalContainer         
              Value: "Token::9981"    # Tales of Tash




        # Font-cluster  ========
        - GroupName: TOTFontA
          IsImportant: True
          BiomesExcluded: [ PolarSnow, Tundra, ColdPlains, Beach ] 
          Faction: None
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 1000
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [1500,3000]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360

        - GroupName: TOTFontCamp                # REQUIRED!
          IsImportant: True
          Faction: None          
          CountMinMax: [ 1, 1 ]
          SpawnPOINear: [ TOTFontA ]
          SpawnPOINearRange: [30,70]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: PersonalContainer 
              Value: "Token::9981"      # Tales of Tash



         # Secondary POI

        - GroupName: TOTActivator              # Optional 
          IsImportant: True      # (Small target biome, more spawn chances. POI has a very small footprint, though, which enhances spawn chances)
          Faction: None
          Biome: [ LowMountains, Mountains, HighMountains, DustBowl, Beach]   
          CountMinMax: [ 3, 3 ]
          SpawnPOIAvoid: [ NullPOI, TOTActivator ]
          SpawnPOIAvoidDistance: 400
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [1000,4400]  # (Increase spawning chances by excluding the area around Crashsite)
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360 



        # === (For "Alien" faction POI, plz see below. Most of them moved lower in the spawn stack)
        # ====== AkuaTalonMissionDigsite
        # ====== AkuaTalonMissionSupplyDepot
        # ====== AkuaTalonMissionComArray




#Dronebase

        - GroupName: AkuaTalonMissionAbandonedBase
          IsImportant: True                # (Increases numbers of spawn attempts)
          Faction: Alien                   # (Blocks a radius of about 1200m around the POI for other factions - Especially 'AkuaTalonMission')
          # BiomesExcluded: [ PolarSnow, Radiated, RadiatedFog ] 
          Biome: [ColdPlains_Danger, Tundra, DustBowl, Beach, LowMountains, HighMountains]   
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 3000      # (Prohibited to spawn near Start. - - 'SpawnPOINear' may act more like a suggestion in special cases, SpawnPOIAvoid is absolute.)
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [3000,5000]
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360 


# Talon Area

         # Talon POI cluster ===================
        - GroupName: AkuaTalonMission           # NPC interaction
          IsImportant: True
          IsCommandCenter: True
          Faction: Talon                               # ( Will avoid spawning to the map corner of the "AkuaTalonMissionAbandonedBase" POI.)
          BiomesExcluded: [ PolarSnow, Tundra, Savanna, SavannaEdge, HighGrass ]         # (Preventing Tundra biome, since this is a spawn anchor for a cluster)
          CountMinMax: [ 1, 1 ] 
          SpawnPOIAvoid: [ AkuaTalonMissionAbandonedBase ]   # (To not spawn in the same map corner and overlap with this POI)
          SpawnPOIAvoidDistance: 1200                  # (Just for spawn security)
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [3000,5000]
          Properties: 
            - Key: RegenAfter
              Value: 360

        - GroupName: AkuaTalonMissionArchery       # (Questgiver location)
          IsImportant: True
          Faction: Talon
          Territory: False
          CountMinMax: [ 1, 1 ] 
          SpawnPOINear: [ AkuaTalonMission ]
          SpawnPOINearRange: [100,400]
          Properties:  
            - Key: RegenAfter
              Value: 360  



        - GroupName: AkuaTalonMissionGuardTower    # LM mission!
          IsImportant: True
          Faction: Talon
          CountMinMax: [ 1, 1 ]
          SpawnPOINear: [AkuaTalonMission]
          SpawnPOINearRange: [300, 600]
          Properties: 
            - Key: RegenAfter
              Value: 720

         # ==== Fillers for the AkuaTalonMission cluster
        - GroupName: TemperateStarterTribalFarm           # Missons: bring crops (from fields?), seeds (collect from NPCs > dialogue), spare parts (robots?) etc
          IsImportant: True
          Faction: Talon
          BiomesExcluded: [ PolarSnow, Tundra] 
          Territory: False
          CountMinMax: [ 3, 4 ]
          SpawnPOINear: [ AkuaTalonMission ]
          SpawnPOINearRange: [100,1000]
          Properties: 
            - Key: RegenAfter
              Value: 360 
            - Key: PersonalContainer         # Required for Quest
              Value: "MetalPieces:1"

        - GroupName: TalonWood
          Faction: Talon
          BiomesExcluded: [ PolarSnow ]
          IsImportant: True
          Territory: False
          CountMinMax: [ 1, 5 ]
          SpawnPOINear: [AkuaTalonMission]
          SpawnPOINearRange: [110, 400]
          Properties: 
            - Key: RegenAfter
              Value: 720



# Talon: Quest and fillers

        - GroupName: TemperateStarterTribalField                 # bring meds, fertilizer (From farms/village chief), kill creatures
          IsImportant: True
          Faction: Talon
          BiomesExcluded: [ PolarSnow, Tundra, ColdPlains] 
          Territory: false
          CountMinMax: [ 10, 10 ]
          SpawnPOIAvoid: [ NullPOI, AkuaTalonMissionSupplyDepot, AkuaTalonMissionAbandonedBase ]
          SpawnPOIAvoidDistance: 800
       #   SpawnPOINear: [ TemperateStarterTribalFarm ]
       #   SpawnPOINearRange: [100,1000]
          Properties: 
            - Key: RegenAfter
              Value: 360 
            - Key: PersonalContainer                             # Required for Quest
              Value: "PlantProtein:1"







  # =========== "Alien" faction POI
  # ============ (Plz keep these POI at this position, else they will prevent other faction POI from spawning.)



        - GroupName: AkuaTalonMissionDigsite
          IsImportant: True
          Faction: Alien          
          CountMinMax: [ 1, 1 ] 
          SpawnPOIAvoid: [ NullPOI, AkuaTalonMission, TOTFontA  ] 
          SpawnPOIAvoidDistance: 1500
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [1000,1500] 
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: PersonalContainer 
              Value: "Token::9981"     # Tales of Tash

        - GroupName: AkuaTalonMissionSupplyDepot
          IsImportant: True
          Faction: Alien
          BiomesExcluded: [ PolarSnow, Tundra, ColdPlains] 
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ NullPOI, AkuaTalonMissionDigsite, AkuaTalonMission, TOTFontA  ]   # (If defining multiple SpawnPOIAvoid, do not use START) 
          SpawnPOIAvoidDistance: 1000
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [1500,2000] 
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360
            - Key: SI
              Value: Off 


        - GroupName: AkuaTalonMissionComArray
          IsImportant: True
          Faction: Alien  
          Biome: [Tundra, ColdPlains, Mountains, LowMountains] 
          CountMinMax: [ 1, 1 ] 
          SpawnPOIAvoid: [ AkuaTalonMissionSupplyDepot, AkuaTalonMissionDigsite, AkuaTalonMission, TOTFontA ]
          SpawnPOIAvoidDistance: 1000
          SpawnPOINear: [ START ]
          SpawnPOINearRange: [1500,3500] 
          Properties:  
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360 





# Fillers ('None' faction) ============



        - GroupName: TemperateStarterTribalTower
          IsImportant: True          # (ClusterAnchor, is Important)
          Faction: None              # ('None' faction POI will ignore any faction exclusion zone)
          CountMinMax: [ 1, 1 ]
          Biome: [Savanna, SavannaEdge, HighGrass]   
          SpawnPOIAvoid: [ NullPOI, TOTFontA, AkuaTalonMissionAbandonedBase, AkuaTalonMission, AkuaTalonMissionDigsite ]  # (Avoids the Crashsite, and both the Talon cluster and the AbandonedBase.)
          SpawnPOIAvoidDistance: 800
          SpawnPOINear: [ START ]          # (To control the overal distance to the Crashsite. Not too close, this is a dangerous spot.)
          SpawnPOINearRange: [2000, 5000]  # (Increase spawn chances by cutting down spawn area)
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360

        - GroupName: TemperateStarterRuinsTribal                    # At least ONE needs to spawn
          Faction: None
          CountMinMax: [ 5, 5 ]
          SpawnPOINear: [ TemperateStarterTribalTower ]
          SpawnPOINearRange: [80,300]
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360 

        - GroupName: RuinsTemperateStarter                         # Patrolled by Robots > Farm mission 4
          IsImportant: True   # (Only for mission security, isn't actually needed. But if this POI spawns easily, then the IsImportant does not make world generation much longer)
          Faction: None
          BiomesExcluded: [ PolarSnow, Tundra] 
          CountMinMax: [ 2, 2 ]  
          SpawnPOIAvoid: [ NullPOI, AkuaTalonMission ]  # (Not close to the Talon center)
          SpawnPOIAvoidDistance: 1500
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360 

        - GroupName: JunkT1                                        # Patrolled by Robots > Farm mission 4
         # IsImportant: True
          Faction: None          
          CountMinMax: [ 4, 5 ]
          Biome: [Savanna, SavannaEdge, HighGrass, Heath, DustBowl, Beach, Plains, LowMountains, Grassland, ColdPlains]
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 1500
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 360






