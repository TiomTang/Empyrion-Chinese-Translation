## ============== Salvage world ================
# ! Place this moon at ringed gas giants only - Outer system, -160\u00B0C or colder
#  In the dust region: Lots of junk, crashed ships, lost cargo, maybe even a vessel shell





PlanetType: MoonIceDusted
PlayfieldType: Moon
Difficulty: 2

LandClaimZone: Device


# Atmosphere and Sky
AtmosphereEnabled: False

# Light
DayLightIntensity: 1.6
NightLightIntensity: 0.7

DayShadowStrength: 0.95         # hardcoded, no effect?
NightShadowStrength: 0.5        # hardcoded, no effect


# Sun
SunFlare: EnvironmentalEffects/SunFlareWhiteMoon



SpecialEffectsLocal:

  - Name: EnvironmentalEffects/Sparks
    Biome: [ LavaFields ]
    Time: Day
    MaxHeight: 10

SpecialEffectsGlobal:


# Global Effect
  - Name: MeteorFireRain
    Biome: [ LavaFields ]
    Time: Day
    InitialDelay: 0
    Delay: 0
    # Lifetime: 60
    # PlyDist: 200
    # SpawnY: 100
    # Struct: Avoid


