  [i]\u4F60\u7684\u98DE\u8239\u6B63\u5728\u88AB\u8FD9\u9897\u661F\u7403\u626B\u63CF\u3002[/i]





PlanetType: LegacyNexusWorld
PlayfieldType: Planet
Difficulty: 10
                # (Playfield danger through thin atmosphere (= more shot range), enemy types and their numbers.)

LandClaimZone: Device
UseFixed: True
UseRandom: True


# === Atmosphere and Sky
OrbitUsesLightColor: true       # (Will make the orbit dark)

SunFlare: EnvironmentalEffects/SunFlareYellow3

AtmosphereEnabled: True
# AtmosphereColor: "1.15, 0.98, 0.77"
AtmosphereColor: "1.0, 0.85, 0.66"

# Basic sky colours
AtmosphereParams: [3, 2]


SkyColor: "0.6, 0.30, 0.125"
SkyHorizonColor: "0.3, 0.5, 0.5"
FogColor: "0.05, 0.03, 0.9"


# Fog 
FogCloudIntensity: 0.8
# AtmosphereFog: 0.4            # (-> See playfield_dynamic.yaml)
# GroundFogIntensity: 0.15
# GroundFogHeight: 45


# Light
DayLightIntensity: 0.001          # (NEVER use a value of zero here!)
NightLightIntensity: 1.2

DayShadowStrength: 0.5          # hardcoded, no effect
NightShadowStrength: 0.5        # hardcoded, no effect


LightZenithColor: "0.5, 0.4, 0.5"  # (Low values here reduce the sun's halo.)
LightHorizonColor: "0.8, 0.4, 0"
NightLightColor: "0.4, 0.4, 0.48"


# Clouds
CloudsZenithColor: "0.11, 0.095, 0.125"
CloudsHorizonColor: "0.4, 0.10, 0.08"
CloudsNightZenithColor: "0.080, 0.165, 0.10"
CloudsNightHorizonColor: "0.04, 0.04, 0.120"

# (Parameters for Default Weather)
CloudsDensity: 1
CloudsSharpness: 0
CloudsBrightness: 1
CloudsOpacity: 0.5


WindSpeed: 20

# Special Effects 
SpecialEffectsLocal:
  - Name: Pollen
    Biome: [ Remnant, FlowersEdge ]
    Time: Day
    MaxHeight: 10
    
  - Name: FireFliesGreenFew
    Biome: [ Plains ]
    Time: Night
    MaxHeight: 15

  - Name: FireFliesOrange
    Biome: [ Structure, Organized ]
    Time: Always
    MaxHeight: 480
    FollowPlayerY: True

  - Name: FireFliesRed
    Biome: [ Active ]
    Time: Always
    MaxHeight: 15

  - Name: FireFliesRed
    Biome: [ Active, Organized ]
    Time: Always
    MaxHeight: 480
    FollowPlayerY: True


  - Name: EnvironmentalEffects/Sparks
    Biome: [ Organized ]
    Time: Night
    MaxHeight: 20
  - Name: EnvironmentalEffects/Sparks
    Biome: [ Active ]
    Time: Night
    MaxHeight: 100


  - Name: Grime
    Biome: [ TacticalStrike, PlanetBuster, Structure, Plains, GlassedTerrain, BarrenRocks, Forest ]
    Time: Always
    MaxHeight: 10

SpecialEffectsGlobal:

# # Weather    # NO WEATHER, to keep the default weather settings (and no space clouds)

  # - Name: Clear
    # Type: Weather
    # InitialDelay: 0
    # Delay: 2
    # Lifetime: 300


# Global Effect
  - Name: MeteorShower
    Biome: [ Any ]
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid
    
  - Name: ThunderAndLightningRed
    Biome: [ Any ]
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 500
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid

  - Name: ThunderAndLightningPurple
    Biome: [ Any ]
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 500
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid

  - Name: ThunderAndLightningWhite
    Biome: [ Active ]
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 500
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid
    
