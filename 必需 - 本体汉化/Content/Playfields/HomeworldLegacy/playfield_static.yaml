### Resource Deposits
RandomResources:
    # - Name: IronResource #rich
      # Biome: [Remnant, Dunes, Forest, Plains, LowMountains, Mountains, GeoBuster]
      # IsScalingCount: True    # Partially unneeded, since this planet should _always_ be size class 3. (See playfield_dynamic)
      # CountMinMax: [ 3, 5 ]
      # SizeMinMax: [ 10, 12 ]
      # DepthMinMax: [ 6, 15 ]
      # DroneProb: 1
      # MaxDroneCount: 3
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

    - Name: SiliconResource  # This planet has biomes with a 1m thick Silicon surface layer (AtomicWeaponry, GlassedTerrain, BarrenRocks. See playfield_dynamic how to turn that off.)
      Biome: [Dunes, Forest, AtomicWeaponry, BarrenRocks, GlassedTerrain]
      IsScalingCount: True 
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 6, 8 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 1
      MaxDroneCount: 1

    - Name: NeodymiumResource #rich
      Biome: [Geobuster, LowMountains, BarrenRocks]
      IsScalingCount: True 
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 7, 9 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 1
      MaxDroneCount: 4


    - Name: PromethiumResource
      Biome: [LowMountains, Remnant, Forest, Geobuster, BarrenRocks, AtomicWeaponry, Structure]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DroneProb: 0.7
      MaxDroneCount: 2
      DepthMinMax: [ 0, 1 ]


    - Name: PentaxidResource      # Rich. (Will be grabbed by POI. Only if they are 'used up' by POI, the next batch of Pentaxid Resources will be placed, too.)
      Biome: [Organized, Active]
      # IsScalingCount: True 
      # IsImportant: True
      CountMinMax: [ 10, 10 ]
      SizeMinMax: [ 5, 5]
      DroneProb: 0.0
      MaxDroneCount: 0
      DepthMinMax: [ 0, 3 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

    - Name: PentaxidResource   # Will only be placed if all 'rich' deposits are 'used up' by POI.
      Biome: [GlassedTerrain, Plains, Structure, Organized]
      IsScalingCount: True 
      CountMinMax: [ 5, 5 ]
      SizeMinMax: [ 3, 3]
      DroneProb: 1
      MaxDroneCount: 2
      DepthMinMax: [ 0, 5 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10


    - Name: SathiumResource #rich
      Biome: [Geobuster, BarrenRocks, LowMountains, GlassedTerrain]
      IsScalingCount: True 
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 11, 13 ] 
      DepthMinMax: [ 6, 15 ]
      DroneProb: 1
      MaxDroneCount: 3

    - Name: GoldResource
      Biome: [Organized, Active]
      # IsScalingCount: True 
      # IsImportant: True
      CountMinMax: [ 4, 7 ]
      SizeMinMax: [ 4, 4]
      DroneProb: 0
      MaxDroneCount: 1
      DepthMinMax: [ 10, 15 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10


