# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html



# Desert variant # (Mostly a Pirate haven. They hide in the canyons after their raids of trading vessels deep inside galactic faction territories)
Description: "[c]\u6CE8\u610F:   [b]\u6B64\u6708\u7403\u7684POI\u63A2\u6D4B\u6709\u9650[/b] [-][/c]\n[c][808080][i]\u51ED\u89C6\u89C9\u63A2\u7D22\u3002[-][/i][-][/c]\n\u4E00\u9897\u62E5\u6709\u5E7F\u9614\u5CE1\u8C37\u7CFB\u7EDF\u7684\u6708\u7403\u3002\n\n\u6C34\u662F\u5728\u9065\u8FDC\u7684\u8FC7\u53BB\u7531\u4E00\u6B21\u5BCC\u542B\u7FD8\u66F2\u6C34\u6676\uFF08\u539F\u6599\uFF09\u7684\u9668\u77F3\u649E\u51FB\u201C\u5F15\u5165\u201D\u7684\u2014\u2014\u53EF\u80FD\u662F\u81EA\u7136\u5F62\u6210\uFF0C\u6216\u8005\u662F\u53E4\u4EE3\u4E00\u6B21\u5C1D\u8BD5\u6539\u9020\u73AF\u5883\u7684\u7ED3\u679C\u3002\n\u5982\u4ECA\uFF0C\u8FD9\u4E2A\u4E16\u754C\u62E5\u6709\u7A00\u8584\u7684\u5927\u6C14\u2014\u2014\u968F\u7740\u5C81\u6708\u6D41\u901D\uFF0C\u5373\u4FBF\u662F\u51E0\u6EF4\u96E8\u6C34\u4E5F\u80FD\u5728\u5CA9\u77F3\u4E0A\u5207\u51FA\u6DF1\u523B\u7684\u6C9F\u58D1\u2026\u2026\n\n\u8FD9\u91CC\u4F9D\u7136\u904D\u5E03\u4F4E\u5BC6\u5EA6\u7684\u7FD8\u66F2\u6C34\u6676\uFF08\u539F\u6599\uFF09\u7C89\u5C18\u2014\u2014\u906E\u853D\u4E86POI\u7684\u80FD\u91CF\u4FE1\u53F7\u3002\n[i]\u2026\u2026\u8FD9\u662F\u4EFB\u4F55\u4E0D\u60F3\u88AB\u53D1\u73B0\u4E4B\u4EBA\u7684\u907F\u98CE\u6E2F\u2026\u2026[/i]"


# [c][e0e020]NOTE:  Risk of multiple [b]anti-aircraft turrets[/b] [-][/c] 
# [c][808080][i]Use extreme caution.[-][/i][-][/c]




PlanetType: MoonDesertCanyon
PlayfieldType: Moon
Difficulty: 4

LandClaimZone: Device


UseFixed: true
UseRandom: true




# == Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.58, 0.7, 0.68"  # lime green


# LightStrength & Shadows
DayLightIntensity: 1.4
NightLightIntensity: 1.9
DayShadowStrength: 0.95
NightShadowStrength: 0.5

# Fog basics
FogCloudIntensity: 0.8
AtmosphereFog: 0


# Atmosphere colours; will effect even weather
SunFlare: EnvironmentalEffects/SunFlareBlue

AtmosphereParams: [0.5, 1.5]
SkyColor: "0.9, 0.9, 0.3"
SkyHorizonColor: "0.5, 0.1, 0.005"
FogColor: "0.7, 0.80, 0.70"

LightZenithColor: "0.95, 0.95, 0.90"
LightHorizonColor: "0.8, 0.3, 0.1"
NightLightColor: "0.3, 0.4, 0.45"


GroundFogIntensity: 0.010
GroundFogHeight: 20

CloudsZenithColor: "0.40, 0.38, 0.31"
CloudsHorizonColor: "0.4, 0.07, 0.05"
CloudsNightZenithColor: "0.03, 0.010, 0.01"
CloudsNightHorizonColor: "0.03, 0.010, 0.01"

# Clouds. These parameters will only matter if NO weather effect is defined (='default' weather)
CloudsDensity: 0.2
CloudsSharpness: 1
CloudsBrightness: 0.3
CloudsOpacity: 0.4


# Wind
WindSpeed: 40



# Special effects around the player
SpecialEffectsLocal:
  - Name: Grime
    MaxHeight: 20

  - Name: FireFliesGreen
    Biome: [ Water, ShallowWater, Shore, Maze, MazeEdge, PalmDunes ]
    Time: Night
    MaxHeight: 70

  - Name: EnvironmentalEffects/SnowMedium
    Biome: [ Hollow, HollowEdge, Maze, Plateau, CanyonEdge ]
    Time: Always
    MaxHeight: 70


  - Name: Pollen
    Biome: [ LargeCrater, Crater, PalmDunes, ShallowWater, Water, Shore ]
    MaxHeight: 30
    Time: Night

  - Name: Pollen
    MaxHeight: 50
    Biome: [ Sediment, Shore, ShallowWater, Water, LargeCrater, Crater, PalmDunes ]
    Time: Night

  - Name: WindLines
    Biome: [ Pole, PoleEdge, Regolith, Hills, Plains, BarrenRocks, SaltFlats ]
    Time: Night
    MaxHeight: 100
  - Name: WindLines
    Biome: [ Pole, PoleEdge, Regolith, Hills, Plains, BarrenRocks, SaltFlats ]
    Time: Night
    MaxHeight: 100



SpecialEffectsGlobal:
# # Weather                # No weather!
  # - Name: Clear
    # Type: Weather
    # InitialDelay: 2
    # Delay: 2  
    # Lifetime: 600


# Global Effect
  - Name: MeteorShower
    Time: Day
    InitialDelay: 0
    Delay: 1
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid


# ==============================================================

### Resource Deposits
RandomResources:



#T0


#T1


#T2
    - Name: CobaltResource
      Biome: [ SaltFlatsEdge, BarrenRocks, Regolith, Plains, LowMountains, Mountains, CanyonEdge]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 8, 9 ]    # Rich
      DepthMinMax: [ 65, 80 ] # Very deep inside the rock. Will need a drill turret or a mining HV.
      DroneProb: 0.3


    - Name: TitanResource
      Biome: [ SaltFlatsEdge, BarrenRocks, Regolith, Plains, PlainsEdge, CanyonEdge]
      IsScalingCount: True 
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 65, 80 ] # As above - Very deep inside the rock. 
      MaxDroneCount: 1 

#Special

    - Name: MagnesiumResource   # (Residuals of evaporated water)
      Biome: [ SaltFlats, Salts, Salts_1, Flats, Hollow]    # Small target biomes, will likely much rarer
      IsScalingCount: True
      CountMinMax: [ 5, 5 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 3, 6 ]    # Shallow deposit
      DroneProb: 0.7
      MaxDroneCount: 1 

    - Name: MagnesiumResource   # (Residuals of evaporated water)
      Biome: [ Maze, Flats, Hollow]    # Medium target biome
      IsScalingCount: True
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 3, 6 ]    # Shallow deposit
      DroneProb: 0.7
      MaxDroneCount: 1 



    - Name: MagnesiumResource   #
      Biome: [ LowMountains, LowMountains_1, Mountains ]   # Medium to small target biomes; fallbacks
      IsScalingCount: True
      CountMinMax: [ 3, 3 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 30, 60 ]


    - Name: PromethiumResource
      Biome: [ LowMountains_1, LowMountains, Mountains ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 20, 30 ]
      DroneProb: 0.3
      MaxDroneCount: 1 

    - Name: PentaxidResource
      Biome: [ LargeCrater, CraterEdge, PalmDunes ]
      # IsScalingCount: True 
      IsImportant: True
      CountMinMax: [ 10, 10 ] # Small target biome... Possibly only 5 deposits or so show up?
      SizeMinMax: [ 3, 4 ]    # 30-71 ores per deposit. 
      DepthMinMax: [ 5, 20 ]


    - Name: GoldResource
      Biome: [ LowMountains_1, Mountains, Crater ]  # Very small target biome; will likely fail to spawn in most cases
      IsScalingCount: True 
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 40, 60 ] # Deep inside the rock
      DroneProb: 0.6
      MaxDroneCount: 3



### Resource Asteroids
AsteroidResources:
     - Name: TitanResource
       Threshold: 0.2
       Amount: 0.3
     - Name: CobaltResource
       Threshold: 0.2
       Amount: 0.3
     - Name: MagnesiumResource
       Threshold: 0.2
       Amount: 0.3
     - Name: PromethiumResource
       Threshold: 0.1
       Amount: 0.2

### POIs
POIs:
    Random:



# =========== FACTION spawns. ===========

###  ===========  
###  Please do not change the order of factions! Add new factions at the end of the list.
###  (The order defines, which POIs are placed first - - if multiple factions compete against each other.)
###  ===========  


# This playfield is nearly always 'hostile dangerous' (Xenu defense turrets placed in Alien faction.) 
# Use playfield for faction POI that are high-value, military oriented or maybe try to hide something. 
# (Compare to a high-security area or secret test site)



# (most likely / has preference)
# ===== Pirates                         # Neutral meeting point, only for trusted clans
# ===== Farr                            # 'Treasury site' (and maybe for other things)
# ===== Zirax (Ghyst > Xenu > Epsilon )  # Weapon test site & research

# ===== Ravagers                        # Prove your worth
# ===== Wastelanders                    # Prove your worth

# ===== Arkenians                       # Secret research
# ===== Kriel                           # Weapon test site
# ===== ARC                             # Secret research

# ===== Warlord                         # (Non-faction space)

# ===== Prenn                           # (NO turrets here - Just normal settling)
# ===== Colonists                       # (NO turrets here - Just normal settling)
# (least likely)




# Zirax and others should have defensive turrets. 
# Colonists, Prenn, TheLegacy should not. 
# These spawn rules are made by 'nearPOI' spawning. Please do not change.

# 1) Select if there should be turret POI. 
#       This is done by spawning a hidden faction POI on the crater. If it can spawn, then all the attached turret POI will also spawn.
#       Other hidden markers will avoid that (further than the playfield is in size), preventing spawns





# # BA_MiningMarker-1  1 to 5
# # PortalDesertFloating  
# # PortalSnowFloating
# # PortalTemperateFloating
# # GSmasperonSpawn                 BAgs_MasperonPlayerSpawn
# # PlayerSpawnerWater              BAgs_AshonPlayerSpawner
# # GSSkillonPlayerSpawn            BAgs_SkillonPlayerSpawn
# # GSTykkionPlayerSpawn            BAgs_TykkionPlayerSpawn

# # RuinsCity                       BAJ_CityDMG_A  & BAJ_CityDMG_B
# # Ruins




          # Helper POI
        - GroupName: PlayerSpawnerWater  # Decides if this should spawn turrets. - 
          Faction: None
          # IsImportant: True
          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Water] 
          CountMinMax: [ 1, 1]
          PlaceAt: Terrain, OnWater
          # FactionTerritory: [All] 
          Territory: False
          SpawnPOINear: [START] 
          SpawnPOINearRange: [0, 100]
          SpawnPOIAvoid: [ PlayerSpawnerWater ]
          SpawnPOIAvoidDistance: 30000  # Will not spawn if there is already a different helper POI spawned by a different faction
          Properties: 
            - Key: RegenAfter
              Value: 720
            - Key: Discovery
              Value: True
            - Key: HudDistance
              Value: 0
            - Key: MapDistance
              Value: 0







## ========================================================================
##                     POI: DRONE BASES and COMMAND CENTERS
## ========================================================================

    # This world is mostly a Pirate haven. 
    # Depending on galactic location: Large factions & Warlord spawn mostly in the Crater, the Pirates (and maybe some Colonists) in the trenches.
    # Pirate POI can spawn even in galactic faction territory.




        # DB FARR ========

        - GroupName: FarrDroneBase

          DroneBaseSetup: DroneBaseSetupFarr
          Faction: Farr 

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Water]  # Crater

          SpawnPOINear: [START]   # (Increases spawn chances)
          SpawnPOINearRange: [0, 300]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True 
          Properties:  
            - Key: RegenAfter
              Value: 720 


          # ================ TheLegacy ================
          # ================ 
          # Since some later factions use 'FactionTerritory', this needs to go first. 
          # The other POI will then try to avoid the Infectors, if those do spawn

        - GroupName: LegacyInfector
          Faction: TheLegacy

          IsScalingCount: True
          # AvoidFactionTerritory: True

          CountMinMax: [ 3, 3 ]
          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Sediment, Dunes, Maze, Hollow, Plateau]
          SpawnPOIAvoid: [FarrDroneBase ] # Legacy is allowed to spawn in Farr territory by GalaxyConfig. This prevents the Infectors to spawn there
          SpawnPOIAvoidDistance: 40000    # (= Bigger than the moon)
          Properties: 
            - Key: RegenAfter
              Value: 720




         # DB KRIEL ========
        - GroupName: KrielDroneBase 

          DroneBaseSetup: DroneBaseSetupKrl

          Faction: Kriel
          IsImportant: True
          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Water]  # Crater
          CountMinMax: [ 1, 1 ]

          # SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, ARCDronebase]
          # SpawnPOIAvoidDistance: 2000
          SpawnPOINear: [START]   # (Increases spawn chances)
          SpawnPOINearRange: [0, 300]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: Music
              Value: AlteredPhase
            - Key: RegenAfter
              Value: 720 





         # DB Zirax (Xenu) ========
        - GroupName: DroneBaseT1   # CommandCenter & POI anchor for defense structures)
          Faction: Xenu   # For drone dangers, using a hostile zirax faction.

          DroneBaseSetup: DroneBaseSetupXen

          IsImportant: True
          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Water] # (These should not be the stamp-spawning biome, but those that overlap it.)
          CountMinMax: [ 1, 1 ]

          SpawnPOINear: [START]   # (Increases spawn chances)
          SpawnPOINearRange: [0, 300]

          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: RegenAfter
              Value: 720

        - GroupName: PlanetVesselBase
          Faction: Xenu

          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Water] # (These should not be the stamp-spawning biome, but those that overlap it.)
          IsImportant: True
          SpawnPOINear: [DroneBaseT1]
          SpawnPOINearRange: [300,600] 

          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: RegenAfter
              Value: 720

         # DB Zirax  ======== (For BA attacks)
        - GroupName: ZiraxDroneBase
          Faction: Zirax

          DroneBaseSetup: DroneBaseSetup

          IsCommandCenter: True

          IsImportant: True
          # BiomesExcluded: [PoleEdge, ColdPlains, SmallCrater, Remnant]
          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Water, Sediment, Dunes, Maze, Plateau, CraterEdge] 

          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: RegenAfter
              Value: 720



         # DB POLARIS (Arkenian) ========

        - GroupName: PolarisDroneBase 
          Faction: Polaris

          DroneBaseSetup: DroneBaseSetupPol
          IsCommandCenter: True      # BA attacks

          IsImportant: True
          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Water]  # Crater

          SpawnPOINear: [START]   # (Increases spawn chances)
          SpawnPOINearRange: [0, 300]

          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
#          AuxiliaryPOIs: [ZiraxDefense]
          Properties: 
            - Key: RegenAfter
              Value: 720


        # DB ARC ========
        - GroupName: ARCDronebase


          DroneBaseSetup: DroneBaseSetup
          DroneSetupID: ID_DroneBaseARC
          Faction: ARC 

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Water]  # Crater

          SpawnPOINear: [START]   # (Increases spawn chances)
          SpawnPOINearRange: [0, 300]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True 
          Properties:  
            - Key: RegenAfter
              Value: 720 




        # DB WARLORD ========   # Will only spawn if no other faction grabs this spot
        - GroupName: WarlordSkaarDroneBase
          Faction: Warlord

          DroneBaseSetup: DroneBaseSetupWar

          IsImportant: True
          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Water]  # Crater
          CountMinMax: [ 1, 1 ]

          SpawnPOINear: [START]   # (Increases spawn chances)
          SpawnPOINearRange: [0, 400]
          
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: RegenAfter
              Value: 720
            - Key: HudDistance
              Value: 1000
            - Key: MapDistance
              Value: 1000





        # DB PIRATES ========
        - GroupName: PiratesDroneBase

          DroneBaseSetup: DroneBaseSetupPir
          Faction: Pirates
          # FactionTerritory: [Kriel, Zirax, PrennFederation, Tesch, ArkenianRepublic, None]
          FactionTerritory: [All] # This overrides the galactic spawn rules.
          Territory: False

          IsImportant: True
          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Water, Sediment, Dunes, Maze, Plateau, CanyonEdge]
          CountMinMax: [ 1, 1 ]
          PlaceAt: Terrain, OnWater


          SpawnPOIAvoid: [LegacyInfector]
          SpawnPOIAvoidDistance: 40000  # Bigger than the planet
          SpawnPOINear: [START]         # (Increases spawn chances)
          SpawnPOINearRange: [1000, 4000]

          AuxiliaryPOIs: [PiratesDefenseDesert]

          # DroneProb: 1.0           # Keeping drones off. If using 'territory: False' they otherwise might spawn as different Faction.
          # DronesMinMax: [ 3, 5 ]
          # ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: RegenAfter
              Value: 720
            - Key: SI
              Value: Off


        - GroupName: PlanetVesselBase
          Faction: Pirates
          Territory: False
          FactionTerritory: [Kriel, Zirax, PrennFederation, Tesch, ArkenianRepublic, None]


          IsImportant: True
          Biome: [LargeCrater, CraterEdge, Crater, PalmDunes, Shore, Water, Sediment, Dunes, Maze, Plateau]
          CountMinMax: [ 1, 1 ]

          SpawnPOINear: [PiratesDroneBase]
          SpawnPOINearRange: [200, 400]
          PlaceAt: Terrain, OnWater

          AuxiliaryPOIs: [PiratesDefenseDesert, Pirates]

          # DroneProb: 1.0  # 
          # DronesMinMax: [ 1, 2 ]
          # ReserveCount: 5
          NoShieldReload: True
          TroopTransport: True
          Properties: 
            - Key: RegenAfter
              Value: 720
            - Key: HudDistance
              Value: 50
            - Key: MapDistance
              Value: 50
            - Key: SI
              Value: Off


