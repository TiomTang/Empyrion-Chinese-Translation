# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

Description: "\u96BE\u5EA6: \u4E2D\u5230\u9AD8
  \u6559\u7A0B: \u65E0
  \u4EFB\u52A1: \u8352\u5E9F\u4E4B\u529B\uFF08\u6D77\u76D7\u6C0F\u65CF\uFF09

  \u5982\u679C\u4F60\u80FD\u5728\u8FD9\u4E2A\u53D7\u5230\u653E\u5C04\u6027\u6C61\u67D3\u3001\u66FE\u7ECF\u4F5C\u4E3A\u6B66\u5668\u8BD5\u9A8C\u7684\u661F\u7403\u4E0A\u5B58\u6D3B\u5934\u51E0\u4E2A\u5C0F\u65F6\uFF0C\u53BB\u5BFB\u627EVren\u6C0F\u65CF\u7684\u201CLa Grande Maira\u201D\u3002\u4E5F\u8BB8\u4ED6\u4EEC\u5728\u90A3\u91CC\u9700\u8981\u4F60\u7684\u5E2E\u52A9\uFF01\u6216\u8005\u662F\u522B\u4EBA\u9700\u8981\uFF1F\u4F60\u4F1A\u77E5\u9053\u7684\u2026\u2026"

# Description: "Hundreds of years of exploitation of the natural resources of this moon have left their mark. While the natural ore deposits have been completely exhausted, ruins have remained. Slowly decaying in the sweltering heat of an unbreathable atmosphere, dangerous creatures use them to trap their prey!\n\nSuitable for advanced/Experts"

PlanetClass: Desert Barren
PlanetType: DesertBarrenStarter
PlayfieldType: Moon
Difficulty: 3

LandClaimZone: Device

# ==============================================================
# Special parameters:
# ==============================================================

#AllowBlueprintSV: False         # Dis-allow to spawn SV Blueprint in this playfield, default is True
#AllowBlueprintCV: False         # Dis-allow to spawn CV Blueprint in this playfield, default is True
#AllowBlueprintBA: False         # Dis-allow to spawn BA Blueprint in this playfield, default is True
#AllowBlueprintHV: False         # Dis-allow to spawn HV Blueprint in this playfield, default is True

Seed: 575561                    # Integer [1, 999999] If set overwrites main Seed 
UseFixed: True  			   	   # If set to True uses fixed POIs + resources in Survival mode (per default set to False). Can be used together with UseRandom
UseRandom: True				   # If set to True uses random POIs + resources in Survival mode (per default set to True). Can be used together with UseFixed
#IndestructibleTerrain: True     # If set to True terrain on this playfield will be indestructible

# ==============================================================
# Special Effects 
SpecialEffectsLocal:
  - Name: FireFliesRed
    Biome: [ Water, ShallowWater, Shore ]
    Time: Night
    MaxHeight: 40
  - Name: FireFliesGreenFew
    Biome: [ Plains, Sand, Flowers, FlowersEdge, Wadi, DustBowl ]
    Time: Night
    MaxHeight: 150
  - Name: Pollen
    Biome: [ Plains, DustBowl, Plantation, Flowers, FlowersEdge, Oasis ]
    Time: Day
    MaxHeight: 150
  - Name: FireFliesGreen
    Biome: [ Oasis, Plantation ]
    Time: Night
    MaxHeight: 150

SpecialEffectsGlobal:
# Weather
  - Name: Clear
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1200
  - Name: HeatWave
    Type: Weather
    InitialDelay: 36
    Delay: 12
    Lifetime: 600
  - Name: FireRain
    Type: Weather
    InitialDelay: 72
    Delay: 24
    Lifetime: 300
  # - Name: Wind
    # Type: Weather
    # InitialDelay: 20
    # Delay: 8
    # Lifetime: 500
# Global Effects
  - Name: BirdFlocksVultures
    Biome: [ Dunes, Plains, Mountains, Water, Flowers, Plantation ]
    Time: Day
    InitialDelay: 2
    Delay: 4
    Lifetime: 600
    PlyDist: 50
    SpawnY: 40
    Struct: True
# ==================

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.77, 0.57, 0.44"  
SkyColor: "0.90, 0.3, 0.3"
SkyHorizonColor: "1, 0.2, 0"
AtmosphereParams: [5, 1.5]       

# Light
DayLightIntensity: 1.4
NightLightIntensity: 0.3
LightZenithColor: "1, 0.7, 0.7"
LightHorizonColor: "1, 0.5, 0"
NightLightColor: "0.78, 0.78, 1"
DayShadowStrength: 1
NightShadowStrength: 1

# Sun
SunFlare: EnvironmentalEffects/SunFlareBlue

# Fog
AtmosphereFog: 0.35
FogColor: "0.8, 0.4, 0.2"
FogCloudIntensity: 0.8
GroundFogIntensity: 0.05
GroundFogHeight: 60

# Clouds & Wind
CloudsDensity: 0.1
CloudsSharpness: 0.05
CloudsOpacity: 0.3

CloudsBrightness: 0.7
CloudsZenithColor: "0.85, 0.36, 0.20" 
CloudsHorizonColor: "0.2, 0.04, 0.03" 
CloudsNightZenithColor: "0.03, 0.012, 0.012"
CloudsNightHorizonColor: "0.03, 0.012, 0.012"

WindSpeed: 3


