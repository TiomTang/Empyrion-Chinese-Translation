---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html


Description: "\u4E00\u4E2A\u6DF1\u5904\u4E8E\u9ED1\u5149\u4E2D\u7684\u4E16\u754C\u3002\n\uFF08\u6D82\u62B9\u5927\u91CF\u9632\u6652\u971C\u3002\uFF09\n\n\u5927\u6C14\u4E2D\u542B\u6709\u7684\u6C14\u4F53\u53EA\u5141\u8BB8\u7D2B\u5916\u7EBF\u901A\u8FC7\u3002\n\u5C3D\u7BA1\u7D2B\u5916\u7EBF\u5BF9\u4EBA\u773C\u662F\u4E0D\u53EF\u89C1\u7684\uFF0C\u4F46\u4ECE\u5730\u8868\u4ECD\u80FD\u88AB\u53CD\u5C04\u56DE\u4F5C\u4E3A\u201C\u5149\u201D\u2014\u2014\u4ECE\u800C\u5F62\u6210\u4E86\u8352\u51C9\u5374\u53C8\u8272\u5F69\u6591\u6593\u7684\u666F\u89C2\u3002"





PlanetType: AlienOPP

PlayfieldType: Planet
Difficulty: 4

LandClaimZone: Device

Seed: 150372                    # Integer [1, 999999] If set overwrites main Seed 

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.6, 1.0, 0.4"

SkyColor: "0.6,1,0.1"
SkyHorizonColor: "0.5, 1.0, 0.50"
AtmosphereParams: [2, 1.2]

# Light
DayLightIntensity: 0.4  #0.6 # (Adjusted to new light setting & 'Clear' weather)
NightLightIntensity: 0.68

DayShadowStrength: 0.95

LightZenithColor: "0.6,1,0.1"
LightHorizonColor: "0.8,0.8,0.1"
NightLightColor: "0.65, 0.8, 0.8"
OrbitUsesLightColor: True

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhite


# Fog
# FogColor: "0.3, 0.7, 0.3"
FogColor: "0.15, 0.35, 0.15"  # (Fit to less dark playfield)


FogCloudIntensity: 0.8
# AtmosphereFog: 0.95          # See Playfield_dynamic!
# GroundFogIntensity: 0.24
# GroundFogHeight: 45

# Clouds and Wind
CloudsDensity: 1
CloudsSharpness: 1
CloudsBrightness: 1
CloudsOpacity: 0.3

CloudsZenithColor: "0.6,1,0.12" 
CloudsHorizonColor: "0.15, 0.4, 0.175"
CloudsNightZenithColor: "0.015, 0.018, 0.017"
CloudsNightHorizonColor: "0.015, 0.018, 0.017"

WindSpeed: 4


# Special Effects
SpecialEffectsLocal:

    # Day
  - Name: ButterfliesBlue
    Biome: [ Forest, Grove ]
    Time: Day
    MaxHeight: 15

  - Name: FireFliesGreenFew
    Biome: [ Savanna, Plateau ]
    Time: Day
    MaxHeight: 15

  - Name: FireFliesRed
    Biome: [ Savanna, Plateau ]
    Time: Day
    MaxHeight: 15

  - Name: Mosquitos
    Biome: [ Biofilm, ShallowWater ]
    Time: Day
    MaxHeight: 15


    #Night
  - Name: FireFliesOrange       # ->Fitting to BigFlower
    Biome: [ Forest, Biofilm ]  # Biofilm: Night time has double intensity
    Time: Night
    MaxHeight: 15
    
  - Name: Sparks                       # Double entry for more intensity.
    Biome: [ Forest, Grove, Plateau ]
    Time: Night
    MaxHeight: 20
  - Name: Sparks
    Biome: [ Forest, Grove, Plateau  ]
    Time: Night
    MaxHeight: 20
    
  - Name: FireFliesRed   # ->Fitting to MoundzTree
    Biome: [ Savanna ]
    Time: Night
    MaxHeight: 15
        
  - Name: Pollen
    Biome: [ Grassland, Savanna, Plateau ]
    Time: Night
    MaxHeight: 15
    



    # Always
  - Name: FireFliesOrange
    Biome: [ Biofilm, ShallowWater, Grove ]
    Time: Always
    MaxHeight: 15
  - Name: TarantulaHawksFew
    Biome: [ Biofilm ]
    Time: Always
    MaxHeight: 15


    
SpecialEffectsGlobal:

# Global Effects
  - Name: BirdFlockBats
    Biome: [ AlienForest, AlienSavanna ]
    Time: Day
    InitialDelay: 0.5
    Delay: 4
    Lifetime: 600
    PlyDist: 50
    SpawnY: 20
    Struct: True

  - Name: ThunderAndLightning
    Biome: [ Any ]
    Time: Always
    InitialDelay: 0.5
    Delay: 6
    Lifetime: 300
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid




# Weather


    # Base weather
  - Name: Clear
    Type: Weather
    InitialDelay: 6
    Delay: 5
    Lifetime: 1200 # Duration: 20 minutes

  - Name: CloudsLight
    Type: Weather
    InitialDelay: 6
    Delay: 5
    Lifetime: 1200 # Duration: 20 minutes
  - Name: CloudsMedium
    Type: Weather
    InitialDelay: 12
    Delay: 2
    Lifetime: 1200
  - Name: CloudsDark
    Type: Weather
    InitialDelay: 6
    Delay: 2
    Lifetime: 1200
  - Name: Clouds
    Type: Weather
    InitialDelay: 6
    Delay: 2
    Lifetime: 600

  - Name: Wind
    Type: Weather
    InitialDelay: 5
    Delay: 2
    Lifetime: 600

    # Rarer Weather
  - Name: Fog
    Type: Weather
    InitialDelay: 48
    Delay: 12
    Lifetime: 1000
  - Name: RainMedium
    Type: Weather
    InitialDelay: 48
    Delay: 12
    Lifetime: 600
  - Name: RainHeavy
    Type: Weather
    InitialDelay: 72
    Delay: 24
    Lifetime: 600
  - Name: Storm
    Type: Weather
    InitialDelay: 72
    Delay: 24
    Lifetime: 600
  - Name: Clear
    Type: Weather
    InitialDelay: 72
    Delay: 24
    Lifetime: 600


  - Name: FogRadiationPurple   # Danger
    Type: Weather
    InitialDelay: 48 # 4 ingame days = 4 RL hours
    Delay: 24
    Lifetime: 600
    # Rare
  - Name: AcidRainHeavy   # Danger
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 600




