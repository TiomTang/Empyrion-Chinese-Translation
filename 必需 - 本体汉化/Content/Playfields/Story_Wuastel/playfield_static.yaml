### Resource Deposits
RandomResources:

# T0; 

 
 #T1;
    - Name: IronResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.5
      MaxDroneCount: 4

    - Name: CopperResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.4
      MaxDroneCount: 2
# T2

    - Name: AluminiumResource   # poor
      Biome: [ LowMountains, Mountains]
      IsScalingCount: True
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 3, 5 ]    # (Wet planet, less resources)
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.5
      MaxDroneCount: 3

    - Name: CobaltResource
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 5, 9 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.4
      MaxDroneCount: 2

#T3
      
    - Name: PentaxidResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 4, 6 ]
      DroneProb: 1
      MaxDroneCount: 4
      DepthMinMax: [ 0, 5 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10
      
    - Name: ErestrumResource
      IsScalingCount: True
      CountMinMax: [ 5, 7 ]
      SizeMinMax: [ 8, 10 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 1
      MaxDroneCount: 4
      
# SPEC  SSOR/Voxel
    - Name: PromethiumResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DroneProb: 0.4
      MaxDroneCount: 2
      DepthMinMax: [ 0, 1 ]
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10
      
    - Name: MagnesiumResource
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 1
      MaxDroneCount: 4

### Resource Asteroids
AsteroidResources:
    - Name: IronResource
      Threshold: 0.2
      Amount: 0.2
    - Name: CopperResource
      Threshold: 0.2
      Amount: 0.2
    - Name: PromethiumResource
      Threshold: 0.2
      Amount: 0.2
    - Name: CobaltResource
      Threshold: 0.2
      Amount: 0.2
    - Name: ErestrumResource
      Threshold: 0.2
      Amount: 0.2
    - Name: MagnesiumResource
      Threshold: 0.2
      Amount: 0.2


