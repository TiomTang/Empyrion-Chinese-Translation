### Resource Deposits

RandomResources:

    # Special planet: Has several 'deposits' as surface and undergroundlayers! 

          # # 'STEALING OFFER' resource anchor
          # #  Only by some POI the lone gold resource might spawn. 
          # #    POIs that are anchored to this are usually mining faction POI. Player can choose to lose rep and dig anyway... Or go in for a fight?
          # #    The deposit is rather large for a playfield of this type.
          # #    But there are more resources in the 'hidden deposits'. 
          ##     In total, this is still less whan can be gained e.g. on a Lava playfield.


    # =======  Exceptions:
    - Name: GoldResource
      Biome: [ ShouldOnlySpawnBySomePOI ]  # Will use a mining faction POI to spawn. 'Stealing choice' (loss or reputation), or risking a fight
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 6, 6 ]    #  Ca 350 ore
      DroneProb: 0.0
      DepthMinMax: [ 5, 10 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

    - Name: PromethiumResource
      Biome: [ ShouldOnlySpawnBySomePOI ]  # (As above) Will use a mining faction POI to spawn.
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 4, 4 ]
      DroneProb: 1.0
      DepthMinMax: [ 0, 1 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10


