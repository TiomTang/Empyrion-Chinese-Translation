# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html



Description: |
  [c][e0e020]注意:[-][/c][c] 存在[c][e0e020][b]敌对巡逻队[/b][-][/c]的风险![-][/c]

  [c]资源扫描仪报告错误：
  [b]“无法精确定位矿藏位置！”[/b]
  [i]密度超出校准范围。
  发现: [b]钛[/b], [b]铝[/b], 铜, 金, (铂) ... ...   [c][808080]-请利用视觉线索[-][/c][/i]


  如果没有经历自我复制化学的奇迹，这里本可以是地球。
  一颗行星大小的孤独沙盒，石头的单身汉。

  即便在这里播撒一些种子……它们也很难扎下根。
  复杂生命的繁荣需要更简单的阶段先行准备环境。细菌孕育植物，植物孕育动物……

  所以现在，这里是地质的天下，笼罩在有毒的天空之下。

  但你的到访或许能改变这一切。
  —— 你的整个身体，你的宇航服，你的装备……内外的每一寸表面……都是一艘方舟。

  你携带的早期微生物，或许能够为土壤和空气做好准备 —— 为新的“花园”繁盛提供条件。

  只要在五亿年后回来看看就好！




PlanetType: BarrenTemperate
PlayfieldType: Planet
Difficulty: 3

LandClaimZone: Device



OrbitUsesLightColor: true   # Orbit is blue-ish. (Use with appropiate stars.)
