uFF1A\n[i]\u611A\u8822\u8005\u3001\u66B4\u529B\u8005\u3001\u75AF\u72C2\u8005\u3001\u65E0\u6CD5\u65E0\u5929\u8005\u2026\u2026[/i]\n\n\u4ED6\u4EEC\u8EB2\u8FDB\u5730\u4E0B\u6216\u9634\u5F71\u4E4B\u4E2D\u2014\u2014\u9003\u907F\u767D\u663C\u7684\u70BD\u70C8\u2026\u2026\u4E0E\u6B64\u540C\u65F6\uFF0C\u4ED6\u4EEC\u7684\u57FA\u5730\u5728\u91D1\u5C5E\u88AB\u62C9\u4F38\u65F6\u53D1\u51FA\u547B\u541F\u5E76\u9010\u6E10\u5D29\u584C\u3002"

 



PlanetType: BarrenScorched
PlayfieldType: Planet
Difficulty: 2

LandClaimZone: Device


# Atmosphere and Sky
AtmosphereEnabled: False

# Light
OrbitUsesLightColor: True         # Will make the orbit ultra-bright. This is a near-sun planet
LightZenithColor: "2, 1.9, 1.8"   # Doesn't have any effect on this playfield (since no atmo), but will make the orbit playfield as bright as the playfield dayside.


DayLightIntensity: 30  # 3.95   # ( For ultra- bright, use much higher values now. The scale has changed!)
NightLightIntensity: 0.7 


# LightHorizonColor: "1, 0.5, 0"
NightLightColor: "0.5, 0.7, 0.9"  # ('No effect', but needed, since else the night colour of other playfield might get transferred here!)


DayShadowStrength: 0.95
DayShadowStrength: 0.2


# Sun
SunFlare: EnvironmentalEffects/SunFlareWhiteMoon


SpecialEffectsLocal:

  # - Name: EnvironmentalEffects/Sparks              # (The ground boils away...)
    # Biome: [ LavaField, LavaFieldUpper, Regolith, RegolithEdge, LowMountains, LowMountains_1, Mountains, Crater, LargeCrater, RayCrater, ColdPlains ]
    # Time: Day
    # MaxHeight: 10

  - Name: EnvironmentalEffects/Grime              # (The ground boils away...)
    Biome: [ LavaField, LavaFieldUpper, Regolith, RegolithEdge, LowMountains, LowMountains_1, Mountains, Crater, LargeCrater, RayCrater, ColdPlains ]
    Time: Day
    MaxHeight: 10


SpecialEffectsGlobal:


# Global Effect
  - Name: MeteorShower
    Biome: [ Any ]
    Time: Always
    InitialDelay: 0
    Delay: 0
    Lifetime: 100
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid

# ==============================================================

### Resource Deposits ==========================================

# Primary role of this planet is 'HV/SV mining challenge' and to refill your Pentaxid
#     Will end up in some 'Lava' planet slots, so it has these resources, too
#     Less for late-tier materials than Lava, but has medium sized gold amount. => CPU Extender
# Very risky to mine without a vessel (or needs _lots and lots_ of water bottles!)

RandomResources:

# ! RESOURCE DEPTHS AND TYPES ARE FITTED TO THE UNDERGROUND LAYERS !  - See playfield_dynamic.yaml
# Plz do not change without adjusting those!
# Especially for the SSOR deposits- Ideally, those should not overlap with a 'barrier' underground layer.

#T0:
#Carbon: poor / low
    - Name: CarbonResource
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 2, 6 ]        
      DepthMinMax: [ 16, 35 ]
      DroneProb: 0.3
      MaxDroneCount: 1 
#T1
      # === Resources in reach of player drone ===

    - Name: IronResource
      IsScalingCount: True
      Biome: [ Mountains, LowMountains, LowMountains_1, RegolithEdge, Regolith, LavaFieldUpper, LavaField, Crater, LargeCrater, RayCrater ]
      CountMinMax: [ 2, 4 ]
      SizeMinMax: [ 3, 10 ]       # High variability. Players need to actually _read_ the deposit marker info ;)
      DepthMinMax: [ 16, 35 ]
      DroneProb: 0.3
      MaxDroneCount: 1
      DistTypeCylinder:
        MaxRadius: 15
        YVariance: 6


    - Name: IceResource                  # (Note: Display problems in the SSG !)       
      Biome: [ ColdPlains ]
      IsScalingCount: True
      CountMinMax: [ 3, 4 ]
      SizeMinMax: [ 1, 2 ]  # 2,20 ore. Water canister needs 5 ore.
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      DistTypeCylinder:    # SSOR deposit, will be placed as subsurface ore rock. Needs ore scanner to see.
        MaxRadius: 5       # Distribution prepares for ore scanner. This is very close to the spot.
        YVariance: 3       #


    - Name: CopperResource              # (For this planet) rich copper cluster. Will spawn next to cluster 'POI'
      Biome: [ Mountains, LowMountains, LowMountains_1, Crater, LargeCrater, RayCrater ]
      IsScalingCount: True
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 5, 7 ]
      DepthMinMax: [ 25, 45 ]
      DroneProb: 0.0
      MaxDroneCount: 1
      DistTypeCylinder:
        MaxRadius: 10
        YVariance: 10


    - Name: CopperResource             # Low yield deposits. 
      Biome: [ Mountains, LowMountains, LowMountains_1, Crater, LargeCrater, RayCrater ]
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 25, 45 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      DistTypeCylinder:
        MaxRadius: 5
        YVariance: 10

    - Name: TitanResource
      Biome: [ SmallCrater, Crater, RayCrater, LargeCrater ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 15, 60 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      DistTypeCylinder:
        MaxRadius: 8
        YVariance: 4



      # === Resources barely out of reach of player drone ===

    - Name: PromethiumResource          # PV anchor: Arkenians
      IsScalingCount: True
      Biome: [ LavaFieldUpper, LavaField, SmallCrater, Crater, RayCrater, LargeCrater ]
      CountMinMax: [ 2, 4 ]  # 20 -160 Ore 
      SizeMinMax: [ 3, 6 ]
      DepthMinMax: [ 50, 60]
      DroneProb: 0.7
      MaxDroneCount: 1
      DistTypeCylinder:
        MaxRadius: 4
        YVariance: 10


    - Name: GoldResource               # PV anchor: Farr
      Biome: [ Mountains, LowMountains, LowMountains_1, Regolith, RegolithEdge, LavaFieldUpper, RayCrater]
      IsScalingCount: True
      CountMinMax: [ 5, 10 ]   # (More individual deposits, but in total _much less_ yield than on a Lava planet)
      SizeMinMax: [ 2, 3 ]     # (Ca 14, 45 ore.    Total planet yield: SizeClass 2: 70-450 ore, SizeClass 3: 140-900 ore. - - Compare to Lava planet, SizeClass 3: (EGS 1.3) : Ca 1130 \u2013 ca 13000 ore, Gold Asteroid ca 3000 ore.)
      DepthMinMax: [ 53, 65]   # (Just barely in reach of drone)
      DroneProb: 0.7
      MaxDroneCount: 1
      DistTypeCylinder:
        MaxRadius: 3   # Single pebble, rather close to the marker. Hard to reach, since behind 'bedrock' 1m layers.
        YVariance: 2


    - Name: PentaxidResource
      IsScalingCount: True
      Biome: [ LavaFieldUpper, Regolith, RegolithEdge, Crater ]
      CountMinMax: [ 5, 6 ]   #
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 40, 60 ]
      DroneProb: 0.6
      MaxDroneCount: 2
      DistTypeCylinder:
        MaxRadius: 3   # Single pebble, rather close to the marker. May be hard to reach. Mostly intended for automining.
        YVariance: 2



      # ===== Resources in need of HV miner or Autominer ======

    - Name: SathiumResource    # 'Difficult' resource. Behind several 'bedrock' layers.
      Biome: [ LowMountains, LowMountains_1, Mountains, RegolithEdge ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]    # Less than lava
      SizeMinMax: [ 6, 7 ]     # Smaller than lava
      DepthMinMax: [ 60, 100 ] # Extremely deep. Needs excavation gear, out of range of suit drone. 
      DroneProb: 1  
      MaxDroneCount: 4 


    - Name: ErestrumResource   # 'Difficult' resource.  Behind several 'bedrock' layers.          # PV anchor
      Biome: [ LowMountains, LowMountains_1, Mountains, RegolithEdge ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]    # Less than lava
      SizeMinMax: [ 6, 7 ]     # Smaller than lava
      DepthMinMax: [ 60, 100 ] # Extremely deep. Needs excavation vessels. 
      DroneProb: 1  
      MaxDroneCount: 4 


    - Name: ZascosiumResource  # Very 'difficult' resource- _Extremely_ hard to mine due to 2m 'barrier' bedrock layer &  SubSurfaceOreRock / SSOR
      Biome: [ LowMountains, LowMountains_1, Mountains ]
      IsScalingCount: True 
      CountMinMax: [ 0, 1 ]    # Less than lava. Might not always spawn.
      SizeMinMax: [ 4, 5 ]     # 160 - 314 ore. Total planet yield SizeClass 3: 0-628 ore; vs. Lava planet (SizeClass 3, EGS 1.3) 1256-3252 ore)
      DepthMinMax: [ 94, 107 ] # Extremely deep.  Needs heavy excavation vessels, ideally with drill turret, or an autominer.
      DroneProb: 1.0
      MaxDroneCount: 4
      DistTypeCylinder:
        MaxRadius: 15
        YVariance: 3    # Keep low, it's the minimum distance to a barrier underground layer!








### Resource Asteroids
AsteroidResources:


     # === 'Refill' asteroids ======
     - Name: IronResource
       Threshold: 0.1
       Amount: 0.1
     - Name: CopperResource
       Threshold: 0.1
       Amount: 0.1

     - Name: SathiumResource
       Threshold: 0.1
       Amount: 0.1
     - Name: ErestrumResource       # Once the Erestrum is all mined, you get these nice asteroids, easy to reach.
       Threshold: 0.1
       Amount: 0.1

     - Name: PromethiumResource 
       Threshold: 0.1
       Amount: 0.1
     - Name: PentaxidResource
       Threshold: 0.1
       Amount: 0.1

      # (Zascosium won't get 'refilled', to keep the difficulty.)


     # === Always occuring asteroids ====

     - Name: IceResource        # INDEPENDENT of the remaining amount and threshold of ore on a planet!
       Amount: 300              # Minimum is 3000 ore. (Here's hoping that this will get some time a lower amount.)
       InitialDelay: 0           # delay in game hours
       Delay: 24                 # Subsequent delay in game hours
       DespawnDelay: 24          # Game hours after which asteroid will be removed

     - Name: IceResource
       Amount: 300
       InitialDelay: 12
       Delay: 20
       DespawnDelay: 20











# ==========================================================================================================================
# ====  POIs
# ==========================================================================================================================


POIs:
    Random:

## === GENERAL INFO ( v 0.82 ) ========================================================================================================

##  ! This template is for RANDOM playfields only! 
##  Sector-placed playfields will ignore the spawn restictions of the Galaxyconfig, likely resulting in too much POI

## ============

## If you are using a 'POI master list': Search and replace these generic keywords with a list of biomes of the playfield.
## It also helps when adding new POI, instead of memorizing all biomes. Use e.g. Notepad++ Autocomplete, then search/replace.

#### For Biome exclusions
##     BM_POLE               Pole biomes to avoid, so that no clustered POIs end up too close to the 'untouchable' terrain
##     BM_TOO_SMALL          Too small biomes for cluster anchors. E.g. Beach biomes on an Ocean planet that risk to be only to be part of a tiny island
##     BM_FORBIDDEN          For some reason, there should be no POI here (e.g. Decoration overlaps)


#### For Biome spawns    # !! Always check if these are replaced, else the POI won't spawn !
##     BM_SPAWN_EASY_ALL     Biomes that are easy for POI to spawn in. - E.g. use for cluster anchor POI that need extra space.
##     BM_SPAWN_EASY_BRIGHT  As above, but these are just the _nice_ places. (Bright, lush, open, etc)
##     BM_SPAWN_EASY_DARK    As above, but these are for those factions that feel 'edgy'. Rocky, shadowed, dark terrain...
##     BM_SPAWN_HIDDEN       Biomes with dense decoration, like deep forests, for a POI that could be tracked down.

##     BM_SPAWN_ROUGH        Interesting biomes, but more difficult to spawn POIs in (Maybe use the IsImportant flag?) E.g. Mountains
##     BM_SHOREWATER

##     BM_HOSTILE            Special or dangerous biomes, optional spawn. E.g. Radiated biomes / creature infested biomes
##     BM_VOLCANIC           Volcanic / lava / hot biome, for POI that generate energy there.


#### For Creature spawns
##     BM_NO_TROOPERS_HERE   # E.g. steep cliff sides, lava fields...
##     BM_TROOP_NICE_HERE    # E.g. lush oasis biomes



# POI order:                                  # ! This order is important, since it controls POI spawn chances. Most important POI come first.
                                                  # NEW POI? Plz add it to the fitting section, or the bottom of this list

#     (1) Planet Exclusives                   # POI that may be just alone on a planet, if they spawn.
#     (2) Helper POI                          # General spawning controls
#     (3a) Dronebases standard                # Normal faction POI DBs. For Drones, Base Attacks (CommandCenters)
#     (3b) 'Everywhere faction' Dronebases    # DBs that need playfield spawn restrictions, else they would be too dominant in the galaxy
#     (4) POI Clusters                        # POI that are tied to the DBs, or to other POIs.
#     (5) Factioned fillers                   # POIs in amounts scaling with planet size. To make a playfield more 'alive', especially in galactic territory. 
#     (6) AuxPOI                              # A POI definition that can be re-used at multiple places. -  ! POI used like this may not be spawned by other means in the same playfield.
#     (7) Lawless / Outposts                  # In galactic 'None'-Territory, or at the edges of faction bubbles. Controlled by 'IsLawless' helper POI.
#     (8) Complex & hidden POIs               # E.g. buried Pirate treasures, and their "hints"
#     (9) Nonfactioned fillers                # Abandoned, Ruins, nests, crashed vesels... - ! 'Alien' faction POI need to be placed late, else they might block others.



## === (1) PLANET EXCLUSIVES ================================================================================
## ==========================================================================================================

             # POI that should be the only ones on a planet.
             # The 'IsSettled' control POI will fully avoid these POI here, and all other POIs anchored to IsSettled will then fail to spawn.



          # # ==== Used for a mission. Please keep this entry unless the mission is changed.
          # # The Tesch keep this world free of the other aliens.

        # - GroupName: VOIDSoulAnchor # "EXCLUSIVE_POI_TO_AVOID"
          # BiomesExcluded: [ BM_POLE, BM_FORBIDDEN ]
          # Faction: Void  
          # CountMinMax: [ 2, 3 ]
          # Properties: 
            # - Key: Music
              # Value: lava 
            # - Key: RegenAfter
              # Value: 720


## === (2) CONTROL POI =======================================================================================
## ==========================================================================================================

            # Affecting spawns of other POI. Acting as a stable and quick reference.



         # ==== Legacy Infection control ==============
         # Keep this POI on any playfield. Use as an avoidance target, e.g. for Dronebases

        - GroupName: CNTRL_IsInfected  # (Invisible)
          CountMinMax: [ 1, 1 ]
          IsImportant: True
          Faction: TheLegacy  # Will only spawn if allowed by GalaxyConfig.
          Territory: False  # This POI will still claim *invisible* planet territory, preventing other spawns. Be careful
          PlaceAt: Terrain, OnWater
          SpawnPOINear: [START] # Spawn further away from center, to not block other faction POI spawns.
          SpawnPOINearRange: [3000, 10000] # For size class 2 moons,this marker will be likely at one of the corners of the map, possibly close to the Poles.
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0



         # ==== Lawless Space control ==============
         # Keep this POI on any playfield. Anchor other POIs to this with 'SpawnPOINear'. E.g. for Pirates, Colonists, Progenitor... - Warlords spawn last.

        - GroupName: CNTRL_IsLawless  # (Invisible)
          CountMinMax: [ 1, 1 ]
          IsImportant: True
          Faction: Warlord  # Warlord faction's grip increases the closer it gets to 'None' galactic territory
          Territory: False  # (Still claims invisible territory!)
          PlaceAt: Terrain, OnWater
          SpawnPOIAvoid: [CNTRL_IsInfected]  # Lawless POis will not spawn on Lgc worlds.
          SpawnPOIAvoidDistance: 45000
          SpawnPOINear: [START]
          SpawnPOINearRange: [3000, 10000]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


         # # ==== POI - Extra spawn control (Optional) =================
         # # CNTRL_IsSettled: Anchor other POIs to this with 'SpawnPOINear'.
         # # It this control POI fails, all those others will do, too, wiping the planet of them

        # - GroupName: CNTRL_IsSettled  # (Invisible)             # Used by POIs: 
          # CountMinMax: [ 1, 1 ]
          # IsImportant: True
          # Faction: None
          # PlaceAt: Terrain, OnWater
          # SpawnPOINear: [START]
          # SpawnPOINearRange: [100, 1500]
          # SpawnPOIAvoid: [EXCLUSIVE_POI_TO_AVOID]
          # SpawnPOIAvoidDistance: 45000
          # Properties:
            # - Key: MapDistance
              # Value: 0
            # - Key: HudDistance
              # Value: 0


         # # ==== Conflict Spawn Location ==============
          # # A control to place POIs of different factions closer together.

        # - GroupName: CNTRL_IsConflict  # (Invisible)
          # CountMinMax: [ 1, 1 ]
          # IsImportant: True
          # Faction: None  # 
          # PlaceAt: Terrain
          # SpawnPOINear: [START]
          # SpawnPOINearRange: [500, 2500]   # (Adjust this to planet scale. Moons have smaller range)
          # Properties:
            # - Key: MapDistance
              # Value: 0
            # - Key: HudDistance
              # Value: 0


         # ==== Coinflips ==========================
         # To reduce global spawn chances of some POI.

        - GroupName: CNTRL_Coinflip_01  # (Invisible)
          CountMinMax: [ 0, 1 ]       # The coinflip: Halving spawnchances of a POI avoiding this POI here fully.
          IsImportant: True
          Faction: None
          PlaceAt: Terrain, OnWater
          SpawnPOINear: [START]
          SpawnPOINearRange: [1000, 2500]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


        - GroupName: CNTRL_Coinflip_02  # (Invisible)
          CountMinMax: [ 0, 1 ]     # Each additional coinflip POIs to be fully avoided will halve the spawn chances.
          IsImportant: True
          Faction: None
          PlaceAt: Terrain, OnWater
          SpawnPOINear: [START]
          SpawnPOINearRange: [1000, 2500]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


         # ==== Resource clusters  =================


         # ============== PREPARING RESOURCES ===============

         # Resource clusters = Large deposits nearby, so that players might be tempted to dig horizontally. 
         # These clusters might not spawn on every planet, to keep diversity. (If so, the resources will be spread more evenly.)


        - GroupName: ResourceMarker01
          Biome: [ Mountains, LowMountains, LowMountains_1 ]
          CountMinMax: [ 0, 1 ]
          IsImportant: True
          SpawnPOIAvoid: [ResourceMarker01]
          SpawnPOIAvoidDistance: 6000    # May be larger than a class 2 planet
          SpawnResource: ["CopperResource:1-3","GoldResource:0-2","PentaxidResource:0-1"]    # Will use up all of the bigger copper deposits, so that the other deposits also spawn
          SpawnResourceRange: [100,350]
          Properties:
            - Key: MapMarker 
              Value: Neutral
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0

        - GroupName: ResourceMarker01
          Biome: [ Mountains, LowMountains, LowMountains_1 ]
          CountMinMax: [ 0, 1 ]
          IsImportant: True
          SpawnPOIAvoid: [ResourceMarker01]
          SpawnPOIAvoidDistance: 6000    # May be larger than a class 2 planet
          SpawnResource: ["CopperResource:1-3","GoldResource:0-2","PentaxidResource:0-1"]    # Will use up all of the bigger copper deposits, so that the other deposits also spawn
          SpawnResourceRange: [100,350]
          DroneProb: 0.5
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          Properties:
            - Key: MapMarker 
              Value: Neutral
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


        - GroupName: ResourceMarker02
          Biome: [ Mountains, LowMountains, LowMountains_1, RegolithEdge, Regolith, LavaFieldUpper, Crater, LargeCrater, RayCrater ]
          CountMinMax: [ 0, 1 ]
          IsScalingCount: True
          IsImportant: True
          SpawnResource: ["IronResource:1-3","GoldResource:0-2","TitanResource:0-1","PentaxidResource:0-1","PromethiumResource:1-1"]
          SpawnResourceRange: [100,350]
          Properties:
            - Key: MapMarker 
              Value: Neutral
            - Key: MapDistance
              Value: 0
