Description: |
  [b]空旷的太空[/b]，在某颗恒星附近的某处。

  [c][e0e020]警告：[-][/c]   [c][b]极高的辐射[/b]。 
  极端温度。—— 这是敌对的太空区域。[-][/c]

  [c][e0e020]注意：[-][/c]   [c] 不建议将飞船停泊在巨大的核聚变火球附近。 [-][/c]


  ……恒星的巨大辐射，以及缺乏中等质量天体来进行定位，使得瞄准该区域极为困难。[b](1)[/b] 
  许多闲置的航母飞船都在此迷失——在恒星光球层中焚毁殆尽。


  [b](1)[/b] [i]在绝望的情况下，或许仍有可能抵达此区域。 
  你可以使用探索扫描数据；这些数据保存在[b]登记簿[/b]中。

  > 打开物品栏；在窗口顶部选择“登记簿”标签页，选择太阳星区（例如 Sun[Right]），然后选择你的飞船。 
  使用按钮在其上添加一个航点，然后退出“登记簿”。
  使用另一艘飞船，就可以手动将你的飞船对准该航点，并在进入射程后，启动翘曲跃迁。[/i]



