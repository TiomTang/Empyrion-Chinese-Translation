  [b]空旷的太空[/b]，位于某颗耀星附近。

  [c][e0e020]注意：[-][/c]   [c] 不建议在一颗巨大的聚变火球附近停泊飞船。[-][/c]


  ……恒星的高辐射，以及缺乏可锁定的中型质量天体，使得锁定此区域极为困难。[b](1)[/b] 
  许多闲置的航母飞船在此迷失——在恒星的光球层中燃烧殆尽。


  [b](1)[/b] [i]在绝望的情况下，仍有可能到达这个区域。 
  你可以使用保存在 [b]登记册[/b] 中的探索扫描数据。

  > 打开物品栏；在窗口顶部选择“登记册”选项卡，选择太阳所在的星区（如 Sun[Right]），然后选择你的飞船。 
  用按钮为其添加一个航路点并退出登记册。 
  然后使用另一艘飞船，手动将你的飞船对准该航路点，如果在范围内，即可发起一次跃迁。[/i]



