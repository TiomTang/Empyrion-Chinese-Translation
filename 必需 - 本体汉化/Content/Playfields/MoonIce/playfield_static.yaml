## === (7) LAWLESS / OUTPOSTS ===============================================================================
## ==========================================================================================================

     # Set SpawnPOINear to 'CNTRL_IsLawless'. These are faction POI clusters outside of galactic territories. 

# Polaris - Outposts =============



        - GroupName: DepositMarker  #
          # BiomesExcluded: [ PoleEdge, PoleEdge_1, SandDrift ]
          Faction: None

          CountMinMax: [ 2, 3 ]
          SpawnPOIAvoid: [PiratesDroneBase]  # 50% chance - appears when there are no pirates
          SpawnPOIAvoidDistance: 45000
          SpawnPOINear: [CNTRL_IsLawless] 
          SpawnPOINearRange: [100, 500]
          Properties:
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720


# Colonists - Vanguard ===========

        - GroupName: CivilSettlement 
          Biome: [ SmallCrater, LargeCrater, Plains ]
          # Territory: False
          Faction: Colonists
          CountMinMax: [ 1, 1 ]  
          NoShieldReload: True

          SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase, PiratesDroneBase, WarlordDroneBase]  # Avoids danger
          SpawnPOIAvoidDistance: 1500  # This is most of the moon
          SpawnPOINear: [CNTRL_IsLawless] # primarily outside the territories
          SpawnPOINearRange: [0, 45000]
          SpawnResource: ["PentaxidResource:1-2","CobaltResource:0-1"]  # claims resources, since it has territory
          SpawnResourceRange: [150,200]

          AuxiliaryPOIs: [OreMinerT1]

          Properties:
            - Key: RegenAfter
              Value: 720 

          # More civilians if the first one spawns
        - GroupName: CivilSettlement 
          Biome: [ SmallCrater, LargeCrater, Plains ]
          # Territory: False
          Faction: Colonists
          CountMinMax: [ 0, 2 ]
          NoShieldReload: True

          SpawnPOIAvoid: [CivilSettlement]  # Keep space for AuxPOI
          SpawnPOIAvoidDistance: 500  #
          SpawnPOINear: [CivilSettlement] 
          SpawnPOINearRange: [0, 2000]
          SpawnResource: ["PentaxidResource:1-2","CobaltResource:0-1"]  # claims resources, since it has territory
          SpawnResourceRange: [150,200]

          AuxiliaryPOIs: [OreMinerT1]

          Properties:
            - Key: RegenAfter
              Value: 720 


