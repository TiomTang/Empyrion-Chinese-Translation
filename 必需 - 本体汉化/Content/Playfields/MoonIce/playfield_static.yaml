          SpawnPOIAvoidDistance: 45000 # Fully avoids. Lower than 50% % chance (by Pirates, Coinflip)
          SpawnPOINear: [CNTRL_IsLawless] 
          SpawnPOINearRange: [0, 10000]
          Properties: 
            - Key: RegenAfter
              Value: 720



