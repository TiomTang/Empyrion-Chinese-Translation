# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

Description: "\u4E00\u4E2A\u51B0\u51B7\u7684\u4F34\u661F\uFF0C\u5176\u5730\u58F3\u4E0E\u5CA9\u77F3\u6838\u5FC3\u4E4B\u95F4\u6709\u7740\u6DF1\u9083\u7684\u6D77\u6D0B\u3002  \n\u5FAE\u5F31\u7684\u6709\u673A\u7269\u8D28\u5728\u8868\u9762\u7559\u4E0B\u8272\u5F69\u6591\u6593\u7684\u6761\u7EB9\u3002  \n\u2014\u2014\u6765\u81EA\u592A\u9633\u7CFB\u4E00\u9897\u536B\u661F\u7684\u8BB0\u5FC6\u2026\u2026\n"

PlanetType: MoonIce
PlayfieldType: Moon
Difficulty: 2

LandClaimZone: Device

# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.30, 0.40, 0.4"

SkyColor: "0, 0, 0" 
SkyHorizonColor: "0, 0.1, 0"
AtmosphereParams: [1, 2]     

# Light
DayLightIntensity: 0.6
NightLightIntensity: 0.4

LightZenithColor: "0.98, 0.90, 1"
LightHorizonColor: "1, 0.6, 0.15"
NightLightColor: "0.78, 0.78, 1"

DayShadowStrength: 1
NightShadowStrength: 1

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhite3 

# Fog
# AtmosphereFog: 0.00
FogCloudIntensity: 0.0
FogColor: "1, 1, 1"
# GroundFogIntensity: 0.07
# GroundFogHeight: 130

# Clouds and Wind
CloudsDensity: 0.0
CloudsSharpness: 1
CloudsBrightness: 0.0
CloudsOpacity: 0.0
CloudsZenithColor: "0.1, 0.1, 0.1"
CloudsHorizonColor: "1, 0.3, 0.1"

WindSpeed: 0


SpecialEffectsGlobal:
  - Name: Clear    # To remove the 'space view clouds'
    Type: Weather
    InitialDelay: 0
    Delay: 0
    Lifetime: 3000

# ==============================================================

### Resource Deposits
RandomResources:
    - Name: SiliconResource   # Shallow
      Biome: [ Mountains, PlainsEdge, Plains, Regolith ]
      IsScalingCount: True 
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 7, 8 ]
      DepthMinMax: [ 3, 8 ]
      DroneProb: 0.4
      # DistTypeCylinder:
        # MaxRadius: 10
        # YVariance: 3
      
    - Name: CobaltResource    # Mountains, shallow
      Biome: [ Mountains, Regolith ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 4, 9 ]
      DroneProb: 0.7
      MaxDroneCount: 1      
      
    - Name: MagnesiumResource  # Mountains, shallow, very poor
      Biome: [ Mountains, Regolith ]
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 2, 3 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.7
      MaxDroneCount: 1 
      
    - Name: MagnesiumResource  # Below ice, rich -> Needs HV excavator or autominer
      Biome: [ LayeredIce, IceSheet, CrustedIce ]
      IsScalingCount: True 
      CountMinMax: [ 3, 4 ]  #2,2
      SizeMinMax: [ 6, 7 ]
      DepthMinMax: [ 35, 45 ]
      DroneProb: 0.2
      MaxDroneCount: 1       
     
    - Name: CobaltResource     # Deep below ice, rich -> Needs HV excavator or autominer
      Biome: [ LayeredIce, IceSheet, CrustedIce ]
      IsScalingCount: True 
      CountMinMax: [ 3, 3 ]
      SizeMinMax: [ 8, 9 ]
      DepthMinMax: [ 45, 55 ]
      DroneProb: 0.2
      MaxDroneCount: 1

    - Name: IronResource    # Very shallow, meteorite impact anywhere
      # Biome: [ Mountains, SmallCrater, Regolith ]
      IsScalingCount: True 
      CountMinMax: [ 5, 7 ] 
      SizeMinMax: [ 4, 7 ] 
      DepthMinMax: [ 2, 5 ]
      DroneProb: 0.3      
      MaxDroneCount: 1
      
    - Name: PromethiumResource # Shallow, meteorite impact
      Biome: [ SmallCrater, Rifts, Regolith ]
      IsScalingCount: True 
      CountMinMax: [ 2, 4 ]
      SizeMinMax: [ 3, 6 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      DepthMinMax: [ 0, 1 ]
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10
      
    - Name: PentaxidResource   # Shallow, meteorite impact
      Biome: [ SmallCrater ]
      IsScalingCount: True 
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 2, 3 ]
      DroneProb: 0.6
      MaxDroneCount: 2
      DepthMinMax: [ 0, 5 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

### Resource Asteroids
