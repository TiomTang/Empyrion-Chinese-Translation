---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

PlanetType: Lava
Emissive: True
PlayfieldType: Planet
Difficulty: 4

LandClaimZone: Device

Description: |
  \u884C\u661F\u8BDE\u751F\u4E8E\u65CB\u8F6C\u6563\u843D\u7684\u7070\u70EC\u4E4B\u4E2D\u2014\u2014\u90A3\u662F\u5DF2\u7ECF\u6B7B\u4EA1\u5E76\u7206\u70B8\u7684\u6052\u661F\u9057\u7559\u4E0B\u6765\u7684\u4EA7\u7269\u3002
  \u2026\u2026\u5F15\u529B\u4F1A\u5C06\u8FD9\u4E9B\u51CC\u4E71\u7684\u788E\u5C51\u6C47\u805A\u8D77\u6765\uFF0C\u5E76\u8D4B\u4E88\u5B83\u4EEC\u65B0\u7684\u5F62\u6001\u3002

  \u7136\u800C\uFF0C\u5927\u91CF\u7684\u5CA9\u77F3\u4E0E\u5C18\u57C3\u5728\u7F13\u6162\u7684\u6469\u64E6\u4E0E\u805A\u5408\u4E2D\u2026\u2026\u4F1A\u4EA7\u751F\u5DE8\u5927\u7684\u6469\u64E6\u529B\u3002

  \u8FD9\u610F\u5473\u7740[b][i]\u70ED\u91CF[/i][/b]\u3002

  \u8FD9\u91CC\u53EA\u6709\u533A\u533A\u4E8C\u4EBF\u4E94\u5343\u4E07\u5E74\u7684\u5386\u53F2\uFF0C\u6B63\u8270\u96BE\u5730\u5C06\u591A\u4F59\u7684\u70ED\u91CF\u5411\u592A\u7A7A\u8F90\u5C04\u2014\u2014
  \u884C\u661F\u8D8A\u5927\uFF0C\u6563\u70ED\u6240\u9700\u7684\u65F6\u95F4\u5C31\u8D8A\u957F\u3002

  \u5728\u8FD9\u79CD\u6DB2\u6001\u72B6\u6001\u4E0B\uFF0C\u8FD9\u9897\u884C\u661F\u66F4\u50CF\u662F\u4E00\u4E2A\u5DE8\u5927\u7684\u70F9\u716E\u9505\u3001\u7194\u5CA9\u706F\uFF0C\u6216\u8005\u4E00\u5EA7\u51B2\u5929\u7684\u7194\u7089\uFF1A
  \u5BC6\u5EA6\u8F83\u4F4E\u7684\u77FF\u6E23\u5927\u9646\u6F02\u6D6E\u5728\u8868\u9762\uFF0C\u800C\u6C89\u91CD\u7684\u5947\u5F02\u91D1\u5C5E\u5219\u6C89\u5165\u884C\u661F\u7684\u6DF1\u5904\u3002

  \u7136\u800C\uFF0C\u901A\u8FC7\u70ED\u91CF\u7684\u6405\u52A8\u548C\u7FFB\u817E\uFF0C\u5176\u4E2D\u4E00\u4E9B\u73CD\u8D35\u6838\u5FC3\u7684\u788E\u7247\u4F1A\u518D\u6B21\u88AB\u5E26\u56DE\u63A5\u8FD1\u5730\u8868\u7684\u5730\u65B9\u3002

  \u5BF9\u4E8E\u90A3\u4E9B\u6562\u4E8E\u627F\u53D7\u8FD9\u79CD\u9AD8\u6E29\u7684\u4EBA\u6765\u8BF4\uFF0C\u8FD9\u91CC\u5C06\u6709\u4E30\u539A\u7684\u56DE\u62A5\u3002

# ==============================================================
# Special parameters:
# ==============================================================

AllowHV: False                  # Dis-allow HVs to enter/spawn in this playfield, default is True
AllowSV: False                  # Dis-allow SVs to enter/spawn in this playfield, default is True
AllowCV: False                  # Dis-allow CVs to enter/spawn in this playfield, default is True
AllowBA: False                  # Dis-allow BAs to enter/spawn in this playfield, default is True

AllowMaxCPUTierBA: 1            # Set the max CPU Tier allowed; Only applies to spawning blueprints
AllowMaxCPUTierSV: 1            # Set the max CPU Tier allowed; Only applies to spawning blueprints
AllowMaxCPUTierHV: 1            # Set the max CPU Tier allowed; Only applies to spawning blueprints
AllowMaxCPUTierCV: 1            # Set the max CPU Tier allowed; Only applies to spawning blueprints

# RestrictToOrigin: Human         # Only players of the defined origin are allowed to enter the playfield

AllowBlueprintSV: False         # Dis-allow to spawn SV Blueprint in this playfield, default is True
AllowBlueprintCV: False         # Dis-allow to spawn CV Blueprint in this playfield, default is True
AllowBlueprintBA: False         # Dis-allow to spawn BA Blueprint in this playfield, default is True
AllowBlueprintHV: True         # Dis-allow to spawn HV Blueprint in this playfield, default is True

# ==============================================================

Seed: 971145                    # Integer [1, 999999] If set overwrites main Seed 
UseFixed: True  			   	   # If set to True uses fixed POIs + resources in Survival mode (per default set to False). Can be used together with UseRandom
UseRandom: True				   # If set to True uses random POIs + resources in Survival mode (per default set to True). Can be used together with UseFixed
IndestructibleTerrain: True     # If set to True terrain on this playfield will be indestructible

# ==============================================================
# Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.80, 0.44, 0.17" 
SkyColor: "0.0, 0.0, 0.2"
SkyHorizonColor: "0.35, 0.15, 0"
AtmosphereParams: [3, 1.7]     

# Light
DayLightIntensity: 0.6
NightLightIntensity: 0.7

LightZenithColor: "1, 0.95, 0.95"
LightHorizonColor: "1, 0.5, 0"
NightLightColor: "1, 0.55, 0.3"

DayShadowStrength: 0.95
NightShadowStrength: 0.5

# Sun
SunFlare: EnvironmentalEffects/SunFlareYellow2

# Fog
FogColor: "1.2, 0.4, 0.0"
FogCloudIntensity: 0.8
# AtmosphereFog: 0.95
# GroundFogIntensity: 0.02
# GroundFogHeight: 35

# Clouds and Wind
CloudsDensity: 1
CloudsSharpness: 0.2
CloudsBrightness: 0.3
CloudsOpacity: 0.7
CloudsZenithColor: "0.6, -0.1, -0.4"
CloudsHorizonColor: "2, 0.1, 0.45"
CloudsNightHorizonColor: "0.8, 0.15, 0.00"
CloudsNightZenithColor: "0.8, 0.15, 0.00"
WindSpeed: 30


# Special effects around the player
SpecialEffectsLocal:
  - Name: Grime
    MaxHeight: 20

SpecialEffectsGlobal:
# Weather

 # Do not use the weathers CloudsLight, CloudsMedium, Wind, ColdWave here! (Their clouds react extremely to colouring)
 # weather Clear >>  Already in HeatWave


  - Name: Clouds
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1500
  - Name: CloudsDark
    Type: Weather
    InitialDelay: 0
    Delay: 2  
    Lifetime: 1200
  - Name: Fog
    Type: Weather
    InitialDelay: 48
    Delay: 12
    Lifetime: 1000
  - Name: HeatWave
    Type: Weather
    InitialDelay: 12
    Delay: 12
    Lifetime: 1200
  - Name: MeteorFireRain
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 300
  - Name: FireRain
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 300

# Global Effect
  - Name: MeteorShower
    Time: Day
    InitialDelay: 1
    Delay: 5
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid

  - Name: ThunderAndLightningPurple
    Time: Night
    InitialDelay: 1.5
    Delay: 4
    Lifetime: 300
    PlyDist: 100
    SpawnY: 500
    Struct: Avoid
# ==============================================================

### Resource Deposits
RandomResources: 
#T0:
#Carbon: poor/low
    - Name: CarbonResource
  #    Biome: [ Flats, CrystallizedRocks ]
      IsScalingCount: True
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 2, 6 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 1  
      MaxDroneCount: 4 
#T1:
#T2:
#T3:
    - Name: ErestrumResource
      Biome: [ Flats, CrystallizedRocks ]
      IsScalingCount: True
      CountMinMax: [ 5, 6 ]
      SizeMinMax: [ 8, 11 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 1  
      MaxDroneCount: 4 

    - Name: ZascosiumResource
      Biome: [ Plains, Dunes, Rocks ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 0.9
      MaxDroneCount: 4
      
#Special:
    - Name: MagnesiumResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 6, 16 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.9

    - Name: PromethiumResource
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 7, 11 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.4
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10

    - Name: GoldResource
      Biome: [ LavaEdge, LavaFolds, Plains ]
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 7, 11 ]
      DroneProb: 1
      MaxDroneCount: 3
      DepthMinMax: [ 6, 15 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

