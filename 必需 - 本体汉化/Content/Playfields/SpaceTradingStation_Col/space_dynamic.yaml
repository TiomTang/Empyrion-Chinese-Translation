### POIs
POIs:


      # Invisible Patrol target for Trading Station defenders
    - Type: BA_Alien
      Name: [MRK_SignalMarker01]     # 
      DisplayName: Guard Target

      Faction: Colonists
      FactionTerritory: [All]
      Mode: Survival
      CountMinMax: [ 1, 1 ]
      Probability: 1

      Pos: [0, 0, 0]
      Rot: [0, 0, 0]
      
      SpaceDefenseOverrideDefaults: True
      SpaceDefenseProbability: 0      # Since this is just a helper POI, it should not trigger attacks.
      Properties: 
        - Key: MapDistance   # This prevents detection even if close by
          Value: 0
        - Key: HudDistance   # This won't show the HUD marker even if close by
          Value: 0
        - Key: AIManExcludeFromPatrol # (This will exclude this POI from all patrol routes)
          Value: true


# Civilian

    - Type: BA_Alien
      GroupName: BAOColonists  
      DisplayName: Waystation
      Faction: Colonists
