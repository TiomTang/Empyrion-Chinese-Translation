# Playfield Characteristics

# Civilian trading station. Needs its own template to not get into trouble with the GalaxyConfig spawn chances.

Gravity: 0                         
AtmosphereEnabled: False          
PvPProb: 0
UseFixed: True                       
Radiation: [5,10]                    
TemperatureDay: [-200,-100]    
Music: [moonstone, space, DistantWorlds, Migration]          
 
PlayfieldType: Space  
PlanetType: StationTrading            

### Resource Asteroid


Description: |
  一个信标正在反复广播它的消息： 
  [i]“最优惠的价格！加满你的油箱！飞船全面维修！
  补给刚到货，机会仅此一次！
  马上联系我们！”[/i]



  [c]（要进入[b]贸易空间站界面[/b]，靠近它，并在你的飞船控制面板中选择绿色选项。）


### POIs
POIs:

# Civilian

    - Type: BA_Alien
      GroupName: BAOColonists  
      DisplayName: Waystation
      Faction: Colonists
      FactionTerritory: [All]
      Mode: Survival
      CountMinMax: [ 1, 1 ]     
      Probability: 1
      InitPower: True
      Pos: [0, 0, 0]
      Rot: [0, 0, 0]
      Properties: 
        - Key: Music
          Value: NebularClouds  
        - Key: Discovery
          Value: False
        - Key: PvEArea
          Value: 500
