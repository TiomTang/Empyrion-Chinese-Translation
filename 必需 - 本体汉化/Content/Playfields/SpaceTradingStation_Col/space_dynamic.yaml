# Playfield Characteristics

# Civilian trading station / Waystation. Outside of faction territories, and "less safe", less complex.
# Spawns only in None territory and Farr.

# Pirate drones will still spawn.

Gravity: 0
AtmosphereEnabled: False
PvPProb: 0
UseFixed: True
Radiation: [5,10]
TemperatureDay: [-200,-100]
Music: [moonstone, space, DistantWorlds, Migration]
 
PlayfieldType: Space  
PlanetType: StationTrading

