---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html


Description: |
  [c]注意：此游戏场地只是一个草图。[-][/c] 
  [c][808080][i]  世界在未来更新中可能会发生重大变化。目前可玩性有限。[-][/i][-][/c]

  这颗荒芜的岩石将它的历史刻在表面：
  已完全固化，没有大气来抹去痕迹和形状——
  所有的相遇都会被铭记。



PlanetType: BarrenCooled
PlayfieldType: Planet
Difficulty: 2

LandClaimZone: Device


# Atmosphere and Sky
AtmosphereEnabled: False

# Light
DayLightIntensity: 1.6
NightLightIntensity: 0.7

DayShadowStrength: 0.95

# Sun
SunFlare: EnvironmentalEffects/SunFlareWhiteMoon

# ==============================================================

### Resource Deposits
RandomResources:
    - Name: IronResource
      IsScalingCount: True
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 8, 13 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.3
      MaxDroneCount: 1

    - Name: SiliconResource
      IsScalingCount: True
      CountMinMax: [ 3, 5 ]
      SizeMinMax: [ 8, 9 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.4

    - Name: CopperResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.7
      MaxDroneCount: 1

    - Name: CobaltResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.7
      MaxDroneCount: 1

    - Name: MagnesiumResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 3, 4 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.7
      MaxDroneCount: 1 

    - Name: TitanResource
      IsScalingCount: True
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 3, 4 ]
      DroneProb: 0.7
      MaxDroneCount: 1
      DepthMinMax: [ 2, 5 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

    - Name: PentaxidResource
      IsScalingCount: True
      CountMinMax: [ 4, 5 ]
      SizeMinMax: [ 2, 3 ]
      DroneProb: 0.6
      MaxDroneCount: 2
      DepthMinMax: [ 0, 5 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

### Resource Asteroids
AsteroidResources:
     - Name: IronResource
       Threshold: 0.2
       Amount: 0.2
     - Name: SiliconResource
       Threshold: 0.2
       Amount: 0.2
     - Name: CopperResource
       Threshold: 0.2
       Amount: 0.2
     - Name: CobaltResource
       Threshold: 0.2
       Amount: 0.2
     - Name: MagnesiumResource
       Threshold: 0.2
       Amount: 0.2
     - Name: PromethiumResource
       Threshold: 0.2
       Amount: 0.2
     - Name: PentaxidResource
       Threshold: 0.2
       Amount: 0.2

### POIs
POIs:
    Random:  
        - GroupName: DroneBaseT1          #CommandCenter
          Faction: Zirax  
          NoShieldReload: True
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          CountMinMax: [ 0, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 5 ] 
          ReserveCount: 5
          Properties: 
            - Key: RegenAfter
              Value: 720

        - GroupName: CrashedShip    
          Faction: None      
          CountMinMax: [ 1, 1 ]
          IsScalingCount: True
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 4
          TroopTransport: False
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

        - GroupName: GhystAuxT1
          Faction: Ghyst  
          NoShieldReload: True
          CountMinMax: [ 3, 4 ]
          IsScalingCount: True 
          DroneProb: 0.7
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: False
          SpawnResource: ["PentaxidResource:0-1"]
          ResourceDistance: 400
          Properties: 
            - Key: RegenAfter
              Value: 720
# Civilians

        - GroupName: CivilSettlement 
          Territory: False
          Faction: Colonists                    #primarily for outside the territories
          NoShieldReload: True
          CountMinMax: [ 3, 4 ]
          Properties:  
            - Key: RegenAfter
              Value: 720 

# Progenitor 
        - GroupName: ProgenitorArtifacts      
          Faction: None     
          CountMinMax: [ 1, 1 ]
          IsScalingCount: True 
          DroneProb: 1.0
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 4
          TroopTransport: False
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

    FixedPlayerStart:
        - Mode: Debug
          Pos: [ -596, 104, -1063 ]
          RotY: 125

        - Mode: Survival
          Spawn: EscapePod
          Armor: ArmorMedium

