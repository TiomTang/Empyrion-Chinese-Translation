### Resource Deposits
RandomResources:
    - Name: IronResource
      Biome: [ Grassland, ColdPlains ]
      CountMinMax: [ 1, 2 ]
      SizeMinMax: [ 3, 5 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.0
      MaxDroneCount: 1

    - Name: CopperResource
      Biome: [ Forest, Oasis, Marsh, Swamp ]
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 3, 5 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.0

    - Name: SiliconResource
      Biome: [ Savanna, SavannaEdge, Tundra, DustBowl ]
      CountMinMax: [ 0, 2 ]
      SizeMinMax: [ 4, 6 ]
      DepthMinMax: [ 6, 15 ]
      DroneProb: 0.0

    - Name: PromethiumResource
      Biome: [ LowMountains, Mountains ]
      CountMinMax: [ 0, 1 ]
      SizeMinMax: [ 2, 3 ]
      DepthMinMax: [ 0, 1 ]
      DroneProb: 0.0
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10


    # =======  Might have been claimed by Zirax -
    - Name: PentaxidResource
      CountMinMax: [ 0, 1 ]
