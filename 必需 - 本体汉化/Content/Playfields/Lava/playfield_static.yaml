## === (3a) DRONEBASES - Standard ===========================================================================
## ==========================================================================================================

    # These POI are both Cluster Anchors (by SpawnPOINear) and avoidance targets (by SpawnPOIAvoid)
    # ! Their group names must not change, else the playfield will behave unexpectedly
    # DronebaseSetups / DronebaseSetupIDs are defined further down in this document

         # Factions sorted by territory vs. avoidance needs.

         # DB Tesch ============================

         # DB Zirax ============================

         # DB Zirax subfactions ================

        - GroupName: ZiraxDroneBase              #CommandCenter
          BiomesExcluded: [ LavaFolds, LavaEdge, Hotspot, Rocks_1, ColdPlains ]  
          Faction: Ghyst

          DroneBaseSetup: DroneBaseSetup
          IsCommandCenter: True

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ] 
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [VOIDSoulAnchor, CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          SpawnResource: ["PlatinResource:2-2" ]
          SpawnResourceRange: [150,200]
          Properties: 
            - Key: Music
              Value: moonstone
            - Key: RegenAfter
              Value: 720 
 
 
