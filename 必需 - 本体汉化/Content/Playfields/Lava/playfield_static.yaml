    Type: Weather
    InitialDelay: 0
    Delay: 2  
    Lifetime: 1200
  - Name: Fog
    Type: Weather
    InitialDelay: 48
    Delay: 12
    Lifetime: 1000
  - Name: HeatWave
    Type: Weather
    InitialDelay: 12
    Delay: 12
    Lifetime: 1200
  - Name: MeteorFireRain
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 300
  - Name: FireRain
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 300

