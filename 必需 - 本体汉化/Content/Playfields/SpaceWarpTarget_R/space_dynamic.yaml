  [b](1)[/b] [i]在绝望的情况下，仍有可能到达此区域。 
  你可以使用你的探索扫描数据；这些数据保存在[b]登记簿[/b]中。

  >打开物品栏；在窗口顶部选择“登记簿”标签，选择恒星星区（例如 Sun[Right]），然后选择你的飞船。 
  使用按钮在其上添加航点，然后退出登记簿。 
  借助另一艘飞船，你可以手动将飞船对准该航点，如果在范围内，则启动翘曲跳跃。[/i]



