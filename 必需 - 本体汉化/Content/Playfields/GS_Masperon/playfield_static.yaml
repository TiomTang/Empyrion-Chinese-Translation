      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3  
      
    - Name: TitanResource
    #  Biome: [ Meadow, Forest_Water, Forest_1, Forest, CopperOreClusters]
      IsScalingCount: True   # Medium Planet: 4-8 Deposits, Large planet 6-12
