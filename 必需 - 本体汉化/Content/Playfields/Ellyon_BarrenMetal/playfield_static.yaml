            - Key: Music
              Value: moonstone
            - Key: RegenAfter
              Value: 720

        - GroupName: DSRCTurret
          Faction: Zirax
          NoShieldReload: True
          CountMinMax: [ 3, 5 ]
          DroneProb: 0.8 
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 2
          TroopTransport: True
          SpawnPOINear: [DSRCMain]
          SpawnPOINearRange: [75, 150] 
          Properties: 
            - Key: RegenAfter
              Value: 720
              
          # Ships ====

          # Maybe a ticket home, if CV got destroyed. Spawns Overseers close by.
        - GroupName: CrashedShip
          IsImportant: True
          Faction: None
          Territory: False
          CountMinMax: [ 1, 1 ]
          DroneProb: 0.0
          DronesMinMax: [ 0, 0 ]
          ReserveCount: 0
          TroopTransport: False
          SpawnPOINear: [TS_Metal_Waypoint]
          SpawnPOINearRange: [300, 400]
          Properties: 
            - Key: MapMarker
              Value: Neutral

          # Another chance somewhere
        - GroupName: CrashedShip
          Faction: None
