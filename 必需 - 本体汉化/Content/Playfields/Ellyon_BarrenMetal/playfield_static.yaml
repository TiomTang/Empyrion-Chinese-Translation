---
# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html

Description: |
  [c][e0e020]注意:[-][/c]   [c]探测到多座防空炮塔。[-][/c]
  [c][808080][i]请格外小心。[-][/i][-][/c]

  在行星形成过程中，大部分重元素会沉入核心。
  但如果一次宇宙事故剥去了行星的外层，或者物质异常丰富——那么就可能形成所谓的“金属行星”。

  无论如何，行星都会留下一个“薄”的硅酸盐地幔，仅有“几百”公里厚。
  即便如此，仍然有大量矿藏可供开采，而且重元素和奇异元素的矿脉也易于获取。

  由于这里是罕见之地，它吸引了许多“守护者”。只有极为谨慎或实力最强的人才能找到通行的方法……——入侵者，小心。



PlanetType: BarrenMetal
PlayfieldType: Planet
Difficulty: 4

LandClaimZone: Device


# == Atmosphere and Sky
AtmosphereEnabled: True
AtmosphereColor: "0.6, 0.3, 0.0"

# LightStrength & Shadows
DayLightIntensity: 1.4
NightLightIntensity: 1.5
DayShadowStrength: 0.95
NightShadowStrength: 0.5

# Fog basics
FogCloudIntensity: 0.8
AtmosphereFog: 0
GroundFogIntensity: 0.02
GroundFogHeight: 180

# Atmosphere colours; will effect even weather
SunFlare: EnvironmentalEffects/SunFlareBlue

SkyColor: "0.9, 0.25, 0.0"
SkyHorizonColor: "0.5, 0.1, 0.005"
FogColor: "0.8, 0.40, 0.40"

LightZenithColor: "0.95, 0.95, 0.90"
LightHorizonColor: "0.8, 0.3, 0.1"
NightLightColor: "0.3, 0.4, 0.45"

CloudsZenithColor: "0.4, 0.108, 0.0"
CloudsHorizonColor: "0.4, 0.07, 0.05"
CloudsNightZenithColor: "0.03, 0.010, 0.01"
CloudsNightHorizonColor: "0.03, 0.010, 0.01"

# Wind
WindSpeed: 3

# Clouds. These parameters will only matter if NO weather effect is defined (='default' weather)
CloudsDensity: 0.95
CloudsSharpness: 1
CloudsBrightness: 0.3
CloudsOpacity: 0.5


# Special effects around the player
SpecialEffectsLocal:
  - Name: Grime
    MaxHeight: 20

SpecialEffectsGlobal:
# Weather
  - Name: Clear
    Type: Weather
    InitialDelay: 2
    Delay: 2  
    Lifetime: 600
  - Name: CloudsLight
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1200
  - Name: CloudsMedium
    Type: Weather
    InitialDelay: 6
    Delay: 2
    Lifetime: 1000
  - Name: CloudsDark
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 600
  - Name: FireRain
    Type: Weather
    InitialDelay: 48
    Delay: 24
    Lifetime: 600


# Global Effect
  - Name: MeteorShower
    Time: Day
    InitialDelay: 0
    Delay: 2
    Lifetime: 60
    PlyDist: 200
    SpawnY: 100
    Struct: Avoid


# ==============================================================

### Resource Deposits
RandomResources:

#T0: 

#T1:
    - Name: CopperResource
      Biome: [DustBowl, Rifts, Rifts_1, LargeCrater, SmallCrater, Dunes]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 16 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.6
        
    - Name: SiliconResource
      Biome: [ Plains, Sand, Dunes ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.2

#T2:

    - Name: CobaltResource
      Biome: [ DustBowl, Rocks, Rocks_1, LowMountains, LowMountains_1, Mountains, HighMountains, LargeCrater, SmallCrater ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 6, 9 ]
      DepthMinMax: [ 5, 10 ]
      DroneProb: 0.3

    - Name: SathiumResource 
      Biome: [ ShallowCanyon, DustBowl]
      IsImportant: true          # small target biome & not tied to a POI
      IsScalingCount: True 
      CountMinMax: [ 2, 2 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 0.9
      MaxDroneCount: 3 


#T3:
    - Name: ErestrumResource         # Rich. Will get grabbed by RocketTurret-POI
      Biome: [ Canyon, DeepCanyon ]
      IsScalingCount: True
      CountMinMax: [ 4, 4 ]
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 0.2  
      MaxDroneCount: 1 

    - Name: ErestrumResource
      Biome: [ ShallowCanyon, Canyon, DeepCanyon ]
      IsScalingCount: True
      CountMinMax: [ 5, 5 ]
      SizeMinMax: [ 3, 6 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 1  
      MaxDroneCount: 4 

    - Name: ZascosiumResource         #  Will get grabbed by RocketTurret-POI
      Biome: [ ShallowCanyon, Canyon, DeepCanyon ]
      IsScalingCount: True 
      CountMinMax: [ 8, 8 ]
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 0.5
      MaxDroneCount: 1
      
#Special
    - Name: PromethiumResource
      Biome: [Rocks, Rocks_1, LavaFolds, LavaEdge, ShallowCanyon, Canyon, DeepCanyon]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 7, 11 ]
      DroneProb: 0.7
      DepthMinMax: [ 0, 1 ]
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10
        
    - Name: GoldResource
      Biome: [ CanyonEdge, ShallowCanyon, Canyon, DeepCanyon, LargeCrater, SmallCrater ]
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 5, 6 ]
      DroneProb: 1
      MaxDroneCount: 3
      DepthMinMax: [ 5, 10 ]
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10



### Resource Asteroids
