        # - GroupName: CivilSettlement 
       # #   Territory: False
          # Faction: Main                    #fill up territories when CIV faction is not placed
          # NoShieldReload: True
          # CountMinMax: [ 3, 4 ]
          # Properties:  
            # - Key: RegenAfter
              # Value: 720 

# Pirates

        - GroupName: PiratesMain 
