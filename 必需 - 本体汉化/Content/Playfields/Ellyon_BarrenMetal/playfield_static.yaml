          DroneProb: 0.7
          DronesMinMax: [ 1, 2 ]
          ReserveCount: 6
          TroopTransport: True
          SpawnPOIAvoid: [ TS_Metal_Waypoint, ZiraxDroneBase, XenuArtilleryBase ]
          SpawnPOIAvoidDistance: 650
          Properties: 
            - Key: MapMarker
              Value: Neutral


    FixedPlayerStart:
