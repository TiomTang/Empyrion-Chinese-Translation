### POIs
POIs:
    Random:
    
    
# =========== Placing the basic POI for the playfield to work ===========

          # DroneBase Xenu - High difficulty POI (outdated, but fond memories of that 'plasma phalanx')
        - GroupName: ZiraxDroneBase                        #CommandCenter
          IsImportant: True
          Faction: Zirax
          NoShieldReload: True
          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetup
          BiomesExcluded: [ PoleEdge ] 
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 4 ]
          ReserveCount: 20
          TroopTransport: True
          SpawnPOIAvoid: [ START ]
          SpawnPOIAvoidDistance: 2000
          Properties: 
            - Key: Music
              Value: Encryptor
            - Key: RegenAfter
              Value: 720

          # Safe place to respawn after being shot down by turrets
        - GroupName: TS_Metal_Waypoint
          IsImportant: True
          Faction: Polaris
          NoShieldReload: True
          BiomesExcluded: [ PoleEdge ] 
          CountMinMax: [ 1, 1 ]
          DroneProb: 0
          DronesMinMax: [ 1 ]
          ReserveCount: 0
          TroopTransport: False 
          SpawnResource: ["ErestrumResource:1-1"]
          SpawnResourceRange: [100, 250]
          SpawnPOIAvoid: [ZiraxDroneBase, START]
          SpawnPOIAvoidDistance: 1000
          Properties: 
            - Key: MapMarker
              Value: Neutral
            - Key: RegenAfter
              Value: 720

# Kriel

        - GroupName: KrielMain 
