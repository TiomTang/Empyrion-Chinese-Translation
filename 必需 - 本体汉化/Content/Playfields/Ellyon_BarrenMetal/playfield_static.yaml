          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          TroopTransport: True
          SpawnPOINear: [START]
          SpawnPOINearRange: [0, 3000] 
          SpawnPOIAvoid: [ TS_Metal_Waypoint, ZiraxDroneBase]
          SpawnPOIAvoidDistance: 2000
