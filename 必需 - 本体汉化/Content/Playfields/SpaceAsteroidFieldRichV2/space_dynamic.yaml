# PLAYTIELD SUMMARY:


# A rich asteroid field in both numbers and materials.
# Much higher faction presence. 
# Tesch really like this place.
# Has a small chance for low-tier TheLegacy vessels encounters (Chance by Galaxyconfig). These vessels will likely end up in a fight with other factions.


Gravity: 0
AtmosphereEnabled: False
PvPProb: 0
UseFixed: True
Radiation: [5,10]
TemperatureDay: [-200,-100]
Music: [Resurgence, Vanguard]
 
PlayfieldType: Space
PlanetType: AsteroidFieldRich

Description: "\u4E00\u4E2A\u5145\u6EE1\u8D44\u6E90\u7684\u5C0F\u884C\u661F\u5E26\u2014\u2014\u5176\u4E2D\u4E00\u4E9B\u53EF\u80FD\u662F\u5947\u5F02\u8D44\u6E90\u3002\n\u56E0\u6B64\uFF0C\u76EE\u6807\u9635\u8425\u7684\u98DE\u8239\u3001\u4EE4\u4EBA\u754F\u60E7\u7684\u519B\u9600\uFF0C\u751A\u81F3\u66F4\u795E\u79D8\u7684\u529B\u91CF\u90FD\u53EF\u80FD\u88AB\u5438\u5F15\u5230\u6B64\u5904\u3002\n\n\u68C0\u67E5\u4F60\u7684\u9635\u8425\u5173\u7CFB\uFF1B\u52A1\u5FC5\u9AD8\u5EA6\u8C28\u614E\u3002\n"



