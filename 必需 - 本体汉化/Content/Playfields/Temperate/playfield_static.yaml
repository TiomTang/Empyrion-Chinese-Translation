# Playfield info ===========

#  This world has a rather large varability. 
#  Depending on Seed, it can have large Savannahs, but also half of the planet deep in snow.
#  Faction POI placement should keep that in mind, else there will be lots of spawnfails.



POIs:
    Random:

## === GENERAL INFO ( ca. v 0.88 ) (Header & DronebaseSetups)  ========================================================================================================

##  ! This template is for RANDOM playfields only! 
##  Sector-placed playfields will ignore the spawn restictions of the Galaxyconfig, likely resulting in too much POI

## ============

## If you are using a 'POI master list': Search and replace these generic keywords with a list of biomes of the playfield.
## It also helps when adding new POI, instead of memorizing all biomes. Use e.g. Notepad++ Autocomplete, then search/replace.

#### For Biome exclusions
##     BM_POLE               PoleEdge
##     BM_TOO_SMALL          Beach, DustBowl
##     BM_FORBIDDEN          If for some reason, there should be no POI here (e.g. Decoration overlaps)


#### For Biome spawns    # !! Always check if these are replaced, else the POI won't spawn !
##     BM_SPAWN_EASY_ALL     Biomes that are easy for POI to spawn in. - E.g. use for cluster anchor POI that need extra space.
##     BM_SPAWN_EASY_BRIGHT  SavannaEdge, Savanna, HighGrass // Grassland // PolarSnow  (! Depends on planet temperatures) // Sand, DustBowl, Beach (use only for single BA)
##     BM_SPAWN_EASY_DARK    Swamp, Forest, DeepForest // ColdPlains, Tundra, Permafrost
##     BM_SPAWN_HIDDEN       Swamp // DeepForest

##     BM_SPAWN_ROUGH        LowMountains, Mountains, GlacierSnow // DustBowl // Swamp // DeepForest
##     BM_SHOREWATER         Beach // WaterSwamp

##     BM_HOSTILE            Radiated
##     BM_VOLCANIC           


#### For Creature spawns
##     BM_NO_TROOPERS_HERE   # E.g. steep cliff sides, lava fields...
##     BM_TROOP_NICE_HERE    # E.g. lush oasis biomes



# POI order:                                  # ! This order is important, since it controls POI spawn chances. Most important POI come first.
                                                  # NEW POI? Plz add it to the fitting section, or the bottom of this list

#     (1) Planet Exclusives                   # POI that may be just alone on a planet, if they spawn.
#     (2) Helper POI                          # General spawning controls
#     (3a) Dronebases standard                # Normal faction POI DBs. For Drones, Base Attacks (CommandCenters)
#     (3b) 'Everywhere faction' Dronebases    # DBs that need playfield spawn restrictions, else they would be too dominant in the galaxy
#     (4) POI Clusters                        # POI that are tied to the DBs, or to other POIs.
#     (5) Factioned fillers                   # POIs in amounts scaling with planet size. To make a playfield more 'alive', especially in galactic territory. 
#     (6) AuxPOI                              # A POI definition that can be re-used at multiple places. -  ! POI used like this may not be spawned by other means in the same playfield.
#     (7) Lawless / Outposts                  # In galactic 'None'-Territory, or at the edges of faction bubbles. Controlled by 'IsLawless' helper POI.
#     (8) Complex & hidden POIs               # E.g. buried Pirate treasures, and their "hints"
#     (9) Nonfactioned fillers                # Abandoned, Ruins, nests, crashed vesels... - ! 'Alien' faction POI need to be placed late, else they might block others.



## === (1) PLANET EXCLUSIVES ================================================================================
## ==========================================================================================================

             # POI that should be the only ones on a planet.
             # The 'IsSettled' control POI will fully avoid these POI here, and all other POIs anchored to IsSettled will then fail to spawn.



          # # ==== Used for a mission. Please keep this entry unless the mission is changed.
          # # The Tesch keep this world free of the other aliens.

        # - GroupName: VOIDSoulAnchor # "EXCLUSIVE_POI_TO_AVOID"
          # BiomesExcluded: [ BM_POLE, BM_FORBIDDEN ]
          # Faction: Void  
          # CountMinMax: [ 2, 3 ]
          # Properties: 
            # - Key: Music
              # Value: lava 
            # - Key: RegenAfter
              # Value: 720



## === (2) CONTROL POI =======================================================================================
## ==========================================================================================================

            # Affecting spawns of other POI. Acting as a stable and quick reference.



         # ==== Legacy Infection control ==============
         # Keep this POI on any playfield. Use as an avoidance target, e.g. for Dronebases

        - GroupName: CNTRL_IsInfected  # (Invisible)
          CountMinMax: [ 1, 1 ]
          IsImportant: True
          Faction: TheLegacy  # Will only spawn if allowed by GalaxyConfig.
          Territory: False  # This POI will still claim *invisible* planet territory, preventing other spawns. Be careful
          PlaceAt: Terrain, OnWater
          SpawnPOINear: [START] # Spawn further away from center, to not block other faction POI spawns.
          SpawnPOINearRange: [3000, 10000] # For size class 2 moons,this marker will be likely at one of the corners of the map, possibly close to the Poles.
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0



         # ==== Lawless Space control ==============
         # Keep this POI on any playfield. Anchor other POIs to this with 'SpawnPOINear'. E.g. for Pirates, Colonists, Progenitor... - Warlords spawn last.

        - GroupName: CNTRL_IsLawless  # (Invisible)
          CountMinMax: [ 1, 1 ]
          IsImportant: True
          Faction: Warlord  # Warlord faction's grip increases the closer it gets to 'None' galactic territory
          Territory: False  # (Still claims invisible territory!)
          PlaceAt: Terrain, OnWater
          SpawnPOIAvoid: [CNTRL_IsInfected]  # Lawless POis will not spawn on Lgc worlds.
          SpawnPOIAvoidDistance: 45000
          SpawnPOINear: [START]
          SpawnPOINearRange: [3000, 10000]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


         # # ==== POI - Extra spawn control (Optional) =================
         # # CNTRL_IsSettled: Anchor other POIs to this with 'SpawnPOINear'.
         # # It this control POI fails, all those others will do, too, wiping the planet of them

        # - GroupName: CNTRL_IsSettled  # (Invisible)             # Used by POIs: 
          # CountMinMax: [ 1, 1 ]
          # IsImportant: True
          # Faction: None
          # PlaceAt: Terrain, OnWater
          # SpawnPOINear: [START]
          # SpawnPOINearRange: [100, 1500]
          # SpawnPOIAvoid: [EXCLUSIVE_POI_TO_AVOID]
          # SpawnPOIAvoidDistance: 45000
          # Properties:
            # - Key: MapDistance
              # Value: 0
            # - Key: HudDistance
              # Value: 0


         # # ==== Conflict Spawn Location ==============
          # # A control to place POIs of different factions closer together.

        # - GroupName: CNTRL_IsConflict  # (Invisible)
          # CountMinMax: [ 1, 1 ]
          # IsImportant: True
          # Faction: None  # 
          # PlaceAt: Terrain
          # SpawnPOINear: [START]
          # SpawnPOINearRange: [500, 2500]   # (Adjust this to planet scale. Moons have smaller range)
          # Properties:
            # - Key: MapDistance
              # Value: 0
            # - Key: HudDistance
              # Value: 0


         # ==== Coinflips ==========================
         # To reduce global spawn chances of some POI.

        - GroupName: CNTRL_Coinflip_01  # (Invisible)
          CountMinMax: [ 0, 1 ]       # The coinflip: Halving spawnchances of a POI avoiding this POI here fully.
          IsImportant: True
          Faction: None
          PlaceAt: Terrain, OnWater
          SpawnPOINear: [START]
          SpawnPOINearRange: [1000, 2500]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


        - GroupName: CNTRL_Coinflip_02  # (Invisible) 
          CountMinMax: [ 0, 1 ]     # Each additional coinflip POIs to be fully avoided will halve the spawn chances.
          IsImportant: True
          Faction: None
          PlaceAt: Terrain, OnWater
          SpawnPOINear: [START]
          SpawnPOINearRange: [1000, 2500]
          Properties:
            - Key: MapDistance
              Value: 0
            - Key: HudDistance
              Value: 0


         # ==== Resource clusters  =================

         # ==== OPV markers ========================

         # ==== Drone markers  =====================

## === (3a) DRONEBASES - Standard ===========================================================================
## ==========================================================================================================

    # These POI are both Cluster Anchors (by SpawnPOINear) and avoidance targets (by SpawnPOIAvoid)
    # ! Their group names must not change, else the playfield will behave unexpectedly
    # DronebaseSetups / DronebaseSetupIDs are defined further down in this document

         # Factions sorted by territory vs. avoidance needs.

         # DB Tesch ============================

         # DB Zirax ============================
         
        - GroupName: ZiraxDroneBase 
          BiomesExcluded: [ PolarSnow, DustBowl, Beach]  # (To prevent it from spawning at the poles or to prevent decoration overlaps)

          Faction: Zirax

          DroneBaseSetup: DroneBaseSetup
          IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties: 
            - Key: Music
              Value: lava
            - Key: RegenAfter
              Value: 720


         # DB Zirax subfactions ================

         # DB Rados  ========

         # DB Zirax (Epsilon) ========  

        - GroupName: EpsilonDronebase
          BiomesExcluded: [ PolarSnow, DustBowl, Beach ]
          Faction: Epsilon

          DroneBaseSetup: DroneBaseSetupEps
          IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 0, 1 ]  # 50% chance
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          SpawnPOINear: [ZiraxDroneBase]
          SpawnPOINearRange: [3000, 45000]  # Only inside of territories
          Properties: 
            - Key: Music
              Value: Encryptor 
            - Key: RegenAfter
              Value: 720



         # DB Abyssal  ========
        - GroupName: AbyssalDroneBase
          BiomesExcluded: [ PolarSnow, DustBowl, Beach ]  
          Faction: Abyssal

          DroneBaseSetup: DroneBaseSetupAby
          IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsLawless]
          SpawnPOIAvoidDistance: 2000
          Properties: 
            - Key: Music
              Value: Encryptor 
            - Key: RegenAfter
              Value: 720



         # DB Kriel ============================


        - GroupName: KrielDroneBase 
          Biome: [  PolarSnow, GlacierSnow, ColdPlains, Tundra, Swamp, DeepForest, LowMountains, Mountains ]  # 'darker' Biomes
          Faction: Kriel

          DroneBaseSetup: DroneBaseSetupKrl

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, ARCDronebase]
          SpawnPOIAvoidDistance: 2000
          DroneProb: 1.0
          DronesMinMax: [ 6, 8 ]
          ReserveCount: 10
          NoShieldReload: True
          Properties: 
            - Key: Music
              Value: Encryptor
            - Key: RegenAfter
              Value: 720 


         # DB ArkenianRepublic =================

        - GroupName: PolarisDroneBase 
          Biome: [ Sand, SavannaEdge, Savanna, HighGrass] # 'brighter' biomes
          Faction: ArkenianRepublic

          DroneBaseSetup: DroneBaseSetupArk
          IsCommandCenter: True      # BA attacks

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          Properties: 
            - Key: Music
              Value: desert
            - Key: RegenAfter
              Value: 720



        # DB PRENN (Trader) ========

        - GroupName: PrennDroneBaseT1 # Is also a trading station, but normal core. Needs breathable atmo
          Biome: [ Marsh, Heath, Hills, Peat, Plains, TallTrees ]
          Faction: PrennFederation

          DroneBaseSetup: DroneBaseSetupPre
          # IsCommandCenter: True

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 4, 6 ]
          ReserveCount: 7
          NoShieldReload: True 
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          Properties:
            - Key: Music
              Value: SunnySkies
            - Key: RegenAfter
              Value: 720 
            - Key: Discovery  # Traders broadcasting their position
              Value: False

         # DB Farr =============================

        - GroupName: FarrDroneBase
          BiomesExcluded: [ PoleEdge, DustBowl, Beach ]
          Faction: Farr 

          DroneBaseSetup: DroneBaseSetupFarr

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True 
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000

          SpawnResource: ["GoldResource:1-1"]  # 
          SpawnResourceRange: [150,300]

          Properties:
            - Key: Music
              Value: desert
            - Key: RegenAfter
              Value: 720 

         # DB (Other mini-factions)=============

         # DB Talon ============================


        
        - GroupName: TribalZiggurat                      #CommandCenter
          Biome: [ DeepForest, Forest, Marsh, Swamp ]
          Faction: Talon  

          IsCommandCenter: True

          IsImportant: True
          CountMinMax: [ 1, 1 ]
