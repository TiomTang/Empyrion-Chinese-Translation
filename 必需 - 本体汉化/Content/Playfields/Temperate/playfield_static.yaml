          LevelMod: +3
          SpawnPOIAvoid: [CNTRL_IsInfected]
          SpawnPOIAvoidDistance: 45000
          SpawnResource: ["IronResource:1-1","SiliconResource:1-1","CopperResource:1-1"]
          SpawnResourceRange: [150,400]
          Properties: 
            - Key: RegenAfter
              Value: 720


         # DB TheLegacy (Infected Planets) =====

         # "DB" TheLegacy  ========
          # Not yet a "dronebase" but may act as an avoidance target for other POI.
        - GroupName: LegacyCrawler     # SC 18 - Dungeon 'crashed vessel'. Solo, keep space for it
          Biome: [ DeepForest, Forest, Swamp, Tundra, ColdPlains, Radiated]
          Faction: TheLegacy 

          IsImportant: True
          CountMinMax: [ 1, 1 ]
          DroneProb: 1.0
          DronesMinMax: [ 1, 3 ]
          NoShieldReload: True
          Properties: 
            - Key: Music
              Value: WhatWalksBelow
            - Key: RegenAfter
              Value: 720




## === (3b) DRONEBASES ('Everywhere' factions) ==============================================================
## ==========================================================================================================

             # DBs that need playfield spawn restrictions, else they would be too dominant due to galaxyconfig spawn chances.


         # DB Polaris ==========================

            #  ( Rich PFs only. 25% spawn, Avoid IsInfected)

         # DB Pirates ==========================

        - GroupName: PiratesDroneBase
          Biome: [ Sand, SavannaEdge, Savanna, HighGrass, DeepForest, Forest, Swamp, Tundra, Beach ]
          Faction: Pirates

          DroneBaseSetup: DroneBaseSetupPir

          IsImportant: True
          CountMinMax: [ 1, 1 ]

          SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, EpsilonDronebase, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase]
          SpawnPOIAvoidDistance: 5000 # Far away from other factions / Dangers
          SpawnPOINear: [CNTRL_IsLawless]  # Avoids IsInfected
          SpawnPOINearRange: [500, 45000]

          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties:
            - Key: Music
              Value: desert 
            - Key: RegenAfter
              Value: 720

         # DB Epsilon (In-territory) ===========


            #  ( Only at living PFs. Avoid IsInfected. - Avoid IsLawless, OR SpawnPOINear to a Zirax faction POI )

