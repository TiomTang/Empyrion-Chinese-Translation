## === (3b) DRONEBASES ('Everywhere' factions) ==============================================================
## ==========================================================================================================

             # DBs that need playfield spawn restrictions, else they would be too dominant due to galaxyconfig spawn chances.


         # DB Polaris ==========================

            #  ( Rich PFs only. 25% spawn, Avoid IsInfected)

         # DB Pirates ==========================

        - GroupName: PiratesDroneBase
          Biome: [ Sand, SavannaEdge, Savanna, HighGrass, DeepForest, Forest, Swamp, Tundra, ColdPlains, Beach ]
          Faction: Pirates

          DroneBaseSetup: DroneBaseSetupPir

          IsImportant: True
          CountMinMax: [ 1, 1 ]

          SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, EpsilonDronebase, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase]
          SpawnPOIAvoidDistance: 5000 # Far away from other factions / Dangers
          SpawnPOINear: [CNTRL_IsLawless]  # Avoids IsInfected
          SpawnPOINearRange: [500, 45000]

          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ]
          ReserveCount: 5
          NoShieldReload: True
          Properties:
            - Key: Music
              Value: desert 
            - Key: RegenAfter
              Value: 720

         # DB Epsilon (In-territory) ===========


            #  ( Only at living PFs. Avoid IsInfected. - Avoid IsLawless, OR SpawnPOINear to a Zirax faction POI )

         # DB Warlord ==========================


        - GroupName: DroneBaseT1
          Faction: Warlord
          CountMinMax: [ 1, 1 ]  # (100% spawn at living & precious PFs, 50% at low interest)

          IsCommandCenter: True
          DroneBaseSetup: DroneBaseSetupWar

          DroneProb: 1.0
          DronesMinMax: [ 3, 5 ] 
          ReserveCount: 5
          NoShieldReload: True
          SpawnPOINear: [CNTRL_IsLawless]
          SpawnPOINearRange: [500, 45000]
          SpawnPOIAvoid: [ZiraxDroneBase, DroneBaseT1, PolarisDroneBase, KrielDroneBase, ARCDronebase, FarrDroneBase]
          SpawnPOIAvoidDistance: 45000 # Fully avoids
          Properties: 
            - Key: Music
              Value: moonstone 
            - Key: RegenAfter
              Value: 720



