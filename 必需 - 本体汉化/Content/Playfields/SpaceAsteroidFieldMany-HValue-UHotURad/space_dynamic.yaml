# Playfield Characteristics


# Massive ratiation and crazy temperature - Will have Promethium and Pentaxid
# At least one Zascosium asteroid, likely another
# Gold and Platinum asteroids may spawn


Description: |
  [c][e0e020]警告:[-][/c]   [c][b]极高辐射[/b]。 
  极端温度。- 这里是敌对空间。[-][/c]

  [c][808080][i]不要在这里被困。[-][/i][-][/c]

  无论这里能找到什么，它都来自深空。 
  散落的、失踪的岩石……或者是流浪卫星的残骸……被炸成碎片。

  很少有访客会疯狂到尝试开采这种东西。 
  如果他们这样做了，他们往往少说多射。



Gravity: 0
AtmosphereEnabled: False
PvPProb: 0
UseFixed: True
# Radiation: [60,80]
# TemperatureDay: [150,300]
Radiation: [150,200]      # Absurdly radiated.
TemperatureDay: [300,500] # Also very hot.

Music: [Hyperion] # 
# Music: [Goliath] ## 
 
PlayfieldType: Space
PlanetType: AsteroidsUltraRich

