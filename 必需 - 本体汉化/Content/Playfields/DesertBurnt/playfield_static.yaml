# =============== SPAWN CONTROL POI ================

# ==== Used for a mission. Please keep this entry unless the mission is changed.

# IMPORTANT NOTE: If a 'Void' faction POI will spawn on the planet, ALL other faction POIs will fail to spawn.
# (Due to SpawnPOIAvoid & SpawnPOINear settings.)
# This is intended. The Progenitor keep this world free of the other aliens.

        - GroupName: VOIDSoulAnchor
          BiomesExcluded: [ Plains ] # Too close at poles
          Faction: Void  
          NoShieldReload: True
          CountMinMax: [ 2, 3 ]
          DroneProb: 0
          DronesMinMax: [ 0, 1 ]
          ReserveCount: 3
         # TroopTransport: True
         # SpawnPOINear: [TOP]
         # SpawnPOINearRange: [500, 1500]
          Properties: 
            - Key: Music
              Value: lava 
            - Key: RegenAfter
              Value: 720


          # Helper POI =============
          # Used as an extra condition to dedice if any other faction should be allowed spawn.
          #  (Other factions will try to 'SpawnNear', as "cluster POI" and if this POI isn't there, the spawn will fail.)
        - GroupName: PlayerSpawnerWater  # (Invisible POI without geometry.)  
          Faction: None
          IsImportant: True
          CountMinMax: [ 1, 1]

          BiomesExcluded: [ Plains ] # Too close at poles
          PlaceAt: Terrain, OnWater
          # FactionTerritory: [All] 
          Territory: False

          SpawnPOIAvoid: [ VOIDSoulAnchor ]
          SpawnPOIAvoidDistance: 46000  # (Max46000) Will not spawn if there is already a different helper POI spawned by a different faction
          SpawnPOINear: [START] 
          SpawnPOINearRange: [0, 1000] # This increases spawn chances, and keeps the SpawnPOIAvoid working
          Properties: 
            - Key: RegenAfter
              Value: 720
            - Key: Discovery
              Value: True
            - Key: HudDistance
              Value: 0
            - Key: MapDistance
              Value: 0




