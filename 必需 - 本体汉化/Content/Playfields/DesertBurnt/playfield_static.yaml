# Playfield Configuration
# IMPORTANT: YAML files use spaces as indentation. Please don't use TABs - tab indentation is forbidden: http://yaml.org/faq.html


Description: |
  在其形成过程中，这个世界从未经历过太多的“翻搅”。

  如今它饱受停滞的行星核心以及各层岩石之间巨大的温差之苦——且没有板块构造来释放压力。

  因此，地幔层与行星其他部分相比冷却得过快——使其表面像巨大的蛋壳般收缩并开裂。

  通常这里没有火山……但**如果**它们真的突破这样的裂缝，往往会极端猛烈——伴随大陆规模的熔岩流与覆盖整个行星的火山灰。

  在最近一次这样的喷发中，仍有幸存者：
  从排水沟与地穴中，生命正缓缓探索这个陌生的新世界……


PlanetType: DesertBurnt
PlayfieldType: Planet
Difficulty: 3

LandClaimZone: Device


# Special Effects 
SpecialEffectsLocal:
  - Name: FireFliesRed
    Biome: [Water, ShallowWater, Shore]
    Time: Night
    MaxHeight: 40
  - Name: Grime
    Biome: [Plains, Flowers, FlowersEdge, Wadi, DustBowl]
    Time: Night
    MaxHeight: 150
  - Name: Pollen
    Biome: [Plains, DustBowl, Plantation, Flowers, FlowersEdge, Oasis]
    Time: Day
    MaxHeight: 150
  - Name: FireFliesGreen
    Biome: [Oasis, Plantation]
    Time: Night
    MaxHeight: 150



SpecialEffectsGlobal:
# Weather
  - Name: Clear
    Type: Weather
    InitialDelay: 0
    Delay: 2
    Lifetime: 1200
  - Name: HeatWave
    Type: Weather
    InitialDelay: 48
    Delay: 12
    Lifetime: 1200
  - Name: Wind
    Type: Weather
    InitialDelay: 20
    Delay: 8
    Lifetime: 500




