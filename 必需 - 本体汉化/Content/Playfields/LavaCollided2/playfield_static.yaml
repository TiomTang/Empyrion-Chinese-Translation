### Resource Deposits
RandomResources:


      # Resources are clustered close to the equator



    - Name: ErestrumResource
      Biome: [ CollisionZoneEquator, LavaEdge, LavaFolds ]
      IsScalingCount: True
      CountMinMax: [ 5, 6 ]
      SizeMinMax: [ 8, 11 ]
      DepthMinMax: [ 5, 20 ]
      DroneProb: 1  
      MaxDroneCount: 4 

    - Name: PromethiumResource
      Biome: [ CollisionZoneEquator, LavaEdge, LavaFolds ]
      IsScalingCount: True 
      CountMinMax: [ 2, 3 ]
      SizeMinMax: [ 7, 11 ]
      DepthMinMax: [ 10, 15 ]
      DroneProb: 0.4

    - Name: ZascosiumResource
      Biome: [ CollisionZoneEquator, LavaEdge, LavaFolds ]
      IsScalingCount: True 
      CountMinMax: [ 1, 2 ] # (Lava planet has: 2,3)
      SizeMinMax: [ 5, 6 ]
      DepthMinMax: [ 10, 20 ]
      DroneProb: 1
      MaxDroneCount: 5

    - Name: GoldResource
      Biome: [ CollisionZoneEquator, LavaFolds, Plains ]
      IsScalingCount: True
      CountMinMax: [ 1, 3 ]
      SizeMinMax: [ 7, 11 ]
      DroneProb: 1
      MaxDroneCount: 3
      DepthMinMax: [ 6, 15 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10

    - Name: PlatinResource
      Biome: [ LavaFolds ]
      IsScalingCount: True 
      CountMinMax: [ 1, 1 ]
      SizeMinMax: [ 4, 5 ]
      DepthMinMax: [ 10, 15 ]
      DroneProb: 1
      MaxDroneCount: 5



