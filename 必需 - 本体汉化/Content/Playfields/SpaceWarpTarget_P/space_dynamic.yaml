Description: |
  [b]空旷的太空[/b]，位于非常接近一颗亚恒星天体的某处。

  [c][e0e020]注意：[-][/c]   [c] 不建议将飞船停泊在这个东西附近。[-][/c]


  ……该天体的辐射以及缺乏可锁定的中等质量天体，使得锁定此区域极其困难。[b](1)[/b]
  许多闲置的航母飞船因此迷失——漂入了潜伏的引力井中。


  [b](1)[/b] [i]在绝望的情况下，仍有可能抵达此区域。
  你可以使用你的探索扫描数据；这些数据保存在 [b]登记簿[/b] 中。

  > 打开物品栏；在窗口顶部选择登记簿标签，选择恒星星区（例如 Sun[Right]），然后选择你的飞船。
  使用按钮在其上添加一个航路点。退出登记簿。
  用另一艘飞船，你可以手动将飞船对准该航路点，如果在范围内，则可启动翘曲跳跃。[/i]



