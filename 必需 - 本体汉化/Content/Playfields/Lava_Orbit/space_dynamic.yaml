# ========= Patrol Vessels =================
# Note: Do not add VOID, Progenitor, DESC (for now), UCH or GLaD as they are only "story factions"; 
# Do not use ALIEN as this faction is only hostile to the Player, while other factions ignore it. Use E.g. Warlord instead.



          - Name: [OPVTeschT0,OPVTeschT1,OPVTeschT2,OPVTeschT3,OPVTeschT4,OPVTeschT5,OPVTeschT6]
            Faction: Tesch
            CountMinMax: [0, 1]
            Probability: 1        # Prob = 1 because SpaceOrbit is ALWAYS around a planet AND if the faction owns that territory, there should ALWAYS be at least 1 guarding patrol vessel!
            CanNotBeControlledByMasterAI: False 
            FixedMaxSpeed: [20, 50] 
            Mission: SpacePatrol   
            MissionDescription:
              DelayBetweenRespawnMinMax: [3600, 3600]
              DelayBeforeSelfDestructionMinMax: [3600, 3600]
              IsRespawnAfterDestruction: True               
              RadiusMinMax: [750, 10000] 
          #    POINameAsPositionRef: [BAO_TeschNodeT1a, BAO_TeschNodeT1b, BAO_TeschNodeT2, BAO_TeschNodeT3, BAO_TeschArrayLD, BAO_TeschArrayHD]
            StockDescription:
              Name: [SpaceDroneLaser]     
              AmountMinMax: [0, 0]       #Faction has no own drones, although this setting is manadtory
              Type: FighterDrone  
            Properties:                        # OPV = default behavior is to patrol POIs of the own faction. Drones shall patrol Resources.
              - Key: SelfDestructionWithNoCore # Military ships = self destruct!
                Value: True                        
              - Key: AIManMaxPursuitRange 
                Value: 4000

          - Name: [OPVZiraxT3,OPVZiraxT4,OPVZiraxT5,OPVZiraxT6]     
            Faction: Zirax
            CountMinMax: [1, 2]  # Precious planet
            Probability: 1       
            CanNotBeControlledByMasterAI: False 
            FixedMaxSpeed: [20, 50] 
            Mission: SpacePatrol   
            MissionDescription:
              DelayBetweenRespawnMinMax: [3600, 3600]
              DelayBeforeSelfDestructionMinMax: [3600, 3600]
              IsRespawnAfterDestruction: True               
              RadiusMinMax: [750, 10000]        #[Min radius, Max radius] defines the boundaries the patrol area radius in meter drawn randomly; Default: 1000
         #     POINameAsPositionRef: [BAO_XenuShipyard, BAO_GhystShipyard]
            StockDescription:
              Name: [SpaceDroneLaser, SpaceDronePlasma] 
              AmountMinMax: [2, 4]  
              Type: FighterDrone  
            Properties:                        # OPV = default behavior is to patrol POIs of the own faction. Drones shall patrol Resources.
              - Key: SelfDestructionWithNoCore # Military ships = self destruct!
                Value: True                        
