### Resource Deposits
RandomResources:

    - Name: IronResource  # Rich - Will be grabbed by POI
      Biome: [ Plains, LowMountains, LowMountains_2, LowMountains_1, Plateau, Mountains, LargeCrater ]
      CountMinMax: [ 1, 1 ]     # Number of large-sized deposits
      IsScalingCount: True
      SizeMinMax: [ 6, 10 ] 
      DepthMinMax: [ 0, 3 ]
      DroneProb: 0.2 
      MaxDroneCount: 1

    - Name: CopperResource
      Biome: [ LowMountains, LowMountains_2, LowMountains_1, Plateau, Mountains, TallTrees, LargeCrater ]
      CountMinMax: [ 1, 1 ]
      IsScalingCount: True
      SizeMinMax: [ 5, 8 ]
      DepthMinMax: [ 0, 3 ]
      DroneProb: 0.3

    - Name: SiliconResource
      Biome: [ Plains, Heath, LowMountains, LowMountains_2, LowMountains_1, Plateau, Mountains, TallTrees ]
      CountMinMax: [ 1, 1 ]
      IsScalingCount: True
      SizeMinMax: [ 6, 10 ]
      DepthMinMax: [ 0, 3 ]
      DroneProb: 0.3

    - Name: PromethiumResource  # Tiny - Anywhere on the planet.
      Biome: [ Morass, SwampEdge, Swamp, Marsh, LargeCrater ]
      CountMinMax: [ 1, 1 ]     # (See below: Highest count of PromethiumResource = This amount sets the _total number_ of ore deposits on the planet.)
      IsScalingCount: True      # (Resource deposits x2 on Medium planet, x3 on Large.)
      SizeMinMax: [ 0, 3 ]      # (About 10-30 ore.)
      DroneProb: 0.8
      DepthMinMax: [ 0, 1 ]
      DistTypeCylinder:
        MaxRadius: 13
        YVariance: 10

    # - Name: TitanResource  # Tiny - Anywhere on the planet.
     # # Biome: [ Morass, SwampEdge, Swamp, Marsh, LargeCrater ]
      # CountMinMax: [ 1, 1 ]     # (See below: Highest count of PromethiumResource = This amount sets the _total number_ of ore deposits on the planet.)
      # IsScalingCount: True      # (Resource deposits x2 on Medium planet, x3 on Large.)
      # SizeMinMax: [ 4, 6 ]      # (About 10-30 ore.)
      # DroneProb: 0.8
      # DepthMinMax: [ 0, 1 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10
      
    # - Name: NeodymiumResource  # Tiny - Anywhere on the planet.
  # #    Biome: [ Morass, SwampEdge, Swamp, Marsh, LargeCrater ]
      # CountMinMax: [ 1, 1 ]     # (See below: Highest count of PromethiumResource = This amount sets the _total number_ of ore deposits on the planet.)
      # IsScalingCount: True      # (Resource deposits x2 on Medium planet, x3 on Large.)
      # SizeMinMax: [ 4, 6 ]      # (About 10-30 ore.)
      # DroneProb: 0.8
      # DepthMinMax: [ 0, 1 ]
      # DistTypeCylinder:
        # MaxRadius: 13
        # YVariance: 10      
      
    - Name: CobaltResource
      Biome: [ Swamp, Plains, Heath, LowMountains, LowMountains_2, LowMountains_1, Plateau, Mountains, TallTrees, LargeCrater ]
      CountMinMax: [ 1, 1 ] 
      # IsScalingCount: True
      SizeMinMax: [ 4, 5 ] 
      DepthMinMax: [ 0, 3 ] 
      DroneProb: 0.2 
      MaxDroneCount: 1

      # Ultra-tiny 'nice find' deposits

    - Name: GoldResource
      Biome: [ Swamp, Plains, Heath, LowMountains, LowMountains_2, LowMountains_1, Plateau, Mountains, TallTrees, LargeCrater ]
      CountMinMax: [ 1, 1 ] 
      IsScalingCount: True
      SizeMinMax: [ 2, 2 ] 
      DepthMinMax: [ 0, 3 ]
      DroneProb: 1
      MaxDroneCount: 1

